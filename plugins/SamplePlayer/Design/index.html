    function setupNativeSessionStateBridge(retryAttempt = 0) {
      const backend = getNativeBackend();
      if (!backend || typeof backend.addEventListener !== "function") {
        if (retryAttempt < 40) {
          if (!state.sessionBridgeRetryTimer) {
            if (retryAttempt === 0 || (retryAttempt + 1) % 10 === 0) {
              debugLoadLog(`restore bridge pending | waiting for native backend | retry=${retryAttempt + 1}`);
            }
            state.sessionBridgeRetryTimer = window.setTimeout(() => {
              state.sessionBridgeRetryTimer = 0;
              setupNativeSessionStateBridge(retryAttempt + 1);
            }, 50);
          }
          return;
        }
        state.sessionStateRestoreAttempted = true;
        debugLoadLog("restore bridge unavailable | no native backend after retries");
        completeLoadingOverlay("Ready");
        return;
      }
      if (state.sessionBridgeRetryTimer) {
        window.clearTimeout(state.sessionBridgeRetryTimer);
        state.sessionBridgeRetryTimer = 0;
      }

      notifyNativeFrontendReady();

      if (state.nativeSessionListeners.length) return;

      try {
        debugLoadLog("restore strategy | resource-fetch + bridge fallback");
        const stateToken = backend.addEventListener("session_state_changed", (payload) => {
          const requestFull = !!payload?.full;
          const version = Number.isFinite(Number(payload?.version)) ? Math.round(Number(payload.version)) : -1;
          const reason = String(payload?.reason || (requestFull ? "push-full" : `push-${version >= 0 ? version : "light"}`)).trim();
          if (state.sessionPayloadLock) return;
          if (state.manualPackLoadInProgress || Date.now() < Number(state.ignoreSessionPayloadUntil || 0)) return;
          void fetchNativeSessionStateSnapshot({ full: requestFull, reason, allowBridgeFallback: true });
        });
        const statePayloadToken = backend.addEventListener("session_state_payload", (payload) => {
          debugLoadLog("restore fallback payload | bridge");
          void applySessionStateFromPayload(payload);
        });
        const sampleDataToken = backend.addEventListener("sample_data_payload", (payload) => {
          handleSampleDataPayload(payload);
        });
        const manifestPickToken = backend.addEventListener("instrument_manifest_picked", (payload) => {
          handleInstrumentManifestPickedPayload(payload);
        });
        const graphicPickToken = backend.addEventListener("native_graphic_file_picked", (payload) => {
          handleNativeGraphicFilePickedPayload(payload);
        });
        const graphicDataToken = backend.addEventListener("graphic_data_payload", (payload) => {
          handleGraphicDataPayload(payload);
        });
        const saveResultToken = backend.addEventListener("instrument_save_result", (payload) => {
          handleInstrumentSaveResult(payload);
        });
        const midiActivityToken = backend.addEventListener("midi_activity", (payload) => {
          handleNativeMidiActivity(payload);
        });
        const nativeAudioPickToken = backend.addEventListener("native_audio_files_picked", (payload) => {
          handleNativePickedAudioFiles(payload);
        });
        state.nativeSessionListeners = [stateToken, statePayloadToken, sampleDataToken, manifestPickToken, graphicPickToken, graphicDataToken, saveResultToken, midiActivityToken, nativeAudioPickToken];
      } catch {
        state.nativeSessionListeners = [];
        debugLoadLog("restore bridge failed | listener registration");
        completeLoadingOverlay("Ready");
        return;
      }

      let initialFetchAttempts = 0;
      const maxInitialFetchAttempts = 1;
      const requestInitialSessionState = () => {
        initialFetchAttempts += 1;
        void fetchNativeSessionStateSnapshot({
          full: false,
          reason: `initial-${initialFetchAttempts}`,
          allowBridgeFallback: true
        });
        debugLoadLog(`restore requested | fetch snapshot | mode=light | attempt=${initialFetchAttempts}`);

        if (state.sessionStateRestoreTimeout) {
          window.clearTimeout(state.sessionStateRestoreTimeout);
        }
        state.sessionStateRestoreTimeout = window.setTimeout(() => {
          state.sessionStateRestoreTimeout = 0;
          if (state.sessionStateRestored) return;
          if (initialFetchAttempts < maxInitialFetchAttempts) {
            debugLoadLog(`restore retry | no payload yet | nextAttempt=${initialFetchAttempts + 1}`);
            requestInitialSessionState();
            return;
          }
          if (!state.sessionStateRestoreAttempted) {
            state.sessionStateRestoreAttempted = true;
          }
          debugLoadLog("restore timeout | no session payload after retries");
          updateStrumUi();
          emitStrumSettings();
          completeLoadingOverlay("Ready");
        }, 1200);
      };

      requestInitialSessionState();

      window.addEventListener("pagehide", () => {
        void flushSessionStateToNative(true, { includeEmbeddedSampleData: true });
      });
      window.addEventListener("beforeunload", () => {
        void flushSessionStateToNative(true, { includeEmbeddedSampleData: true });
      });
    }

    function stripFileExtension(name) {
      return String(name || "").replace(/\.[^/.]+$/, "");
    }

    function normalizeKeyswitchKey(rawValue, fallbackMidi = 12) {
      const raw = String(rawValue || "").trim().toUpperCase();
      const parsed = noteToMidi(raw);
      if (parsed === null) {
        const safeMidi = Math.max(0, Math.min(127, Math.round(Number(fallbackMidi) || 12)));
        return {
          keyMidi: safeMidi,
          key: midiToNote(safeMidi),
          valid: false
        };
      }
      return {
        keyMidi: parsed,
        key: midiToNote(parsed),
        valid: true
      };
    }

    function suggestUnusedKeyswitchMidi() {
      const used = new Set();
      (state.keyswitchSets || []).forEach((set) => {
        if (Number.isFinite(set?.keyMidi)) used.add(Math.round(set.keyMidi));
      });
      for (let midi = 12; midi <= 48; midi += 1) {
        if (!used.has(midi)) return midi;
      }
      return 12;
    }

    function collectDuplicateKeyswitchKeys() {
      const byMidi = new Map();
      (state.keyswitchSets || []).forEach((set) => {
        const midi = Number.isFinite(set?.keyMidi) ? Math.round(set.keyMidi) : null;
        if (midi === null) return;
        if (!byMidi.has(midi)) byMidi.set(midi, []);
        byMidi.get(midi).push(set.id);
      });
      const duplicates = new Map();
      byMidi.forEach((ids, midi) => {
        if (ids.length > 1) duplicates.set(midi, ids);
      });
      return duplicates;
    }

    function getKeyswitchSetById(setId) {
      const id = String(setId || "");
      return (state.keyswitchSets || []).find((set) => String(set.id || "") === id) || null;
    }

    function isKeyswitchSetLoopPlaybackEnabled(set) {
      return !set || set.loopPlaybackEnabled !== false;
    }

    function findKeyswitchSetForEntry(entry) {
      if (!entry || !Array.isArray(state.keyswitchSets)) return null;
      const setIdHint = String(entry.mapSetId || "").trim();
      if (setIdHint) {
        const hinted = getKeyswitchSetById(setIdHint);
        if (hinted) return hinted;
      }
      for (const set of state.keyswitchSets) {
        if (!Array.isArray(set?.entries)) continue;
        if (set.entries.includes(entry)) return set;
      }
      return null;
    }

    function isEntryLoopPlaybackEnabled(entry) {
      const ownerSet = findKeyswitchSetForEntry(entry);
      if (ownerSet) return isKeyswitchSetLoopPlaybackEnabled(ownerSet);
      return state.baseLoopPlaybackEnabled !== false;
    }

    function getDuplicateKeyswitchNotes() {
      return Array.from(collectDuplicateKeyswitchKeys().keys())
        .sort((a, b) => a - b)
        .map((midi) => midiToNote(midi));
    }

    function getBaseMapEntries() {
      return state.entries.filter((entry) => entry.valid);
    }

    function getAvailableMapSets() {
      const sets = [];
      const baseEntries = getBaseMapEntries();
      const keyswitchSets = Array.isArray(state.keyswitchSets) ? state.keyswitchSets : [];
      const keyswitchMode = keyswitchSets.length > 0;
      if (!keyswitchMode && baseEntries.length) {
        sets.push({
          id: "base",
          label: "Main",
          entries: baseEntries,
          manualRanges: state.manualRootRanges
        });
      }

      keyswitchSets.forEach((set) => {
        const keyLabel = set.key ? ` (${set.key})` : "";
        sets.push({
          id: set.id,
          label: `${set.name}${keyLabel}`,
          entries: Array.isArray(set.entries) ? set.entries.filter((entry) => entry.valid) : [],
          manualRanges: set.manualRanges || {}
        });
      });
      if (!sets.length) {
        sets.push({
          id: "base",
          label: "Main",
          entries: baseEntries,
          manualRanges: state.manualRootRanges
        });
      }
      return sets;
    }

    function getActiveMapSet() {
      const available = getAvailableMapSets();
      if (!available.length) return null;
      let active = available.find((item) => item.id === state.activeMapSetId) || null;
      if (!active) {
        active = available[0];
        state.activeMapSetId = active.id;
      }
      return active;
    }

    function getKeyswitchSetGainDb(setOrId) {
      const set = typeof setOrId === "string"
        ? getKeyswitchSetById(setOrId)
        : setOrId;
      return clampKeyswitchGainDb(set?.gainDb ?? 0);
    }

    function getActiveMapEntries() {
      const active = getActiveMapSet();
      if (!active) return [];
      return Array.isArray(active.entries) ? active.entries : [];
    }

    function getActiveMapManualRanges() {
      const active = getActiveMapSet();
      if (!active) return state.manualRootRanges;
      if (active.id === "base") return state.manualRootRanges;
      const set = getKeyswitchSetById(active.id);
      if (!set) return state.manualRootRanges;
      if (!set.manualRanges || typeof set.manualRanges !== "object") {
        set.manualRanges = {};
      }
      return set.manualRanges;
    }

    function getPlayerPlaybackSource() {
      const keyswitchSets = Array.isArray(state.keyswitchSets) ? state.keyswitchSets : [];
      if (keyswitchSets.length > 0) {
        const activeKeyswitchSet = getKeyswitchSetById(state.activeMapSetId) || keyswitchSets[0];
        if (activeKeyswitchSet && activeKeyswitchSet.id !== state.activeMapSetId) {
          state.activeMapSetId = activeKeyswitchSet.id;
          updateKeyswitchMapSelector();
        }
        return {
          entries: Array.isArray(activeKeyswitchSet?.entries) ? activeKeyswitchSet.entries.filter((entry) => entry.valid) : [],
          manualRanges: activeKeyswitchSet?.manualRanges || {},
          oneShotPlayback: resolveKeyswitchPlaybackMode(activeKeyswitchSet) === "oneshot"
        };
      }
      return {
        entries: state.entries.filter((entry) => entry.valid),
        manualRanges: state.manualRootRanges,
        oneShotPlayback: isBasePlaybackModeOneShot()
      };
    }

    function setActiveMapSet(setId, shouldRender = true) {
      const next = String(setId || "base");
      const available = getAvailableMapSets();
      const keyswitchMode = (state.keyswitchSets || []).length > 0;
      const exists = available.some((item) => item.id === next);
      let resolvedId = exists ? next : (available[0]?.id || "base");
      if (keyswitchMode && resolvedId === "base") {
        resolvedId = available.find((item) => item.id !== "base")?.id || resolvedId;
      }
      const changed = state.activeMapSetId !== resolvedId;
      state.activeMapSetId = resolvedId;
      if (changed) {
        // Switch processor map slot first, then do any expensive UI rendering.
        emitNativeEvent("active_map_set", { setId: resolvedId });
      }
      if (changed) stopAllPreviewVoices();
      closeSampleEditor();
      state.mapMatrixRrCursor = {};
      state.mapMatrixPaintActive = false;
      state.mapMatrixLastPaintCellKey = "";
      if (shouldRender) {
        renderKeyboardMap(undefined, true);
        renderPlayerKeyboard();
      }
      updateKeyswitchMapSelector();
      if (changed && shouldRender) {
        scheduleSessionStateSave(650);
      }
    }

    function clampSequencerVelocity(v) {
      return Math.max(1, Math.min(127, Math.round(Number(v) || 100)));
    }

    function normalizeSequencerKeyswitchId(keyswitchSetId) {
      const value = String(keyswitchSetId || "").trim();
      if (!value) return "";
      const sets = Array.isArray(state.keyswitchSets) ? state.keyswitchSets : [];
      return sets.some((set) => String(set?.id || "") === value) ? value : "";
    }

    function normalizeKeyswitchPlaybackMode(value) {
      return String(value || "").trim().toLowerCase() === "oneshot" ? "oneshot" : "spread";
    }

    function isBasePlaybackModeOneShot() {
      return normalizeKeyswitchPlaybackMode(state.basePlaybackMode) === "oneshot";
    }

    function normalizeKeyswitchTriggerModeName(name) {
      const normalized = String(name || "").trim().toLowerCase().replace(/[\s_-]+/g, "");
      if (normalized === "on" || normalized === "noteon" || normalized === "keyon") return "on";
      if (normalized === "off" || normalized === "noteoff" || normalized === "keyoff") return "off";
      return "manual";
    }

    function getKeyswitchTriggerMode(set) {
      return normalizeKeyswitchTriggerModeName(set?.name);
    }

    function resolveKeyswitchPlaybackMode(set) {
      return getKeyswitchTriggerMode(set) === "manual"
        ? normalizeKeyswitchPlaybackMode(set?.playbackMode)
        : "oneshot";
    }

    function isKeyswitchPlaybackModeOneShot(set) {
      return resolveKeyswitchPlaybackMode(set) === "oneshot";
    }

    function getKeyswitchToolbarModeState(set) {
      if (!set) {
        if (state.baseLoopPlaybackEnabled !== false) return "loop";
        return isBasePlaybackModeOneShot() ? "anykey" : "oneshot";
      }
      const triggerMode = getKeyswitchTriggerMode(set);
      if (triggerMode !== "manual") return "anykey";
      if (resolveKeyswitchPlaybackMode(set) === "oneshot") return "anykey";
      return isKeyswitchSetLoopPlaybackEnabled(set) ? "loop" : "oneshot";
    }

    function setKeyswitchToolbarModeState(set, mode) {
      const normalizedMode = String(mode || "").trim().toLowerCase();
      if (!set) {
        state.baseLoopPlaybackEnabled = normalizedMode === "loop";
        state.basePlaybackMode = normalizedMode === "anykey" ? "oneshot" : "spread";
        return normalizedMode;
      }
      if (getKeyswitchTriggerMode(set) !== "manual") {
        set.playbackMode = "oneshot";
        set.loopPlaybackEnabled = false;
        return "anykey";
      }
      if (normalizedMode === "loop") {
        set.playbackMode = "spread";
        set.loopPlaybackEnabled = true;
        return "loop";
      }
      if (normalizedMode === "anykey") {
        set.playbackMode = "oneshot";
        set.loopPlaybackEnabled = false;
        return "anykey";
      }
      set.playbackMode = "spread";
      set.loopPlaybackEnabled = false;
      return "oneshot";
    }

    function normalizeSequencerStep(step) {
      const source = (step && typeof step === "object") ? step : {};
      let noteMidi = Number(source.noteMidi);
      if (!Number.isFinite(noteMidi)) {
        const parsed = noteToMidi(String(source.note || "").trim());
        noteMidi = parsed === null ? 60 : parsed;
      }
      const rawRateIndex = Number(source.rateIndex);
      const rateIndex = Number.isFinite(rawRateIndex)
        ? Math.max(0, Math.min(4, Math.round(rawRateIndex)))
        : 2;

      return {
        noteMidi: Math.max(0, Math.min(127, Math.round(noteMidi))),
        velocity: clampSequencerVelocity(source.velocity),
        rateIndex: rateIndex,
        keyswitchSetId: normalizeSequencerKeyswitchId(source.keyswitchSetId)
      };
    }

    function normalizeSequencerSteps(steps) {
      const source = Array.isArray(steps) ? steps : [];
      const normalized = [];
      for (let i = 0; i < SEQUENCER_STEP_COUNT; i += 1) {
        normalized.push(normalizeSequencerStep(source[i]));
      }
      return normalized;
    }

    function ensureSequencerState() {
      state.sequencerSteps = normalizeSequencerSteps(state.sequencerSteps);
      state.sequencerHostTriggerEnabled = !!state.sequencerHostTriggerEnabled;
      state.sequencerDoubling = !!state.sequencerDoubling;
      if (!Number.isFinite(state.sequencerRateIndex)) state.sequencerRateIndex = 2;
      state.sequencerRateIndex = Math.max(0, Math.min(3, Math.round(state.sequencerRateIndex)));
      if (!Number.isFinite(state.sequencerCurrentStep)) state.sequencerCurrentStep = -1;
      if (state.sequencerCurrentStep >= SEQUENCER_STEP_COUNT || state.sequencerCurrentStep < -1) {
        state.sequencerCurrentStep = -1;
      }
    }

    function buildSequencerSnapshot() {
      ensureSequencerState();
      return {
        hostTriggerEnabled: !!state.sequencerHostTriggerEnabled,
        doubling: !!state.sequencerDoubling,
        rateIndex: Math.max(0, Math.min(3, Math.round(Number(state.sequencerRateIndex) || 2))),
        steps: state.sequencerSteps.map((step) => ({
          noteMidi: Math.max(0, Math.min(127, Math.round(Number(step?.noteMidi) || 60))),
          velocity: clampSequencerVelocity(step?.velocity),
          rateIndex: Math.max(0, Math.min(4, Math.round(Number(step?.rateIndex) || 2))),
          keyswitchSetId: normalizeSequencerKeyswitchId(step?.keyswitchSetId)
        }))
      };
    }

    function buildStrumSnapshot() {
      ensureStrumStepPattern();
      return {
        enabled: !!state.strumEnabled,
        sequencerSteps: Math.max(0, Math.min(8, Math.round(Number(state.strumSequencerSteps) || 0))),
        sequencerMode: Math.max(0, Math.min(2, Number(state.strumSequencerMode) || 0)),
        doubling: !!state.strumDoubling,
        showOnMain: !!state.strumShowOnMain,
        rateIndex: Math.max(0, Math.min(3, Number(state.strumRateIndex) || 0)),
        swingPercent: Math.max(0, Math.min(20, Number(state.strumSwingPercent) || 0)),
        velocityHumanizePercent: Math.max(0, Math.min(20, Number(state.strumVelocityHumanizePercent) || 0)),
        timingHumanizeMs: Math.max(0, Math.min(10, Number(state.strumTimingHumanizeMs) || 0)),
        stepPattern: state.strumStepPattern.slice(0, 8).map((step) => {
          const n = normalizeStrumStep(step);
          return {
            rateIndex: n.rateIndex,
            keyswitchSetId: n.keyswitchSetId,
            subVelocities: n.subVelocities.slice()
          };
        })
      };
    }

    function applyStrumSnapshot(snapshot) {
      const source = (snapshot && typeof snapshot === "object") ? snapshot : {};
      state.strumSequencerSteps = Number.isFinite(source.sequencerSteps) ? Math.max(0, Math.min(8, Math.round(source.sequencerSteps))) : 0;
      state.strumSequencerMode = Number.isFinite(source.sequencerMode) ? Math.max(0, Math.min(2, Math.round(source.sequencerMode))) : 0;
      state.strumEnabled = source.enabled !== undefined ? !!source.enabled : (state.strumSequencerSteps > 0);
      state.strumDoubling = !!source.doubling;
      state.strumShowOnMain = !!source.showOnMain;
      state.strumRateIndex = Number.isFinite(source.rateIndex) ? Math.max(0, Math.min(3, Math.round(source.rateIndex))) : 2;
      state.strumSwingPercent = Number.isFinite(source.swingPercent) ? Math.max(0, Math.min(20, Math.round(source.swingPercent))) : 0;
      state.strumVelocityHumanizePercent = Number.isFinite(source.velocityHumanizePercent) ? Math.max(0, Math.min(20, Math.round(source.velocityHumanizePercent))) : 0;
      state.strumTimingHumanizeMs = Number.isFinite(source.timingHumanizeMs) ? Math.max(0, Math.min(10, Math.round(source.timingHumanizeMs))) : 0;
      if (Array.isArray(source.stepPattern)) {
        state.strumStepPattern = source.stepPattern.slice(0, 8).map(normalizeStrumStep);
      }
      ensureStrumStepPattern();
    }

    function updateSequencerModeButton() {
      if (!el.sequencerModeBtn) return;
      const enabled = !!state.sequencerHostTriggerEnabled;
      el.sequencerModeBtn.textContent = enabled ? "On" : "Off";
      el.sequencerModeBtn.setAttribute("aria-pressed", enabled ? "true" : "false");

        : "Sequencer Off: play mapped notes directly";

    function updateSequencerDoublingButton() {
      if (!el.sequencerDoublingBtn) return;
      const on = !!state.sequencerDoubling;
      el.sequencerDoublingBtn.textContent = on ? "Doubling On" : "Doubling Off";
      el.sequencerDoublingBtn.setAttribute("aria-pressed", on ? "true" : "false");
      el.sequencerDoublingBtn.classList.toggle("active", on);

    function updateSequencerRateButton() {

      const RATE_LABELS = ["1/4", "1/8", "1/16", "1/32"];
      const idx = Math.max(0, Math.min(3, Math.round(Number(state.sequencerRateIndex) || 2)));
      el.sequencerRateBtn.textContent = "Rate " + RATE_LABELS[idx];
    }

    function updateSequencerStepHighlight() {
      if (!el.sequencerGrid) return;
      const activeIndex = Math.max(-1, Math.min(SEQUENCER_STEP_COUNT - 1, Math.round(Number(state.sequencerCurrentStep) || -1)));
      const stepNodes = el.sequencerGrid.querySelectorAll(".sequencer-step[data-step-index]");
      stepNodes.forEach((node) => {
        const index = Math.round(Number(node.dataset.stepIndex));

      });
    }

    function applySequencerSnapshot(snapshot, shouldRender = true) {
      const source = (snapshot && typeof snapshot === "object") ? snapshot : {};
      state.sequencerHostTriggerEnabled = !!source.hostTriggerEnabled;
      state.sequencerDoubling = !!source.doubling;
      state.sequencerRateIndex = Number.isFinite(source.rateIndex) ? Math.max(0, Math.min(3, Math.round(source.rateIndex))) : 2;
      state.sequencerSteps = normalizeSequencerSteps(source.steps);
      state.sequencerCurrentStep = -1;
      if (shouldRender) renderSequencerArpControls();
    }

    function renderSequencerArpControls() {
      ensureSequencerState();
      updateSequencerModeButton();
      updateSequencerDoublingButton();
      updateSequencerRateButton();

      if (!el.sequencerGrid) {
        updateSequencerStepHighlight();
        return;
      }

      const keyswitchSets = Array.isArray(state.keyswitchSets) ? state.keyswitchSets : [];
      const keyswitchOptions = [{ value: "", label: "Keep" }];
      keyswitchSets.forEach((set, index) => {
        const id = String(set?.id || "").trim();
        if (!id) return;
        const keyText = String(set?.key || "").trim();
        keyswitchOptions.push({
          value: id,
          label: keyText || `KS${index + 1}`
        });
      });

      el.sequencerGrid.textContent = "";
      state.sequencerSteps.forEach((step, index) => {
        const normalizedStep = normalizeSequencerStep(step);
        state.sequencerSteps[index] = normalizedStep;

        const stepNode = document.createElement("div");
        stepNode.className = "sequencer-step";
        stepNode.dataset.stepIndex = String(index);

        const head = document.createElement("div");
        head.className = "sequencer-step-head";
        const title = document.createElement("div");
        title.className = "sequencer-step-title";
        title.textContent = `Step ${index + 1}`;
        head.appendChild(title);
        stepNode.appendChild(head);

        const noteField = document.createElement("div");
        noteField.className = "sequencer-step-field";
        const noteLabel = document.createElement("label");
        noteLabel.textContent = "N";
        const noteInput = document.createElement("input");
        noteInput.className = "sequencer-step-note";
        noteInput.type = "text";
        noteInput.maxLength = 4;
        noteInput.autocomplete = "off";
        noteInput.spellcheck = false;
        noteInput.dataset.stepIndex = String(index);
        noteInput.dataset.field = "note";
        noteInput.value = midiToNote(normalizedStep.noteMidi);
        noteField.appendChild(noteLabel);
        noteField.appendChild(noteInput);
        stepNode.appendChild(noteField);

        const velocityField = document.createElement("div");
        velocityField.className = "sequencer-step-field";
        const velocityLabel = document.createElement("label");
        velocityLabel.textContent = "V";
        const velocityInput = document.createElement("input");
        velocityInput.className = "sequencer-step-velocity";
        velocityInput.type = "number";
        velocityInput.min = "1";
        velocityInput.max = "127";
        velocityInput.step = "1";
        velocityInput.inputMode = "numeric";
        velocityInput.dataset.stepIndex = String(index);
        velocityInput.dataset.field = "velocity";
        velocityInput.value = String(normalizedStep.velocity);
        velocityField.appendChild(velocityLabel);
        velocityField.appendChild(velocityInput);
        stepNode.appendChild(velocityField);

        const keyswitchField = document.createElement("div");
        keyswitchField.className = "sequencer-step-field";
        const keyswitchLabel = document.createElement("label");
        keyswitchLabel.textContent = "KS";
        const keyswitchSelect = document.createElement("select");
        keyswitchSelect.className = "sequencer-step-keyswitch";
        keyswitchSelect.dataset.stepIndex = String(index);
        keyswitchSelect.dataset.field = "keyswitch";
        keyswitchOptions.forEach((optionData) => {
          const option = document.createElement("option");
          option.value = optionData.value;
          option.textContent = optionData.label;
          option.selected = optionData.value === normalizedStep.keyswitchSetId;
          keyswitchSelect.appendChild(option);
        });
        keyswitchField.appendChild(keyswitchLabel);
        keyswitchField.appendChild(keyswitchSelect);
        stepNode.appendChild(keyswitchField);

        const SEQ_RATE_LABELS = ["1/4", "1/8", "1/16", "1/32", "Rest"];
        const rateField = document.createElement("div");
        rateField.className = "sequencer-step-field";
        const rateLabel = document.createElement("label");
        rateLabel.textContent = "R";
        const rateWrap = document.createElement("div");
        rateWrap.className = "sequencer-step-rate-wrap";
        const rateBtn = document.createElement("button");
        rateBtn.className = "sample-loop-tool-btn strum-menu-btn sequencer-step-rate-btn";
        rateBtn.type = "button";
        rateBtn.dataset.stepIndex = String(index);
        rateBtn.textContent = SEQ_RATE_LABELS[normalizedStep.rateIndex] || "1/16";
        rateBtn.setAttribute("aria-haspopup", "true");
        rateBtn.setAttribute("aria-expanded", "false");
        rateField.appendChild(rateLabel);
        rateWrap.appendChild(rateBtn);
        rateField.appendChild(rateWrap);
        stepNode.appendChild(rateField);

        el.sequencerGrid.appendChild(stepNode);
      });

      updateSequencerStepHighlight();
    }

    function setupSequencerArp() {
      ensureSequencerState();

      // Floating rate overlay — lives on document.body to avoid overflow clipping
      const seqRateOverlay = document.createElement("div");
      seqRateOverlay.className = "strum-menu hidden";
      seqRateOverlay.setAttribute("role", "menu");
      seqRateOverlay.setAttribute("aria-label", "Step rate");
      document.body.appendChild(seqRateOverlay);
      let seqRateOverlayStepIndex = -1;

      const SEQ_RATE_OVERLAY_LABELS = ["1/4", "1/8", "1/16", "1/32", "Rest"];

      const showSeqRateOverlay = (btn, stepIndex) => {
        const step = normalizeSequencerStep(state.sequencerSteps[stepIndex]);
        seqRateOverlay.innerHTML = "";
        SEQ_RATE_OVERLAY_LABELS.forEach((label, rateIdx) => {
          const item = document.createElement("button");
          item.className = "strum-menu-item sequencer-step-rate-item";
          item.type = "button";
          item.dataset.stepIndex = String(stepIndex);
          item.dataset.stepRateIndex = String(rateIdx);
          item.textContent = label;
          item.classList.toggle("active", rateIdx === step.rateIndex);
          seqRateOverlay.appendChild(item);
        });
        seqRateOverlayStepIndex = stepIndex;
        const rect = btn.getBoundingClientRect();
        seqRateOverlay.style.minWidth = `${Math.max(72, Math.round(rect.width))}px`;
        seqRateOverlay.style.left = "";
        seqRateOverlay.style.top = "";
        seqRateOverlay.classList.remove("hidden");
        const menuRect = seqRateOverlay.getBoundingClientRect();
        let top = rect.top - 6 - menuRect.height;
        let left = rect.left;
        if (top < 0) top = rect.bottom + 6;
        if (left + menuRect.width > window.innerWidth) {
          left = Math.max(0, window.innerWidth - menuRect.width - 4);
        }
        seqRateOverlay.style.top = `${Math.round(top)}px`;
        seqRateOverlay.style.left = `${Math.round(left)}px`;
      };

      seqRateOverlay.addEventListener("click", (ev) => {
        const item = ev.target instanceof Element ? ev.target.closest(".sequencer-step-rate-item") : null;
        if (!(item instanceof HTMLButtonElement)) return;
        const stepIndex = Math.round(Number(item.dataset.stepIndex));
        if (!Number.isFinite(stepIndex) || stepIndex < 0 || stepIndex >= SEQUENCER_STEP_COUNT) return;
        ensureSequencerState();
        ensureSessionStateWritable("sequencer-step-rate-select");
        const step = normalizeSequencerStep(state.sequencerSteps[stepIndex]);
        step.rateIndex = Math.max(0, Math.min(4, Math.round(Number(item.dataset.stepRateIndex) || 2)));
        state.sequencerSteps[stepIndex] = step;
        closeSequencerMenus();
        renderSequencerArpControls();
        if (el.sequencerArpStatus) setStatus(el.sequencerArpStatus, "");
        emitSequencerSettings();
        scheduleSessionStateSave(320);
      });

      const positionSequencerMenuAt = (btn, menu) => {
        if (!btn || !menu) return;
        const rect = btn.getBoundingClientRect();
        const menuGap = 6;
        menu.style.left = "";
        menu.style.top = "";
        menu.style.right = "";
        menu.style.bottom = "";
        menu.style.minWidth = `${Math.max(72, Math.round(rect.width))}px`;
        menu.classList.remove("hidden");
        const menuRect = menu.getBoundingClientRect();
        let top = rect.top - menuGap - menuRect.height;
        let left = rect.left;
        if (top < 0) {
          top = rect.bottom + menuGap;
        }
        if (left + menuRect.width > window.innerWidth) {
          left = Math.max(0, window.innerWidth - menuRect.width - 4);
        }
        menu.style.top = `${Math.round(top)}px`;
        menu.style.left = `${Math.round(left)}px`;
      };

      const closeSequencerMenus = () => {
        if (el.sequencerRateMenu) {
          el.sequencerRateMenu.classList.add("hidden");
          el.sequencerRateMenu.style.top = "";
          el.sequencerRateMenu.style.left = "";
          el.sequencerRateMenu.style.right = "";
          el.sequencerRateMenu.style.bottom = "";
          el.sequencerRateMenu.style.minWidth = "";
        }
        if (el.sequencerRateBtn) el.sequencerRateBtn.setAttribute("aria-expanded", "false");
        seqRateOverlay.classList.add("hidden");
        seqRateOverlay.style.top = "";
        seqRateOverlay.style.left = "";
        seqRateOverlay.innerHTML = "";
        seqRateOverlayStepIndex = -1;
        Array.from(document.querySelectorAll(".sequencer-step-rate-btn")).forEach((btn) => {
          btn.setAttribute("aria-expanded", "false");
        });
      };

      if (el.sequencerGrid) {
        el.sequencerGrid.addEventListener("focusin", (ev) => {
          const target = ev.target;
          if (!(target instanceof HTMLInputElement)) return;
          if (!target.classList.contains("sequencer-step-note")
              && !target.classList.contains("sequencer-step-velocity")) return;
          window.requestAnimationFrame(() => {
            try {
              target.select();
            } catch {}
          });
        });

        el.sequencerGrid.addEventListener("change", (ev) => {
          const target = ev.target;
          if (!(target instanceof Element)) return;
          const stepIndex = Math.round(Number(target.getAttribute("data-step-index")));
          if (!Number.isFinite(stepIndex) || stepIndex < 0 || stepIndex >= SEQUENCER_STEP_COUNT) return;
          const field = String(target.getAttribute("data-field") || "");
          const step = normalizeSequencerStep(state.sequencerSteps[stepIndex]);

          ensureSessionStateWritable("sequencer-step-edit");

          if (field === "note" && target instanceof HTMLInputElement) {
            const parsed = noteToMidi(target.value);
            if (parsed !== null) {
              step.noteMidi = Math.max(0, Math.min(127, Math.round(parsed)));
            }
            target.value = midiToNote(step.noteMidi);
          } else if (field === "velocity" && target instanceof HTMLInputElement) {
            step.velocity = clampSequencerVelocity(target.value);
            target.value = String(step.velocity);
          } else if (field === "keyswitch" && target instanceof HTMLSelectElement) {
            step.keyswitchSetId = normalizeSequencerKeyswitchId(target.value);
            target.value = step.keyswitchSetId;
          } else {
            return;
          }

          state.sequencerSteps[stepIndex] = step;
          if (el.sequencerArpStatus) setStatus(el.sequencerArpStatus, "");
          emitSequencerSettings();
          scheduleSessionStateSave(320);
        });

        el.sequencerGrid.addEventListener("click", (ev) => {
          const target = ev.target;
          if (!(target instanceof Element)) return;

          const rateBtn = target.closest(".sequencer-step-rate-btn");
          if (rateBtn instanceof HTMLButtonElement) {
            const stepIndex = Math.round(Number(rateBtn.dataset.stepIndex));
            if (!Number.isFinite(stepIndex) || stepIndex < 0 || stepIndex >= SEQUENCER_STEP_COUNT) return;
            const isOpen = seqRateOverlayStepIndex === stepIndex && !seqRateOverlay.classList.contains("hidden");
            closeSequencerMenus();
            if (!isOpen) {
              showSeqRateOverlay(rateBtn, stepIndex);
              rateBtn.setAttribute("aria-expanded", "true");
            }
          }
        });

        el.sequencerGrid.addEventListener("blur", (ev) => {
          const target = ev.target;
          if (!(target instanceof HTMLInputElement)) return;
          if (!target.classList.contains("sequencer-step-note")) return;
          const stepIndex = Math.round(Number(target.dataset.stepIndex));
          if (!Number.isFinite(stepIndex) || stepIndex < 0 || stepIndex >= SEQUENCER_STEP_COUNT) return;
          const step = normalizeSequencerStep(state.sequencerSteps[stepIndex]);
          target.value = midiToNote(step.noteMidi);
        }, true);
      }

      if (el.sequencerModeBtn) {
        el.sequencerModeBtn.addEventListener("click", () => {
          ensureSequencerState();
          ensureSessionStateWritable("sequencer-mode-toggle");
          state.sequencerHostTriggerEnabled = !state.sequencerHostTriggerEnabled;
          state.sequencerCurrentStep = -1;
          updateSequencerModeButton();
          updateSequencerStepHighlight();
          emitNativeEvent("sequencer_host_trigger_set", {
            enabled: !!state.sequencerHostTriggerEnabled
          });
          scheduleSessionStateSave(220);
        });
      }

      if (el.sequencerDoublingBtn) {
        el.sequencerDoublingBtn.addEventListener("click", () => {
          ensureSequencerState();
          ensureSessionStateWritable("sequencer-doubling-toggle");
          state.sequencerDoubling = !state.sequencerDoubling;
          updateSequencerDoublingButton();
          emitSequencerSettings();
          scheduleSessionStateSave(220);
        });
      }

      if (el.sequencerRateBtn && el.sequencerRateMenu) {
        el.sequencerRateBtn.addEventListener("click", (ev) => {
          ev.stopPropagation();
          const isOpen = !el.sequencerRateMenu.classList.contains("hidden");
          closeSequencerMenus();
          if (!isOpen) {
            positionSequencerMenuAt(el.sequencerRateBtn, el.sequencerRateMenu);
            el.sequencerRateBtn.setAttribute("aria-expanded", "true");
          }
        });
        el.sequencerRateMenu.addEventListener("click", (ev) => {
          const btn = ev.target.closest("[data-seq-rate-index]");
          if (!btn) return;
          const idx = Math.round(Number(btn.dataset.seqRateIndex));
          if (!Number.isFinite(idx) || idx < 0 || idx > 3) return;
          ensureSequencerState();
          ensureSessionStateWritable("sequencer-rate-change");
          state.sequencerRateIndex = idx;
          state.sequencerSteps = state.sequencerSteps.map((step) => ({
            ...normalizeSequencerStep(step),
            rateIndex: idx
          }));
          updateSequencerRateButton();
          renderSequencerArpControls();
          closeSequencerMenus();
          emitSequencerSettings();
          scheduleSessionStateSave(220);
        });
      }

      document.addEventListener("click", (ev) => {
        const target = ev.target;
        if (!(target instanceof Element)) return;
        const clickedInsideOverlay = seqRateOverlay.contains(target);
        const clickedInsideMenu = clickedInsideOverlay || !!target.closest("#sequencerRateMenu");
        const clickedMenuButton = !!target.closest(".sequencer-step-rate-btn") || !!target.closest("#sequencerRateBtn");
        if (!clickedInsideMenu && !clickedMenuButton) closeSequencerMenus();
      });

      updateSequencerModeButton();
      updateSequencerDoublingButton();
      updateSequencerRateButton();
      renderSequencerArpControls();
    }

    function emitStrumSettings() {
      const stepCount = getStrumVisibleStepCount();
      const payload = {
        enabled: !!state.strumEnabled && stepCount > 0,
        sequencerMode: stepCount <= 0 ? 0 : (stepCount <= 4 ? 1 : 2),
        doubling: !!state.strumDoubling,
        rateIndex: getStrumEffectiveRateIndex(),
        swingPercent: Math.max(0, Math.min(20, Number(state.strumSwingPercent) || 0)),
        velocityHumanizePercent: Math.max(0, Math.min(20, Number(state.strumVelocityHumanizePercent) || 0)),
        timingHumanizeMs: Math.max(0, Math.min(10, Number(state.strumTimingHumanizeMs) || 0)),
        stepPattern: getVisibleStrumStepPattern()
      };
      emitNativeEvent("strum_settings_set", payload);
    }

    function emitSequencerSettings() {
      ensureSequencerState();
      emitNativeEvent("sequencer_settings_set", {
        doubling: !!state.sequencerDoubling,
        rateIndex: Math.max(0, Math.min(3, Math.round(Number(state.sequencerRateIndex) || 2))),
        stepPattern: state.sequencerSteps.map((step) => ({
          noteMidi: Math.max(0, Math.min(127, Math.round(Number(step?.noteMidi) || 60))),
          velocity: clampSequencerVelocity(step?.velocity),
          rateIndex: Math.max(0, Math.min(4, Math.round(Number(step?.rateIndex) || 2))),
          keyswitchSetId: normalizeSequencerKeyswitchId(step?.keyswitchSetId)
        }))
      });
    }

    function getStrumVisibleStepCount() {
      const explicit = Number(state.strumSequencerSteps);
      if (Number.isFinite(explicit)) {
        return Math.max(0, Math.min(8, Math.round(explicit)));
      }
      const legacyMode = Math.max(0, Math.min(2, Number(state.strumSequencerMode) || 0));
      if (legacyMode === 1) return 4;
      if (legacyMode === 2) return 8;
      return 0;
    }

    function getStrumSubdivisionCount(rateIndex) {
      if (rateIndex === 0) return 1;
      if (rateIndex === 1) return 2;
      if (rateIndex === 2) return 4;
      if (rateIndex === 3) return 8;
      return 0;
    }

    function normalizeStrumStep(step) {
      const rawRateIndex = Number(step?.rateIndex);
      const rateIndex = Number.isFinite(rawRateIndex)
        ? Math.max(0, Math.min(4, Math.round(rawRateIndex)))
        : 2;
      const rawKeyswitchSetId = String(step?.keyswitchSetId || "").trim();
      const keyswitchSetId = rawKeyswitchSetId && getKeyswitchSetById(rawKeyswitchSetId)
        ? rawKeyswitchSetId
        : "";
      const legacyVelocity = Math.max(1, Math.min(127, Math.round(Number(step?.velocity) || 100)));
      let subVelocities = Array.isArray(step?.subVelocities)
        ? step.subVelocities.map((value) => Math.max(1, Math.min(127, Math.round(Number(value) || legacyVelocity))))
        : [];

      if (!subVelocities.length) {
        subVelocities = Array.from({ length: STRUM_STEP_MAX_SUBDIVISIONS }, () => legacyVelocity);
      }

      while (subVelocities.length < STRUM_STEP_MAX_SUBDIVISIONS) {
        subVelocities.push(subVelocities[subVelocities.length - 1] || legacyVelocity);
      }

      if (subVelocities.length > STRUM_STEP_MAX_SUBDIVISIONS) {
        subVelocities = subVelocities.slice(0, STRUM_STEP_MAX_SUBDIVISIONS);
      }

      const activeSubdivisionCount = getStrumSubdivisionCount(rateIndex);
      const activeVelocities = activeSubdivisionCount > 0
        ? subVelocities.slice(0, activeSubdivisionCount)
        : [];
      const velocity = activeVelocities.length
        ? Math.max(1, Math.min(127, Math.round(activeVelocities.reduce((sum, value) => sum + value, 0) / activeVelocities.length)))
        : 0;

      return {
        velocity,
        rateIndex,
        subVelocities,
        keyswitchSetId
      };
    }

    function getStrumKeyswitchOptions() {
      const keyswitchSets = Array.isArray(state.keyswitchSets) ? state.keyswitchSets : [];
      const options = [{ value: "", label: "Keep" }];
      keyswitchSets.forEach((set, index) => {
        const setId = String(set?.id || "").trim();
        if (!setId) return;
        const setName = String(set?.name || setId || `Set ${index + 1}`).trim() || `Set ${index + 1}`;
        options.push({ value: setId, label: setName });
      });
      return options;
    }

    function getStrumKeyswitchLabel(keyswitchSetId) {
      const id = String(keyswitchSetId || "").trim();
      if (!id) return "Keyswitch";
      const set = getKeyswitchSetById(id);
      const label = String(set?.name || id).trim() || id;
      return label;
    }

    function ensureStrumStepPattern() {
      if (!Array.isArray(state.strumStepPattern)) state.strumStepPattern = [];
      while (state.strumStepPattern.length < 8) {
        state.strumStepPattern.push({
          subVelocities: Array.from({ length: STRUM_STEP_MAX_SUBDIVISIONS }, () => 100),
          rateIndex: 2,
          keyswitchSetId: ""
        });
      }
      if (state.strumStepPattern.length > 8) {
        state.strumStepPattern = state.strumStepPattern.slice(0, 8);
      }
      state.strumStepPattern = state.strumStepPattern.map(normalizeStrumStep);
    }

    function getVisibleStrumStepPattern() {
      ensureStrumStepPattern();
      const count = getStrumVisibleStepCount();
      return state.strumStepPattern.slice(0, count).map((step) => {
        const normalized = normalizeStrumStep(step);
        const subdivisionCount = getStrumSubdivisionCount(normalized.rateIndex);
        return {
          velocity: normalized.velocity,
          rateIndex: normalized.rateIndex,
          subVelocities: normalized.subVelocities.slice(0, subdivisionCount),
          keyswitchSetId: normalized.keyswitchSetId
        };
      });
    }

    function getStrumEffectiveRateIndex() {
      const visibleSteps = getVisibleStrumStepPattern();
      for (const step of visibleSteps) {
        const idx = Math.max(0, Math.min(4, Number(step?.rateIndex) || 0));
        if (idx <= 3) return idx;
      }
      return 2;
    }

    function renderStrumStepGridInto(container) {
      if (!container) return;
      ensureStrumStepPattern();
      const activeStepCount = getStrumVisibleStepCount();
      const keyswitchOptions = getStrumKeyswitchOptions();
      const hasKeyswitchOptions = keyswitchOptions.length > 1;
      container.innerHTML = "";
      container.classList.toggle("hidden", activeStepCount === 0);
      if (activeStepCount === 0) return;

      const hasAddGap = activeStepCount < 8;
      const gapCount = (activeStepCount - 1) + (hasAddGap ? 1 : 0);
      const colParts = [];
      for (let i = 0; i < activeStepCount; i++) {
        colParts.push("1fr");
        if (i < activeStepCount - 1 || hasAddGap) colParts.push("6px");
      }
      container.style.gridTemplateColumns = colParts.join(" ");

      for (let stepIndex = 0; stepIndex < activeStepCount; stepIndex += 1) {
        const step = normalizeStrumStep(state.strumStepPattern[stepIndex]);
        const subdivisionCount = getStrumSubdivisionCount(step.rateIndex);
        const barsMarkup = subdivisionCount > 0
          ? Array.from({ length: subdivisionCount }, (_, barIndex) => {
              const vel = Math.max(1, Math.min(127, Math.round(Number(step.subVelocities[barIndex]) || 100)));
              return `<span class="strum-step-velocity-bar" data-step-index="${stepIndex}" data-bar-index="${barIndex}"><span class="strum-step-velocity-fill" style="height: ${(vel / 127) * 100}%;"></span></span>`;
            }).join("")
          : '<span class="strum-step-rest-label">Rest</span>';

        const stepCard = document.createElement("div");
        stepCard.className = "strum-step-card";
        stepCard.setAttribute("aria-disabled", "false");
        const keyswitchDisabled = !hasKeyswitchOptions;
        const keyswitchItemsMarkup = keyswitchOptions.map((option) => (
          `<button class="strum-menu-item strum-step-keyswitch-item" type="button" data-step-index="${stepIndex}" data-step-keyswitch-id="${option.value}">${option.label}</button>`
        )).join("");
        stepCard.innerHTML = `
          <p class="strum-step-head">Step ${stepIndex + 1}</p>
          <button class="strum-step-velocity-btn" type="button" data-step-index="${stepIndex}" aria-label="Set velocity for step ${stepIndex + 1}">
            <span class="strum-step-velocity-track${subdivisionCount === 0 ? " is-rest" : ""}">
              ${barsMarkup}
            </span>
          </button>
          <div class="strum-step-rate-wrap">
            <button class="sample-loop-tool-btn strum-menu-btn strum-step-rate-btn" type="button" data-step-index="${stepIndex}" aria-haspopup="true" aria-expanded="false">Rate ${STRUM_STEP_RATE_LABELS[step.rateIndex]}</button>
            <div class="strum-menu strum-step-rate-menu hidden" role="menu" aria-label="Step ${stepIndex + 1} rate">
              <button class="strum-menu-item strum-step-rate-item" type="button" data-step-index="${stepIndex}" data-step-rate-index="0">1/4</button>
              <button class="strum-menu-item strum-step-rate-item" type="button" data-step-index="${stepIndex}" data-step-rate-index="1">1/8</button>
              <button class="strum-menu-item strum-step-rate-item" type="button" data-step-index="${stepIndex}" data-step-rate-index="2">1/16</button>
              <button class="strum-menu-item strum-step-rate-item" type="button" data-step-index="${stepIndex}" data-step-rate-index="3">1/32</button>
              <button class="strum-menu-item strum-step-rate-item" type="button" data-step-index="${stepIndex}" data-step-rate-index="4">Rest</button>
            </div>
          </div>
          <div class="strum-step-rate-wrap">
            <button class="sample-loop-tool-btn strum-menu-btn strum-step-keyswitch-btn" type="button" data-step-index="${stepIndex}" aria-haspopup="true" aria-expanded="false" ${keyswitchDisabled ? "disabled" : ""}>${getStrumKeyswitchLabel(step.keyswitchSetId)}</button>
            <div class="strum-menu strum-step-keyswitch-menu hidden" role="menu" aria-label="Step ${stepIndex + 1} keyswitch">
              ${keyswitchItemsMarkup}
            </div>
          </div>
        `;

        const rateItems = Array.from(stepCard.querySelectorAll(".strum-step-rate-item"));
        rateItems.forEach((item) => {
          const itemRateIndex = Math.max(0, Math.min(4, Number(item.dataset.stepRateIndex) || 0));
          item.classList.toggle("active", itemRateIndex === step.rateIndex);
        });

        const keyswitchItems = Array.from(stepCard.querySelectorAll(".strum-step-keyswitch-item"));
        keyswitchItems.forEach((item) => {
          const itemKeyswitchId = String(item.dataset.stepKeyswitchId || "").trim();
          item.classList.toggle("active", itemKeyswitchId === String(step.keyswitchSetId || "").trim());
        });

        container.appendChild(stepCard);

        /* Gap between active steps = "−" (remove), gap after last active = "+" (add) */
        if (stepIndex < activeStepCount - 1) {
          const gap = document.createElement("button");
          gap.type = "button";
          gap.className = "strum-step-gap";
          gap.dataset.gapAfterStep = String(stepIndex);
          gap.dataset.gapAction = "remove";
          gap.textContent = "\u2212";
          gap.title = `Remove step ${stepIndex + 2}`;
          container.appendChild(gap);
        } else if (hasAddGap) {
          const gap = document.createElement("button");
          gap.type = "button";
          gap.className = "strum-step-gap";
          gap.dataset.gapAfterStep = String(stepIndex);
          gap.dataset.gapAction = "add";
          gap.textContent = "+";
          gap.title = `Add step ${activeStepCount + 1}`;
          container.appendChild(gap);
        }
      }
    }

    function renderStrumStepGrid() {
      renderStrumStepGridInto(el.strumStepGrid);
      if (el.playerStrumStepGrid) {
        if (state.strumShowOnMain) {
          if (el.playerStrumOverlay) el.playerStrumOverlay.classList.remove("hidden");
          renderStrumStepGridInto(el.playerStrumStepGrid);
        } else {
          el.playerStrumStepGrid.innerHTML = "";
          el.playerStrumStepGrid.classList.add("hidden");
          if (el.playerStrumOverlay) el.playerStrumOverlay.classList.add("hidden");
        }
      }
    }

    function updateStrumUi() {
      if (el.strumEnableBtn) {
        const on = !!state.strumEnabled;
        el.strumEnableBtn.textContent = on ? "Enable On" : "Enable Off";
        el.strumEnableBtn.setAttribute("aria-pressed", on ? "true" : "false");
        el.strumEnableBtn.classList.toggle("active", on);
      }

      const stepCount = getStrumVisibleStepCount();
      [el.strumSequencerBtn, el.playerStrumSequencerBtn].forEach((button) => {
        if (!button) return;
        button.textContent = stepCount <= 0 ? "Sequencer Off" : `Sequencer ${stepCount}`;
        button.setAttribute("aria-pressed", stepCount > 0 ? "true" : "false");
        button.classList.toggle("active", stepCount > 0);
        if (el.strumSequencerMenu) {
          const isOpen = !el.strumSequencerMenu.classList.contains("hidden");
          button.setAttribute("aria-expanded", isOpen ? "true" : "false");
        }
      });
      if (el.strumSequencerMenu) {
        Array.from(el.strumSequencerMenu.querySelectorAll(".strum-menu-item")).forEach((item) => {
          const rawSteps = Number(item.dataset.sequencerSteps);
          const steps = Number.isFinite(rawSteps) ? Math.max(0, Math.min(8, Math.round(rawSteps))) : 8;
          item.classList.toggle("active", steps === stepCount);
        });
      }

      const doublingOn = !!state.strumDoubling;
      [el.strumDoublingBtn, el.playerStrumDoublingBtn].forEach((button) => {
        if (!button) return;
        button.textContent = doublingOn ? "Doubling On" : "Doubling Off";
        button.setAttribute("aria-pressed", doublingOn ? "true" : "false");
        button.classList.toggle("active", doublingOn);
      });

      if (el.strumShowOnMainBtn) {
        el.strumShowOnMainBtn.setAttribute("aria-pressed", state.strumShowOnMain ? "true" : "false");
        el.strumShowOnMainBtn.classList.toggle("active", !!state.strumShowOnMain);
        const activeTab = document.querySelector('.tab-btn.active')?.dataset.tab || 'player';
        el.strumShowOnMainBtn.style.display = activeTab === 'player' ? '' : 'none';
      }

      const idx = Math.max(0, Math.min(3, Number(state.strumRateIndex) || 0));
      [el.strumRateBtn, el.playerStrumRateBtn].forEach((button) => {
        if (!button) return;
        button.textContent = `Rate ${STRUM_RATE_LABELS[idx]}`;
        if (el.strumRateMenu) {
          const isOpen = !el.strumRateMenu.classList.contains("hidden");
          button.setAttribute("aria-expanded", isOpen ? "true" : "false");
        }
      });
      if (el.strumRateMenu) {
        const items = Array.from(el.strumRateMenu.querySelectorAll(".strum-menu-item"));
        items.forEach((item, itemIndex) => {
          item.classList.toggle("active", itemIndex === idx);
        });
      }

      const swing = Math.max(0, Math.min(20, Number(state.strumSwingPercent) || 0));
      [el.strumSwingBtn, el.playerStrumSwingBtn].forEach((button) => {
        if (!button) return;
        button.textContent = `Swing ${swing}%`;
        if (el.strumSwingMenu) {
          const isOpen = !el.strumSwingMenu.classList.contains("hidden");
          button.setAttribute("aria-expanded", isOpen ? "true" : "false");
        }
      });
      if (el.strumSwingMenu) {
        Array.from(el.strumSwingMenu.querySelectorAll(".strum-menu-item")).forEach((item) => {
          const val = Math.max(0, Math.min(20, Number(item.dataset.swingValue) || 0));
          item.classList.toggle("active", val === swing);
        });
      }

      const velHum = Math.max(0, Math.min(20, Number(state.strumVelocityHumanizePercent) || 0));
      [el.strumVelHumanBtn, el.playerStrumVelHumanBtn].forEach((button) => {
        if (!button) return;
        button.textContent = `Velocity Humanization ${velHum}%`;
        if (el.strumVelHumanMenu) {
          const isOpen = !el.strumVelHumanMenu.classList.contains("hidden");
          button.setAttribute("aria-expanded", isOpen ? "true" : "false");
        }
      });
      if (el.strumVelHumanMenu) {
        Array.from(el.strumVelHumanMenu.querySelectorAll(".strum-menu-item")).forEach((item) => {
          const val = Math.max(0, Math.min(20, Number(item.dataset.velHumanValue) || 0));
          item.classList.toggle("active", val === velHum);
        });
      }

      const timeHum = Math.max(0, Math.min(10, Number(state.strumTimingHumanizeMs) || 0));
      [el.strumTimeHumanBtn, el.playerStrumTimeHumanBtn].forEach((button) => {
        if (!button) return;
        button.textContent = `Timing Humanization ${timeHum}ms`;
        if (el.strumTimeHumanMenu) {
          const isOpen = !el.strumTimeHumanMenu.classList.contains("hidden");
          button.setAttribute("aria-expanded", isOpen ? "true" : "false");
        }
      });
      if (el.strumTimeHumanMenu) {
        Array.from(el.strumTimeHumanMenu.querySelectorAll(".strum-menu-item")).forEach((item) => {
          const val = Math.max(0, Math.min(10, Number(item.dataset.timeHumanValue) || 0));
          item.classList.toggle("active", val === timeHum);
        });
      }

      renderStrumStepGrid();

      // Auto-collapse the Strum section when the sequencer is off.
      try {
        const stepCount = getStrumVisibleStepCount();
        if (el.strumSection && el.strumToggle) {
          const shouldBeCollapsed = stepCount <= 0;
          const isCollapsed = el.strumSection.classList.contains("collapsed");
          if (isCollapsed !== shouldBeCollapsed) {
            setStrumCollapsed(shouldBeCollapsed);
            // Double-rAF: ensure layout settles before the host measures content height
            window.requestAnimationFrame(() => {
              window.requestAnimationFrame(() => scheduleHostResizeForActiveTab());
            });
          } else {
            // keep aria-expanded in sync when no change required
            el.strumToggle.setAttribute("aria-expanded", String(!shouldBeCollapsed));
          }
        }
      } catch (e) {
        // fail silently; UI should not break
      }
      syncPlayerStrumMainToggle();
      syncDoublingToggle();

    }

    function syncPlayerStrumMainToggle() {
      if (!el.playerStrumMainToggle) return;
      const on = !!state.strumShowOnMain && !!state.strumEnabled && getStrumVisibleStepCount() > 0;
      el.playerStrumMainToggle.classList.toggle("active", on);
      el.playerStrumMainToggle.setAttribute("aria-pressed", on ? "true" : "false");
      el.playerStrumMainToggle.title = on ? "Hide Strum From Main" : "Show Strum On Main";
      el.playerStrumMainToggle.setAttribute("aria-label", on ? "Hide strum from main" : "Show strum on main");
    }

    let playerStrumIdleTimer = 0;

    function clearPlayerStrumIdleTimer() {
      if (playerStrumIdleTimer) {
        window.clearTimeout(playerStrumIdleTimer);
        playerStrumIdleTimer = 0;
      }
    }

    function schedulePlayerStrumIdleDim() {
      clearPlayerStrumIdleTimer();
      if (!el.playerStrumOverlay) return;
      if (!state.strumShowOnMain || !state.strumEnabled || getStrumVisibleStepCount() <= 0) {
        el.playerStrumOverlay.classList.remove("is-idle-dim");
        if (el.playerStrumStepGrid) el.playerStrumStepGrid.classList.remove("is-idle-dim");
        return;
      }
      playerStrumIdleTimer = window.setTimeout(() => {
        if (!el.playerStrumOverlay) return;
        el.playerStrumOverlay.classList.add("is-idle-dim");
        if (el.playerStrumStepGrid) el.playerStrumStepGrid.classList.remove("is-idle-dim");
      }, 3000);
    }

    function wakePlayerStrumGrid() {
      if (!el.playerStrumOverlay) return;
      clearPlayerStrumIdleTimer();
      el.playerStrumOverlay.classList.remove("is-idle-dim");
      if (el.playerStrumStepGrid) el.playerStrumStepGrid.classList.remove("is-idle-dim");
    }

    function syncPlayerStrumIdleState() {
      if (!el.playerStrumOverlay) return;
      if (!state.strumShowOnMain || !state.strumEnabled || getStrumVisibleStepCount() <= 0) {
        wakePlayerStrumGrid();
        return;
      }
      schedulePlayerStrumIdleDim();
    }

    function syncDoublingToggle() {
      if (!el.doublingToggle) return;
      const on = !!state.strumDoubling;
      el.doublingToggle.classList.toggle("active", on);
      el.doublingToggle.setAttribute("aria-pressed", on ? "true" : "false");
      el.doublingToggle.title = on ? "Doubling On" : "Doubling";
      syncPlayerStrumIdleState();
    }

    function getPlayerPitchDownOctaves() {
      return Math.max(0, Math.min(2, Math.round(Number(state.playerPitchDownOctaves) || 0)));
    }

    function getPlayerPitchDownRateRatio() {
      return Math.pow(2, -getPlayerPitchDownOctaves());
    }

    function syncPlayerPitchDownToggle() {
      if (!el.playerPitchDownToggle) return;
      const downOctaves = getPlayerPitchDownOctaves();
      el.playerPitchDownToggle.textContent = downOctaves === 0 ? "0" : `-${downOctaves}`;
      el.playerPitchDownToggle.classList.toggle("active", downOctaves > 0);
      el.playerPitchDownToggle.setAttribute("aria-pressed", downOctaves > 0 ? "true" : "false");
      el.playerPitchDownToggle.title = downOctaves === 0
        ? "Pitch Down: 0"
        : `Pitch Down: -${downOctaves} octave${downOctaves > 1 ? "s" : ""}`;
    }

    function syncStrumDoublingBtn() {
      const on = !!state.strumDoubling;
      [el.strumDoublingBtn, el.playerStrumDoublingBtn].forEach((button) => {
        if (!button) return;
        button.textContent = on ? "Doubling On" : "Doubling Off";
        button.setAttribute("aria-pressed", on ? "true" : "false");
        button.classList.toggle("active", on);
      });
    }

    function setupStrum() {
      updateStrumUi();
      syncPlayerStrumMainToggle();
      syncDoublingToggle();
      syncPlayerPitchDownToggle();
      syncPlayerPitchDownToggle();

      const isPlayerStrumThemeActive = () => !!String(state.wallpaperDataUrl || "").trim();

      const shouldUsePlayerStrumMenuTheme = (button) => {
        if (!isPlayerStrumThemeActive() || !(button instanceof Element)) return false;
        return !!button.closest("#playerStrumOverlay");
      };

      const setStrumMenuTheme = (menu, button) => {
        if (!menu) return;
        menu.classList.toggle("player-strum-menu", shouldUsePlayerStrumMenuTheme(button));
      };

      // Floating strum rate overlay — lives on document.body to avoid overflow clipping
      const strumRateOverlay = document.createElement("div");
      strumRateOverlay.className = "strum-menu hidden";
      strumRateOverlay.setAttribute("role", "menu");
      strumRateOverlay.setAttribute("aria-label", "Step rate");
      document.body.appendChild(strumRateOverlay);
      let strumRateOverlayStepIndex = -1;

      // Floating strum keyswitch overlay — lives on document.body to avoid overflow clipping
      const strumKeyswitchOverlay = document.createElement("div");
      strumKeyswitchOverlay.className = "strum-menu hidden";
      strumKeyswitchOverlay.setAttribute("role", "menu");
      strumKeyswitchOverlay.setAttribute("aria-label", "Step keyswitch");
      document.body.appendChild(strumKeyswitchOverlay);
      let strumKeyswitchOverlayStepIndex = -1;

      const showStrumRateOverlay = (btn, stepIndex) => {
        ensureStrumStepPattern();
        const step = normalizeStrumStep(state.strumStepPattern[stepIndex]);
        strumRateOverlay.innerHTML = "";
        setStrumMenuTheme(strumRateOverlay, btn);
        STRUM_STEP_RATE_LABELS.forEach((label, rateIdx) => {
          const item = document.createElement("button");
          item.className = "strum-menu-item strum-step-rate-item";
          item.type = "button";
          item.dataset.stepIndex = String(stepIndex);
          item.dataset.stepRateIndex = String(rateIdx);
          item.textContent = label;
          item.classList.toggle("active", rateIdx === step.rateIndex);
          strumRateOverlay.appendChild(item);
        });
        strumRateOverlayStepIndex = stepIndex;
        const rect = btn.getBoundingClientRect();
        strumRateOverlay.style.minWidth = `${Math.max(72, Math.round(rect.width))}px`;
        strumRateOverlay.style.left = "";
        strumRateOverlay.style.top = "";
        strumRateOverlay.classList.remove("hidden");
        const menuRect = strumRateOverlay.getBoundingClientRect();
        let top = rect.top - 6 - menuRect.height;
        let left = rect.left;
        if (top < 0) top = rect.bottom + 6;
        if (left + menuRect.width > window.innerWidth) {
          left = Math.max(0, window.innerWidth - menuRect.width - 4);
        }
        strumRateOverlay.style.top = `${Math.round(top)}px`;
        strumRateOverlay.style.left = `${Math.round(left)}px`;
      };

      const showStrumKeyswitchOverlay = (btn, stepIndex) => {
        ensureStrumStepPattern();
        const keyswitchOptions = getStrumKeyswitchOptions();
        const step = normalizeStrumStep(state.strumStepPattern[stepIndex]);
        strumKeyswitchOverlay.innerHTML = "";
        setStrumMenuTheme(strumKeyswitchOverlay, btn);
        keyswitchOptions.forEach((option) => {
          const item = document.createElement("button");
          item.className = "strum-menu-item strum-step-keyswitch-item";
          item.type = "button";
          item.dataset.stepIndex = String(stepIndex);
          item.dataset.stepKeyswitchId = option.value;
          item.textContent = option.label;
          item.classList.toggle("active", String(option.value) === String(step.keyswitchSetId || "").trim());
          strumKeyswitchOverlay.appendChild(item);
        });
        strumKeyswitchOverlayStepIndex = stepIndex;
        const rect = btn.getBoundingClientRect();
        strumKeyswitchOverlay.style.minWidth = `${Math.max(72, Math.round(rect.width))}px`;
        strumKeyswitchOverlay.style.left = "";
        strumKeyswitchOverlay.style.top = "";
        strumKeyswitchOverlay.classList.remove("hidden");
        const menuRect = strumKeyswitchOverlay.getBoundingClientRect();
        let top = rect.top - 6 - menuRect.height;
        let left = rect.left;
        if (top < 0) top = rect.bottom + 6;
        if (left + menuRect.width > window.innerWidth) {
          left = Math.max(0, window.innerWidth - menuRect.width - 4);
        }
        strumKeyswitchOverlay.style.top = `${Math.round(top)}px`;
        strumKeyswitchOverlay.style.left = `${Math.round(left)}px`;
      };

      strumRateOverlay.addEventListener("click", (ev) => {
        const item = ev.target instanceof Element ? ev.target.closest(".strum-step-rate-item") : null;
        if (!(item instanceof HTMLButtonElement)) return;
        const stepIndex = Math.round(Number(item.dataset.stepIndex));
        if (!Number.isFinite(stepIndex) || stepIndex < 0 || stepIndex >= 8) return;
        const rateIndex = Math.max(0, Math.min(4, Number(item.dataset.stepRateIndex) || 0));
        ensureSessionStateWritable("strum-step-rate");
        ensureStrumStepPattern();
        const normalizedStep = normalizeStrumStep(state.strumStepPattern[stepIndex]);
        state.strumStepPattern[stepIndex] = { ...normalizedStep, rateIndex };
        closeStrumMenus();
        updateStrumUi();
        emitStrumSettings();
        scheduleSessionStateSave(280);
      });

      strumKeyswitchOverlay.addEventListener("click", (ev) => {
        const item = ev.target instanceof Element ? ev.target.closest(".strum-step-keyswitch-item") : null;
        if (!(item instanceof HTMLButtonElement)) return;
        const stepIndex = Math.round(Number(item.dataset.stepIndex));
        if (!Number.isFinite(stepIndex) || stepIndex < 0 || stepIndex >= 8) return;
        const keyswitchSetId = String(item.dataset.stepKeyswitchId || "").trim();
        ensureSessionStateWritable("strum-step-keyswitch");
        ensureStrumStepPattern();
        const normalizedStep = normalizeStrumStep(state.strumStepPattern[stepIndex]);
        state.strumStepPattern[stepIndex] = {
          ...normalizedStep,
          keyswitchSetId: keyswitchSetId && getKeyswitchSetById(keyswitchSetId) ? keyswitchSetId : ""
        };
        closeStrumMenus();
        updateStrumUi();
        emitStrumSettings();
        scheduleSessionStateSave(280);
      });

      const positionStrumMenuAt = (btn, menu) => {
        if (!btn || !menu) return;
        const r = btn.getBoundingClientRect();
        const menuGap = 6;
        menu.style.left = "";
        menu.style.top = "";
        menu.style.right = "";
        menu.style.bottom = "";
        menu.style.minWidth = `${Math.max(100, Math.round(r.width))}px`;
        menu.classList.remove("hidden");
        const mRect = menu.getBoundingClientRect();
        let top = r.top - menuGap - mRect.height;
        let left = r.left;
        if (top < 0) {
          top = r.bottom + menuGap;
        }
        if (left + mRect.width > window.innerWidth) {
          left = Math.max(0, window.innerWidth - mRect.width - 4);
        }
        menu.style.top = `${Math.round(top)}px`;
        menu.style.left = `${Math.round(left)}px`;
      };

      const closeStrumMenus = () => {
        strumRateOverlay.classList.add("hidden");
        strumRateOverlay.classList.remove("player-strum-menu");
        strumRateOverlay.innerHTML = "";
        strumRateOverlayStepIndex = -1;
        strumKeyswitchOverlay.classList.add("hidden");
        strumKeyswitchOverlay.classList.remove("player-strum-menu");
        strumKeyswitchOverlay.innerHTML = "";
        strumKeyswitchOverlayStepIndex = -1;
        const menus = [
          el.strumSequencerMenu,
          el.strumRateMenu,
          el.strumSwingMenu,
          el.strumVelHumanMenu,
          el.strumTimeHumanMenu,
          ...Array.from(document.querySelectorAll(".strum-step-rate-menu")),
          ...Array.from(document.querySelectorAll(".strum-step-keyswitch-menu"))
        ];
        const buttons = [
          el.strumSequencerBtn,
          el.playerStrumSequencerBtn,
          el.strumRateBtn,
          el.playerStrumRateBtn,
          el.strumSwingBtn,
          el.playerStrumSwingBtn,
          el.strumVelHumanBtn,
          el.playerStrumVelHumanBtn,
          el.strumTimeHumanBtn,
          el.playerStrumTimeHumanBtn,
          ...Array.from(document.querySelectorAll(".strum-step-rate-btn")),
          ...Array.from(document.querySelectorAll(".strum-step-keyswitch-btn"))
        ];
        menus.forEach((menu) => {
          if (menu) {
            menu.classList.add("hidden");
            menu.classList.remove("player-strum-menu");
            menu.style.top = "";
            menu.style.left = "";
            menu.style.right = "";
            menu.style.bottom = "";
            menu.style.minWidth = "";
          }
        });
        buttons.forEach((btn) => {
          if (btn) btn.setAttribute("aria-expanded", "false");
        });
      };

      const setupStrumMenu = (buttons, menu, itemSelector, onSelect, saveReason = "strum-menu-edit") => {
        const buttonList = Array.isArray(buttons) ? buttons.filter(Boolean) : [buttons].filter(Boolean);
        if (!buttonList.length || !menu) return;
        buttonList.forEach((button) => {
          button.addEventListener("click", (e) => {
            e.stopPropagation();
            const open = !menu.classList.contains("hidden");
            closeStrumMenus();
            if (!open) {
              setStrumMenuTheme(menu, button);
              positionStrumMenuAt(button, menu);
              button.setAttribute("aria-expanded", "true");
            }
          });
        });

        Array.from(menu.querySelectorAll(itemSelector)).forEach((item) => {
          item.addEventListener("click", (ev) => {
            ev.stopPropagation();
            ensureSessionStateWritable(saveReason);
            onSelect(item);
            updateStrumUi();
            emitStrumSettings();
            closeStrumMenus();
            scheduleSessionStateSave(220);
            // Double-rAF ensures layout settles before host measures new content height
            window.requestAnimationFrame(() => {
              window.requestAnimationFrame(() => requestHostResizeForActiveTab());
            });
          });
        });
      };

      if (el.strumEnableBtn) {
        el.strumEnableBtn.addEventListener("click", () => {
          ensureSessionStateWritable("strum-enable-toggle");
          state.strumEnabled = !state.strumEnabled;
          if (state.strumEnabled && getStrumVisibleStepCount() <= 0) {
            state.strumSequencerSteps = 4;
            state.strumSequencerMode = 1;
          }
          updateStrumUi();
          emitStrumSettings();
          scheduleSessionStateSave(220);
          window.requestAnimationFrame(() => {
            window.requestAnimationFrame(() => requestHostResizeForActiveTab());
          });
        });
      }

      if (el.strumSequencerBtn || el.playerStrumSequencerBtn) {
        setupStrumMenu([el.strumSequencerBtn, el.playerStrumSequencerBtn], el.strumSequencerMenu, ".strum-menu-item", (item) => {
          const rawSteps = Number(item.dataset.sequencerSteps);
          state.strumSequencerSteps = Number.isFinite(rawSteps) ? Math.max(0, Math.min(8, Math.round(rawSteps))) : 8;
          state.strumSequencerMode = state.strumSequencerSteps <= 0 ? 0 : (state.strumSequencerSteps <= 4 ? 1 : 2);
          state.strumEnabled = state.strumSequencerSteps > 0;
        }, "strum-sequencer-steps");
      }

      [el.strumDoublingBtn, el.playerStrumDoublingBtn].filter(Boolean).forEach((button) => {
        button.addEventListener("click", () => {
          ensureSessionStateWritable("strum-doubling-toggle");
          state.strumDoubling = !state.strumDoubling;
          syncDoublingToggle();
          syncStrumDoublingBtn();
          emitStrumSettings();
          scheduleSessionStateSave(220);
        });
      });

      if (el.doublingToggle) {
        el.doublingToggle.addEventListener("click", () => {
          ensureSessionStateWritable("player-doubling-toggle");
          state.strumDoubling = !state.strumDoubling;
          syncDoublingToggle();
          syncStrumDoublingBtn();
          emitStrumSettings();
          scheduleSessionStateSave(220);
        });
      }

      if (el.playerPitchDownToggle) {
        el.playerPitchDownToggle.addEventListener("click", () => {
          ensureSessionStateWritable("player-pitch-down");
          const next = (getPlayerPitchDownOctaves() + 1) % 3;
          state.playerPitchDownOctaves = next;
          syncPlayerPitchDownToggle();
          scheduleSessionStateSave(220);
          void flushSessionStateToNative(false);
        });
      }

      if (el.playerStrumMainToggle) {
        el.playerStrumMainToggle.addEventListener("click", () => {
          ensureSessionStateWritable("player-strum-main-toggle");
          const isOn = !!state.strumShowOnMain && !!state.strumEnabled && getStrumVisibleStepCount() > 0;
          if (isOn) {
            state.strumShowOnMain = false;
            state.strumEnabled = false;
          } else {
            state.strumEnabled = true;
            state.strumSequencerSteps = 8;
            state.strumSequencerMode = 2;
            state.strumShowOnMain = true;
          }
          updateStrumUi();
          syncPlayerStrumMainToggle();
          emitStrumSettings();
          scheduleSessionStateSave(220);
          window.requestAnimationFrame(() => {
            window.requestAnimationFrame(() => requestHostResizeForActiveTab());
          });
        });
      }

      if (el.playerStrumOverlay) {
        el.playerStrumOverlay.addEventListener("mouseenter", () => {
          wakePlayerStrumGrid();
        });
