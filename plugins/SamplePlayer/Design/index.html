<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sample Player - Simple Knob UI</title>
  <style>
    :root {
      --line-rgb: 136, 136, 136;
      --surface-elevated-rgb: 42, 42, 42;
      --surface-panel-rgb: 34, 34, 34;
      --surface-card-rgb: 28, 28, 28;
      --surface-deep-rgb: 20, 20, 20;
      --surface-hover-rgb: 58, 58, 58;
      --accent-rgb: 148, 148, 148;
      --accent-text: #d2d2d2;
      --accent-surface: rgba(52, 52, 52, 0.88);
      --accent-surface-strong: rgba(62, 62, 62, 0.92);
      --accent-gradient: linear-gradient(180deg, rgba(176, 176, 176, 0.92), rgba(112, 112, 112, 0.95));
      --tooltip-surface: rgba(18, 18, 18, 0.95);
      --modal-surface: linear-gradient(145deg, rgba(38, 38, 38, 0.98), rgba(24, 24, 24, 0.96));
      --overlay-scrim: rgba(10, 10, 10, 0.78);
      --bg-a: #2b2b2b;
      --bg-b: #1e1e1e;
      --app-background:
        radial-gradient(900px 560px at 8% 6%, rgba(255, 255, 255, 0.08), transparent 62%),
        radial-gradient(880px 660px at 90% 86%, rgba(196, 196, 196, 0.08), transparent 62%),
        linear-gradient(145deg, var(--bg-a), var(--bg-b));
      --chrome-surface: linear-gradient(145deg, rgba(var(--surface-elevated-rgb), 0.96), rgba(var(--surface-deep-rgb), 0.94));
      --panel: rgba(var(--surface-panel-rgb), 0.9);
      --line: rgba(var(--line-rgb), 0.3);
      --text: #e4e4e4;
      --text-dim: #a6a6a6;
      --mint: #92aaa3;
      --blue: #bdbdbd;
      --warn: #b6b6b6;
      --danger: #be7e86;
      --radius: 14px;
      --player-swatch-rgb: 40, 40, 40;
      --player-topbar-rgb: 40, 40, 40;
      --player-line-rgb: 150, 150, 150;
      --player-bright-rgb: 224, 224, 224;
      --player-wallpaper-dominant-rgb: 224, 224, 224;
      --player-wallpaper-open-string-rgb: 224, 224, 224;
      --player-press-glow-rgb: 224, 224, 224;
      --player-wheel-rgb: 236, 236, 236;
      --player-wheel-rgb-dark: 216, 216, 216;
      --player-wallpaper-image: none;
      --player-key-tint-alpha-top: 0;
      --player-key-tint-alpha-bottom: 0;
      --player-key-press-tint-alpha-top: 0;
      --player-key-press-tint-alpha-bottom: 0;
      --player-key-press-black-alpha-top: 0;
      --player-key-press-black-alpha-bottom: 0;
    }

    * {
      box-sizing: border-box;
      user-select: none;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      min-height: 100%;
      font-family: "Avenir Next", "Segoe UI", sans-serif;
      color: var(--text);
      background: var(--app-background);
      overflow: hidden;
    }

    body {
      padding: 0;
      display: block;
    }

    .instrument {
      position: relative;
      width: 100%;
      height: 100%;
      min-height: 100%;
      display: flex;
      flex-direction: column;
      border: 1px solid rgba(150, 150, 150, 0.2);
      border-radius: 8px;
      background: var(--chrome-surface);
      box-shadow: 0 20px 52px rgba(0, 0, 0, 0.34);
      overflow: hidden;
      backdrop-filter: blur(6px);
    }

    .loading-overlay {
      position: absolute;
      inset: 0;
      z-index: 20000;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: auto;
      background:
        linear-gradient(
          180deg,
          rgba(var(--surface-card-rgb), 0.9),
          rgba(var(--surface-deep-rgb), 0.88)
        );
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
    }

    .loading-card {
      width: min(460px, calc(100% - 72px));
      border: 1px solid rgba(150, 150, 150, 0.42);
      border-radius: 10px;
      padding: 14px 14px 12px;
      background:
        linear-gradient(
          180deg,
          rgba(var(--surface-elevated-rgb), 0.94),
          rgba(var(--surface-card-rgb), 0.9)
        );
      box-shadow:
        0 14px 34px rgba(0, 0, 0, 0.42),
        inset 0 1px 0 rgba(255, 255, 255, 0.08);
    }

    .loading-label-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 0;
    }

    .loading-label {
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: rgba(228, 228, 228, 0.94);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .btn-row {
      display: flex;
      flex-wrap: nowrap;
      gap: 8px;
      overflow-x: auto;
      -ms-overflow-style: none;
      scrollbar-width: none;
    }

    .btn-row::-webkit-scrollbar {
      width: 0;
      height: 0;
      display: none;
    }

    button,
    .file-btn {
      border: 1px solid var(--line);
      border-radius: 10px;
      background: rgba(var(--surface-elevated-rgb), 0.96);
      color: var(--text);
      font: inherit;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      padding: 8px 11px;
      cursor: pointer;
    }

    /* Strum dropdown controls */
    .strum-controls-row {
      overflow: visible !important;
      flex-wrap: wrap;
      position: relative;
      z-index: 20050;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
    }

    /* Make all controls in the strum row fluid: distribute available width */
    .strum-controls-row .strum-menu-wrap {
      flex: 1 1 0;
      min-width: 0;
    }

    .strum-controls-row .sample-loop-tool-btn,
    .strum-controls-row .strum-menu-btn {
      flex: 1 1 0;
      min-width: 0;
      padding: 0 8px;
      height: 26px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      white-space: nowrap;
      text-transform: none;
    }

    .strum-controls-row .strum-menu {
      /* positioned dynamically via JS */
    }

    .strum-menu-wrap {
      position: relative;
      display: inline-flex;
      z-index: 20060;
    }

    .strum-menu-btn {
      text-transform: none;
      font-size: 10px;
      letter-spacing: 0.04em;
    }

    .strum-menu {
      position: fixed;
      min-width: 100px;
      background: rgba(var(--surface-deep-rgb), 0.96);
      border: 1px solid rgba(var(--line-rgb), 0.3);
      border-radius: 4px;
      box-shadow: 0 8px 18px rgba(0, 0, 0, 0.45);
      padding: 4px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      z-index: 100000;
    }

    #strumSequencerMenu {
      z-index: 100001;
    }

    .strum-menu.hidden { display: none; }

    .strum-menu-item {
      appearance: none;
      border: 1px solid transparent;
      background: transparent;
      color: var(--text);
      text-align: left;
      padding: 0 6px;
      height: 22px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 10px;
      letter-spacing: 0.04em;
      text-transform: none;
      line-height: 1;
      display: flex;
      align-items: center;
    }

    .strum-menu-item:hover {
      background: rgba(var(--surface-hover-rgb), 0.94);
      border-color: rgba(var(--line-rgb), 0.5);
    }

    .strum-menu-item.active {
      border-color: rgba(var(--accent-rgb), 0.72);
      color: var(--accent-text);
      background: var(--accent-surface);
    }

    .strum-menu.player-strum-menu {
      background: linear-gradient(180deg, rgba(var(--player-topbar-rgb, 12, 17, 26), 0.96), rgba(var(--player-topbar-rgb, 12, 17, 26), 0.88));
      border-color: rgba(var(--player-line-rgb, 140, 146, 156), 0.38);
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.48);
      backdrop-filter: blur(10px) saturate(115%);
      -webkit-backdrop-filter: blur(10px) saturate(115%);
    }

    .strum-menu.player-strum-menu .strum-menu-item {
      color: #fff;
    }

    .strum-menu.player-strum-menu .strum-menu-item:hover {
      background: rgba(var(--player-swatch-rgb, 55, 58, 66), 0.8);
      border-color: rgba(var(--player-line-rgb, 140, 146, 156), 0.45);
      color: #fff;
    }

    .strum-menu.player-strum-menu .strum-menu-item.active {
      border-color: rgba(var(--player-bright-rgb, 218, 222, 229), 0.6);
      color: #fff;
      background: rgba(var(--player-swatch-rgb, 28, 24, 13), 0.7);
    }

    .strum-step-grid {
      margin-top: 8px;
      display: grid;
      grid-template-columns: repeat(8, 1fr);
      gap: 0;
    }

    .strum-step-grid.hidden {
      display: none;
    }

    .strum-step-card {
      border: 1px solid rgba(var(--line-rgb), 0.28);
      border-radius: 6px;
      background: rgba(var(--surface-card-rgb), 0.62);
      padding: 6px;
      display: grid;
      gap: 6px;
      min-width: 0;
      position: relative;
      overflow: visible;
    }

    .strum-step-card.is-inactive {
      opacity: 0.44;
      filter: saturate(0.2);
    }

    .strum-step-head {
      margin: 0;
      font-size: 8px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-dim);
      text-align: center;
      line-height: 1;
    }

    .strum-step-velocity-btn {
      width: 100%;
      height: 100px;
      border: none;
      border-radius: 6px;
      background: transparent;
      padding: 4px 2px;
      display: flex;
      align-items: stretch;
      justify-content: stretch;
      cursor: ns-resize;
    }

    .strum-step-velocity-track {
      width: 100%;
      height: 100%;
      border-radius: 4px;
      background: transparent;
      display: flex;
      gap: 6px;
      padding: 0;
      align-items: flex-end;
      overflow: visible;
    }

    .strum-step-velocity-track.is-rest {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
    }

    .strum-step-velocity-bar {
      border-radius: 4px;
      background: rgba(var(--player-topbar-rgb, 40, 40, 40), 0.88);
      display: flex;
      align-items: flex-end;
      flex: 1 1 0;
      min-width: 0;
      overflow: hidden;
      height: 100%;
    }

    .strum-step-velocity-fill {
      width: 100%;
      background: #fff;
    }

    .strum-step-rest-label {
      font-size: 10px;
      color: var(--text-dim);
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .strum-step-rate-wrap {
      position: relative;
      display: flex;
      min-width: 0;
      overflow: visible;
    }

    .strum-step-rate-btn,
    .strum-step-keyswitch-btn {
      width: 100%;
      min-width: 0;
      height: 24px;
      padding: 0 6px;
      font-size: 10px;
      text-transform: none;
      letter-spacing: 0.04em;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .strum-step-rate-wrap .strum-menu {
      /* positioned dynamically via JS */
    }

    .strum-step-keyswitch-btn:disabled {
      opacity: 0.45;
      cursor: default;
    }

    .strum-step-rate-wrap {
      z-index: 240;
    }

    .strum-step-rate-menu {
      z-index: 10001;
    }

    .strum-step-card.is-inactive .strum-step-velocity-btn,
    .strum-step-card.is-inactive .strum-step-rate-btn,
    .strum-step-card.is-inactive .strum-step-keyswitch-btn {
      cursor: default;
    }

    .strum-step-gap {
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      border: none;
      border-radius: 3px;
      background: transparent;
      color: transparent;
      font-size: 13px;
      font-weight: 700;
      line-height: 1;
      padding: 0;
      min-width: 0;
      width: 100%;
      height: 100%;
      transition: color 0.12s, background 0.12s;
    }

    .strum-step-gap:hover {
      background: rgba(var(--line-rgb), 0.12);
      color: rgba(216, 216, 216, 0.9);
    }

    /* Player page strum step grid uses the active player color theme */
    .player-strum-step-grid {
      position: relative;
      display: grid;
      grid-template-columns: repeat(8, 1fr);
      gap: 0;
      opacity: 1;
      transition: opacity 220ms ease;
    }

    .player-strum-overlay {
      position: absolute;
      left: 10px;
      right: 10px;
      bottom: calc(var(--player-kb-height, 87px) + 10px);
      z-index: 10;
      display: grid;
      gap: 8px;
      opacity: 1;
      transition: opacity 220ms ease;
    }

    .player-strum-overlay.hidden {
      display: none;
    }

    .player-strum-overlay.is-idle-dim {
      opacity: 0.1;
    }

    .player-strum-controls {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      align-items: center;
      justify-content: center;
      padding: 8px 10px;
      border: 1px solid rgba(var(--player-line-rgb, 140, 146, 156), 0.28);
      border-radius: 8px;
      background: rgba(var(--player-topbar-rgb, 9, 13, 20), 0.72);
      box-shadow: 0 8px 18px rgba(0, 0, 0, 0.28);
      backdrop-filter: blur(10px) saturate(115%);
      -webkit-backdrop-filter: blur(10px) saturate(115%);
    }

    .player-strum-controls .strum-menu-wrap {
      display: flex;
      min-width: 0;
    }

    .player-strum-controls .sample-loop-tool-btn,
    .player-strum-controls .strum-menu-btn {
      border-color: rgba(var(--player-line-rgb, 140, 146, 156), 0.34);
      background: rgba(var(--player-topbar-rgb, 30, 33, 40), 0.88);
      color: #fff;
    }

    .player-strum-controls .sample-loop-tool-btn:hover,
    .player-strum-controls .strum-menu-btn:hover {
      border-color: rgba(var(--player-bright-rgb, 218, 222, 229), 0.45);
      background: rgba(var(--player-topbar-rgb, 55, 58, 66), 0.92);
      color: #fff;
    }

    .player-strum-controls .sample-loop-tool-btn.active,
    .player-strum-controls .strum-menu-btn.active {
      border-color: rgba(var(--player-bright-rgb, 218, 222, 229), 0.56);
      background: rgba(var(--player-swatch-rgb, 28, 24, 13), 0.72);
      color: #fff;
    }

    .player-strum-step-grid.hidden {
      display: none;
    }

    .player-strum-step-grid.is-idle-dim {
      opacity: 0.1;
    }

    .player-strum-step-grid .strum-step-card {
      border: 1px solid rgba(var(--player-line-rgb, 140, 146, 156), 0.35);
      border-radius: 6px;
      background: rgba(var(--player-topbar-rgb, 40, 40, 40), 0.5);
      padding: 6px;
      display: grid;
      gap: 6px;
      min-width: 0;
      position: relative;
      overflow: visible;
    }

    .player-strum-step-grid .strum-step-card.is-inactive {
      opacity: 0.44;
      filter: saturate(0.2);
    }

    .player-strum-step-grid .strum-step-head {
      margin: 0;
      font-size: 8px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #fff;
      text-align: center;
      line-height: 1;
    }

    .player-strum-step-grid .strum-step-velocity-btn {
      width: 100%;
      height: 100px;
      border: 1px solid transparent;
      border-radius: 6px;
      background: transparent;
      padding: 4px 2px;
      display: flex;
      align-items: stretch;
      justify-content: stretch;
      cursor: ns-resize;
    }

    .player-strum-step-grid .strum-step-velocity-btn:hover {
      border-color: rgba(var(--player-bright-rgb, 200, 200, 200), 0.35);
      background: transparent;
    }

    .player-strum-step-grid .strum-step-velocity-track {
      width: 100%;
      height: 100%;
      border-radius: 4px;
      background: transparent;
      display: flex;
      gap: 6px;
      padding: 0;
      align-items: flex-end;
      overflow: visible;
    }

    .player-strum-step-grid .strum-step-velocity-track.is-rest {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
    }

    .player-strum-step-grid .strum-step-velocity-bar {
      border-radius: 4px;
      background: rgba(var(--player-topbar-rgb, 40, 40, 40), 0.9);
      display: flex;
      align-items: flex-end;
      flex: 1 1 0;
      min-width: 0;
      overflow: hidden;
      height: 100%;
    }

    .player-strum-step-grid .strum-step-velocity-fill {
      width: 100%;
      background: #fff;
    }

    .player-strum-step-grid .strum-step-rest-label {
      font-size: 10px;
      color: rgba(255, 255, 255, 0.5);
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .player-strum-step-grid .strum-step-rate-wrap {
      position: relative;
      display: flex;
      min-width: 0;
      overflow: visible;
      z-index: 240;
    }

    .player-strum-step-grid .strum-step-rate-btn,
    .player-strum-step-grid .strum-step-keyswitch-btn {
      width: 100%;
      min-width: 0;
      height: 24px;
      padding: 0 6px;
      font-size: 10px;
      text-transform: none;
      letter-spacing: 0.04em;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 1px solid rgba(var(--player-line-rgb, 140, 146, 156), 0.3);
      border-radius: 4px;
      background: rgba(var(--player-topbar-rgb, 30, 33, 40), 0.85);
      color: #fff;
    }

    .player-strum-step-grid .strum-step-rate-btn:hover,
    .player-strum-step-grid .strum-step-keyswitch-btn:hover {
      border-color: rgba(var(--player-bright-rgb, 218, 222, 229), 0.45);
      background: rgba(var(--player-topbar-rgb, 55, 58, 66), 0.9);
      color: #fff;
    }

    .player-strum-step-grid .strum-step-keyswitch-btn:disabled {
      opacity: 0.45;
      cursor: default;
    }

    .player-strum-step-grid .strum-step-rate-menu,
    .player-strum-step-grid .strum-step-keyswitch-menu {
      z-index: 10001;
      background: rgba(var(--player-topbar-rgb, 12, 17, 26), 0.96);
      border: 1px solid rgba(var(--player-line-rgb, 140, 146, 156), 0.3);
      box-shadow: 0 8px 18px rgba(0, 0, 0, 0.45);
    }

    .player-strum-step-grid .strum-menu-item {
      color: #fff;
    }

    .player-strum-step-grid .strum-menu-item:hover {
      background: rgba(var(--player-swatch-rgb, 55, 58, 66), 0.8);
      border-color: rgba(var(--player-line-rgb, 140, 146, 156), 0.45);
      color: #fff;
    }

    .player-strum-step-grid .strum-menu-item.active {
      border-color: rgba(var(--player-bright-rgb, 218, 222, 229), 0.6);
      color: #fff;
      background: rgba(var(--player-swatch-rgb, 28, 24, 13), 0.7);
    }

    .player-strum-step-grid .strum-step-card.is-inactive .strum-step-velocity-btn,
    .player-strum-step-grid .strum-step-card.is-inactive .strum-step-rate-btn,
    .player-strum-step-grid .strum-step-card.is-inactive .strum-step-keyswitch-btn {
      cursor: default;
    }

    .player-strum-step-grid .strum-step-gap:hover {
      background: rgba(var(--player-line-rgb, 140, 146, 156), 0.15);
      color: #fff;
    }

    button:not(.player-key):hover,
    .file-btn:hover {
      border-color: rgba(140, 146, 156, 0.5);
      background: rgba(var(--surface-hover-rgb), 0.94);
    }

    .primary {
      border-color: rgba(var(--line-rgb), 0.52);
      background: linear-gradient(180deg, rgba(176, 176, 176, 0.18), rgba(var(--surface-elevated-rgb), 0.95));
    }

    .tabs {
      display: flex;
      align-items: center;
      gap: 3px;
      padding: 7px 10px;
      border-bottom: 1px solid rgba(var(--line-rgb), 0.28);
      background: rgba(var(--surface-deep-rgb), 0.12);
    }

    .tabs.player-topbar-swatch {
      background:
        linear-gradient(
          180deg,
          rgba(var(--player-topbar-rgb), 0.92),
          rgba(var(--player-topbar-rgb), 0.76)
        );
    }

    .tabs.player-topbar-swatch .player-tab-icons .tab-btn {
      color: rgba(var(--player-line-rgb), 0.96);
    }

    .tabs.wallpaper-icon-swatch .player-tab-icons .tab-btn {
      border-color: rgba(var(--player-line-rgb), 0.34);
      background:
        linear-gradient(
          180deg,
          rgba(var(--player-topbar-rgb), 0.94),
          rgba(var(--player-topbar-rgb), 0.8)
        );
      color: rgba(var(--player-line-rgb), 0.88);
    }

    .tabs.wallpaper-icon-swatch .player-tab-icons .tab-btn.active {
      color: rgba(var(--player-line-rgb), 0.96);
      border-color: rgba(var(--player-line-rgb), 0.96);
      background:
        linear-gradient(
          180deg,
          rgba(var(--player-swatch-rgb), 0.98),
          rgba(var(--player-swatch-rgb), 0.68)
        );
    }

    .tabs.player-topbar-swatch .player-tab-icons .tab-btn:not(.active) {
      border-color: rgba(var(--player-line-rgb), 0.34);
      background:
        linear-gradient(
          180deg,
          rgba(var(--player-topbar-rgb), 0.94),
          rgba(var(--player-topbar-rgb), 0.8)
        );
      color: rgba(var(--player-line-rgb), 0.82);
    }

    .player-tab-swap {
      position: relative;
      display: grid;
      align-items: center;
      min-width: 83px;
    }

    .player-tab-swap > * {
      grid-area: 1 / 1;
    }

    .player-tab-icons {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      transition: opacity 120ms ease, visibility 120ms ease;
    }

    .tab-btn {
      border: 1px solid rgba(var(--line-rgb), 0.28);
      border-radius: 10px;
      background: rgba(var(--surface-elevated-rgb), 0.96);
      font-size: 11px;

      border-radius: 6px;
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.5);
      padding: 4px 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 13px;
    }

    .map-key-context-menu.visible {
      display: block;
    }

    .map-key-context-menu-item {
      padding: 6px 14px;
      color: #e0e0e0;
      cursor: default;
      white-space: nowrap;
    }

    .map-key-context-menu-item.active {
      background: rgba(80, 140, 255, 0.18);
      color: #fff;
    }

    .map-key-context-menu-item:hover {
      background: rgba(80, 140, 255, 0.25);
      color: #fff;
    }

    .map-key-context-menu-label {
      padding: 7px 14px 4px;
      color: rgba(224, 224, 224, 0.56);
      font-size: 10px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      pointer-events: none;
    }

    .map-key-context-menu-color-item {
      display: flex;
      align-items: center;
      gap: 9px;
    }

    .map-key-context-menu-swatch {
      width: 12px;
      height: 12px;
      border-radius: 999px;
      flex: 0 0 auto;
      border: 1px solid rgba(255, 255, 255, 0.22);
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.22),
        0 0 0 1px rgba(0, 0, 0, 0.18);
      background: rgb(var(--context-menu-swatch-rgb, 224, 224, 224));
    }

    .hidden {
      display: none;
    }

    .tab-btn.hidden {
      display: none;
    }

    @media (max-width: 1100px) {
      .setup-layout,
      .auto-layout {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 900px) {
      .auto-stack-split {
        grid-template-columns: 1fr;
      }

      .tabs {
        flex-wrap: wrap;
      }

      .top-right-controls {
        width: 100%;
        margin-left: 0;
        justify-content: flex-end;
      }

      .player-author-display {
        max-width: none;
      }

      .simple-grid {
        grid-template-columns: repeat(3, minmax(70px, 1fr));
      }

      .field-grid,
      .stats {
        grid-template-columns: 1fr;
      }

      .player-controls {
        right: 6px;
        bottom: calc(var(--player-kb-height) + 6px);
        gap: 4px;
      }

      .player-stage {
        --player-kb-height: 76px;
        --player-white-key-width: 19px;
      }

      .player-controls .knob {
        width: 44px;
      }

      .player-divider {
        height: 22px;
        margin: 0 1px;
      }

      .player-load-btn {
        width: 74px;
        height: 74px;
        font-size: 48px;
      }

      .map-key.white {
        height: 23px;
      }

      .map-key.black {
        height: 23px;
      }

      .octave-nav {
        width: 28px;
        font-size: 20px;
      }

      .map-empty {
        left: 34px;
        right: 34px;
      }
    }
  </style>
</head>
<body>
  <main class="instrument">
    <div id="loadingOverlay" class="loading-overlay hidden" aria-live="polite" aria-busy="false">
      <div class="loading-card">
        <div class="loading-label-row">
          <div id="loadingLabel" class="loading-label">Loading instrument...</div>
        </div>
      </div>
    </div>

    <nav class="tabs">
      <div class="player-tab-swap">
        <div class="player-tab-icons">
          <button id="tabSwapBtn" class="tab-btn icon-tab active" type="button" data-tab="setup" aria-label="Open setup" title="Setup / Mapping">
            <svg id="tabSwapIcon" viewBox="0 -960 960 960" aria-hidden="true" focusable="false">
              <path id="tabSwapIconPath" d="M748.33-82.5q-5.66-2.17-11-7.5L508-319.33q-5.33-5.34-7.5-11-2.17-5.67-2.17-12.34 0-6.66 2.17-12.33t7.5-11l85-85q5.33-5.33 11-7.5t12.33-2.17q6.67 0 12.34 2.17 5.66 2.17 11 7.5L869-221.67q5.33 5.34 7.5 11 2.17 5.67 2.17 12.34 0 6.66-2.17 12.33t-7.5 11l-85 85q-5.33 5.33-11 7.5t-12.33 2.17q-6.67 0-12.34-2.17Zm12.34-77.5L799-198.33 616.67-380.67l-38.34 38.34L760.67-160ZM185.5-82.33Q179.33-84.67 174-90l-84-84q-5.33-5.33-7.67-11.5Q80-191.67 80-198.33q0-6.67 2.33-12.34 2.34-5.66 7.67-11l220.67-220.66h85L432.33-479 260.67-650.67h-57L80-774.33 183.67-878l123.66 123.67v57L479-525.67 604.33-651l-59-59 56-56h-113L467-787.33 599.67-920 621-898.67v113l56-56 160 160q15.67 15.67 24.33 35.84Q870-625.67 870-603q0 21.33-7.33 41-7.34 19.67-21 35.33l-85-85-56 56L652-604.33 442.33-394.67v84L221.67-90q-5.34 5.33-11 7.67Q205-80 198.33-80q-6.66 0-12.83-2.33ZM198.33-160l190-190v-38.33H350l-190 190L198.33-160Zm0 0L160-198.33l19.67 18.66L198.33-160Zm562.34 0L799-198.33 760.67-160Z"/>
            </svg>
          </button>
        </div>
        <div id="playerAuthorDisplay" class="player-author-display" aria-live="polite"></div>
      </div>
      <div class="top-right-controls">
        <div class="player-adsr-strip" aria-label="Amp envelope quick controls" title="Amp envelope quick controls">
          <input class="player-adsr-slider" type="range" min="0" max="5000" step="1" value="10" data-param="ampAttack" aria-label="Attack" title="Attack">
          <input class="player-adsr-slider" type="range" min="0" max="5000" step="1" value="120" data-param="ampDecay" aria-label="Decay" title="Decay">
          <input class="player-adsr-slider" type="range" min="0" max="100" step="1" value="100" data-param="ampSustain" aria-label="Sustain" title="Sustain">
          <input class="player-adsr-slider" type="range" min="0" max="5000" step="1" value="2000" data-param="ampRelease" aria-label="Release" title="Release">
        </div>
        <button id="playerStrumMainToggle" type="button" aria-pressed="false" aria-label="Show strum on main" title="Show Strum On Main">
          <svg class="eye-icon-off" viewBox="0 0 24 24" aria-hidden="true"><path d="M8 6v12l10-6-10-6z"/></svg>
          <svg class="eye-icon-on" viewBox="0 0 24 24" aria-hidden="true"><path d="M8 6v12l10-6-10-6z"/></svg>
        </button>
        <button id="doublingToggle" type="button" aria-pressed="false" aria-label="Doubling" title="Doubling">
          <svg class="dbl-icon-off" viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="4"/></svg>
          <svg class="dbl-icon-on" viewBox="0 0 24 24" aria-hidden="true"><path d="M18.6 6.62c-1.44 0-2.8.56-3.77 1.53L12 10.66 10.48 12h.01L7.8 14.39c-.64.64-1.49.99-2.4.99-1.87 0-3.39-1.51-3.39-3.38S3.53 8.62 5.4 8.62c.91 0 1.76.35 2.44 1.03l1.13 1 1.51-1.34L9.22 8.2A5.37 5.37 0 0 0 5.4 6.62C2.42 6.62 0 9.04 0 12s2.42 5.38 5.4 5.38c1.44 0 2.8-.56 3.77-1.53l2.83-2.5.01.01L13.52 12h-.01l2.69-2.39c.64-.64 1.49-.99 2.4-.99 1.87 0 3.39 1.51 3.39 3.38s-1.52 3.38-3.39 3.38c-.9 0-1.76-.35-2.44-1.03l-1.14-1.01-1.51 1.34 1.27 1.12a5.386 5.386 0 0 0 3.82 1.57c2.98 0 5.4-2.41 5.4-5.38s-2.42-5.37-5.4-5.37z"/></svg>
        </button>
        <button id="playerPitchDownToggle" type="button" aria-pressed="false" aria-label="Pitch down octaves" title="Pitch Down: 0">0</button>
        <div class="knob knob-mini tooltip-right" data-param="gain" data-min="-24" data-max="12" data-step="0.1" data-value="0" data-unit="dB" data-decimals="1">
          <div class="knob-face"><div class="knob-pointer"></div></div>
          <div class="knob-label">Output</div>
          <div class="knob-value"></div>
        </div>
      </div>
    </nav>

    <input id="filesInput" class="hidden" type="file" multiple accept=".wav,.aif,.aiff,.flac,.ogg,.mp3,.WAV,.AIF,.AIFF,.FLAC,.OGG,.MP3">
    <input id="folderInput" class="hidden" type="file" webkitdirectory directory multiple>
    <input id="packInput" class="hidden" type="file" accept=".smpinst,.smpinstm,.json">
    <input id="keyswitchInput" class="hidden" type="file" accept=".keysw,.json" multiple>
    <input id="wallpaperInput" class="hidden" type="file" accept="image/png,image/jpeg,image/webp,image/gif,image/svg+xml">

    <section id="panel-player" class="panel active">
      <div id="playerStage" class="player-stage">
        <div id="playerEmptyState" class="player-empty">
          <button id="playerLoadInstrumentBtn" class="player-load-btn" type="button" aria-label="Load sample instrument" title="Load sample instrument">+</button>
        </div>
        <div id="playerStrumOverlay" class="player-strum-overlay hidden">
          <div id="playerStrumControls" class="player-strum-controls">
            <div class="strum-menu-wrap">
              <button id="playerStrumSwingBtn" class="sample-loop-tool-btn strum-menu-btn" type="button" aria-haspopup="true" aria-expanded="false">Swing 0%</button>
            </div>
            <div class="strum-menu-wrap">
              <button id="playerStrumVelHumanBtn" class="sample-loop-tool-btn strum-menu-btn" type="button" aria-haspopup="true" aria-expanded="false">Velocity Humanization 0%</button>
            </div>
            <div class="strum-menu-wrap">
              <button id="playerStrumTimeHumanBtn" class="sample-loop-tool-btn strum-menu-btn" type="button" aria-haspopup="true" aria-expanded="false">Timing Humanization 0ms</button>
            </div>
          </div>
          <div id="playerStrumStepGrid" class="player-strum-step-grid hidden" aria-label="Player strum sequencer"></div>
        </div>
        <div class="player-keyboard-strip" aria-label="Player keyboard">
          <div id="playerKeyboardViewport" class="player-keyboard-viewport">
            <div id="playerKeyboard" class="player-keyboard">
              <div id="playerKeyboardWhites" class="player-keys-whites"></div>
              <div id="playerKeyboardBlacks" class="player-keys-blacks"></div>
            </div>
          </div>
        </div>
      </div>
    </section>

    <section id="panel-setup" class="panel">
      <div class="setup-layout">
        <div class="setup-wide">
          <div class="auto-meta-strip">
            <div class="field-grid auto-meta-grid">
              <div class="field">
                <label class="auto-meta-sr-label" for="autoDestination">Destination Folder</label>
                <input id="autoDestination" class="auto-meta-input" type="text" value="" placeholder="Destination Folder" aria-label="Destination Folder" title="Click to choose destination folder">
                <input id="autoDestinationPicker" class="hidden" type="file" webkitdirectory directory multiple tabindex="-1" aria-hidden="true">
              </div>
              <div class="field">
                <label id="autoInstrumentLabel" class="auto-meta-sr-label" for="autoInstrument">Instrument Name</label>
                <input id="autoInstrument" class="auto-meta-input" type="text" value="" placeholder="Instrument Name" aria-label="Instrument Name">
              </div>
              <div class="field auto-author-field">
                <label id="autoAuthorLabel" class="auto-meta-sr-label" for="autoAuthor">Author</label>
                <div class="auto-author-row">
                  <input id="autoAuthor" class="auto-meta-input" type="text" value="" placeholder="Author" aria-label="Author">
                  <input id="wallpaperField" class="auto-meta-input auto-wallpaper-input" type="text" value="" placeholder="Wallpaper" aria-label="Wallpaper" readonly title="Click to choose wallpaper">
                  <button id="saveSmpinstBtn" class="sample-loop-tool-btn auto-save-btn hidden" type="button">Save</button>
                </div>
              </div>
            </div>
          </div>

          <div id="keyboardMapSection" class="section setup-map-wide">
            <h2 id="keyboardMapToggle" class="setup-map-toggle setup-divider-toggle">Keyboard Map</h2>
            <div id="keyboardMapBody" class="section-body">
              <div id="keyswitchMapToolbar" class="keyswitch-map-toolbar">
                <div class="keyswitch-map-import-controls">
                  <button id="addFilesBtn" class="sample-loop-tool-btn" type="button">Add Files</button>
                  <button id="addFolderBtn" class="sample-loop-tool-btn" type="button">Add Folder</button>
                  <button id="newKeyswitchBtn" class="sample-loop-tool-btn" type="button">New Keyswitch</button>
                  <select id="keyswitchMapSelect" class="keyswitch-map-select" aria-label="Select keyswitch set"></select>
                  <div id="keyswitchGainKnob" class="knob knob-mini tooltip-right keyswitch-map-gain-knob is-disabled" data-param="keyswitchGain" data-min="-24" data-max="24" data-step="0.1" data-value="0" data-unit="dB" data-decimals="1" data-tooltip-value="true" aria-disabled="true" aria-label="Select a keyswitch set">
                    <div class="knob-face"><div class="knob-pointer"></div></div>
                    <div class="knob-label">Set Gain</div>
                    <div class="knob-value"></div>
                  </div>
                  <button id="clearInstrumentBtn" class="sample-loop-tool-btn" type="button">Clear</button>
                </div>
                <div id="newKeyswitchPopover" class="new-ks-popover">
                  <div class="new-ks-row">
                    <label for="newKsNameInput">Name</label>
                    <input id="newKsNameInput" type="text" maxlength="40" placeholder="e.g. Legato">
                  </div>
                  <div class="new-ks-row">
                    <label for="newKsNoteInput">Note</label>
                    <input id="newKsNoteInput" type="text" maxlength="3" placeholder="e.g. C0">
                  </div>
                  <button id="newKsCreateBtn" class="new-ks-create-btn" type="button">Create</button>
                </div>
                <div class="keyswitch-map-main-controls">
                  <button id="keyswitchMapNormalizeBtn" class="keyswitch-map-normalize-btn hidden" type="button" title="Normalize all samples to peak level">Normalize</button>
                  <div id="keyswitchMapLoopWrap" class="keyswitch-map-loop-wrap hidden">
                    <button id="keyswitchMapLoopModeBtn" class="keyswitch-map-loop-btn" type="button" title="Loop playback enabled">Loop</button>
                  </div>
                  <span id="keyswitchMapWarning" class="keyswitch-map-warning hidden" aria-live="polite"></span>
                </div>
              </div>
              <div class="keyswitch-map-matrix-row">
                <div class="keyswitch-map-matrix-controls">
                  <label class="keyswitch-map-matrix-label" for="mapMatrixIntervalInput">Int</label>
                  <input id="mapMatrixIntervalInput" class="keyswitch-map-matrix-input" type="number" min="1" max="12" step="1" value="1" inputmode="numeric" aria-label="Split interval in semitones">
                  <label class="keyswitch-map-matrix-label" for="mapMatrixVelInput">Vel</label>
                  <input id="mapMatrixVelInput" class="keyswitch-map-matrix-input" type="number" min="1" max="8" step="1" value="3" inputmode="numeric" aria-label="Velocity layers">
                  <label class="keyswitch-map-matrix-label" for="mapMatrixRrInput">RR</label>
                  <input id="mapMatrixRrInput" class="keyswitch-map-matrix-input" type="number" min="1" max="8" step="1" value="1" inputmode="numeric" aria-label="Round robin columns">
                  <button id="mapMatrixSplitBtn" class="sample-loop-tool-btn" type="button">Split</button>
                </div>
              </div>
              <div id="setupStatus" class="status"></div>
              <div class="map-shell">
              <div id="sampleEditor" class="sample-editor">
                <div class="sample-waveform-box">
                  <div class="sample-controls-bar">
                    <div class="sample-loop-tools">
                      <button id="sampleLoopPrevBtn" class="sample-loop-tool-btn" type="button" title="Previous loop candidate">&lt;</button>
                      <button id="sampleLoopNextBtn" class="sample-loop-tool-btn" type="button" title="Next loop candidate">&gt;</button>
                      <button id="sampleFindLoopBtn" class="sample-loop-tool-btn" type="button" title="Find best loop">Find</button>
                      <button id="sampleLoopApplyAllBtn" class="sample-loop-tool-btn" type="button" title="Apply current loop strategy to all samples">All</button>
                    </div>
                    <div id="sampleLoopXfadeKnob" class="sample-finetune sample-loop-xfade" aria-label="Loop crossfade">
                      <div class="sample-finetune-knob" role="slider" tabindex="0" aria-valuemin="0" aria-valuemax="500" aria-valuenow="30" aria-label="Loop crossfade milliseconds">
                        <div id="sampleLoopXfadePointer" class="sample-finetune-pointer sample-loop-xfade-pointer"></div>
                      </div>
                    </div>
                    <label class="sample-velocity-toggle" title="Velocity crossfade 70%" aria-label="Velocity crossfade 70%">
                      <input id="velocityXfadeToggle" type="checkbox">
                      <span class="sample-velocity-toggle-mark">✓</span>
                    </label>
                    <div id="sampleFineTuneKnob" class="sample-finetune sample-finetune-tune" aria-label="Fine tune">
                      <div class="sample-finetune-knob" role="slider" tabindex="0" aria-valuemin="-100" aria-valuemax="100" aria-valuenow="0" aria-label="Fine tune cents">
                        <div id="sampleFineTunePointer" class="sample-finetune-pointer"></div>
                      </div>
                    </div>
                  </div>
                  <div class="sample-waveform-info">
                    <button id="sampleNavPrev" class="sample-nav-btn" type="button" aria-label="Previous sample">&lt;</button>
                    <div id="sampleEditorTitle" class="sample-editor-title"></div>
                    <button id="sampleNavNext" class="sample-nav-btn" type="button" aria-label="Next sample">&gt;</button>
                    <div id="sampleEditorMeta" class="sample-editor-meta"></div>
                  </div>
                  <div id="sampleWaveformViewport" class="sample-waveform-viewport">
                    <div id="sampleWaveformContent" class="sample-waveform-content">
                      <canvas id="sampleWaveform" class="sample-waveform"></canvas>
                      <div id="sampleGainLine" class="sample-gain-line hidden" aria-label="Sample gain line">
                        <span id="sampleGainReadout" class="sample-gain-readout">0.0 dB</span>
                      </div>
                      <div id="sampleLoopRegion" class="sample-loop-region hidden"></div>
                      <div id="sampleLoopFadeRegion" class="sample-loop-fade-region hidden"></div>
                      <div id="samplePlayhead" class="sample-playhead hidden"></div>
                      <div id="sampleStartMarker" class="sample-loop-handle sample-start-handle hidden" aria-label="Sample start"></div>
                      <div id="sampleLoopFade" class="sample-loop-handle sample-loop-fade-handle hidden" aria-label="Loop crossfade start"></div>
                      <div id="sampleLoopStart" class="sample-loop-handle hidden" aria-label="Loop start"></div>
                      <div id="sampleLoopEnd" class="sample-loop-handle hidden" aria-label="Loop end"></div>
                    </div>
                  </div>
                </div>
              </div>
              <div class="map-viewport">
                <button id="octaveDownBtn" class="octave-nav left" type="button" aria-label="Previous octave">&lt;</button>
                <button id="octaveUpBtn" class="octave-nav right" type="button" aria-label="Next octave">&gt;</button>
                <div id="mapEmpty" class="map-empty hidden"></div>
                <div id="mapSamples" class="map-samples"></div>
                <div id="mapKeys" class="map-keys"></div>
                <div id="mapKeyContextMenu" class="map-key-context-menu"></div>
              </div>
            </div>
            </div>
          </div>

          <div id="autoSamplerSection" class="section">
            <h2 id="autoSamplerToggle" class="setup-divider-toggle">Auto Sampler</h2>
            <div id="autoSamplerBody" class="section-body auto-layout">
              <div class="section">
                <div class="auto-stack-split">
                      <div class="field-grid auto-stack-grid">
                        <div id="autoStartField" class="field note-inline">
                          <label for="autoStart">Start Note</label>
                          <div class="interval-stepper" role="group" aria-label="Start note">
                            <button id="autoStartDown" class="interval-step-btn" type="button" aria-label="Previous start note">&lt;</button>
                            <input id="autoStart" class="note-input" type="text" value="C2" maxlength="3">
                            <button id="autoStartUp" class="interval-step-btn" type="button" aria-label="Next start note">&gt;</button>
                          </div>
                        </div>
                        <div id="autoEndField" class="field note-inline">
                          <label for="autoEnd">End Note</label>
                          <div class="interval-stepper" role="group" aria-label="End note">
                            <button id="autoEndDown" class="interval-step-btn" type="button" aria-label="Previous end note">&lt;</button>
                            <input id="autoEnd" class="note-input" type="text" value="C5" maxlength="3">
                            <button id="autoEndUp" class="interval-step-btn" type="button" aria-label="Next end note">&gt;</button>
                          </div>
                        </div>
                        <div class="field note-inline" id="intervalWrap">
                          <label for="autoIntervalValue">Sample Interval</label>
                          <div class="interval-stepper" role="group" aria-label="Interval">
                            <button id="autoIntervalDown" class="interval-step-btn" type="button" aria-label="Decrease interval">&lt;</button>
                            <input id="autoIntervalValue" class="interval-input" type="text" value="3" maxlength="2" inputmode="numeric" aria-label="Interval value">
                            <button id="autoIntervalUp" class="interval-step-btn" type="button" aria-label="Increase interval">&gt;</button>
                          </div>
                        </div>
                        <div id="autoVelField" class="field note-inline">
                          <label for="autoVelValue">Velocity Layers</label>
                          <div class="interval-stepper" role="group" aria-label="Velocity layers">
                            <button id="autoVelDown" class="interval-step-btn" type="button" aria-label="Decrease velocity layers">&lt;</button>
                            <input id="autoVelValue" class="interval-input" type="text" value="3" maxlength="1" inputmode="numeric" aria-label="Velocity layers value">
                            <button id="autoVelUp" class="interval-step-btn" type="button" aria-label="Increase velocity layers">&gt;</button>
                          </div>
                        </div>
                        <div id="autoRRField" class="field note-inline">
                          <label for="autoRRValue">Round Robin</label>
                          <div class="interval-stepper" role="group" aria-label="Round robin per note">
                            <button id="autoRRDown" class="interval-step-btn" type="button" aria-label="Decrease round robin per note">&lt;</button>
                            <input id="autoRRValue" class="interval-input" type="text" value="2" maxlength="1" inputmode="numeric" aria-label="Round robin per note value">
                            <button id="autoRRUp" class="interval-step-btn" type="button" aria-label="Increase round robin per note">&gt;</button>
                          </div>
                        </div>
                      </div>
                      <div class="field-grid auto-stack-grid">
                        <div class="field auto-ms-field">
                          <label for="autoHoldMs">Sustain</label>
                          <input id="autoHoldMs" class="ms-input" type="text" value="1800" inputmode="numeric">
                        </div>
                        <div class="field auto-ms-field">
                          <label for="autoTailMs">Release Tail</label>
                          <input id="autoTailMs" class="ms-input" type="text" value="700" inputmode="numeric">
                        </div>
                        <div class="field auto-ms-field">
                          <label for="autoPrerollMs">Pre-roll</label>
                          <input id="autoPrerollMs" class="ms-input" type="text" value="0" inputmode="numeric">
                        </div>
                        <div class="field auto-loop-row">
                          <label for="autoNormalizeRecorded" class="auto-loop-row-label">Normalize</label>
                          <label class="sample-velocity-toggle auto-loop-inline auto-loop-check" title="Normalize recorded samples" aria-label="Normalize recorded samples">
                            <input id="autoNormalizeRecorded" type="checkbox">
                            <span class="sample-velocity-toggle-mark">✓</span>
                          </label>
                        </div>

    function getDefaultSetupCollapseState() {
      return {
        autoSampler: false,
        keyboardMap: false,
        modulation: true,
        strum: true
      };
    }

    function loadSetupCollapseState() {
      const defaults = getDefaultSetupCollapseState();
      try {
        const raw = window.sessionStorage.getItem(SETUP_COLLAPSE_STATE_KEY);
        if (!raw) return defaults;
        const parsed = JSON.parse(raw);
        if (!parsed || typeof parsed !== "object") return defaults;
        const next = { ...defaults };
        Object.keys(next).forEach((key) => {
          if (typeof parsed[key] === "boolean") next[key] = parsed[key];
        });
        return next;
      } catch {
        return defaults;
      }
    }

    function saveSetupCollapseState(key, collapsed) {
      const stateMap = loadSetupCollapseState();
      stateMap[key] = !!collapsed;
      try {
        window.sessionStorage.setItem(SETUP_COLLAPSE_STATE_KEY, JSON.stringify(stateMap));
      } catch {
        // ignore storage failures
      }
    }

    function midiToNote(midi) {
      return `${NOTE_NAMES[midi % 12]}${Math.floor(midi / 12) - 1}`;
    }

    function noteToMidi(note) {
      const match = String(note || "").trim().match(/^([A-Ga-g])([#b]?)(-?\d{1,2})$/);
      if (!match) return null;
      const token = `${match[1].toUpperCase()}${match[2]}`;
      const pitch = NOTE_TO_SEMITONE[token];
      if (pitch === undefined) return null;
      const midi = (Number(match[3]) + 1) * 12 + pitch;
      if (midi < 0 || midi > 127) return null;
      return midi;
    }

    function parseFilename(name) {
      const stem = name.replace(/\.[^/.]+$/, "");
      const note = stem.match(/([A-Ga-g])([#b]?)(-?\d{1,2})/);
      if (!note) return { valid: false, reason: "Missing NOTE token" };
      const noteToken = `${note[1].toUpperCase()}${note[2]}${note[3]}`;
      const rootMidi = noteToMidi(noteToken);
      if (rootMidi === null) return { valid: false, reason: `Invalid NOTE token ${noteToken}` };
      const parts = stem.split(/[^A-Za-z0-9#]+/).filter(Boolean);
      const partsUpper = parts.map((p) => p.toUpperCase());
      let velocityLayer = null;
      let hasVelocityToken = false;

      for (const token of partsUpper) {
        const byV = token.match(/^V([1-9][0-9]{0,2})$/);
        if (byV) {
          velocityLayer = Number(byV[1]);
          hasVelocityToken = true;
          break;
        }
        const byVelWord = token.match(/^VEL(?:OCITY)?([1-9][0-9]{0,2})$/);
        if (byVelWord) {
          velocityLayer = Number(byVelWord[1]);
          hasVelocityToken = true;
          break;
        }
      }

      if (velocityLayer === null) {
        const byV = stem.match(/(?:^|[^A-Za-z0-9])V([1-9][0-9]{0,2})(?:$|[^A-Za-z0-9])/i);
        if (byV) {
          velocityLayer = Number(byV[1]);
          hasVelocityToken = true;
        }
      }

      if (velocityLayer === null) {
        const byVelWord = stem.match(/VEL(?:OCITY)?[_-]?([1-9][0-9]{0,2})/i);
        if (byVelWord) {
          velocityLayer = Number(byVelWord[1]);
          hasVelocityToken = true;
        }
      }

      if (!Number.isFinite(velocityLayer)) velocityLayer = 3;
      velocityLayer = Math.max(1, Math.min(5, velocityLayer));

      let rrIndex = null;
      let hasRRToken = false;
      for (const token of partsUpper) {
        const rrToken = token.match(/^RR([1-9][0-9]*)$/);
        if (rrToken) {
          rrIndex = Number(rrToken[1]);
          hasRRToken = true;
          break;
        }
      }
      if (rrIndex === null) {
        const rr = stem.match(/(?:^|[^A-Za-z0-9])RR([1-9][0-9]*)(?:$|[^A-Za-z0-9])/i);
        if (rr) {
          rrIndex = Number(rr[1]);
          hasRRToken = true;
        }
      }

      const suffixSerialMatch = stem.match(/(?:_|-)(\d+)$/);
      const suffixSerial = suffixSerialMatch ? Number(suffixSerialMatch[1]) : null;
      const loopEnabled = partsUpper.includes("L");
      return {
        valid: true,
        noteToken,
        rootMidi,
        velocityLayer,
        rrIndex,
        loopEnabled,
        hasVelocityToken,
        hasRRToken,
        suffixSerial
      };
    }

      const maxWaitMs = Math.max(0, Math.round(Number(timeoutMs) || 0));
      if (getNativeBackend()) return true;
      if (maxWaitMs <= 0) return false;
      const start = performance.now();
      while ((performance.now() - start) < maxWaitMs) {

        if (getNativeBackend()) return true;

    function cloneManualRangesObject(source) {
      const result = {};
      if (!source || typeof source !== "object") return result;
      Object.entries(source).forEach(([key, value]) => {
        const rootMidi = Math.max(0, Math.min(127, Math.round(Number(key))));
        if (!Number.isFinite(rootMidi)) return;
        const low = Math.max(0, Math.min(127, Math.round(Number(value?.low))));
        const high = Math.max(0, Math.min(127, Math.round(Number(value?.high))));
        if (!Number.isFinite(low) || !Number.isFinite(high)) return;
        result[String(rootMidi)] = {
          low: Math.min(low, rootMidi),
          high: Math.max(high, rootMidi)
        };
      });
      return result;
    }

    function resolveLoadedManualRanges(...sources) {
      let fallback = {};
      let hasFallback = false;
      sources.forEach((source) => {
        const cloned = cloneManualRangesObject(source);
        if (Object.keys(cloned).length > 0) {
          fallback = cloned;
          hasFallback = true;
          return;
        }
        if (!hasFallback) {
          fallback = cloned;
          hasFallback = true;
        }
      });
      return fallback;
    }

    function normalizeOpenStringMidiList(values) {
      const source = Array.isArray(values) ? values : [];
      const unique = [];
      source.forEach((value) => {
        const parsed = Math.round(Number(value));
        if (!Number.isFinite(parsed)) return;
        const clamped = Math.max(PLAYER_KB_START_MIDI, Math.min(PLAYER_KB_END_MIDI, parsed));
        if (!unique.includes(clamped)) unique.push(clamped);
      });
      return unique;
    }

    function normalizeRgbText(value, fallback = "") {
      const raw = String(value || "").trim();
      if (!raw) return String(fallback || "").trim();
      const parts = raw.split(",").map((part) => Number(part.trim()));
      if (parts.length !== 3 || parts.some((part) => !Number.isFinite(part))) {
        return String(fallback || "").trim();
      }
      return parts
        .map((part) => Math.max(0, Math.min(255, Math.round(part))))
        .join(", ");
    }

    function normalizeOpenStringColorMap(values, allowedMidis = null) {
      const source = (values && typeof values === "object") ? values : {};
      const allowed = Array.isArray(allowedMidis)
        ? new Set(normalizeOpenStringMidiList(allowedMidis).map((midi) => String(midi)))
        : null;
      const normalized = {};
      Object.entries(source).forEach(([midiKey, rgbValue]) => {
        const parsedMidi = Math.round(Number(midiKey));
        if (!Number.isFinite(parsedMidi)) return;
        const clampedMidi = Math.max(PLAYER_KB_START_MIDI, Math.min(PLAYER_KB_END_MIDI, parsedMidi));
        if (allowed && !allowed.has(String(clampedMidi))) return;
        const normalizedRgb = normalizeRgbText(rgbValue);
        if (!normalizedRgb) return;
        normalized[String(clampedMidi)] = normalizedRgb;
      });
      return normalized;
    }

    function serializeOpenStringColorMap(values, allowedMidis = null) {
      const normalized = normalizeOpenStringColorMap(values, allowedMidis);
      return Object.keys(normalized)
        .sort((left, right) => Number(left) - Number(right))
        .map((midiKey) => `${midiKey}:${normalized[midiKey]}`)
        .join("|");
    }

    function getNormalizedKeyswitchSetOpenStringMidis(set) {
      if (!set || typeof set !== "object") return [];
      const normalized = normalizeOpenStringMidiList(set.openStringMidis);
      if (!Array.isArray(set.openStringMidis)
        || set.openStringMidis.length !== normalized.length
        || normalized.some((midi, index) => midi !== set.openStringMidis[index])) {
        set.openStringMidis = normalized;
      }
      return normalized;
    }

    function getNormalizedKeyswitchSetOpenStringColorsByMidi(set) {

    function getOpenStringMidisForSet(setId = state.activeMapSetId) {

    function setOpenStringMidisForSet(values, setId = state.activeMapSetId) {
      const normalized = normalizeOpenStringMidiList(values);

        ownerSet.openStringMidis = normalized;

        return normalized;

      state.playerOpenStringMidis = normalized;

    function getOpenStringColorsByMidiForSet(setId = state.activeMapSetId) {
      const ownerSet = getOpenStringOwnerSet(setId);
      if (ownerSet) return getNormalizedKeyswitchSetOpenStringColorsByMidi(ownerSet);

        state.playerOpenStringColorsByMidi,

      );
      return state.playerOpenStringColorsByMidi;

    function setOpenStringColorsByMidiForSet(values, setId = state.activeMapSetId) {
      const allowedMidis = getOpenStringMidisForSet(setId);
      const normalized = normalizeOpenStringColorMap(values, allowedMidis);
      const ownerSet = getOpenStringOwnerSet(setId);
      if (ownerSet) {
        ownerSet.openStringColorsByMidi = normalized;

      state.playerOpenStringColorsByMidi = normalized;

    function getOpenStringColorForMidi(midi, setId = state.activeMapSetId) {
      const normalizedMidi = Math.round(Number(midi));
      if (!Number.isFinite(normalizedMidi)) return "";
      const clampedMidi = Math.max(PLAYER_KB_START_MIDI, Math.min(PLAYER_KB_END_MIDI, normalizedMidi));
      const colorMap = getOpenStringColorsByMidiForSet(setId);
      return normalizeRgbText(colorMap[String(clampedMidi)]);
    }

    function setOpenStringColorForMidi(midi, rgbText = "", setId = state.activeMapSetId) {
      const normalizedMidi = Math.round(Number(midi));
      if (!Number.isFinite(normalizedMidi)) return getOpenStringColorsByMidiForSet(setId);
      const clampedMidi = Math.max(PLAYER_KB_START_MIDI, Math.min(PLAYER_KB_END_MIDI, normalizedMidi));
      const nextColorMap = {
        ...getOpenStringColorsByMidiForSet(setId)
      };
      const normalizedRgb = normalizeRgbText(rgbText);
      if (normalizedRgb) nextColorMap[String(clampedMidi)] = normalizedRgb;
      else delete nextColorMap[String(clampedMidi)];
      return setOpenStringColorsByMidiForSet(nextColorMap, setId);
    }

    function setOpenStringColorForSelection(rgbText = "", setId = state.activeMapSetId, extraMidis = []) {
      const normalizedRgb = normalizeRgbText(rgbText);
      const selectedMidis = [
        ...getOpenStringMidisForSet(setId),
        ...normalizeOpenStringMidiList(extraMidis)
      ];
      const uniqueMidis = Array.from(new Set(selectedMidis));
      if (!uniqueMidis.length) {
        return setOpenStringColorsByMidiForSet({}, setId);
      }
      const nextColorMap = {};
      uniqueMidis.forEach((midi) => {
        if (normalizedRgb) nextColorMap[String(midi)] = normalizedRgb;
      });
      return setOpenStringColorsByMidiForSet(nextColorMap, setId);
    }

    function getPackManifestBasePath() {
      const path = String(state.packManifestBasePath || "").trim();
      if (!path) return "";
      return path.replace(/\\/g, "/");
    }

    function getPackManifestFilePath() {
      const path = String(state.packManifestFilePath || "").trim();
      if (!path) return "";
      return path.replace(/\\/g, "/");
    }

    function resolveManifestAssetPath(manifestBasePath, assetPath) {
      const rel = normalizeManifestPathInput(assetPath);
      if (!rel) return "";
      if (/^[A-Za-z]:\//.test(rel) || rel.startsWith("/")) return rel;

      const base = String(manifestBasePath || "").trim().replace(/\\/g, "/");
      if (!base) return "";

      const sanitizedRel = rel.replace(/^\.?\//, "");
      return `${base.replace(/\/+$/, "")}/${sanitizedRel}`;
    }

    function normalizeManifestPathInput(pathLike) {
      let normalized = String(pathLike || "").trim();
      if (!normalized) return "";

      const isLikelyUrl = /^[a-z][a-z0-9+.-]*:\/\//i.test(normalized);
      const fileUrlMatch = normalized.match(/^file:\/+(.+)$/i);
      if (fileUrlMatch) {
        normalized = fileUrlMatch[1] || "";
        if (!/^[A-Za-z]:[\\/]/.test(normalized)) {
          normalized = `/${normalized}`;
        }
      }

      // Strip URL query/hash only for real URLs. Local filesystem paths can
      // legally include "#" characters (e.g. note names like G#3.wav).
      if (isLikelyUrl || !!fileUrlMatch) {
        const hashIdx = normalized.indexOf("#");
        if (hashIdx >= 0) normalized = normalized.slice(0, hashIdx);
        const queryIdx = normalized.indexOf("?");
        if (queryIdx >= 0) normalized = normalized.slice(0, queryIdx);
      }

      try {
        normalized = decodeURIComponent(normalized);
      } catch {
        // Keep raw path when URI decoding fails.
      }

      normalized = normalized.replace(/\\/g, "/").trim();
      return normalized;
    }

    function getNormalizedPathDir(pathLike) {
      const normalized = String(pathLike || "").trim().replace(/\\/g, "/");
      if (!normalized) return "";
      const trimmed = normalized.replace(/\/+$/, "");
      if (!trimmed) return "";
      const slashIdx = trimmed.lastIndexOf("/");
      if (slashIdx < 0) return "";
      if (slashIdx === 0) return "/";
      return trimmed.slice(0, slashIdx);
    }

    function getKeyswitchImportBasePathCandidates(filePath) {
      const candidates = [];
      const pushCandidate = (value) => {
        const candidate = String(value || "").trim().replace(/\\/g, "/").replace(/\/+$/, "");
        if (!candidate) return;
        if (!candidates.includes(candidate)) candidates.push(candidate);
      };

      const destinationPath = String(el.autoDestination?.value || "").trim().replace(/\\/g, "/").replace(/\/+$/, "");
      const manifestBasePath = getPackManifestBasePath();

      const fileDir = getNormalizedPathDir(filePath);
      pushCandidate(fileDir);
      pushCandidate(getNormalizedPathDir(fileDir));

      const lowerDir = fileDir.toLowerCase();
      const marker = "/keyswitches/";
      const markerIdx = lowerDir.lastIndexOf(marker);
      if (markerIdx > 0) {
        pushCandidate(fileDir.slice(0, markerIdx));
      } else if (lowerDir.endsWith("/keyswitches")) {
        pushCandidate(fileDir.slice(0, Math.max(0, fileDir.length - "/keyswitches".length)));
      }

      // Prefer Keyswitches folder as base for ../Audio relative paths.
      if (manifestBasePath) {
        pushCandidate(`${manifestBasePath}/Keyswitches`);
        pushCandidate(manifestBasePath);
      }
      if (destinationPath) {
        pushCandidate(`${destinationPath}/Keyswitches`);
        pushCandidate(destinationPath);
      }

      return candidates;
    }

    function selectKeyswitchImportBasePathForRelativePath(relativePath, candidates) {
      const list = Array.isArray(candidates) ? candidates : [];
      if (!list.length) return "";
      const rel = String(relativePath || "").trim().replace(/\\/g, "/");
      if (!rel) return list[0];

      const keyswitchBase = list.find((value) => /\/keyswitches$/i.test(String(value || ""))) || "";
      const rootBase = list.find((value) => !/\/keyswitches$/i.test(String(value || ""))) || "";

      if (rel.startsWith("../") || rel.startsWith("./")) {
        return keyswitchBase || list[0];
      }

      if (/^(audio|keyswitches)\//i.test(rel)) {
        return rootBase || list[0];
      }

      return keyswitchBase || list[0];
    }

    function isAbsolutePathLike(pathLike) {
      const normalized = String(pathLike || "").trim().replace(/\\/g, "/");
      if (!normalized) return false;
      return /^[A-Za-z]:\//.test(normalized) || normalized.startsWith("/");
    }

    function ensurePackManifestBasePathHint() {
      if (getPackManifestBasePath()) return;
      const hasRelativeManifestPaths = getAllMapEntries().some((entry) => {
        if (!entry || !entry.valid) return false;
        const manifestPath = String(entry.manifestPath || "").trim();
        if (!manifestPath) return false;
        return !isAbsolutePathLike(manifestPath);
      });
      if (!hasRelativeManifestPaths) return;

      const keyswitchSourcePath = (state.keyswitchSets || []).find((set) => String(set?.sourcePath || "").trim())?.sourcePath || "";
      const candidates = getKeyswitchImportBasePathCandidates(keyswitchSourcePath);
      const fallbackBasePath = String(candidates[0] || "").trim();
      if (fallbackBasePath) {
        state.packManifestBasePath = fallbackBasePath;
      }
    }

    function getWallpaperAssetPath() {

    function getWallpaperManifestAbsolutePath() {
      const assetPath = getWallpaperAssetPath();

    function buildWallpaperAssetPath(fileName) {
      const baseName = String(fileName || "").trim();
      if (!baseName) return "";

      function getLegacyWallpaperManifestPath(manifestLike) {

      function applyWallpaperManifestMetadata(manifest, options = {}) {

        manifest.wallpaper = {
          enabled: true,
          path: wallpaperAssetPath,
          fitMode: "fill",
          brightness: 1,
          position: "middle-center"
        };
        return wallpaperAssetPath;

      function logWallpaperDebug(context, extra = "") {

        ];

    function applyPlayerWallpaperBackdropRgb(rgbText = "") {
      const normalized = String(rgbText || "").trim();
      if (!normalized) {
        document.documentElement.style.setProperty("--player-swatch-rgb", "40, 40, 40");

        document.documentElement.style.setProperty("--player-swatch-rgb", normalized);
        document.documentElement.style.setProperty("--player-topbar-rgb", normalized);

    function applyPlayerWallpaperDominantRgb(rgbText = "") {
      const normalized = String(rgbText || "").trim() || "224, 224, 224";
      state.wallpaperDominantRgb = normalized;
      document.documentElement.style.setProperty("--player-wallpaper-dominant-rgb", normalized);

    function applyPlayerWallpaperOpenStringRgb(rgbText = "") {
      const normalized = String(rgbText || "").trim() || "224, 224, 224";
      document.documentElement.style.setProperty("--player-wallpaper-open-string-rgb", normalized);
