        const openStringItem = document.createElement("div");
        openStringItem.className = "map-key-context-menu-item";
        openStringItem.dataset.action = "open-string";
        openStringItem.textContent = isOpenString ? "Remove open string" : "Mark as open string";
        openStringItem.classList.toggle("active", isOpenString);
        menu.appendChild(openStringItem);
        if (availablePalette.length) {
          const colorLabel = document.createElement("div");
          colorLabel.className = "map-key-context-menu-label";
          colorLabel.textContent = "Open string color";
          menu.appendChild(colorLabel);
          availablePalette.forEach((rgbText, index) => {
            const item = document.createElement("div");
            item.className = "map-key-context-menu-item map-key-context-menu-color-item";
            item.dataset.action = "open-string-color";
            item.dataset.color = rgbText;
            item.classList.toggle("active", isOpenString && normalizeRgbText(rgbText) === selectedColor);
            const swatch = document.createElement("span");
            swatch.className = "map-key-context-menu-swatch";
            swatch.style.setProperty("--context-menu-swatch-rgb", rgbText);
            const label = document.createElement("span");
            label.textContent = `Wallpaper color ${index + 1}`;
            item.appendChild(swatch);
            item.appendChild(label);
            menu.appendChild(item);
          });
        }
        if (state.mapMatrixSplitEnabled && state.mapMatrixVelocityLayers > 1) {
          const layers = clampMapMatrixVelocityLayers(state.mapMatrixVelocityLayers);
          for (let v = 1; v <= layers; v++) {
            const item = document.createElement("div");
            item.className = "map-key-context-menu-item";
            item.dataset.action = "load-samples";
            item.dataset.layer = String(v);
            item.textContent = "Load samples \u2192 V" + v;
            menu.appendChild(item);
          }
        } else {
          const item = document.createElement("div");
          item.className = "map-key-context-menu-item";
          item.dataset.action = "load-samples";
          item.textContent = "Load samples";
          menu.appendChild(item);
        }
      };

      el.mapKeys.addEventListener("contextmenu", (ev) => {
        const keyNode = ev.target.closest(".map-key");
        if (!keyNode || keyNode.classList.contains("disabled")) return;
        const midi = Number(keyNode.dataset.midi);
        if (!Number.isFinite(midi)) return;
        ev.preventDefault();
        ev.stopPropagation();
        state.keyContextMenuTargetMidi = midi;
        state.keyContextMenuTargetLayer = null;
        buildKeyContextMenuItems();
        const menu = el.mapKeyContextMenu;
        menu.style.left = ev.clientX + "px";
        menu.style.top = ev.clientY + "px";
        menu.classList.add("visible");
        requestAnimationFrame(() => {
          const rect = menu.getBoundingClientRect();
          if (rect.right > window.innerWidth) menu.style.left = (window.innerWidth - rect.width - 4) + "px";
          if (rect.bottom > window.innerHeight) menu.style.top = (window.innerHeight - rect.height - 4) + "px";
        });
      });

      el.mapKeyContextMenu.addEventListener("click", (ev) => {
        const item = ev.target.closest(".map-key-context-menu-item");
        if (!item) return;
        hideKeyContextMenu();
        if (item.dataset.action === "open-string") {
          openStringOnPlayer(state.keyContextMenuTargetMidi);
          return;
        }
        if (item.dataset.action === "open-string-color") {
          openStringOnPlayer(state.keyContextMenuTargetMidi, {
            forceOn: true,
            color: item.dataset.color,
            applyColorToSelection: true
          });
          return;
        }
        if (item.dataset.action === "load-samples") {
          if (item.dataset.layer) {
            state.keyContextMenuTargetLayer = Number(item.dataset.layer);
          }
          if (getNativeBackend()) {
            emitNativeEvent("pick_audio_files", {});
          }
        }
      });

      document.addEventListener("pointerdown", (ev) => {
        if (!el.mapKeyContextMenu.contains(ev.target)) hideKeyContextMenu();
      });
      document.addEventListener("keydown", (ev) => {
        if (ev.key === "Escape") hideKeyContextMenu();
      });

      const getMatrixDropTarget = (targetNode) => {
        if (!(targetNode instanceof Element)) return null;
        const matrixCell = targetNode.closest('.map-rr-cell[data-matrix-cell="1"]');
        if (matrixCell) {
          const rootMidi = Number(matrixCell.dataset.rootMidi);
          const velocityLayer = Number(matrixCell.dataset.velocityLayer);
          if (Number.isFinite(rootMidi) && Number.isFinite(velocityLayer)) {
            return {
              rootMidi,
              velocityLayer,
              rrIndex: Number(matrixCell.dataset.rrIndex),
              source: "cell"
            };
          }
        }

        const matrixBox = targetNode.closest(".map-sample-box.map-matrix-box");
        if (matrixBox) {
          const rootMidi = Number(matrixBox.dataset.rootMidi);
          const velocityLayer = Number(matrixBox.dataset.velocityLayer);
          if (Number.isFinite(rootMidi) && Number.isFinite(velocityLayer)) {
            return {
              rootMidi,
              velocityLayer,
              rrIndex: Number.NaN,
              source: "box"
            };
          }
        }

        return null;
      };

      const getMapEntryFromTarget = (targetNode) => {
        if (!(targetNode instanceof Element)) return null;
        const directEntryNode = targetNode.closest("[data-entry-order]");
        if (directEntryNode) {
          const order = Number(directEntryNode.dataset.entryOrder);
          const directEntry = getMapEntryByOrder(order);
          if (directEntry) return directEntry;
        }

        if (!state.mapMatrixSplitEnabled) return null;
        const matrixCell = targetNode.closest('.map-rr-cell[data-matrix-cell="1"]');
        const matrixBox = targetNode.closest(".map-sample-box.map-matrix-box");
        const matrixTarget = matrixCell || matrixBox;
        if (!matrixTarget) return null;

        const rootMidi = Number(matrixTarget.dataset.rootMidi);
        const velocityLayer = Number(matrixTarget.dataset.velocityLayer);
        if (!Number.isFinite(rootMidi) || !Number.isFinite(velocityLayer)) return null;

        const { rrColumns, interval } = normalizeMapMatrixState();
        const activeEntries = getActiveMapEntries().filter((item) => item && item.valid);
        const intervalRoots = getMapMatrixIntervalRoots(activeEntries, interval);
        const targetRoot = quantizeMidiToMapMatrixRoot(rootMidi, interval, intervalRoots);
        const targetLayer = clampMapMatrixVelocityLayers(velocityLayer);
        const candidates = activeEntries
          .filter((item) => (
            quantizeMidiToMapMatrixRoot(item.rootMidi, interval, intervalRoots) === targetRoot
            && clampMapMatrixVelocityLayers(item.velocityLayer) === targetLayer
          ))
          .sort((a, b) => (
            Number(entryHasPlayableSource(b)) - Number(entryHasPlayableSource(a))
            || getEntryMatrixRrIndex(a, rrColumns) - getEntryMatrixRrIndex(b, rrColumns)
            || a.order - b.order
          ));
        if (!candidates.length) return null;

        if (matrixCell) {
          const preferredRr = Number(matrixCell.dataset.rrIndex);
          if (Number.isFinite(preferredRr)) {
            const preferred = candidates.find((item) => getEntryMatrixRrIndex(item, rrColumns) === preferredRr);
            if (preferred) return preferred;
          }
        }
        return candidates[0];
      };

      el.mapSamples.addEventListener("dragstart", (ev) => {
        if (!state.mapMatrixSplitEnabled) return;
        const rrCell = ev.target?.closest?.('.map-rr-cell[data-matrix-cell="1"][data-entry-order]');
        if (!rrCell) return;
        const order = Number(rrCell.dataset.entryOrder);
        if (!Number.isFinite(order) || !ev.dataTransfer) return;
        ev.dataTransfer.effectAllowed = "move";
        ev.dataTransfer.setData("application/x-sample-map-entry-order", String(order));
        ev.dataTransfer.setData("text/plain", String(order));
      });

      el.mapSamples.addEventListener("dragover", (ev) => {
        const draggedOrder = Number(ev.dataTransfer?.getData("application/x-sample-map-entry-order"));
        const hasEntryMove = Number.isFinite(draggedOrder);

        if (!hasEntryMove || !state.mapMatrixSplitEnabled) return;
        const pointerTarget = document.elementFromPoint(ev.clientX, ev.clientY);
        const dropTarget = getMatrixDropTarget(ev.target) || getMatrixDropTarget(pointerTarget);
        if (!dropTarget) return;
        ev.preventDefault();
        ev.stopPropagation();
        if (ev.dataTransfer) ev.dataTransfer.dropEffect = "move";
      });

      el.mapSamples.addEventListener("drop", (ev) => {
        const draggedOrder = Number(ev.dataTransfer?.getData("application/x-sample-map-entry-order"));
        const hasEntryMove = Number.isFinite(draggedOrder);

        const pointerTarget = document.elementFromPoint(ev.clientX, ev.clientY);
        const dropTarget = getMatrixDropTarget(ev.target) || getMatrixDropTarget(pointerTarget);
        if (!dropTarget) {
          if (hasEntryMove) {
            ev.preventDefault();
            ev.stopPropagation();
          }
          return;
        }

        ev.preventDefault();
        ev.stopPropagation();

        const targetRoot = dropTarget.rootMidi;
        const targetLayer = dropTarget.velocityLayer;
        let changed = false;
        let skippedDueToFull = 0;

        if (Number.isFinite(draggedOrder) && state.mapMatrixSplitEnabled) {
          const draggedEntry = getMapEntryByOrder(draggedOrder);
          if (draggedEntry) {
            const moveResult = moveMapEntryToMatrixLayer(draggedEntry, targetRoot, targetLayer);
            if (moveResult.moved) {
              changed = true;
            } else if (moveResult.reason === "layer-full") {
              skippedDueToFull += 1;
            }
          }
        }

        if (changed) {
          mapMatrixDeleteSelection = null;
          state.packLoaded = false;
          stopAllPreviewVoices();
          state.mapMatrixPaintActive = false;
          state.mapMatrixLastPaintCellKey = "";
          applyMapMatrixIntervalRanges(getActiveMapEntries());
          renderSetup();
          renderPlayerKeyboard();
          updatePlayerEmptyState();
          scheduleSessionStateSave(320);
        }

        if (skippedDueToFull > 0) {
          const sampleLabel = skippedDueToFull === 1 ? "sample" : "samples";
          setStatus(
            el.setupStatus,
            `${skippedDueToFull} ${sampleLabel} not placed: ${midiToNote(targetRoot)} V${targetLayer} has no free RR slots.`,
            "warn"
          );
        }
      });

      el.mapSamples.addEventListener("pointerdown", (ev) => {
        const eventTarget = ev.target instanceof Element ? ev.target : null;
        const pointerTarget = document.elementFromPoint(ev.clientX, ev.clientY);
        const targetNode = eventTarget
          || (pointerTarget instanceof Element ? pointerTarget : null);
        if (!(targetNode instanceof Element)) return;

        const matrixCell = targetNode.closest('.map-rr-cell[data-matrix-cell="1"]');
        const matrixBox = targetNode.closest(".map-sample-box.map-matrix-box");

        if (state.mapMatrixSplitEnabled) {
          if (matrixCell) {
            mapMatrixDeleteSelection = {
              scope: "rr",
              rootMidi: Number(matrixCell.dataset.rootMidi),
              velocityLayer: Number(matrixCell.dataset.velocityLayer),
              rrIndex: Number(matrixCell.dataset.rrIndex)
            };
          } else if (matrixBox) {
            mapMatrixDeleteSelection = {
              scope: "layer",
              rootMidi: Number(matrixBox.dataset.rootMidi),
              velocityLayer: Number(matrixBox.dataset.velocityLayer),
              rrIndex: 1
            };
          } else {
            mapMatrixDeleteSelection = null;
          }
        } else {
          mapMatrixDeleteSelection = null;
        }

        if (matrixCell && state.mapMatrixSplitEnabled && state.mapMatrixAssignMode) {
          const selectedEntry = getMapEntryByOrder(state.selectedMapEntryOrder);
          if (!selectedEntry) {
            const pickedOrder = Number(matrixCell.dataset.entryOrder);
            const pickedEntry = getMapEntryByOrder(pickedOrder);
            if (pickedEntry) {
              void openSampleEditor(pickedEntry).catch(() => {});
              return;
            }
          }
          ev.preventDefault();
          ev.stopPropagation();
          state.mapMatrixPaintActive = true;
          const cellKey = `${matrixCell.dataset.rootMidi}:${matrixCell.dataset.velocityLayer}:${matrixCell.dataset.rrIndex}`;
          if (cellKey !== state.mapMatrixLastPaintCellKey) {
            state.mapMatrixLastPaintCellKey = cellKey;
            tryAssignFromMapMatrixCell(matrixCell);
          }
          return;
        }

        const handle = targetNode.closest(".map-range-handle");
        if (handle && !state.mapMatrixSplitEnabled) {
          const box = handle.closest(".map-sample-box");
          if (!box) return;
          const rootMidi = Number(box.dataset.rootMidi);
          const side = String(handle.dataset.side || "");
          if (!Number.isFinite(rootMidi) || (side !== "left" && side !== "right")) return;
          ev.preventDefault();
          ev.stopPropagation();

          const valid = getActiveMapEntries().filter((entry) => entry.valid);
          const manualRanges = getActiveMapManualRanges();
          const { roots, rangesByRoot } = getResolvedRootRanges(valid, manualRanges);
          const startRange = rangesByRoot.get(rootMidi);
          if (!startRange) return;
          const startX = ev.clientX;
          const startValue = side === "left" ? startRange.low : startRange.high;
          const minValue = side === "left" ? startRange.minLow : rootMidi;
          const maxValue = side === "left" ? rootMidi : startRange.maxHigh;

          const keyNode = el.mapKeys.querySelector(".map-key");
          const mapKeysStyle = getComputedStyle(el.mapKeys);
          const gapPx = Number.parseFloat(mapKeysStyle.columnGap || mapKeysStyle.gap || "0") || 0;
          const semitoneStepPx = keyNode ? Math.max(1, keyNode.getBoundingClientRect().width + gapPx) : Math.max(1, el.mapKeys.getBoundingClientRect().width / 12);

          let rangeDragRaf = 0;
          function move(moveEv) {
            const delta = Math.round((moveEv.clientX - startX) / semitoneStepPx);
            const nextValue = Math.max(minValue, Math.min(maxValue, startValue + delta));
            const current = rangesByRoot.get(rootMidi) || startRange;
            if (side === "left") {
              setManualRangeForRoot(rootMidi, nextValue, current.high, roots, manualRanges);
            } else {
              setManualRangeForRoot(rootMidi, current.low, nextValue, roots, manualRanges);
            }
            if (!rangeDragRaf) {
              rangeDragRaf = requestAnimationFrame(() => {
                rangeDragRaf = 0;
                renderKeyboardMap(getActiveMapEntries(), true);
                renderPlayerKeyboard();
              });
            }
          }

          function up() {
            window.removeEventListener("pointermove", move);
            window.removeEventListener("pointerup", up);
            window.removeEventListener("pointercancel", up);
            if (rangeDragRaf) { cancelAnimationFrame(rangeDragRaf); rangeDragRaf = 0; }
            renderKeyboardMap(getActiveMapEntries(), true);
            renderPlayerKeyboard();
          }

          window.addEventListener("pointermove", move);
          window.addEventListener("pointerup", up);
          window.addEventListener("pointercancel", up);
          return;
        }

        let entry = getMapEntryFromTarget(targetNode);
        if (!entry && pointerTarget instanceof Element && pointerTarget !== targetNode) {
          entry = getMapEntryFromTarget(pointerTarget);
        }
        if (!entry) return;
        void openSampleEditor(entry).catch(() => {});
      });

      el.mapSamples.addEventListener("pointerover", (ev) => {
        if (!state.mapMatrixSplitEnabled || !state.mapMatrixAssignMode) return;
        const selectedEntry = getMapEntryByOrder(state.selectedMapEntryOrder);
        if (!selectedEntry) return;
        const matrixCell = ev.target.closest('.map-rr-cell[data-matrix-cell="1"]');
        if (!matrixCell) return;
        const cellKey = `${matrixCell.dataset.rootMidi}:${matrixCell.dataset.velocityLayer}:${matrixCell.dataset.rrIndex}`;
        if (cellKey === state.mapMatrixLastPaintCellKey) return;
        state.mapMatrixLastPaintCellKey = cellKey;
        tryAssignFromMapMatrixCell(matrixCell);
      });

      el.mapSamples.addEventListener("pointerleave", () => {
        state.mapMatrixLastPaintCellKey = "";
      });

      window.addEventListener("keydown", (ev) => {
        const key = String(ev.key || "");
        if (key !== "Delete" && key !== "Backspace") return;
        if (!state.mapMatrixSplitEnabled) return;
        const activeTab = getActiveTab();
        if (activeTab !== "setup") return;
        if (isTextInputLikeTarget(ev.target)) return;
        ev.preventDefault();

        const deleted = deleteSelectedMapMatrixAssignment({
          target: mapMatrixDeleteSelection,
          deleteVelocityLayer: !!ev.shiftKey
        });
        if (deleted) {
          mapMatrixDeleteSelection = null;
        }
      });

      window.addEventListener("pointerup", () => {
        state.mapMatrixPaintActive = false;
        state.mapMatrixLastPaintCellKey = "";
      });
      window.addEventListener("pointercancel", () => {
        state.mapMatrixPaintActive = false;
        state.mapMatrixLastPaintCellKey = "";
      });
    }

    function renderSetup() {
      const valid = state.entries.filter((e) => e.valid);
      const invalid = state.entries.filter((e) => !e.valid);
      updateWheelBaseTheme();
      valid.forEach((entry) => ensureEntryEditorState(entry));
      if (state.selectedMapEntryOrder !== null && !getMapEntryByOrder(state.selectedMapEntryOrder)) {
        closeSampleEditor();
      }
      if (state.mapMatrixSplitEnabled) {
        applyMapMatrixIntervalRanges(getActiveMapEntries());
      }
      updateKeyswitchMapSelector();
      renderSequencerArpControls();
      renderKeyboardMap(getActiveMapEntries(), true);
      syncVelocityCrossfadeControl();

      const buckets = new Map();
      valid.forEach((entry) => {
        const key = `${entry.rootMidi}-${entry.velocityLayer}`;
        if (!buckets.has(key)) buckets.set(key, []);
        buckets.get(key).push(entry);
      });

      if (state.entries.length === 0) {
        if ((state.keyswitchSets || []).length > 0) {
          const setLabels = state.keyswitchSets.map((set) => `${set.name}${set.key ? ` (${set.key})` : ""}`);
          el.importLog.textContent = `Loaded keyswitch set(s):\n${setLabels.join("\n")}`;
          const duplicates = getDuplicateKeyswitchNotes();
          if (duplicates.length > 0) {
            setStatus(el.setupStatus, `Duplicate keyswitch keys: ${duplicates.join(", ")}. Change key values.`, "warn");
          } else {
            setStatus(el.setupStatus, "");
          }
        } else {
          el.importLog.textContent = "No files imported.";
          setStatus(el.setupStatus, "");
        }
        closeSampleEditor();
        scheduleHostResizeForActiveTab();
        return;
      }

      el.importLog.textContent = state.entries.map((e) => {
        if (!e.valid) return `${e.fileName} -> INVALID (${e.reason})`;
        const rr = e.rrIndex === null ? "RR:auto" : `RR:${e.rrIndex}`;
        return `${e.fileName} -> ${midiToNote(e.rootMidi)} V${e.velocityLayer} ${rr}${e.loopEnabled ? " L" : ""}`;
      }).join("\n");

      const duplicateKeys = getDuplicateKeyswitchNotes();
      if (duplicateKeys.length > 0) {
        setStatus(el.setupStatus, `Duplicate keyswitch keys: ${duplicateKeys.join(", ")}. Change key values.`, "warn");
      } else if (invalid.length > 0) {
        setStatus(el.setupStatus, `Imported ${state.entries.length} files with ${invalid.length} invalid filename(s).`, "warn");
      } else {
        setStatus(el.setupStatus, "");
      }
      scheduleHostResizeForActiveTab();
    }

    function ingest(filesLike) {
      const files = Array.from(filesLike || []).filter((f) => {
        if (f.type && f.type.startsWith("audio/")) return true;
        return AUDIO_REGEX.test(f.name);
      });

      if (!files.length) {
        setStatus(el.setupStatus, "No audio files detected.", "warn");
        return;
      }

      ensureSessionStateWritable("ingest-audio");
      state.packLoaded = false;
      const start = state.entries.length;
      files.forEach((file, idx) => {
        const parsed = parseFilename(file.name);
        const sourcePath = (file && typeof file.path === "string") ? String(file.path).trim() : "";
        const sampleUrl = (parsed.valid && !sourcePath) ? URL.createObjectURL(file) : "";
        const entry = {
          fileName: file.name,
          manifestPath: sourcePath,
          order: start + idx,
          sampleUrl,
          sampleDataUrl: "",
          fineTuneCents: 0,
          sampleStartNorm: 0,
          loopStartNorm: 0,
          loopEndNorm: 1,
          loopFadeInNorm: 0,
          ...parsed
        };
        state.entries.push(entry);
        if (parsed.valid && !sourcePath) {
          cacheEntrySampleDataUrlFromFile(entry, file);
        }
      });

      state.activeMapSetId = "base";
      state.rrCursor = {};
      state.mapMatrixRrCursor = {};
      state.mapMatrixPaintActive = false;
      state.mapMatrixLastPaintCellKey = "";
      assignImplicitVelocityLayers();
      renderSetup();
      updatePlayerEmptyState();
      setKeyboardMapCollapsed(false);
      syncAllKnobValues();
      scheduleSessionStateSave(350);
    }

    function clearInstrument() {
      const preservedMapMatrix = {
        interval: clampMapMatrixInterval(state.mapMatrixInterval),
        velocityLayers: clampMapMatrixVelocityLayers(state.mapMatrixVelocityLayers),
        rrColumns: clampMapMatrixRrColumns(state.mapMatrixRrColumns),
        splitEnabled: !!state.mapMatrixSplitEnabled
      };

      stopAutoSamplingCountdown(false);
      state.sequencerCurrentStep = -1;
      state.sequencerHostTriggerEnabled = false;
      state.sequencerSteps = Array.from({ length: SEQUENCER_STEP_COUNT }, () => ({
        noteMidi: 60,
        velocity: 100,
        rateIndex: 2,
        keyswitchSetId: ""
      }));
      if (state.nativeAutoSamplerAvailable && state.nativeAutoSamplerActive) {
        emitNativeEvent("autosampler_control", { action: "stop" });
      }
      state.nativeAutoSamplerActive = false;
      state.nativeAutoSamplerExpected = 0;
      state.nativeAutoSamplerCaptured = 0;
      state.nativeAutoSamplerTakeCount = 0;
      state.deferredAutoLoopOrders = [];
      state.nativeAutoSamplerLoopPostConfig = null;
      state.nativeAutoSamplerInputDetected = false;
      state.nativeAutoSamplerMessage = "";
      updateStartSamplingButtonLabel();
      stopAllPreviewVoices();
      state.entrySampleHydrationPromises.clear();
      state.entries.forEach((entry) => {
        if (entry.sampleUrl) URL.revokeObjectURL(entry.sampleUrl);
      });
      state.entries = [];
      state.manualRootRanges = {};
      state.keyswitchSets = [];
      state.activeMapSetId = "base";
      state.baseLoopPlaybackEnabled = true;
      state.basePlaybackMode = "spread";
      state.mapMatrixAssignMode = false;
      state.mapMatrixRrCursor = {};
      state.mapMatrixPaintActive = false;
      state.mapMatrixLastPaintCellKey = "";
      state.mapMatrixInterval = preservedMapMatrix.interval;
      state.mapMatrixVelocityLayers = preservedMapMatrix.velocityLayers;
      state.mapMatrixRrColumns = preservedMapMatrix.rrColumns;
      state.mapMatrixSplitEnabled = preservedMapMatrix.splitEnabled;
      state.mapMatrixAutoFillRr = true;
      state.packManifestFilePath = "";
      state.packManifestBasePath = "";
      state.playerOpenStringMidis = [];
      state.playerOpenStringColorsByMidi = {};
      state.nextVirtualOrder = -1;
      state.packLoaded = false;
      state.lastFlushedJsonHash = "";
      state.rrCursor = {};
      state.waveformCache.clear();
      state.pendingSampleDataRequests.clear();
      state.pendingManifestPickRequests.clear();
      state.pendingDestinationFolderRequests.clear();
      state.pendingGraphicPickRequests.clear();
      state.pendingGraphicDataRequests.clear();
      state.entrySampleHydrationPromises.clear();
      state.velocityCrossfadeByRoot = {};
      state.velocityCrossfadePercent = 0;
      clearPlayerWallpaperState();
      closeSampleEditor();
      renderSetup();
      updatePlayerEmptyState();
      syncAllKnobValues();
      scheduleSessionStateSave(250);
    }

    function clearActiveKeyswitchSet() {
      const activeSet = getKeyswitchSetById(state.activeMapSetId);
      if (!activeSet) return false;

      stopAllPreviewVoices();
      state.entrySampleHydrationPromises.clear();

      const setEntries = Array.isArray(activeSet.entries) ? activeSet.entries : [];
      setEntries.forEach((entry) => {
        const sampleUrl = String(entry?.sampleUrl || "");
        if (sampleUrl.startsWith("blob:")) {
          try { URL.revokeObjectURL(sampleUrl); } catch {}
        }
        if (sampleUrl) state.waveformCache.delete(sampleUrl);
      });

      const removedSetName = String(activeSet.name || activeSet.key || "Keyswitch").trim() || "Keyswitch";
      state.keyswitchSets = (state.keyswitchSets || []).filter((set) => String(set?.id || "") !== activeSet.id);

      const nextActiveId = state.keyswitchSets[0]?.id || "base";
      closeSampleEditor();
      state.mapMatrixRrCursor = {};
      state.mapMatrixPaintActive = false;
      state.mapMatrixLastPaintCellKey = "";
      setActiveMapSet(nextActiveId, true);
      updatePlayerEmptyState();
      syncAllKnobValues();
      setStatus(el.setupStatus, `Cleared keyswitch "${removedSetName}".`, "ok");
      scheduleSessionStateSave(250);
      void flushSessionStateToNative(false);
      return true;
    }

    function buildManifestMapping(entries, options = {}) {
      const preserveRuntimePaths = !!options.preserveRuntimePaths;
      const includeEmbeddedSampleData = !!options.includeEmbeddedSampleData;
      const sampleFolderName = String(options.sampleFolderName || "samples").trim() || "samples";
      const resolvedRangesByRoot = getResolvedRootRanges(
        entries,
        cloneManualRangesObject(options.manualRanges)
      ).rangesByRoot;
      const groups = new Map();
      (entries || []).filter((e) => e.valid).forEach((e) => {
        ensureEntryEditorState(e);
        const key = `${e.rootMidi}-${e.velocityLayer}`;
        if (!groups.has(key)) {
          groups.set(key, {
            rootMidiNote: e.rootMidi,
            velocityLayer: e.velocityLayer,
            rrVariants: []
          });
        }
        const bucketRange = resolvedRangesByRoot.get(e.rootMidi);
        if (bucketRange) {
          groups.get(key).lowNote = bucketRange.low;
          groups.get(key).highNote = bucketRange.high;
        }
        const runtimePath = preserveRuntimePaths ? String(e.manifestPath || "").trim() : "";
        let runtimeSampleDataUrl = "";
        if (includeEmbeddedSampleData) {
          runtimeSampleDataUrl = String(e.sampleDataUrl || "").trim();
          if (!runtimeSampleDataUrl.startsWith("data:")) {
            const fallbackSampleUrl = String(e.sampleUrl || "").trim();
            if (fallbackSampleUrl.startsWith("data:")) runtimeSampleDataUrl = fallbackSampleUrl;
          }
        }
        const rrVariant = {
          path: runtimePath || `${sampleFolderName}/${e.fileName}`,
          originalFilename: e.fileName,
          loopEnabled: isEntryLoopRegionActive(e),
          sampleStartNorm: Number((e.sampleStartNorm ?? 0).toFixed(6)),
          loopStartNorm: Number((e.loopStartNorm ?? 0).toFixed(6)),
          loopEndNorm: Number((e.loopEndNorm ?? 1).toFixed(6)),
          loopFadeInNorm: Number((e.loopFadeInNorm ?? e.loopStartNorm ?? 0).toFixed(6)),
          fineTuneCents: clampFineTune(e.fineTuneCents ?? 0)
        };
        if (Number.isFinite(Number(e.rrIndex))) {
          rrVariant.rrIndex = Math.max(1, Math.round(Number(e.rrIndex)));
        }
        if (runtimeSampleDataUrl.startsWith("data:") && (!runtimePath || includeEmbeddedSampleData)) {
          rrVariant.sampleDataUrl = runtimeSampleDataUrl;
        }
        groups.get(key).rrVariants.push(rrVariant);
      });
      return Array.from(groups.values());
    }

    function extractManualRangesFromManifestMapping(mapping) {
      const ranges = {};
      const buckets = Array.isArray(mapping) ? mapping : [];
      buckets.forEach((bucket) => {
        const rootMidi = Math.round(Number(bucket?.rootMidiNote));
        const lowNote = Math.round(Number(bucket?.lowNote));
        const highNote = Math.round(Number(bucket?.highNote));
        if (!Number.isFinite(rootMidi) || !Number.isFinite(lowNote) || !Number.isFinite(highNote)) return;
        ranges[rootMidi] = { low: lowNote, high: highNote };
      });
      return cloneManualRangesObject(ranges);
    }

    function sanitizePathToken(raw, fallback = "item") {
      const cleaned = String(raw || "")
        .trim()
        .replace(/[\\/]+/g, " ")
        .replace(/[^a-z0-9._ -]+/gi, "")
        .replace(/\s+/g, "_")
        .replace(/_+/g, "_")
        .replace(/^_+|_+$/g, "");
      return cleaned || String(fallback || "item");
    }

    function normalizeDestinationFolderPath(pathLike) {
      const normalized = String(pathLike || "").trim().replace(/\\/g, "/");
      if (!normalized) return "";
      if (/^[A-Za-z]:\/+$/.test(normalized)) return normalized.slice(0, 3);
      return normalized.replace(/\/+$/, "");
    }

    function applyAutoDestinationPath(pathLike) {
      const normalized = normalizeDestinationFolderPath(pathLike);
      if (!normalized || !el.autoDestination) return "";
      if (el.autoDestination.value !== normalized) {
        el.autoDestination.value = normalized;
      }
      renderAuto();
      scheduleSessionStateSave(250);
      return normalized;
    }

    async function requestAutoDestinationFolder(options = {}) {
      const currentPath = normalizeDestinationFolderPath(options?.currentPath || el.autoDestination?.value || "");

      if (getNativeBackend()) {
        return requestDestinationFolderFromNative({ currentPath, timeoutMs: options?.timeoutMs });
      }

      if (typeof window.showDirectoryPicker === "function") {
        try {
          const handle = await window.showDirectoryPicker();
          const folderName = String(handle?.name || "").trim();
          if (!folderName) return "";
          const merged = mergeFolderNameIntoPath(currentPath, folderName);
          return applyAutoDestinationPath(merged || folderName);
        } catch {
          // fall through to input-based directory picker
        }
      }

      if (!el.autoDestinationPicker) return "";

      const requestId = (Number(state.destinationFolderRequestSeq) || 0) + 1;
      state.destinationFolderRequestSeq = requestId;
      const timeoutMs = Math.max(1000, Math.round(Number(options?.timeoutMs) || 25000));

      return new Promise((resolve) => {
        const timeoutId = window.setTimeout(() => {
          const pending = state.pendingDestinationFolderRequests.get(requestId);
          if (!pending) return;
          state.pendingDestinationFolderRequests.delete(requestId);
          resolve("");
        }, timeoutMs);

        state.pendingDestinationFolderRequests.set(requestId, { resolve, timeoutId });
        el.autoDestinationPicker.click();
      });
    }

    async function ensureAutoDestinationFolder(options = {}) {
      const existing = normalizeDestinationFolderPath(el.autoDestination?.value || "");
      if (existing) return existing;
      return requestAutoDestinationFolder(options);
    }

    function buildKeyswitchSampleFolder(baseSampleFolder, keyswitchName, keyswitchKey, fallbackToken = "keyswitch") {
      const base = String(baseSampleFolder || "samples").trim().replace(/[\\/]+$/g, "") || "samples";
      const token = sanitizePathToken(`${String(keyswitchName || "").trim()} ${String(keyswitchKey || "").trim()}`, fallbackToken);
      return `${base}/${token}`;
    }

    function buildManifestSkeleton(targetExt = "smpinst", options = {}) {
      const preserveRuntimePaths = !!options.preserveRuntimePaths;
      const includeEmbeddedSampleData = !!options.includeEmbeddedSampleData;
      const sampleFolderName = String(options.sampleFolderName || "samples").trim() || "samples";
      const ext = String(targetExt || "smpinst").trim().toLowerCase().replace(/^\./, "") || "smpinst";
      const normalizedExt = ext === "keyswitch" ? "keysw" : ext;
      const manifest = {
        formatVersion: 1,
        instrumentName: (el.autoInstrument.value || "Instrument").trim(),
        author: (el.autoAuthor?.value || "").trim(),
        createdUtc: new Date().toISOString(),
        settings: {
          gapFillMode: "nextHigherOnly",
          allowPitchUpAboveHighest: state.allowPitchUpAboveHighest,
          autoRR: state.autoRR,
          velocityCrossfadePercent: state.velocityCrossfadePercent,
          loopCrossfadeMs: state.loopCrossfadeMs,
          autoGainCrossfade: state.autoGainCrossfade,
          autoLoopSamples: !!el.autoLoop?.checked,
          autoLoopEnabled: !!el.autoLoopMode?.checked,
          autoLoopStartPercent: getAutoLoopStartPercent(),
          autoLoopEndPercent: getAutoLoopEndPercent(),
          autoLoopCutAtEnd: !!el.autoLoopCutAtEnd?.checked,
          autoLoopCrossfadeMs: getAutoLoopCrossfadeMs(),
          autoModwheelVelocityControl: !!el.autoModwheelVelocity?.checked,
          autoNormalizeRecorded: !!el.autoNormalizeRecorded?.checked,
          baseLoopPlaybackEnabled: state.baseLoopPlaybackEnabled !== false,
          basePlaybackMode: normalizeKeyswitchPlaybackMode(state.basePlaybackMode),
          manualRootRanges: cloneManualRangesObject(state.manualRootRanges),
          openStringMidis: normalizeOpenStringMidiList(state.playerOpenStringMidis),
          openStringColorsByMidi: normalizeOpenStringColorMap(state.playerOpenStringColorsByMidi, state.playerOpenStringMidis)
        },
        mapping: buildManifestMapping(state.entries, {
          preserveRuntimePaths,
          includeEmbeddedSampleData,
          sampleFolderName,
          manualRanges: state.manualRootRanges
        })
      };

      if (normalizedExt === "keysw") {
        const keyInfo = normalizeKeyswitchKey(el.autoAuthor?.value || "", 12);
        manifest.packType = "keyswitch";
        manifest.keyswitchKey = keyInfo.key;
        manifest.settings.openStringMidis = getOpenStringMidisForSet(state.activeMapSetId);
        manifest.settings.openStringColorsByMidi = getOpenStringColorsByMidiForSet(state.activeMapSetId);
        manifest.mapping = buildManifestMapping(state.entries, {
          preserveRuntimePaths,
          includeEmbeddedSampleData,
          sampleFolderName: buildKeyswitchSampleFolder(sampleFolderName, manifest.instrumentName, keyInfo.key, "keyswitch"),
          manualRanges: state.manualRootRanges
        });
      } else {
        manifest.packType = "instrument";
        manifest.keyswitchSets = (state.keyswitchSets || [])
          .map((set, index) => {
            const setName = String(set?.name || "Keyswitch").trim() || "Keyswitch";
            const setKey = Number.isFinite(set?.keyMidi) ? midiToNote(Math.round(set.keyMidi)) : String(set?.key || "");
            const setSampleFolder = buildKeyswitchSampleFolder(sampleFolderName, setName, setKey, `keyswitch_${index + 1}`);
            return {
              name: setName,
              keyswitchKey: setKey,
              loopPlaybackEnabled: set?.loopPlaybackEnabled !== false,
              gainDb: clampKeyswitchGainDb(set?.gainDb ?? 0),
              playbackMode: resolveKeyswitchPlaybackMode(set),
              openStringMidis: getNormalizedKeyswitchSetOpenStringMidis(set),
              openStringColorsByMidi: getNormalizedKeyswitchSetOpenStringColorsByMidi(set),
              manualRanges: cloneManualRangesObject(set?.manualRanges),
              mapping: buildManifestMapping(Array.isArray(set?.entries) ? set.entries : [], {
                preserveRuntimePaths,
                includeEmbeddedSampleData,
                sampleFolderName: setSampleFolder,
                manualRanges: set?.manualRanges
              })
            };
          })
          .filter((set) => Array.isArray(set.mapping) && set.mapping.length > 0);
      }
      manifest.ui = buildUiSessionStateSnapshot({
        includeKeyswitchSets: normalizedExt !== "keysw",
        manifestFilePath: options.manifestFilePath,
        manifestBasePath: options.manifestBasePath
      });
      applyWallpaperManifestMetadata(manifest);
      return manifest;
    }

    async function exportPack(targetExt = "smpinst") {
      const extRaw = String(targetExt || "smpinst").trim().toLowerCase().replace(/^\./, "") || "smpinst";
      const ext = extRaw === "keyswitch" ? "keysw" : extRaw;
      if (ext === "smpinst") {
        const duplicates = getDuplicateKeyswitchNotes();
        if (duplicates.length > 0) {
          setStatus(el.setupStatus, `Duplicate keyswitch keys: ${duplicates.join(", ")}. Change keys before packing .smpinst.`, "warn");
          return;
        }
      }

      if (ext === "smpinst" && el.saveSmpinstBtn) {
        el.saveSmpinstBtn.disabled = true;
        el.saveSmpinstBtn.classList.add("is-saving");
      }
      try {
        // Strict relative-path JSON manifests only (no embedded data URLs).
        const manifest = buildManifestSkeleton(ext, { preserveRuntimePaths: false });
        const defaultBase = (manifest.instrumentName || "instrument").replace(/[^a-z0-9_-]+/gi, "_");
        let base = defaultBase || "instrument";
        if (ext === "keysw") {
          const keyInfo = normalizeKeyswitchKey(el.autoAuthor?.value || "", 12);
          base = sanitizePathToken(`${manifest.instrumentName || "keyswitch"} ${keyInfo.key || ""}`, "keyswitch");
        }
        const blob = new Blob([JSON.stringify(manifest, null, 2)], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = `${base || "instrument"}.${ext}`;
        a.click();
        URL.revokeObjectURL(url);
        const label = ext === "smpinst" ? ".smpinst" : `.${ext}`;
        setStatus(el.setupStatus, `Saved ${label} JSON preset (relative-path manifest).`, "ok");
      } catch {
        setStatus(el.setupStatus, "Could not save preset file.", "bad");
      } finally {
        if (ext === "smpinst" && el.saveSmpinstBtn) {
          el.saveSmpinstBtn.disabled = false;
          el.saveSmpinstBtn.classList.remove("is-saving");
        }
      }
    }

    async function dataUrlFromAnyUrl(url) {
      const src = String(url || "").trim();
      if (!src) return "";
      if (src.startsWith("data:")) return src;
      try {
        const response = await fetch(src);
        if (!response.ok) return "";
        const blob = await response.blob();
        return await readFileAsDataUrl(blob);
      } catch {
        return "";
      }
    }

    async function ensureSampleDataForSave(entry) {
      if (!entry || !entry.valid) return "";
      const cachedDataUrl = String(entry.sampleDataUrl || "").trim();
      if (cachedDataUrl.startsWith("data:")) return cachedDataUrl;
      let sampleUrl = String(entry.sampleUrl || "").trim();
      if (!sampleUrl) {
        sampleUrl = String(await requestSampleDataForEntrySave(entry, 4000) || "").trim();
        if (sampleUrl) entry.sampleUrl = sampleUrl;
      }
      if (!sampleUrl) return "";
      return await dataUrlFromAnyUrl(sampleUrl);
    }

    function buildNativeSaveAsset(path, dataUrl = "", sourcePath = "") {
      return {
        path: String(path || "").trim(),
        dataUrl: String(dataUrl || "").trim(),
        sourcePath: normalizeManifestPathInput(sourcePath)
      };
    }

    async function saveInstrumentBundleToDisk() {
      const saveBtn = el.saveSmpinstBtn;
      if (!saveBtn) return;

      saveBtn.disabled = true;
      saveBtn.classList.add("is-saving");

      try {
        const instrumentName = String(el.autoInstrument?.value || "Instrument").trim() || "Instrument";
        const destinationFolder = await ensureAutoDestinationFolder({ timeoutMs: 25000 });
        if (!destinationFolder) {
          setStatus(el.setupStatus, "Choose a destination folder before saving the instrument.", "warn");
          return;
        }

        setStatus(el.setupStatus, "Preparing instrument save...", "ok");

        const existingManifestPath = normalizeManifestPathInput(getPackManifestFilePath());
        const manifestPath = existingManifestPath
          ? existingManifestPath
          : `${destinationFolder}/${sanitizePathToken(instrumentName, "Instrument")}.json`;
        const overwriteExisting = !!existingManifestPath;

        const manifest = buildManifestSkeleton("smpinst", {
          preserveRuntimePaths: false,
          sampleFolderName: "Audio",
          manifestFilePath: manifestPath,
          manifestBasePath: destinationFolder
        });
        logWallpaperDebug("save-bundle-start", `manifestGraphics=${JSON.stringify(manifest?.graphics || null)}`);

        const allEntries = [
          ...state.entries.filter((entry) => entry && entry.valid),
          ...(state.keyswitchSets || []).flatMap((set) => Array.isArray(set?.entries) ? set.entries : []).filter((entry) => entry && entry.valid)
        ];

        const keyswitchSetSampleFolders = new Map();
        (state.keyswitchSets || []).forEach((set, index) => {
          const setId = String(set?.id || "").trim();
          if (!setId) return;
          const setName = String(set?.name || "Keyswitch").trim() || "Keyswitch";
          const setKey = Number.isFinite(set?.keyMidi) ? midiToNote(Math.round(set.keyMidi)) : String(set?.key || "");
          const folder = buildKeyswitchSampleFolder("Audio", setName, setKey, `keyswitch_${index + 1}`);
          keyswitchSetSampleFolders.set(setId, folder);
        });

        const assetsByPath = new Map();
        let directCopyAssetCount = 0;
        let missingSampleCount = 0;
        for (const entry of allEntries) {
          const fileName = String(entry.fileName || "").trim();
          if (!fileName) continue;
          const sourcePath = getEntryManifestAbsolutePath(entry);
          let dataUrl = "";
          if (!sourcePath) {
            dataUrl = await ensureSampleDataForSave(entry);
            if (!dataUrl) {
              missingSampleCount += 1;
              continue;
            }
          } else {
            directCopyAssetCount += 1;
          }
          let relPath = `Audio/${fileName}`;
          const mapSetId = String(entry.mapSetId || "").trim();
          if (mapSetId && mapSetId !== "base") {
            const setFolder = keyswitchSetSampleFolders.get(mapSetId);
            if (setFolder) relPath = `${setFolder}/${fileName}`;
          }
          if (!assetsByPath.has(relPath)) {
            assetsByPath.set(relPath, buildNativeSaveAsset(relPath, dataUrl, sourcePath));
          }
        }

        if (missingSampleCount > 0) {
          setStatus(el.setupStatus, `Save failed: ${missingSampleCount} sample(s) could not be resolved.`, "bad");
          return;
        }

        const wallpaperAssetPath = getWallpaperAssetPath();
        if (wallpaperAssetPath) {
          let wallpaperDataUrl = String(state.wallpaperDataUrl || "").trim();
          const wallpaperSourcePath = getWallpaperManifestAbsolutePath() || normalizeManifestPathInput(state.wallpaperSourcePath);
          if (!wallpaperDataUrl && !wallpaperSourcePath) {
            logWallpaperDebug("save-bundle-missing-data");
            setStatus(el.setupStatus, "Save failed: wallpaper image could not be resolved.", "bad");
            return;
          }
          if (!wallpaperDataUrl && wallpaperSourcePath) {
            directCopyAssetCount += 1;
            logWallpaperDebug("save-bundle-copy-source", `wallpaperSource=${JSON.stringify(wallpaperSourcePath)}`);
          }
          state.wallpaperDataUrl = wallpaperDataUrl || state.wallpaperDataUrl;
          applyWallpaperManifestMetadata(manifest);
          assetsByPath.set(wallpaperAssetPath, buildNativeSaveAsset(wallpaperAssetPath, wallpaperDataUrl, wallpaperSourcePath));
          logWallpaperDebug("save-bundle-ready", `manifestGraphics=${JSON.stringify(manifest.graphics)} | manifestWallpaper=${JSON.stringify(manifest.wallpaper)} | assetCount=${assetsByPath.size} | directCopyAssets=${directCopyAssetCount}`);
        } else {
          applyWallpaperManifestMetadata(manifest);
          logWallpaperDebug("save-bundle-no-wallpaper", `assetCount=${assetsByPath.size} | directCopyAssets=${directCopyAssetCount}`);
        }

        const askForPath = false;

        const manifestJson = JSON.stringify(manifest, null, 2);
        logWallpaperDebug("save-bundle-emit", `manifestGraphics=${JSON.stringify(manifest?.graphics || null)} | manifestHasGraphics=${manifestJson.includes('"graphics"') ? "yes" : "no"} | assetCount=${assetsByPath.size} | directCopyAssets=${directCopyAssetCount}`);
        const emitted = emitNativeEvent("save_instrument_bundle", {
          manifestJson,
          manifestPath,
          askForPath,
          overwriteExisting,
          assets: Array.from(assetsByPath.values())
        });

        if (!emitted) {
          setStatus(el.setupStatus, "Native save backend unavailable.", "bad");
          return;
        }

        setStatus(el.setupStatus, "Saving instrument...", "ok");
      } catch {
        setStatus(el.setupStatus, "Could not save instrument.", "bad");
      } finally {
        saveBtn.disabled = false;
        saveBtn.classList.remove("is-saving");
      }
    }

    function handleInstrumentSaveResult(payload) {
      const info = (payload && typeof payload === "object" && !Array.isArray(payload))
        ? payload
        : {};
      const success = !!info.success;
      const message = String(info.message || "").trim();
      const manifestPath = String(info.manifestPath || "").trim();
      const manifestBasePath = String(info.manifestBasePath || "").trim();
      logWallpaperDebug("save-result", `success=${success ? "yes" : "no"} | manifestPath=${JSON.stringify(manifestPath)} | manifestBase=${JSON.stringify(manifestBasePath)} | message=${JSON.stringify(message)}`);

      if (success) {
        if (manifestPath) state.packManifestFilePath = manifestPath;
        if (manifestBasePath) state.packManifestBasePath = manifestBasePath;
        if (manifestBasePath && el.autoDestination) {
          el.autoDestination.value = normalizeDestinationFolderPath(manifestBasePath);
        }
        const wallpaperAssetPath = getWallpaperAssetPath();
        if (wallpaperAssetPath && manifestBasePath) {
          state.wallpaperSourcePath = resolveManifestAssetPath(manifestBasePath, wallpaperAssetPath);
          scheduleWallpaperHydration(40);
        }
        setStatus(el.setupStatus, message || "Instrument saved.", "ok");
        scheduleSessionStateSave(250);
      } else {
        setStatus(el.setupStatus, message || "Could not save instrument.", "bad");
      }
    }

    async function saveMonolithToDisk() {
      const saveBtn = el.saveSmpinstBtn;
      if (saveBtn) {
        saveBtn.disabled = true;
        saveBtn.classList.add("is-saving");
      }

      try {
        const manifest = buildManifestSkeleton("smpinst", {
          preserveRuntimePaths: false,
          sampleFolderName: "Audio"
        });

        manifest.formatVersion = 2;
        manifest.monolith = true;

        const allMappingBuckets = Array.isArray(manifest.mapping) ? manifest.mapping : [];
        const keyswitchSets = Array.isArray(manifest.keyswitchSets) ? manifest.keyswitchSets : [];

        const allEntries = [
          ...state.entries.filter((entry) => entry && entry.valid),
          ...(state.keyswitchSets || []).flatMap((set) => Array.isArray(set?.entries) ? set.entries : []).filter((entry) => entry && entry.valid)
        ];

        const entryByFileName = new Map();
        allEntries.forEach((entry) => {
          const key = String(entry.fileName || "").trim();
          if (key) entryByFileName.set(key, entry);
        });

        let missingSampleCount = 0;

        async function embedBucketsData(buckets) {
          for (const bucket of buckets) {
            if (!Array.isArray(bucket.rrVariants)) continue;
            for (const variant of bucket.rrVariants) {
              const fileName = String(variant.originalFilename || variant.path || "").trim();
              const entry = entryByFileName.get(fileName);
              if (!entry) { missingSampleCount += 1; continue; }
              const dataUrl = await ensureSampleDataForSave(entry);
              if (!dataUrl) { missingSampleCount += 1; continue; }
              variant.sampleDataUrl = dataUrl;
            }
          }
        }

        setStatus(el.setupStatus, "Packing monolith — collecting samples...", "ok");
        await embedBucketsData(allMappingBuckets);
        for (const ksSet of keyswitchSets) {
          if (Array.isArray(ksSet.mapping)) await embedBucketsData(ksSet.mapping);
        }

        if (missingSampleCount > 0) {
          setStatus(el.setupStatus, `Monolith save failed: ${missingSampleCount} sample(s) could not be resolved.`, "bad");
          return;
        }

        const wallpaperAssetPath = getWallpaperAssetPath();
        if (wallpaperAssetPath) {
          let wallpaperDataUrl = String(state.wallpaperDataUrl || "").trim();
          if (!wallpaperDataUrl) {
            const existingWallpaperPath = getWallpaperManifestAbsolutePath() || normalizeManifestPathInput(state.wallpaperSourcePath);
            wallpaperDataUrl = String(await requestGraphicDataFromNative(existingWallpaperPath, 4000) || "").trim();
          }
          if (!wallpaperDataUrl) {
            setStatus(el.setupStatus, "Monolith save failed: wallpaper image could not be resolved.", "bad");
            return;
          }
          applyWallpaperManifestMetadata(manifest, { includeDataUrl: true, wallpaperDataUrl });
        }

        const monolithJson = JSON.stringify(manifest, null, 2);
        const instrumentName = String(manifest.instrumentName || "Instrument").trim();
        const defaultName = instrumentName.replace(/[^a-z0-9_\- ]+/gi, "_") + ".smpinstm";

        const emitted = emitNativeEvent("save_instrument_bundle", {
          manifestJson: monolithJson,
          manifestPath: "",
          askForPath: true,
          assets: []
        });

        if (!emitted) {
          const blob = new Blob([monolithJson], { type: "application/json" });
          const url = URL.createObjectURL(blob);
          const a = document.createElement("a");
          a.href = url;
          a.download = defaultName;
          a.click();
          URL.revokeObjectURL(url);
          setStatus(el.setupStatus, `Downloaded monolith ${defaultName} (${allEntries.length} samples embedded).`, "ok");
        } else {
          setStatus(el.setupStatus, "Choose where to save monolith instrument...", "ok");
        }
      } catch {
        setStatus(el.setupStatus, "Could not save monolith instrument.", "bad");
      } finally {
        if (saveBtn) {
          saveBtn.disabled = false;
          saveBtn.classList.remove("is-saving");
        }
      }
    }

    async function applyLoadedPackData(data, options = {}) {
      const sourceLabel = String(options?.sourceLabel || "").trim();
      const manifestFilePath = String(options?.manifestFilePath || "").trim();
      const manifestBasePath = String(options?.manifestBasePath || "").trim();
      const silentStatus = !!options?.silentStatus;
      const hydrateManifestSamples = options?.hydrateManifestSamples !== false;
      const embeddedUiState = (data?.ui && typeof data.ui === "object")
        ? data.ui
        : null;
      const sessionUiState = (options?.sessionUiState && typeof options.sessionUiState === "object")
        ? options.sessionUiState
        : embeddedUiState;
      const resolvedManifestFilePath = manifestFilePath || String(sessionUiState?.manifestFilePath || "").trim();
      const resolvedManifestBasePath = normalizeDestinationFolderPath(
        manifestBasePath
        || computeManifestBasePathFromFilePath(resolvedManifestFilePath)
        || String(sessionUiState?.manifestBasePath || "").trim()
      );
      const sessionUiKeyswitchSets = Array.isArray(sessionUiState?.keyswitchSets)
        ? sessionUiState.keyswitchSets
        : null;

      stopAutoSamplingCountdown(false);
      if (state.nativeAutoSamplerAvailable && state.nativeAutoSamplerActive) {
        emitNativeEvent("autosampler_control", { action: "stop" });
        state.nativeAutoSamplerActive = false;
        state.nativeAutoSamplerExpected = 0;
        state.nativeAutoSamplerCaptured = 0;
        state.nativeAutoSamplerTakeCount = 0;
        state.deferredAutoLoopOrders = [];
        state.nativeAutoSamplerLoopPostConfig = null;
        updateStartSamplingButtonLabel();
      }

      stopAllPreviewVoices();
      state.entries.forEach((entry) => {
        if (entry.sampleUrl) URL.revokeObjectURL(entry.sampleUrl);
      });
      (state.keyswitchSets || []).forEach((set) => {
        (set.entries || []).forEach((entry) => {
          if (entry?.sampleUrl) URL.revokeObjectURL(entry.sampleUrl);
        });
      });

      const baseEntries = buildKeyswitchEntriesFromManifest(data, { useVirtualOrder: false, startOrder: 0 });
      let nextOrder = baseEntries.length;
      const importedKeyswitchSets = [];
      const keyswitchSetRecords = Array.isArray(data?.keyswitchSets) ? data.keyswitchSets : [];
      const legacyGlobalOpenStringMidis = normalizeOpenStringMidiList(
        sessionUiState?.playerOpenStringMidis
        ?? data?.settings?.openStringMidis
      );
      keyswitchSetRecords.forEach((rawSet, index) => {
        const sessionUiSet = (sessionUiKeyswitchSets && typeof sessionUiKeyswitchSets[index] === "object")
          ? sessionUiKeyswitchSets[index]
          : null;
        const setEntries = buildKeyswitchEntriesFromManifest(rawSet, { useVirtualOrder: false, startOrder: nextOrder });
        nextOrder += setEntries.length;
        const keySource = sessionUiSet?.key
          ?? sessionUiSet?.keyswitchKey
          ?? rawSet?.keyswitchKey
          ?? rawSet?.key
          ?? rawSet?.author
          ?? "";
        const keyInfo = normalizeKeyswitchKey(keySource, 12);
        const sessionSetId = String(sessionUiSet?.id || "").trim();
        const sessionSetName = String(sessionUiSet?.name || "").trim();
        const importedSetName = sessionSetName || String(rawSet?.name || rawSet?.instrumentName || `Keyswitch ${index + 1}`).trim() || `Keyswitch ${index + 1}`;
        const sessionLoopPlayback = sessionUiSet && Object.prototype.hasOwnProperty.call(sessionUiSet, "loopPlaybackEnabled")
          ? (sessionUiSet.loopPlaybackEnabled !== false)
          : null;
        importedKeyswitchSets.push({
          id: sessionSetId || `ks_loaded_${Date.now()}_${index}_${Math.random().toString(36).slice(2, 6)}`,
          name: importedSetName,
          key: keyInfo.key,
          keyMidi: keyInfo.keyMidi,
          loopPlaybackEnabled: sessionLoopPlayback === null ? (rawSet?.loopPlaybackEnabled !== false) : sessionLoopPlayback,
          gainDb: clampKeyswitchGainDb(sessionUiSet?.gainDb ?? rawSet?.gainDb ?? 0),
          playbackMode: normalizeKeyswitchTriggerModeName(importedSetName) !== "manual"
            ? "oneshot"
            : normalizeKeyswitchPlaybackMode(sessionUiSet?.playbackMode || rawSet?.playbackMode),
          openStringMidis: normalizeOpenStringMidiList(
            sessionUiSet?.openStringMidis
            ?? rawSet?.openStringMidis
            ?? (index === 0 ? legacyGlobalOpenStringMidis : [])
          ),
          openStringColorsByMidi: normalizeOpenStringColorMap(
            sessionUiSet?.openStringColorsByMidi
            ?? rawSet?.openStringColorsByMidi,
            normalizeOpenStringMidiList(
              sessionUiSet?.openStringMidis
              ?? rawSet?.openStringMidis
              ?? (index === 0 ? legacyGlobalOpenStringMidis : [])
            )
          ),
          sourceFile: sourceLabel,
          entries: setEntries,
          manualRanges: resolveLoadedManualRanges(
            sessionUiSet?.manualRanges,
            rawSet?.manualRanges,
            extractManualRangesFromManifestMapping(rawSet?.mapping)
          )
        });
        const createdSet = importedKeyswitchSets[importedKeyswitchSets.length - 1];
        (createdSet.entries || []).forEach((entry) => {
          entry.mapSetId = createdSet.id;
        });
      });

      state.entries = baseEntries;
      state.keyswitchSets = importedKeyswitchSets;
      state.manualRootRanges = resolveLoadedManualRanges(
        sessionUiState?.manualRootRanges,
        data?.settings?.manualRootRanges,
        extractManualRangesFromManifestMapping(data?.mapping)
      );
      state.activeMapSetId = importedKeyswitchSets.length > 0 ? importedKeyswitchSets[0].id : "base";
      state.baseLoopPlaybackEnabled = data?.settings?.baseLoopPlaybackEnabled !== false;
      state.basePlaybackMode = normalizeKeyswitchPlaybackMode(
        sessionUiState?.basePlaybackMode
        ?? data?.settings?.basePlaybackMode
        ?? "spread"
      );
      state.packManifestFilePath = resolvedManifestFilePath;
      state.packManifestBasePath = resolvedManifestBasePath;
      state.playerOpenStringMidis = importedKeyswitchSets.length > 0 ? [] : legacyGlobalOpenStringMidis;
      state.playerOpenStringColorsByMidi = importedKeyswitchSets.length > 0
        ? {}
        : normalizeOpenStringColorMap(
            sessionUiState?.playerOpenStringColorsByMidi
            ?? data?.settings?.openStringColorsByMidi,
            legacyGlobalOpenStringMidis
          );
      state.wallpaperAssetPath = normalizeManifestPathInput(
        sessionUiState?.wallpaperAssetPath
        || data?.graphics?.wallpaperPath
        || getLegacyWallpaperManifestPath(data)
      );
      state.wallpaperSourcePath = normalizeManifestPathInput(sessionUiState?.wallpaperSourcePath);
      state.wallpaperSourceFileName = String(sessionUiState?.wallpaperSourceFileName || state.wallpaperAssetPath.split("/").pop() || "").trim();
      state.wallpaperDataUrl = String(data?.graphics?.wallpaperDataUrl || "").trim();
      updateWallpaperField();
      applyPlayerWallpaperVisual(state.wallpaperDataUrl);
      debugLoadLog(`wallpaper apply-loaded raw | manifestGraphics=${JSON.stringify(data?.graphics || null)} | manifestWallpaper=${JSON.stringify(data?.wallpaper || null)} | sessionWallpaperAsset=${JSON.stringify(sessionUiState?.wallpaperAssetPath || "")} | sessionWallpaperSource=${JSON.stringify(sessionUiState?.wallpaperSourcePath || "")}`);
      state.nextVirtualOrder = -1;
      state.rrCursor = {};
      state.sessionStateLightweight = false;
      state.sessionStateHydrationRequested = false;
      closeSampleEditor();

      const author = typeof data?.author === "string"
        ? data.author
        : (typeof data?.metadata?.author === "string" ? data.metadata.author : "");
      if (el.autoAuthor) el.autoAuthor.value = author.trim();
      if (el.autoInstrument && typeof data?.instrumentName === "string") {
        el.autoInstrument.value = data.instrumentName.trim();
      }
      applyAutoDestinationPath(
        sessionUiState?.auto?.destination
        || resolvedManifestBasePath
      );
      resetSetupSaveButtonState();
      if (!state.wallpaperSourcePath && state.wallpaperAssetPath && resolvedManifestBasePath) {
        state.wallpaperSourcePath = resolveManifestAssetPath(resolvedManifestBasePath, state.wallpaperAssetPath);
        updateWallpaperField();
      }
      logWallpaperDebug("apply-loaded-final", `sourceLabel=${JSON.stringify(sourceLabel)} | manifestFile=${JSON.stringify(resolvedManifestFilePath)}`);
      scheduleWallpaperHydration(80);
      const loadedSettings = (data?.settings && typeof data.settings === "object") ? data.settings : null;
      if (el.autoLoop && loadedSettings && Object.prototype.hasOwnProperty.call(loadedSettings, "autoLoopSamples")) {
        el.autoLoop.checked = !!loadedSettings.autoLoopSamples;
      }
      if (el.autoLoopMode && loadedSettings && Object.prototype.hasOwnProperty.call(loadedSettings, "autoLoopEnabled")) {
        el.autoLoopMode.checked = !!loadedSettings.autoLoopEnabled;
      }
      if (loadedSettings && Object.prototype.hasOwnProperty.call(loadedSettings, "autoLoopStartPercent")) {
        setAutoLoopStartPercent(loadedSettings.autoLoopStartPercent, false);
      }
      if (loadedSettings && Object.prototype.hasOwnProperty.call(loadedSettings, "autoLoopEndPercent")) {
        setAutoLoopEndPercent(loadedSettings.autoLoopEndPercent, false);
      }
      if (el.autoLoopCutAtEnd && loadedSettings && Object.prototype.hasOwnProperty.call(loadedSettings, "autoLoopCutAtEnd")) {
        el.autoLoopCutAtEnd.checked = !!loadedSettings.autoLoopCutAtEnd;
      }
      if (loadedSettings && Object.prototype.hasOwnProperty.call(loadedSettings, "autoLoopCrossfadeMs")) {
        setAutoLoopCrossfadeMs(loadedSettings.autoLoopCrossfadeMs, false);
      }
      if (el.autoModwheelVelocity && loadedSettings && Object.prototype.hasOwnProperty.call(loadedSettings, "autoModwheelVelocityControl")) {
        el.autoModwheelVelocity.checked = !!loadedSettings.autoModwheelVelocityControl;
      }
      updateAutoLoopDetailsVisibility(false);
      syncLoopOneshotWithAutoLoopSamples({ shouldRender: false, persist: false });
      const count = Array.isArray(data.mapping) ? data.mapping.length : 0;
      state.packLoaded = true;
      if (!silentStatus) {
        const duplicateNotes = getDuplicateKeyswitchNotes();
        if (duplicateNotes.length > 0) {
          setStatus(el.setupStatus, `Loaded preset with duplicate keyswitch keys: ${duplicateNotes.join(", ")}. Change keys in Keyboard Map.`, "warn");
        } else {
          const ksCount = importedKeyswitchSets.length;
          setStatus(el.setupStatus, `Loaded .smpinst preset with ${count} mapping bucket(s) and ${ksCount} keyswitch set(s).`, "ok");
        }
      }

      if (!options?.skipRender) {
        renderSetup();
        renderAuto();
        resetSetupSaveButtonState();
        applyModwheelVelocityCrossfadeLink();
        updatePlayerEmptyState();
        syncAllKnobValues();
      }
      if (hydrateManifestSamples) {
        void hydrateMissingManifestSampleUrls(120);
      }
    }

    function computeManifestBasePathFromFilePath(filePath) {
      const normalizedFilePath = String(filePath || "").trim().replace(/\\/g, "/");
      const lastSlash = normalizedFilePath.lastIndexOf("/");
      if (lastSlash < 0) return "";
      if (lastSlash === 2 && /^[A-Za-z]:/.test(normalizedFilePath)) return normalizedFilePath.slice(0, lastSlash + 1);
      if (lastSlash === 0) return "/";
      return normalizedFilePath.slice(0, lastSlash);
    }

    async function loadPackFromText(rawText, options = {}) {
      const sourceLabel = String(options?.sourceLabel || "").trim();
      const manifestFilePath = String(options?.manifestFilePath || "").trim();
      const manifestBasePath = computeManifestBasePathFromFilePath(manifestFilePath);
      const loadSeq = Math.max(1, Math.round(Number(state.manualPackLoadSeq) || 0) + 1);
      state.manualPackLoadSeq = loadSeq;
      if (state.sessionStateRestoreTimeout) {
        window.clearTimeout(state.sessionStateRestoreTimeout);
        state.sessionStateRestoreTimeout = 0;
      }
      releaseSessionPayloadLock(0);
      state.sessionPayloadLock = true;
      state.manualPackLoadInProgress = true;
      state.ignoreSessionPayloadUntil = Date.now() + 4500;
      setLoadingOverlay(8, "Loading instrument...");
      let loadSucceeded = false;
      try {
        const normalizedText = String(rawText || "").replace(/^\uFEFF/, "");
        debugLoadLog(`loadPack file read | seq=${loadSeq} | chars=${normalizedText.length}`);
        const data = JSON.parse(normalizedText || "{}");
        const isMonolith = !!data.monolith && Number(data.formatVersion) >= 2;
        setLoadingOverlay(36, isMonolith ? "Loading monolith..." : "Loading instrument...");
        await applyLoadedPackData(data, {
          sourceLabel,
          manifestFilePath,
          manifestBasePath,
          silentStatus: false,
          hydrateManifestSamples: !isMonolith
        });
        setLoadingOverlay(74, "Applying instrument...");
        if (!getNativeBackend()) await waitForNativeBackend(300);
        setLoadingOverlay(96, "Finalizing...");
        state.lastFlushedJsonHash = "";
        if (isMonolith) {
          void flushSessionStateToNative(false);
        } else {
          void flushSessionStateToNative(false);
        }
        state.sessionStateRestoreAttempted = true;
        state.sessionStateRestored = true;
        state.sessionStateRestoreCompletedAt = Date.now();
        state.sessionStateLightweight = false;
        state.sessionStateHydrationRequested = false;
        state.lastSessionPayloadSig = "";
        state.lastFlushedJsonHash = "";
        loadSucceeded = true;
        debugLoadLog(`loadPack done | seq=${loadSeq} | entries=${state.entries.length} | sets=${state.keyswitchSets.length}`);
      } catch (error) {
        const reason = error && typeof error === "object" && "message" in error
          ? String(error.message || "unknown")
          : "unknown";
        debugLoadLog(`loadPack failed | seq=${loadSeq} | reason=${reason}`);
        if (!manifestFilePath) {
          setStatus(el.setupStatus, "Could not load file path. Use the native load button so samples resolve.", "bad");
        } else {
          setStatus(el.setupStatus, "Could not load selected .json/.smpinst file.", "bad");
        }
      } finally {
        state.manualPackLoadInProgress = false;
        const suppressMs = loadSucceeded ? 1200 : 200;
        state.ignoreSessionPayloadUntil = Date.now() + suppressMs;
        releaseSessionPayloadLock(suppressMs);
        completeLoadingOverlay("Ready");
      }
    }

    function loadPack(file) {
      if (!file) return;
      const selectedFilePath = (file && typeof file.path === "string") ? String(file.path).trim() : "";
      const loadSeq = Math.max(1, Math.round(Number(state.manualPackLoadSeq) || 0) + 1);
      state.manualPackLoadSeq = loadSeq;
      setLoadingOverlay(4, "Loading .smpinst...");
      debugLoadLog(`loadPack start | seq=${loadSeq} | file=${String(file?.name || "")} | bytes=${Math.max(0, Number(file?.size) || 0)}`);
      const reader = new FileReader();
      reader.onerror = () => {
        const reason = reader.error ? String(reader.error.message || reader.error.name || "read-error") : "read-error";
        debugLoadLog(`loadPack read failed | seq=${loadSeq} | reason=${reason}`);
        releaseSessionPayloadLock(0);
        state.manualPackLoadInProgress = false;
        state.ignoreSessionPayloadUntil = Date.now() + 120;
        setStatus(el.setupStatus, "Could not read selected .json/.smpinst file.", "bad");
        completeLoadingOverlay("Ready");
      };
      reader.onload = async () => {
        if (loadSeq !== state.manualPackLoadSeq) {
          debugLoadLog(`loadPack ignored | stale seq=${loadSeq} latest=${state.manualPackLoadSeq}`);
          return;
        }
        await loadPackFromText(String(reader.result || ""), {
          sourceLabel: file?.name || "",
          manifestFilePath: selectedFilePath
        });
      };
      reader.readAsText(file);
    }

    async function pickAndLoadPackViaNative() {
      if (!getNativeBackend()) return false;
      const picked = await requestManifestPickFromNative();
      if (!picked) {
        setStatus(el.setupStatus, "Instrument picker timed out.", "bad");
        return true;
      }
      if (!picked.success) {
        const message = String(picked.message || "").trim();
        if (message && !/cancel/i.test(message)) {
          setStatus(el.setupStatus, message, "bad");
        }
        return true;
      }
      const pickedFormat = String(picked.format || "").trim().toLowerCase();
      const isNativeSnapshotLoad = !!picked.nativeLoaded;
      const isMonolithFormat = pickedFormat === "smpinstm";
      setLoadingOverlay(4, isMonolithFormat ? "Loading monolith..." : "Loading instrument...");
      debugLoadLog(`loadPack native pick | file=${picked.fileName} | path=${picked.path}`);

      if (isNativeSnapshotLoad) {
        state.manualPackLoadSeq = Math.max(1, Math.round(Number(state.manualPackLoadSeq) || 0) + 1);
        state.sessionStateRestoreAttempted = false;
        state.sessionStateRestored = false;
        state.sessionStateHydrationRequested = false;
        state.lastSessionPayloadSig = "";
        await fetchNativeSessionStateSnapshot({
          full: false,
          reason: isMonolithFormat ? "native-monolith-pick" : "native-manifest-pick",
          allowBridgeFallback: true
        });
        return true;
      }

      await loadPackFromText(String(picked.text || ""), {
        sourceLabel: picked.fileName || "",
        manifestFilePath: picked.path || ""
      });
      return true;
    }

    function computeNotes() {
      const start = noteToMidi(el.autoStart.value);
      const end = noteToMidi(el.autoEnd.value);
      if (start === null || end === null) return [];

      const lo = Math.min(start, end);
      const hi = Math.max(start, end);
      let notes = [];

      const step = getAutoInterval();
      for (let m = lo; m <= hi; m += step) notes.push(m);
      if (notes[notes.length - 1] !== hi) notes.push(hi);

      const uniq = Array.from(new Set(notes)).filter((m) => m >= lo && m <= hi).sort((a, b) => a - b);
      return uniq;
    }

    function getAutoRenderEstimate() {
      const notes = computeNotes();
      if (!notes.length) {
        return {
          notes,
          vel: 0,
          rr: 0,
          total: 0,
          totalRecordMs: 0,
          loopCutEnabled: false,
          loopEndRatio: 1,
          storedPerRenderMs: 0,
          sampleRate: getAutoRenderSampleRate(),
          bitDepth: 32,
          channelCount: 2,
          estimatedBytes: 0
        };
      }

      const vel = getAutoVelocityLayers();
      const rr = getAutoRRPerNote();
      const total = notes.length * vel * rr;
      const capturePerRenderMs = getAutoHoldMs() + getAutoTailMs() + getAutoPrerollMs();
      const interTakePauseMs = AUTO_SAMPLE_INTER_TAKE_PAUSE_MS;
      const totalRecordMs = (total * capturePerRenderMs) + (Math.max(0, total - 1) * interTakePauseMs);

      const loopCutEnabled = !!el.autoLoop?.checked && !!el.autoLoopCutAtEnd?.checked;
      const loopEndRatio = loopCutEnabled ? clamp01(getAutoLoopEndPercent() / 100) : 1;
      const storedPerRenderMs = capturePerRenderMs * loopEndRatio;

      const sampleRate = getAutoRenderSampleRate();
      const bitDepth = 32; // WebAudio engine runs float32.
      const channelCount = 2; // Auto-sampler render target is stereo.
      const bytesPerFrame = (bitDepth / 8) * channelCount;
      const wavHeaderBytes = 44;
      const totalStoredFrames = Math.max(0, (total * storedPerRenderMs * sampleRate) / 1000);
      const estimatedBytes = Math.round((totalStoredFrames * bytesPerFrame) + (total * wavHeaderBytes));

      return {
        notes,
        vel,
        rr,
        total,
        totalRecordMs,
        loopCutEnabled,
        loopEndRatio,
        storedPerRenderMs,
        sampleRate,
        bitDepth,
        channelCount,
        estimatedBytes
      };
    }

          el.startSamplingBtn.textContent = `${captured} captured`;

      el.startSamplingBtn.classList.toggle("is-recording", active);
      if (!active) {
        el.startSamplingBtn.textContent = "Start Sampling";

    function openStringOnPlayer(midi, options = {}) {
      const normalizedMidi = Math.round(Number(midi));
      if (!Number.isFinite(normalizedMidi)) return;
      const clampedMidi = Math.max(PLAYER_KB_START_MIDI, Math.min(PLAYER_KB_END_MIDI, normalizedMidi));
      const forceOn = options?.forceOn === true;
      const forceOff = options?.forceOff === true;
      const applyColorToSelection = options?.applyColorToSelection === true;
      const requestedColor = normalizeRgbText(options?.color);
      const selectedMidis = getOpenStringMidisForSet();
      const alreadySelected = selectedMidis.includes(clampedMidi);
      const shouldEnable = forceOn ? true : (forceOff ? false : !alreadySelected);
      const nextSelectedMidis = shouldEnable
        ? [...selectedMidis.filter((value) => value !== clampedMidi), clampedMidi]
        : selectedMidis.filter((value) => value !== clampedMidi);
      setOpenStringMidisForSet(
        nextSelectedMidis
      );
      if (shouldEnable) {
        const fallbackColor = requestedColor
          || getOpenStringColorForMidi(clampedMidi)
          || normalizeRgbText(state.wallpaperOpenStringPalette[0])
          || normalizeRgbText(getComputedStyle(document.documentElement).getPropertyValue("--player-wallpaper-open-string-rgb"), "224, 224, 224");
        if (applyColorToSelection) setOpenStringColorForSelection(fallbackColor, state.activeMapSetId, nextSelectedMidis);
        else setOpenStringColorForMidi(clampedMidi, fallbackColor);
      } else {
        setOpenStringColorForMidi(clampedMidi, "");
      }
      scheduleSessionStateSave(250);
      activateTab("player");
      renderPlayerKeyboard();
      if (shouldEnable && !alreadySelected) {
        focusPlayerKeyMidi(clampedMidi);
      }
    }
