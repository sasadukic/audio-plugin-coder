          loopEndPercent: clampAutoPercent(sourceSettings.loopEndPercent),
          cutLoopAtEnd: !!sourceSettings.cutLoopAtEnd,
          loopCrossfadeMs: clampAutoMs(sourceSettings.loopCrossfadeMs, 0, 60000),
          modwheelVelocityControl: !!sourceSettings.modwheelVelocityControl,
          normalizeRecorded: !!sourceSettings.normalizeRecorded
        }
      };
    }

    function loadAutoPresetsFromStorage() {
      try {
        const raw = window.localStorage.getItem(AUTO_PRESET_STORAGE_KEY);
        if (!raw) return [];
        const parsed = JSON.parse(raw);
        if (!Array.isArray(parsed)) return [];
        return parsed
          .map((preset, index) => normalizeAutoPresetRecord(preset, index))
          .filter(Boolean);
      } catch {
        return [];
      }
    }

    function saveAutoPresetsToStorage() {
      try {
        window.localStorage.setItem(AUTO_PRESET_STORAGE_KEY, JSON.stringify(state.autoPresets || []));
      } catch {
        // ignore storage failures
      }
    }

    function applyAutoPresetSettings(presetSettings) {
      const settings = normalizeAutoPresetRecord({ settings: presetSettings }, 0)?.settings;
      if (!settings) return;
      if (el.autoStart) el.autoStart.value = settings.startNote;
      if (el.autoEnd) el.autoEnd.value = settings.endNote;
      normalizeAutoNoteInput(el.autoStart, 36, false);
      normalizeAutoNoteInput(el.autoEnd, 72, false);
      setAutoIntervalValue(settings.sampleInterval, false);
      setAutoVelocityLayers(settings.velocityLayers, false);
      setAutoRRPerNote(settings.roundRobin, false);
      setAutoHoldMs(settings.sustainMs, false);
      setAutoTailMs(settings.releaseTailMs, false);
      setAutoPrerollMs(settings.prerollMs, false);
      if (el.autoLoop) el.autoLoop.checked = settings.loopSamples;
      if (el.autoLoopMode) el.autoLoopMode.checked = settings.autoLoop;
      setAutoLoopStartPercent(settings.loopStartPercent, false);
      setAutoLoopEndPercent(settings.loopEndPercent, false);
      if (el.autoLoopCutAtEnd) el.autoLoopCutAtEnd.checked = settings.cutLoopAtEnd;
      setAutoLoopCrossfadeMs(settings.loopCrossfadeMs, false);
      if (el.autoModwheelVelocity) el.autoModwheelVelocity.checked = !!settings.modwheelVelocityControl;
      if (el.autoNormalizeRecorded) el.autoNormalizeRecorded.checked = settings.normalizeRecorded;
      updateAutoLoopDetailsVisibility();
      syncLoopOneshotWithAutoLoopSamples({ shouldRender: true, persist: false });
      applyModwheelVelocityCrossfadeLink();
      renderAuto();
    }

    function renderAutoPresetList() {
      if (!el.autoPresetList) return;
      el.autoPresetList.innerHTML = "";
      const presets = Array.isArray(state.autoPresets) ? state.autoPresets : [];
      if (!presets.length) {
        const empty = document.createElement("div");
        empty.className = "auto-preset-empty";
        empty.textContent = "No presets";
        el.autoPresetList.appendChild(empty);
        return;
      }

      presets.forEach((preset) => {
        const row = document.createElement("div");
        row.className = "auto-preset-row";

        const loadBtn = document.createElement("button");
        loadBtn.type = "button";
        loadBtn.className = "sample-loop-tool-btn auto-preset-item";
        loadBtn.textContent = preset.name;
        loadBtn.title = `Load preset ${preset.name}`;
        loadBtn.addEventListener("click", (ev) => {
          ev.preventDefault();
          applyAutoPresetSettings(preset.settings);
          if (el.autoPresetMenu) el.autoPresetMenu.classList.add("hidden");
          if (el.autoPresetBtn) el.autoPresetBtn.setAttribute("aria-expanded", "false");
        });

        const deleteBtn = document.createElement("button");
        deleteBtn.type = "button";
        deleteBtn.className = "sample-loop-tool-btn auto-preset-delete-btn";
        deleteBtn.textContent = "x";
        deleteBtn.title = `Delete preset ${preset.name}`;
        deleteBtn.setAttribute("aria-label", `Delete preset ${preset.name}`);
        deleteBtn.addEventListener("click", (ev) => {
          ev.preventDefault();
          ev.stopPropagation();
          const targetId = String(preset.id || "");
          state.autoPresets = (state.autoPresets || []).filter((item) => (
            String(item.id || "") !== targetId
          ));
          saveAutoPresetsToStorage();
          renderAutoPresetList();
        });

        row.append(loadBtn, deleteBtn);
        el.autoPresetList.appendChild(row);
      });
    }

    function formatDurationMs(ms) {
      const totalSeconds = Math.max(0, Math.round((Number(ms) || 0) / 1000));
      const h = Math.floor(totalSeconds / 3600);
      const m = Math.floor((totalSeconds % 3600) / 60);
      const s = totalSeconds % 60;
      if (h > 0) return `${h}:${String(m).padStart(2, "0")}:${String(s).padStart(2, "0")}`;
      return `${m}:${String(s).padStart(2, "0")}`;
    }

    function formatFileSize(bytes) {
      const value = Number(bytes) || 0;
      if (value <= 0) return "0 B";
      const units = ["B", "KB", "MB", "GB", "TB"];
      let unitIndex = 0;
      let size = value;
      while (size >= 1024 && unitIndex < units.length - 1) {
        size /= 1024;
        unitIndex += 1;
      }
      const precision = size >= 100 || unitIndex === 0 ? 0 : (size >= 10 ? 1 : 2);
      return `${size.toFixed(precision)} ${units[unitIndex]}`;
    }

    function formatSampleRate(sampleRate) {
      const hz = Math.max(1, Number(sampleRate) || 44100);
      const khz = hz / 1000;
      const precision = Math.abs(Math.round(khz) - khz) < 0.05 ? 0 : 1;
      return `${khz.toFixed(precision)} kHz`;
    }

    function getAutoRenderSampleRate() {
      if (state.audioContext && Number.isFinite(state.audioContext.sampleRate) && state.audioContext.sampleRate > 0) {
        return state.audioContext.sampleRate;
      }
      try {
        const ctx = ensureAudioContext();
        if (ctx && Number.isFinite(ctx.sampleRate) && ctx.sampleRate > 0) return ctx.sampleRate;
      } catch {
        // fallback handled below
      }
      return 44100;
    }

    function mergeFolderNameIntoPath(currentPath, folderName) {
      const name = String(folderName || "").trim();
      if (!name) return String(currentPath || "");
      const base = String(currentPath || "").trim();
      if (!base) return name;
      const slashIdx = base.lastIndexOf("/");
      const backslashIdx = base.lastIndexOf("\\");
      const splitIdx = Math.max(slashIdx, backslashIdx);
      if (splitIdx < 0) return name;
      return `${base.slice(0, splitIdx + 1)}${name}`;
    }

    function normalizeAutoNoteInput(input, fallbackMidi = 60, shouldRender = false) {
      if (!input) return null;
      const parsed = noteToMidi(input.value);
      const fallback = Math.max(0, Math.min(127, Math.round(Number(fallbackMidi) || 60)));
      const midi = parsed === null ? fallback : parsed;
      const normalized = midiToNote(midi);
      if (input.value !== normalized) input.value = normalized;
      if (shouldRender) renderAuto();
      return midi;
    }

    function stepAutoNoteInput(input, delta, fallbackMidi = 60) {
      if (!input) return null;
      const current = normalizeAutoNoteInput(input, fallbackMidi, false);
      const stepped = Math.max(0, Math.min(127, (current ?? fallbackMidi) + (Number(delta) || 0)));
      input.value = midiToNote(stepped);
      renderAuto();
      return stepped;
    }

    function getVelocityCrossfadePercentForRoot(rootMidi) {
      if (!Number.isFinite(rootMidi)) return 0;
      if (isAutoModwheelVelocityControlActiveForRoot(rootMidi)) return 70;
      const key = String(Math.round(rootMidi));
      if (Object.prototype.hasOwnProperty.call(state.velocityCrossfadeByRoot, key)) {
        return Number(state.velocityCrossfadeByRoot[key]) > 0 ? 70 : 0;
      }
      return 0;
    }

    function setVelocityCrossfadePercentForRoot(rootMidi, nextPercent) {
      if (!Number.isFinite(rootMidi)) return 0;
      const key = String(Math.round(rootMidi));
      const normalized = clampVelocityCrossfadePercent(nextPercent);
      state.velocityCrossfadeByRoot[key] = normalized;
      state.velocityCrossfadePercent = normalized;
      scheduleSessionStateSave(600);
      return normalized;
    }

    function setVelocityCrossfadePercentForAllRoots(nextPercent) {
      const normalized = clampVelocityCrossfadePercent(nextPercent);
      const roots = new Set();
      (state.entries || []).forEach((entry) => {
        if (!entryHasPlayableSource(entry) || !Number.isFinite(entry?.rootMidi)) return;
        roots.add(Math.round(entry.rootMidi));
      });
      (state.keyswitchSets || []).forEach((set) => {
        (set?.entries || []).forEach((entry) => {
          if (!entryHasPlayableSource(entry) || !Number.isFinite(entry?.rootMidi)) return;
          roots.add(Math.round(entry.rootMidi));
        });
      });
      roots.forEach((rootMidi) => {
        state.velocityCrossfadeByRoot[String(rootMidi)] = normalized;
      });
      state.velocityCrossfadePercent = normalized;
      scheduleSessionStateSave(600);
      return normalized;
    }

    function isAutoModwheelVelocityControlEnabled() {
      return !!el.autoModwheelVelocity?.checked;
    }

    function isAutoModwheelVelocityControlActiveForRoot(rootMidi, entries = state.entries) {
      if (!isAutoModwheelVelocityControlEnabled()) return false;
      if (!Number.isFinite(rootMidi)) return false;
      return getVelocityLayersForRoot(Math.round(rootMidi), entries).length > 1;
    }

    function applyModwheelVelocityCrossfadeLink() {
      if (!isAutoModwheelVelocityControlEnabled()) return;
      const applied = setVelocityCrossfadePercentForAllRoots(70);
      if (el.velocityXfadeToggle) {
        el.velocityXfadeToggle.checked = applied > 0;
      }
      syncVelocityCrossfadeControl();
    }

    function ensureEntryEditorState(entry) {
      if (!entry) return;
      entry.fineTuneCents = clampFineTune(entry.fineTuneCents ?? 0);
      entry.editorGainDb = clampSampleGainDb(entry.editorGainDb ?? 0);
      const minGap = 0.002;
      entry.sampleStartNorm = Math.max(0, Math.min(1 - minGap, clamp01(entry.sampleStartNorm ?? 0)));
      entry.loopStartNorm = clamp01(entry.loopStartNorm ?? 0);
      entry.loopEndNorm = clamp01(entry.loopEndNorm ?? 1);
      entry.loopFadeInNorm = clamp01(entry.loopFadeInNorm ?? entry.loopStartNorm ?? 0);

      if (entry.loopStartNorm < entry.sampleStartNorm) {
        entry.loopStartNorm = entry.sampleStartNorm;
      }
      if (entry.loopFadeInNorm < entry.sampleStartNorm) {
        entry.loopFadeInNorm = entry.sampleStartNorm;
      }
      if (entry.loopEndNorm < entry.loopStartNorm + minGap) {
        entry.loopEndNorm = Math.min(1, entry.loopStartNorm + minGap);
      }
      if (entry.loopFadeInNorm > entry.loopStartNorm) {
        entry.loopFadeInNorm = entry.loopStartNorm;
      }
    }

    function hasEntryLoopRegionConfigured(entry) {
      if (!entry) return false;
      ensureEntryEditorState(entry);
      const explicitLoopEnabled = !!entry.loopEnabled;
      const implicitLoopRegion = entry.loopStartNorm > 0.001 || entry.loopEndNorm < 0.999;
      return explicitLoopEnabled || implicitLoopRegion;
    }

    function isEntryLoopRegionActive(entry) {
      if (!hasEntryLoopRegionConfigured(entry)) return false;
      return isEntryLoopPlaybackEnabled(entry);
    }

    function getCachedDurationForEntry(entry) {
      if (!entry || !entry.sampleUrl) return null;
      const waveform = state.waveformCache.get(entry.sampleUrl);
      if (!waveform) return null;
      return Number.isFinite(waveform.durationSec) ? waveform.durationSec : null;
    }

    function getEntryLoopTimes(entry, durationSec) {
      ensureEntryEditorState(entry);
      const movedLoop = isEntryLoopRegionActive(entry);
      const active = movedLoop;
      const minLenSec = 0.01;
      const duration = Math.max(minLenSec, Number(durationSec) || minLenSec);
      const sampleStartNorm = clamp01(entry.sampleStartNorm ?? 0);
      const startNorm = movedLoop
        ? Math.max(sampleStartNorm, entry.loopStartNorm)
        : sampleStartNorm;
      const endNorm = movedLoop
        ? Math.max(startNorm + 0.002, entry.loopEndNorm)
        : 1;
      const fadeNorm = movedLoop
        ? Math.max(sampleStartNorm, Math.min(entry.loopFadeInNorm ?? entry.loopStartNorm, startNorm))
        : startNorm;
      const startSec = Math.max(0, Math.min(duration - minLenSec, startNorm * duration));
      const endSec = Math.max(startSec + minLenSec, Math.min(duration, endNorm * duration));
      const fadeStartSec = Math.max(0, Math.min(startSec, fadeNorm * duration));
      return {
        active,
        startSec,
        endSec,
        fadeStartSec,
        crossfadeSec: Math.max(0, startSec - fadeStartSec)
      };
    }

    function getSampleEditorMeta(entry, durationSec = null) {
      ensureEntryEditorState(entry);
      const rr = entry.rrIndex === null ? "auto" : String(entry.rrIndex);
      const parts = [
        `root:${midiToNote(entry.rootMidi)}`,
        `V${entry.velocityLayer}`,
        `RR:${rr}`
      ];
      const fineTune = clampFineTune(entry.fineTuneCents ?? 0);
      parts.push(`tune:${fineTune >= 0 ? "+" : ""}${fineTune}c`);
      if (isEntryLoopRegionActive(entry)) {
        const startPct = (entry.loopStartNorm * 100).toFixed(1);
        const endPct = (entry.loopEndNorm * 100).toFixed(1);
        parts.push(`loop:${startPct}-${endPct}%`);
        if (Number.isFinite(durationSec)) {
          const xfadeMs = Math.round(Math.max(0, (entry.loopStartNorm - entry.loopFadeInNorm) * durationSec * 1000));
          if (xfadeMs > 0) parts.push(`xfade:${xfadeMs}ms`);
        }
      }
      if (Number.isFinite(durationSec)) parts.push(`${durationSec.toFixed(2)}s`);
      return parts.join(" | ");
    }

    function refreshSelectedSampleMeta() {
      const entry = getMapEntryByOrder(state.selectedMapEntryOrder);
      if (!entry) return;
      el.sampleEditorMeta.textContent = getSampleEditorMeta(entry, getCachedDurationForEntry(entry));
    }

    function syncSelectedMapSampleBox() {
      const selected = state.selectedMapEntryOrder;
      // Remove old selection — only touches the few currently-selected elements
      el.mapSamples.querySelectorAll(".map-rr-cell.selected").forEach(c => c.classList.remove("selected"));
      el.mapSamples.querySelectorAll(".map-sample-box.selected").forEach(b => b.classList.remove("selected"));
      if (!Number.isFinite(selected)) return;
      // Add new selection — targeted data-attribute query
      el.mapSamples.querySelectorAll(`.map-rr-cell[data-entry-order="${selected}"]`).forEach(cell => {
        cell.classList.add("selected");
        const box = cell.closest(".map-sample-box");
        if (box) box.classList.add("selected");
      });
    }

    function retriggerClass(node, className, durationMs = 230) {
      if (!node || !className) return;
      const timerKey = `__${className}Timer`;
      if (node[timerKey]) {
        window.clearTimeout(node[timerKey]);
        node[timerKey] = 0;
      }
      node.classList.remove(className);
      void node.offsetWidth;
      node.classList.add(className);
      node[timerKey] = window.setTimeout(() => {
        node.classList.remove(className);
        node[timerKey] = 0;
      }, Math.max(80, Math.round(Number(durationMs) || 230)));
    }

    function flashPlayedMapEntry(entry) {
      if (!entry || !el.mapSamples) return;
      const order = Number(entry.order);
      const rootMidi = Math.round(Number(entry.rootMidi));
      const flashedBoxes = new Set();

      if (Number.isFinite(order)) {
        const rrCells = Array.from(el.mapSamples.querySelectorAll(`.map-rr-cell[data-entry-order="${order}"]`));
        rrCells.forEach((cell) => {
          retriggerClass(cell, "play-flash");
          const box = cell.closest(".map-sample-box");
          if (box) flashedBoxes.add(box);
        });
      }

      if (!flashedBoxes.size && Number.isFinite(rootMidi)) {
        const rootBoxes = Array.from(el.mapSamples.querySelectorAll(`.map-sample-box[data-root-midi="${rootMidi}"]`));
        rootBoxes.forEach((box) => flashedBoxes.add(box));
      }

      flashedBoxes.forEach((box) => retriggerClass(box, "play-flash"));
    }

    function syncVelocityCrossfadeControl(entry = getMapEntryByOrder(state.selectedMapEntryOrder)) {
      if (!el.velocityXfadeToggle) return;
      if (!entry) {
        state.velocityCrossfadePercent = 0;
        el.velocityXfadeToggle.checked = false;
        return;
      }
      const value = getVelocityCrossfadePercentForRoot(entry.rootMidi);
      state.velocityCrossfadePercent = value;
      el.velocityXfadeToggle.checked = value > 0;
    }

    function updateSampleGainLine(entry = getMapEntryByOrder(state.selectedMapEntryOrder)) {
      if (!el.sampleGainLine || !el.sampleGainReadout) return;
      if (!entry) {
        el.sampleGainLine.classList.add("hidden");
        return;
      }
      ensureEntryEditorState(entry);
      const gainDb = clampSampleGainDb(entry.editorGainDb ?? 0);
      const minDb = -24;
      const maxDb = 24;
      const t = (gainDb - minDb) / (maxDb - minDb);
      const yPct = (1 - clamp01(t)) * 100;
      el.sampleGainLine.style.top = `${yPct.toFixed(3)}%`;
      el.sampleGainReadout.textContent = `${gainDb >= 0 ? "+" : ""}${gainDb.toFixed(1)} dB`;
      el.sampleGainLine.classList.remove("hidden");
    }

    function setSelectedSampleGainDb(nextDb) {
      const entry = getMapEntryByOrder(state.selectedMapEntryOrder);
      if (!entry) return;
      ensureEntryEditorState(entry);
      entry.editorGainDb = clampSampleGainDb(nextDb);
      updateSampleGainLine(entry);
      scheduleSessionStateSave(700);
    }

    function updateFineTuneKnob(entry = getMapEntryByOrder(state.selectedMapEntryOrder)) {
      const knob = el.sampleFineTuneKnob?.querySelector(".sample-finetune-knob");
      const pointer = el.sampleFineTunePointer;
      if (!knob || !pointer) return;
      if (!entry) {
        knob.classList.add("disabled");
        pointer.style.transform = "translate(-50%, -100%) rotate(0deg)";
        knob.setAttribute("aria-valuenow", "0");
        knob.setAttribute("aria-label", "Fine tune unavailable");
        knob.dataset.tooltip = "Fine tune unavailable";
        knob.title = "Fine tune unavailable";
        return;
      }
      ensureEntryEditorState(entry);
      const cents = clampFineTune(entry.fineTuneCents);
      const normalized = (cents + 100) / 200;
      const angle = -135 + (normalized * 270);
      pointer.style.transform = `translate(-50%, -100%) rotate(${angle.toFixed(2)}deg)`;
      knob.classList.remove("disabled");
      knob.setAttribute("aria-valuenow", String(cents));
      const label = `Fine tune: ${cents >= 0 ? "+" : ""}${cents} cents`;
      knob.setAttribute("aria-label", label);
      knob.dataset.tooltip = label;
      knob.title = label;
    }

    function setSelectedFineTune(nextCents) {
      const entry = getMapEntryByOrder(state.selectedMapEntryOrder);
      if (!entry) return;
      ensureEntryEditorState(entry);
      entry.fineTuneCents = clampFineTune(nextCents);
      updateFineTuneKnob(entry);
      refreshSelectedSampleMeta();
      scheduleSessionStateSave(700);
    }

    function updateLoopCrossfadeKnob() {
      const knob = el.sampleLoopXfadeKnob.querySelector(".sample-finetune-knob");
      const value = clampLoopCrossfadeMs(state.loopCrossfadeMs);
      state.loopCrossfadeMs = value;
      const t = value / 500;
      const angle = -135 + (t * 270);
      el.sampleLoopXfadePointer.style.transform = `translate(-50%, -100%) rotate(${angle}deg)`;
      knob.setAttribute("aria-valuenow", String(value));
      const label = `Loop crossfade ${value} ms`;
      knob.setAttribute("aria-label", label);
      el.sampleLoopXfadeKnob.title = label;
    }

    function enforceLoopCrossfadeForEntry(entry, desiredMs = state.loopCrossfadeMs, durationSec = null) {
      if (!entry) return null;
      ensureEntryEditorState(entry);

      const duration = Number.isFinite(durationSec) && durationSec > 0.0001
        ? Number(durationSec)
        : getCachedDurationForEntry(entry);
      if (!Number.isFinite(duration) || duration <= 0.0001) return null;

      const minGap = 0.002;
      const prevStart = clamp01(entry.loopStartNorm);
      const prevEnd = clamp01(entry.loopEndNorm);
      const prevFade = clamp01(entry.loopFadeInNorm);
      const prevEnabled = !!entry.loopEnabled;

      const requestedMs = Math.max(0, Number(desiredMs) || 0);
      const maxCrossfadeMs = Math.max(0, Math.round(duration * 1000 * 0.5));
      const appliedMs = Math.max(0, Math.min(requestedMs, maxCrossfadeMs));
      const crossfadeNorm = clamp01(appliedMs / (duration * 1000));

      let startNorm = prevStart;
      let endNorm = Math.max(prevEnd, startNorm + minGap);
      if (startNorm < crossfadeNorm) {
        startNorm = crossfadeNorm;
      }

      if (endNorm < startNorm + minGap) {
        endNorm = Math.min(1, startNorm + minGap);
        startNorm = Math.max(0, endNorm - minGap);
      }

      const fadeNorm = Math.max(0, startNorm - crossfadeNorm);
      entry.loopStartNorm = clamp01(startNorm);
      entry.loopEndNorm = clamp01(Math.max(entry.loopStartNorm + minGap, endNorm));
      entry.loopFadeInNorm = clamp01(Math.min(entry.loopStartNorm, fadeNorm));
      if (crossfadeNorm > 0.0001) {
        entry.loopEnabled = true;
      }
      ensureEntryEditorState(entry);

      const changed = (
        Math.abs(entry.loopStartNorm - prevStart) > 1e-6
        || Math.abs(entry.loopEndNorm - prevEnd) > 1e-6
        || Math.abs(entry.loopFadeInNorm - prevFade) > 1e-6
        || (!!entry.loopEnabled !== prevEnabled)
      );

      return {
        durationSec: duration,
        appliedMs,
        maxCrossfadeMs,
        changed
      };
    }

    function setLoopCrossfadeMs(nextMs) {
      state.loopCrossfadeMs = clampLoopCrossfadeMs(nextMs);
      if (state.loopCandidates.length) clearLoopCandidates(false);
      let changed = false;
      const selectedEntry = getMapEntryByOrder(state.selectedMapEntryOrder);
      if (selectedEntry) {
        const constrained = enforceLoopCrossfadeForEntry(selectedEntry, state.loopCrossfadeMs);
        if (constrained) {
          if (constrained.appliedMs !== state.loopCrossfadeMs) {
            state.loopCrossfadeMs = clampLoopCrossfadeMs(constrained.appliedMs);
          }
          changed = !!constrained.changed;
        }
      }
      updateLoopCrossfadeKnob();
      if (changed) {
        updateLoopHandles();
      }
      refreshSelectedSampleMeta();
      updateLoopToolButtons();
      scheduleSessionStateSave(700);
    }

    function clearLoopCandidates(updateUi = true) {
      state.loopCandidates = [];
      state.loopCandidateIndex = -1;
      state.loopCandidateOrder = null;
      if (updateUi) updateLoopToolButtons();
    }

    function updateLoopToolButtons() {
      const selectedEntry = getMapEntryByOrder(state.selectedMapEntryOrder);
      const hasEntry = !!selectedEntry;
      const candidatesForSelected = (
        hasEntry
        && state.loopCandidateOrder === selectedEntry.order
        && state.loopCandidates.length > 0
      );
      const validSampleCount = state.entries.filter((entry) => entry.valid && !!entry.sampleUrl).length;
      const navVisible = !!state.loopNavVisible;

      el.sampleFindLoopBtn.disabled = !hasEntry || state.loopSearchBusy;
      el.sampleLoopPrevBtn.classList.toggle("hidden", !navVisible);
      el.sampleLoopNextBtn.classList.toggle("hidden", !navVisible);
      el.sampleLoopPrevBtn.disabled = !navVisible || !candidatesForSelected || state.loopSearchBusy;
      el.sampleLoopNextBtn.disabled = !navVisible || !candidatesForSelected || state.loopSearchBusy;
      el.sampleLoopApplyAllBtn.disabled = !hasEntry || state.loopSearchBusy || validSampleCount <= 1;
      el.sampleFindLoopBtn.textContent = state.loopSearchBusy ? "..." : "Find";

      if (candidatesForSelected) {
        const idx = state.loopCandidateIndex + 1;
        const total = state.loopCandidates.length;
        el.sampleLoopPrevBtn.title = `Previous loop candidate (${idx}/${total})`;
        el.sampleLoopNextBtn.title = `Next loop candidate (${idx}/${total})`;
      } else {
        el.sampleLoopPrevBtn.title = "Previous loop candidate";
        el.sampleLoopNextBtn.title = "Next loop candidate";
      }
    }

    function applyLoopCandidateToEntry(entry, candidate) {
      if (!entry || !candidate) return;
      entry.loopStartNorm = clamp01(candidate.startNorm);
      entry.loopEndNorm = clamp01(candidate.endNorm);
      entry.loopFadeInNorm = Math.min(entry.loopStartNorm, clamp01(candidate.fadeInNorm));
      entry.loopEnabled = true;
      ensureEntryEditorState(entry);
      scheduleSessionStateSave(750);
    }

    function evaluateLoopBoundaryMismatch(audioBuffer, candidate) {
      if (!audioBuffer || !candidate) return Number.POSITIVE_INFINITY;
      const data = audioBuffer.getChannelData(0);
      if (!data || !data.length) return Number.POSITIVE_INFINITY;

      const length = data.length;
      const startIdx = Math.max(1, Math.min(length - 2, Math.round(clamp01(candidate.startNorm) * (length - 1))));
      const endIdx = Math.max(startIdx + 1, Math.min(length - 1, Math.round(clamp01(candidate.endNorm) * (length - 1))));
      const available = Math.min(startIdx, endIdx);
      if (available < 16) return Number.POSITIVE_INFINITY;

      const sampleRate = audioBuffer.sampleRate || 44100;
      const windowSamples = Math.max(32, Math.min(1024, Math.round(sampleRate * 0.01), available));
      const startWindow = startIdx - windowSamples;
      const endWindow = endIdx - windowSamples;

      let ampDiff = 0;
      let slopeDiff = 0;
      let energy = 0;

      for (let i = 0; i < windowSamples; i += 1) {
        const a = data[startWindow + i] || 0;
        const b = data[endWindow + i] || 0;
        const d = a - b;
        ampDiff += d * d;
        energy += (a * a) + (b * b);
        if (i > 0) {
          const aPrev = data[startWindow + i - 1] || 0;
          const bPrev = data[endWindow + i - 1] || 0;
          const ds = (a - aPrev) - (b - bPrev);
          slopeDiff += ds * ds;
        }
      }

      const denom = Math.max(1e-8, energy);
      const edge = Math.abs((data[startIdx] || 0) - (data[endIdx] || 0));
      return (ampDiff / denom) + ((slopeDiff / denom) * 0.55) + (edge * edge * 0.9);
    }

    function pickBestAutoLoopCandidate(audioBuffer, candidates) {
      if (!audioBuffer || !Array.isArray(candidates) || !candidates.length) return null;
      const evaluated = [];

      candidates.forEach((candidate) => {
        const startNorm = clamp01(candidate.startNorm);
        const endNorm = clamp01(candidate.endNorm);
        const spanNorm = Math.max(0, endNorm - startNorm);
        if (spanNorm < 0.02) return;
        const fullSpan = startNorm <= 0.003 && endNorm >= 0.997;
        const mismatch = evaluateLoopBoundaryMismatch(audioBuffer, candidate);
        if (!Number.isFinite(mismatch)) return;
        evaluated.push({
          candidate,
          mismatch,
          fullSpan,
          spanNorm
        });
      });

      if (!evaluated.length) return null;
      evaluated.sort((a, b) => (
        a.mismatch - b.mismatch
        || (b.spanNorm - a.spanNorm)
      ));

      const preferred = evaluated.find((item) => !item.fullSpan) || evaluated[0];
      return preferred?.candidate || null;
    }

    function computeRmsOverSampleRange(data, startSample, endSample) {
      if (!data || !data.length) return 0;
      const start = Math.max(0, Math.min(data.length - 1, Math.round(Number(startSample) || 0)));
      const end = Math.max(start + 1, Math.min(data.length, Math.round(Number(endSample) || 0)));
      let sumSquares = 0;
      let count = 0;
      for (let i = start; i < end; i += 1) {
        const s = data[i] || 0;
        sumSquares += s * s;
        count += 1;
      }
      if (!count) return 0;
      return Math.sqrt(sumSquares / count);
    }

    function refineLoopAnchorSample(data, sampleRate, anchorSample, minAnchorSample, maxAnchorSample) {
      if (!data || !data.length) return Math.max(0, Math.round(Number(anchorSample) || 0));
      const minAnchor = Math.max(0, Math.min(data.length - 1, Math.round(Number(minAnchorSample) || 0)));
      const maxAnchor = Math.max(minAnchor, Math.min(data.length - 1, Math.round(Number(maxAnchorSample) || 0)));
      let anchor = Math.max(minAnchor, Math.min(maxAnchor, Math.round(Number(anchorSample) || minAnchor)));
      if (maxAnchor <= minAnchor) return anchor;

      const probeHalfWindow = Math.max(24, Math.round((Number(sampleRate) || 44100) * 0.006));
      const overallRms = computeRmsOverSampleRange(data, minAnchor, maxAnchor + 1);
      if (!Number.isFinite(overallRms) || overallRms <= 0.000001) return anchor;

      const threshold = Math.max(0.0008, overallRms * 0.42);
      let bestSample = anchor;
      let bestRms = computeRmsOverSampleRange(data, anchor - probeHalfWindow, anchor + probeHalfWindow);
      if (bestRms >= threshold) return anchor;

      const step = Math.max(8, Math.round((Number(sampleRate) || 44100) / 2500));
      for (let sample = anchor + step; sample <= maxAnchor; sample += step) {
        const rms = computeRmsOverSampleRange(data, sample - probeHalfWindow, sample + probeHalfWindow);
        if (rms > bestRms) {
          bestRms = rms;
          bestSample = sample;
        }
        if (rms >= threshold) {
          return sample;
        }
      }

      return bestSample;
    }

    function buildLoopCandidatesFromBuffer(entry, audioBuffer, maxCandidates = 7, crossfadeOverrideMs = null) {
      if (!entry || !audioBuffer || !audioBuffer.length) return [];
      ensureEntryEditorState(entry);
      const data = audioBuffer.getChannelData(0);
      if (!data || data.length < 512) return [];

      const length = audioBuffer.length;
      const sampleRate = audioBuffer.sampleRate || 44100;
      const windowSamples = Math.max(48, Math.round(sampleRate * 0.012));
      const minLoopSamples = Math.max(windowSamples * 2, Math.round(sampleRate * 0.08));
      const lastSafeSample = Math.max(windowSamples + 2, length - windowSamples - 3);
      let anchor = Math.max(
        windowSamples + 2,
        Math.min(lastSafeSample, Math.round(entry.loopStartNorm * length))
      );
      const searchOut = Math.max(
        anchor + minLoopSamples,
        Math.min(lastSafeSample, Math.round(entry.loopEndNorm * length))
      );
      const maxAnchor = Math.max(windowSamples + 2, Math.min(lastSafeSample - minLoopSamples, searchOut - minLoopSamples));
      anchor = refineLoopAnchorSample(data, sampleRate, anchor, windowSamples + 2, maxAnchor);
      const defaultRadius = (entry.loopEndNorm >= 0.999 && entry.loopStartNorm <= 0.001)
        ? Math.round(length * 0.35)
        : Math.round(length * 0.18);
      const searchRadius = Math.max(minLoopSamples, defaultRadius);

      let candidateStart = Math.max(anchor + minLoopSamples, searchOut - searchRadius);
      let candidateEnd = Math.min(lastSafeSample, searchOut + searchRadius);
      if (candidateEnd <= candidateStart + windowSamples) {
        candidateStart = anchor + minLoopSamples;
        candidateEnd = lastSafeSample;
      }
      if (candidateEnd <= candidateStart) return [];

      const step = Math.max(1, Math.round(sampleRate / 2000));
      const crossfadeMs = crossfadeOverrideMs === null ? state.loopCrossfadeMs : crossfadeOverrideMs;
      const requestedCrossfadeSamples = Math.max(0, Math.round((Math.max(0, Number(crossfadeMs) || 0) / 1000) * sampleRate));
      const maxCrossfadeSamples = Math.max(0, Math.floor(length * 0.5));
      const crossfadeSamples = Math.min(requestedCrossfadeSamples, maxCrossfadeSamples);
      const scores = [];
      const anchorStart = anchor - windowSamples;

      for (let end = candidateStart; end <= candidateEnd; end += step) {
        const endStart = end - windowSamples;
        if (endStart < 0 || end + 1 >= length) continue;

        let ampDiff = 0;
        let slopeDiff = 0;
        for (let i = 0; i < windowSamples; i += 1) {
          const a = data[anchorStart + i] || 0;
          const b = data[endStart + i] || 0;
          const d = a - b;
          ampDiff += d * d;
          if (i < windowSamples - 1) {
            const da = (data[anchorStart + i + 1] || 0) - a;
            const db = (data[endStart + i + 1] || 0) - b;
            const ds = da - db;
            slopeDiff += ds * ds;
          }
        }

        const edgeDiff = Math.abs((data[anchor] || 0) - (data[end] || 0));
        const score = ampDiff + (slopeDiff * 0.55) + (edgeDiff * edgeDiff * windowSamples * 1.3);
        const startNorm = anchor / length;
        const endNorm = end / length;
        const fadeInNorm = Math.max(0, Math.min(startNorm, (anchor - crossfadeSamples) / length));
        scores.push({
          startNorm,
          endNorm,
          fadeInNorm,
          score
        });
      }

      scores.sort((a, b) => a.score - b.score);
      const deduped = [];
      for (const candidate of scores) {
        const isNearExisting = deduped.some((existing) => (
          Math.abs(existing.endNorm - candidate.endNorm) < 0.0025
        ));
        if (!isNearExisting) deduped.push(candidate);
        if (deduped.length >= maxCandidates) break;
      }
      return deduped;
    }

    async function findLoopCandidatesForSelectedEntry() {
      const entry = getMapEntryByOrder(state.selectedMapEntryOrder);
      if (!entry || !entry.sampleUrl) return;
      state.loopNavVisible = true;
      state.loopSearchBusy = true;
      updateLoopToolButtons();
      try {
        const waveform = await getWaveformForEntry(entry);
        const candidates = buildLoopCandidatesFromBuffer(entry, waveform?.audioBuffer, 7);
        state.loopCandidateOrder = entry.order;
        state.loopCandidates = candidates;
        state.loopCandidateIndex = candidates.length ? 0 : -1;
        if (candidates.length) {
          applyLoopCandidateToEntry(entry, candidates[0]);
          renderKeyboardMap(state.entries.filter((sample) => sample.valid), true);
          syncSelectedMapSampleBox();
          updateLoopHandles();
          refreshSelectedSampleMeta();
          setStatus(el.setupStatus, `Found ${candidates.length} loop candidate(s).`, "ok");
        } else {
          setStatus(el.setupStatus, "No loop candidates found in this search range.", "warn");
        }
      } catch {
        setStatus(el.setupStatus, "Loop search failed for this sample.", "bad");
      } finally {
        state.loopSearchBusy = false;
        updateLoopToolButtons();
      }
    }

    function stepSelectedLoopCandidate(direction) {
      const entry = getMapEntryByOrder(state.selectedMapEntryOrder);
      if (!entry) return;
      if (state.loopCandidateOrder !== entry.order || !state.loopCandidates.length) return;
      const total = state.loopCandidates.length;
      state.loopCandidateIndex = (state.loopCandidateIndex + direction + total) % total;
      applyLoopCandidateToEntry(entry, state.loopCandidates[state.loopCandidateIndex]);
      renderKeyboardMap(state.entries.filter((sample) => sample.valid), true);
      syncSelectedMapSampleBox();
      updateLoopHandles();
      refreshSelectedSampleMeta();
      updateLoopToolButtons();
    }

    async function applyCurrentLoopStrategyToAll() {
      const selected = getMapEntryByOrder(state.selectedMapEntryOrder);
      if (!selected) return;
      const targets = state.entries.filter((entry) => entry.valid && !!entry.sampleUrl);
      if (!targets.length) return;
      const strategyStart = clamp01(selected.loopStartNorm);
      const strategyEnd = clamp01(selected.loopEndNorm);

      state.loopSearchBusy = true;
      clearLoopCandidates(false);
      updateLoopToolButtons();

      let applied = 0;
      for (const entry of targets) {
        ensureEntryEditorState(entry);
        entry.loopStartNorm = strategyStart;
        entry.loopEndNorm = Math.max(strategyStart + 0.002, strategyEnd);
        entry.loopFadeInNorm = Math.min(entry.loopStartNorm, entry.loopFadeInNorm);
        try {
          const waveform = await getWaveformForEntry(entry);
          const candidates = buildLoopCandidatesFromBuffer(entry, waveform?.audioBuffer, 7);
          const best = pickBestAutoLoopCandidate(waveform?.audioBuffer, candidates);
          if (best) {
            applyLoopCandidateToEntry(entry, best);
            applied += 1;
          }
        } catch {
          // skip samples that cannot be decoded in browser preview
        }
      }

      state.loopSearchBusy = false;
      renderKeyboardMap(state.entries.filter((entry) => entry.valid), true);
      syncSelectedMapSampleBox();
      updateLoopHandles();
      refreshSelectedSampleMeta();
      updateLoopToolButtons();
      setStatus(el.setupStatus, `Applied auto-loop strategy to ${applied}/${targets.length} sample(s).`, applied ? "ok" : "warn");
    }

    function updateLoopHandles() {
      const entry = getMapEntryByOrder(state.selectedMapEntryOrder);
      if (!entry) {
        if (el.sampleWaveformContent) {
          el.sampleWaveformContent.classList.remove("loop-markers-dim");
          el.sampleWaveformContent.classList.remove("loop-handles-locked");
        }
        el.sampleStartMarker.classList.add("hidden");
        el.sampleLoopFade.classList.add("hidden");
        el.sampleLoopStart.classList.add("hidden");
        el.sampleLoopEnd.classList.add("hidden");
        el.sampleLoopRegion.classList.add("hidden");
        el.sampleLoopFadeRegion.classList.add("hidden");
        return;
      }
      ensureEntryEditorState(entry);
      const contentWidth = Math.max(1, el.sampleWaveformContent.clientWidth || el.sampleWaveformViewport.clientWidth || 1);
      const sampleStartX = entry.sampleStartNorm * contentWidth;
      const loopPlaybackEnabled = isEntryLoopPlaybackEnabled(entry);
      const displayFadeNorm = loopPlaybackEnabled ? entry.loopFadeInNorm : entry.sampleStartNorm;
      const displayStartNorm = loopPlaybackEnabled ? entry.loopStartNorm : entry.sampleStartNorm;
      const displayEndNorm = loopPlaybackEnabled ? entry.loopEndNorm : 1;
      const fadeX = displayFadeNorm * contentWidth;
      const startX = displayStartNorm * contentWidth;
      const endX = displayEndNorm * contentWidth;
      el.sampleWaveformContent.classList.toggle("loop-markers-dim", !loopPlaybackEnabled);
      el.sampleWaveformContent.classList.toggle("loop-handles-locked", !loopPlaybackEnabled);

      el.sampleStartMarker.classList.remove("hidden");
      el.sampleStartMarker.style.left = `${sampleStartX}px`;
      el.sampleLoopFade.classList.remove("hidden");
      el.sampleLoopStart.classList.remove("hidden");
      el.sampleLoopEnd.classList.remove("hidden");
      el.sampleLoopFade.style.left = `${fadeX}px`;
      el.sampleLoopStart.style.left = `${startX}px`;
      el.sampleLoopEnd.style.left = `${endX}px`;

      if (loopPlaybackEnabled && isEntryLoopRegionActive(entry)) {
        el.sampleLoopRegion.classList.remove("hidden");
        el.sampleLoopRegion.style.left = `${Math.min(startX, endX)}px`;
        el.sampleLoopRegion.style.width = `${Math.max(0, endX - startX)}px`;

        if (entry.loopFadeInNorm < entry.loopStartNorm - 0.0005) {
          el.sampleLoopFadeRegion.classList.remove("hidden");
          el.sampleLoopFadeRegion.style.left = `${Math.min(fadeX, startX)}px`;
          el.sampleLoopFadeRegion.style.width = `${Math.max(0, startX - fadeX)}px`;
        } else {
          el.sampleLoopFadeRegion.classList.add("hidden");
        }
      } else {
        el.sampleLoopRegion.classList.add("hidden");
        el.sampleLoopFadeRegion.classList.add("hidden");
      }
    }

    function startLoopHandleDrag(which, ev) {
      const entry = getMapEntryByOrder(state.selectedMapEntryOrder);
      if (!entry) return;
      ensureEntryEditorState(entry);
      if (which !== "sampleStart" && !isEntryLoopPlaybackEnabled(entry)) return;
      ev.preventDefault();

      const viewport = el.sampleWaveformViewport;
      const minGap = 0.002;
      let changed = false;

      function update(clientX) {
        const rect = viewport.getBoundingClientRect();
        const contentWidth = Math.max(1, el.sampleWaveformContent.clientWidth || viewport.clientWidth || 1);
        const absoluteX = (clientX - rect.left) + viewport.scrollLeft;
        let next = clamp01(absoluteX / contentWidth);
        if (next < 0.005) next = 0;
        if (next > 0.995) next = 1;

        if (which === "sampleStart") {
          entry.sampleStartNorm = Math.min(next, 1 - minGap);
          if (entry.loopStartNorm < entry.sampleStartNorm) {
            entry.loopStartNorm = entry.sampleStartNorm;
          }
          if (entry.loopFadeInNorm < entry.sampleStartNorm) {
            entry.loopFadeInNorm = entry.sampleStartNorm;
          }
          if (entry.loopEndNorm < entry.loopStartNorm + minGap) {
            entry.loopEndNorm = Math.min(1, entry.loopStartNorm + minGap);
          }
        } else if (which === "start") {
          const wasLinked = Math.abs((entry.loopFadeInNorm ?? 0) - entry.loopStartNorm) < minGap;
          entry.loopStartNorm = Math.max(entry.sampleStartNorm, Math.min(next, entry.loopEndNorm - minGap));
          if (wasLinked || entry.loopFadeInNorm > entry.loopStartNorm) {
            entry.loopFadeInNorm = entry.loopStartNorm;
          }
        } else if (which === "fade") {
          entry.loopFadeInNorm = Math.max(entry.sampleStartNorm, Math.min(next, entry.loopStartNorm));
          if (entry.loopStartNorm - entry.loopFadeInNorm < minGap) {
            entry.loopFadeInNorm = entry.loopStartNorm;
          }
        } else {
          const floor = Math.max(entry.sampleStartNorm, entry.loopStartNorm);
          entry.loopEndNorm = Math.max(next, floor + minGap);
        }
        changed = true;
        updateLoopHandles();
        refreshSelectedSampleMeta();
      }

      update(ev.clientX);

      function onMove(moveEv) {
        update(moveEv.clientX);
      }

      function onUp() {
        window.removeEventListener("pointermove", onMove);
        window.removeEventListener("pointerup", onUp);
        if (changed) scheduleSessionStateSave(420);
      }

      window.addEventListener("pointermove", onMove);
      window.addEventListener("pointerup", onUp);
    }

    function stopWaveformPlayhead() {
      if (state.playheadAnimationId) {
        window.cancelAnimationFrame(state.playheadAnimationId);
        state.playheadAnimationId = 0;
      }
      state.playheadSession = null;
      el.samplePlayhead.classList.add("hidden");
    }

    function startWaveformPlayhead(entry, ctx, durationSec, segments, stopSec) {
      if (
        !entry
        || !ctx
        || !Number.isFinite(durationSec)
        || durationSec <= 0
        || !Array.isArray(segments)
        || !segments.length
      ) {
        stopWaveformPlayhead();
        return;
      }
      if (state.selectedMapEntryOrder !== entry.order) {
        return;
      }

      const sanitized = segments
        .map((segment) => ({
          t0: Number(segment.t0) || 0,
          t1: Number(segment.t1) || 0,
          src0: Math.max(0, Math.min(durationSec, Number(segment.src0) || 0)),
          src1: Math.max(0, Math.min(durationSec, Number(segment.src1) || 0))
        }))
        .filter((segment) => segment.t1 > segment.t0 && segment.src1 >= segment.src0)
        .sort((a, b) => a.t0 - b.t0);

      if (!sanitized.length) {
        stopWaveformPlayhead();
        return;
      }

      stopWaveformPlayhead();
      el.samplePlayhead.classList.remove("hidden");
      state.playheadSession = {
        entryOrder: entry.order,
        ctx,
        durationSec,
        segments: sanitized,
        stopSec: Number.isFinite(stopSec) ? stopSec : sanitized[sanitized.length - 1].t1
      };

      function tick() {
        const session = state.playheadSession;
        if (!session) return;
        if (
          session.entryOrder !== state.selectedMapEntryOrder
          || session.ctx !== ctx
        ) {
          stopWaveformPlayhead();
          return;
        }

        const now = session.ctx.currentTime;
        if (now >= session.stopSec + 0.04) {
          stopWaveformPlayhead();
          return;
        }

        let active = session.segments[0];
        for (const segment of session.segments) {
          if (now >= segment.t0) active = segment;
          if (now >= segment.t0 && now <= segment.t1) {
            active = segment;
          }
        }

        const clampedNow = Math.max(active.t0, Math.min(active.t1, now));
        const dur = Math.max(0.000001, active.t1 - active.t0);
        const ratio = (clampedNow - active.t0) / dur;
        const srcPos = active.src0 + ((active.src1 - active.src0) * ratio);
        const norm = Math.max(0, Math.min(1, srcPos / session.durationSec));
        const contentWidth = Math.max(1, el.sampleWaveformContent.clientWidth || el.sampleWaveformViewport.clientWidth || 1);
        el.samplePlayhead.style.left = `${norm * contentWidth}px`;
        state.playheadAnimationId = window.requestAnimationFrame(tick);
      }

      tick();
    }

    function closeSampleEditor() {
      stopWaveformPlayhead();
      clearLoopCandidates(false);
      state.loopNavVisible = false;
      state.selectedMapEntryOrder = null;
      syncVelocityCrossfadeControl(null);
      updateSampleGainLine(null);
      state.waveformRequestId += 1;
      state.waveformZoom = 1;
      el.sampleEditorTitle.textContent = "No sample selected";
      el.sampleEditorMeta.textContent = "";
      el.sampleWaveformViewport.scrollLeft = 0;
      drawWaveformMessage("Select a sample to edit.");
      updateWaveformScrollControl();
      syncSelectedMapSampleBox();
      updateWaveformZoomButtons();
      el.sampleNavPrev.disabled = true;
      el.sampleNavNext.disabled = true;
      updateFineTuneKnob(null);
      updateLoopHandles();
      updateLoopToolButtons();
    }

    function ensureAudioContext() {
      if (state.audioContext) return state.audioContext;
      const Ctor = window.AudioContext || window.webkitAudioContext;
      if (!Ctor) throw new Error("WebAudio unavailable");
      state.audioContext = new Ctor();
      return state.audioContext;
    }

    function prepareWaveformCanvas(zoom = state.waveformZoom) {
      const canvas = el.sampleWaveform;
      const viewport = el.sampleWaveformViewport;
      const viewportWidth = Math.max(1, Math.round(viewport.clientWidth || 1));
      const cssHeight = Math.max(1, Math.round(viewport.clientHeight || 234));
      const zoomLevel = Math.max(1, Math.min(8, Number(zoom) || 1));
      const drawWidth = Math.max(1, Math.round(viewportWidth * zoomLevel));
      el.sampleWaveformContent.style.width = `${drawWidth}px`;
      el.sampleWaveformContent.style.height = `${cssHeight}px`;
      canvas.style.width = "100%";
      canvas.style.height = "100%";
      const dpr = Math.max(1, window.devicePixelRatio || 1);
      canvas.width = Math.max(1, Math.round(drawWidth * dpr));
      canvas.height = Math.max(1, Math.round(cssHeight * dpr));
      const ctx = canvas.getContext("2d");
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      return { ctx, drawWidth, cssHeight };
    }

    function updateWaveformZoomButtons() {
      const minZoom = 1;
      const maxZoom = 8;
      state.waveformZoom = Math.max(minZoom, Math.min(maxZoom, Number(state.waveformZoom) || minZoom));
    }

    function updateWaveformScrollControl() {
      const hasSelection = Number.isFinite(state.selectedMapEntryOrder);
      const viewport = el.sampleWaveformViewport;
      const max = Math.max(0, Math.round(viewport.scrollWidth - viewport.clientWidth));
      const canPan = hasSelection && max > 0;
      viewport.classList.toggle("pannable", canPan);
      if (!canPan) viewport.classList.remove("panning");
      updateLoopHandles();
    }

    function setupWaveformPan() {
      const viewport = el.sampleWaveformViewport;
      let pointerId = null;
      let startX = 0;
      let startScroll = 0;

      function endPan() {
        pointerId = null;
        viewport.classList.remove("panning");
      }

      viewport.addEventListener("pointerdown", (ev) => {
        if (ev.button !== 0) return;
        if (!viewport.classList.contains("pannable")) return;
        if (ev.target.closest(".sample-loop-handle")) return;
        if (ev.target.closest(".sample-gain-line")) return;
        pointerId = ev.pointerId;
        startX = ev.clientX;
        startScroll = viewport.scrollLeft;
        viewport.classList.add("panning");
        if (viewport.setPointerCapture) viewport.setPointerCapture(pointerId);
        ev.preventDefault();
      });

      viewport.addEventListener("pointermove", (ev) => {
        if (pointerId === null || ev.pointerId !== pointerId) return;
        const deltaX = ev.clientX - startX;
        viewport.scrollLeft = Math.round(startScroll - deltaX);
        updateWaveformScrollControl();
      });

      function onPointerEnd(ev) {
        if (pointerId === null || ev.pointerId !== pointerId) return;
        if (viewport.releasePointerCapture && viewport.hasPointerCapture && viewport.hasPointerCapture(pointerId)) {
          viewport.releasePointerCapture(pointerId);
        }
        endPan();
      }

      viewport.addEventListener("pointerup", onPointerEnd);
      viewport.addEventListener("pointercancel", onPointerEnd);
      viewport.addEventListener("lostpointercapture", endPan);

      viewport.addEventListener("wheel", (ev) => {
        if (!Number.isFinite(state.selectedMapEntryOrder)) return;
        if (ev.target.closest(".sample-loop-handle")) return;
        const deltaNorm = Math.max(-1, Math.min(1, (-ev.deltaY || 0) / 100));
        const step = ev.shiftKey ? 0.45 : 0.18;
        const nextZoom = Math.max(1, Math.min(8, state.waveformZoom + (deltaNorm * step)));
        if (Math.abs(nextZoom - state.waveformZoom) < 0.001) return;
        ev.preventDefault();
        setWaveformZoom(nextZoom);
      }, { passive: false });
    }

    function redrawSelectedWaveform() {
      const entry = getMapEntryByOrder(state.selectedMapEntryOrder);
      if (!entry) return;
      const waveform = state.waveformCache.get(entry.sampleUrl);
      if (!waveform) return;
      drawWaveformPeaks(waveform.peaks, state.waveformZoom);
      updateWaveformScrollControl();
    }

    function setWaveformZoom(nextZoom) {
      const minZoom = 1;
      const maxZoom = 8;
      const viewport = el.sampleWaveformViewport;
      const maxBefore = Math.max(0, viewport.scrollWidth - viewport.clientWidth);
      const scrollRatio = maxBefore > 0 ? (viewport.scrollLeft / maxBefore) : 0;
      const zoom = Math.max(minZoom, Math.min(maxZoom, Number(nextZoom) || minZoom));
      state.waveformZoom = zoom;
      updateWaveformZoomButtons();
      redrawSelectedWaveform();
      window.requestAnimationFrame(() => {
        const maxAfter = Math.max(0, viewport.scrollWidth - viewport.clientWidth);
        viewport.scrollLeft = Math.round(scrollRatio * maxAfter);
        updateWaveformScrollControl();
      });
    }

    function drawWaveformMessage(text) {
      const { ctx, drawWidth, cssHeight } = prepareWaveformCanvas(1);
      ctx.clearRect(0, 0, drawWidth, cssHeight);
      ctx.fillStyle = "rgba(4, 8, 14, 0.92)";
      ctx.fillRect(0, 0, drawWidth, cssHeight);
      ctx.fillStyle = "rgba(184, 202, 234, 0.85)";
      ctx.font = '11px "SFMono-Regular", Menlo, monospace';
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillText(text, drawWidth / 2, cssHeight / 2);
      updateWaveformScrollControl();
    }

    function drawWaveformPeaks(peaks, zoom = state.waveformZoom) {
      const { ctx, drawWidth, cssHeight } = prepareWaveformCanvas(zoom);
      ctx.clearRect(0, 0, drawWidth, cssHeight);
      ctx.fillStyle = "rgba(4, 8, 14, 0.92)";
      ctx.fillRect(0, 0, drawWidth, cssHeight);

      const mid = (cssHeight - 1) * 0.5;
      ctx.strokeStyle = "rgba(140, 146, 156, 0.24)";
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(0, mid);
      ctx.lineTo(drawWidth, mid);
      ctx.stroke();

      let minValues = [];
      let maxValues = [];

      if (Array.isArray(peaks)) {
        minValues = peaks.map((value) => -Math.max(0, Math.min(1, Number(value) || 0)));
        maxValues = peaks.map((value) => Math.max(0, Math.min(1, Number(value) || 0)));
      } else if (peaks && Array.isArray(peaks.center) && Array.isArray(peaks.min) && Array.isArray(peaks.max)) {
        minValues = peaks.min;
        maxValues = peaks.max;
      }

      const count = Math.min(minValues.length, maxValues.length);
      if (!count) return;

      const stepX = count > 1 ? drawWidth / (count - 1) : drawWidth;
      let centerBiasSum = 0;
      let centerBiasCount = 0;
      for (let i = 0; i < count; i += 1) {
        const hi = Number(maxValues[i]) || 0;
        const lo = Number(minValues[i]) || 0;
        centerBiasSum += (hi + lo) * 0.5;
        centerBiasCount += 1;
      }

      const centerBias = centerBiasCount > 0 ? (centerBiasSum / centerBiasCount) : 0;
      let posPeak = 0;
      let negPeak = 0;
      for (let i = 0; i < count; i += 1) {
        const hi = Number(maxValues[i]) || 0;
        const lo = Number(minValues[i]) || 0;
        const centeredHi = hi - centerBias;
        const centeredLo = lo - centerBias;
        if (centeredHi > posPeak) posPeak = centeredHi;
        if (-centeredLo > negPeak) negPeak = -centeredLo;
      }
      posPeak = Math.max(0.0001, posPeak);
      negPeak = Math.max(0.0001, negPeak);
      const posNorm = 1 / posPeak;
      const negNorm = 1 / negPeak;
      const normalize = (value) => {
        const centered = (Number(value) || 0) - centerBias;
        return Math.max(-1, Math.min(1, centered >= 0 ? (centered * posNorm) : (centered * negNorm)));
      };
      const ampScale = Math.max(1, (cssHeight - 2) * 0.5);

      ctx.beginPath();
      for (let i = 0; i < count; i += 1) {
        const x = i * stepX;
        const y = mid - (normalize(Number(maxValues[i]) || 0) * ampScale);
        if (i === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
      }
      for (let i = count - 1; i >= 0; i -= 1) {
        const x = i * stepX;
        const y = mid - (normalize(Number(minValues[i]) || 0) * ampScale);
        ctx.lineTo(x, y);
      }
      ctx.closePath();
      ctx.fillStyle = "rgba(164, 170, 180, 0.2)";
      ctx.fill();

      ctx.beginPath();
      for (let i = 0; i < count; i += 1) {
        const x = i * stepX;
        const hi = Number(maxValues[i]) || 0;
        const lo = Number(minValues[i]) || 0;
        const y = mid - (normalize((hi + lo) * 0.5) * ampScale);
        if (i === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
      }
      ctx.strokeStyle = "rgba(164, 170, 180, 0.95)";
      ctx.lineWidth = 1.1;
      ctx.stroke();
      updateWaveformScrollControl();
    }

    function buildWaveformPeaks(audioBuffer, pointCount = 2048) {
      const length = audioBuffer.length;
      if (!length) return { center: [], min: [], max: [] };
      const channels = Math.max(1, audioBuffer.numberOfChannels);
      const points = Math.max(512, Math.min(pointCount, length));
      const block = Math.max(1, Math.floor(length / points));
      const center = new Array(points).fill(0);
      const min = new Array(points).fill(0);
      const max = new Array(points).fill(0);

      for (let i = 0; i < points; i += 1) {
        const start = i * block;
        const end = Math.min(length, i === points - 1 ? length : start + block);
        let localMin = 1;
        let localMax = -1;
        let avg = 0;
        let count = 0;
        for (let n = start; n < end; n += 1) {
          let mixed = 0;
          let sampleMin = 1;
          let sampleMax = -1;
          for (let ch = 0; ch < channels; ch += 1) {
            const data = audioBuffer.getChannelData(ch);
            const value = data[n] || 0;
            mixed += value;
            if (value < sampleMin) sampleMin = value;
            if (value > sampleMax) sampleMax = value;
          }
          mixed /= channels;
          if (sampleMin < localMin) localMin = sampleMin;
          if (sampleMax > localMax) localMax = sampleMax;
          avg += mixed;
          count += 1;
        }
        if (!count) {
          center[i] = 0;
          min[i] = 0;
          max[i] = 0;
        } else {
          center[i] = avg / count;
          min[i] = localMin;
          max[i] = localMax;
        }
      }

      return {
        center,
        min,
        max
      };
    }

    async function getWaveformForEntry(entry) {
      const cacheKey = entry.sampleUrl;
      if (state.waveformCache.has(cacheKey)) {
        return state.waveformCache.get(cacheKey);
      }

      const ctx = ensureAudioContext();
      const response = await fetch(entry.sampleUrl);
      const source = await response.arrayBuffer();
      const audioBuffer = await ctx.decodeAudioData(source.slice(0));
      const waveform = {
        peaks: buildWaveformPeaks(audioBuffer),
        durationSec: Number(audioBuffer.duration) || 0,
        audioBuffer
      };
      state.waveformCache.set(cacheKey, waveform);
      return waveform;
    }

    function requestSampleDataForEntry(entry) {
      if (!entry || !Number.isFinite(entry.order)) return false;
      if (!getNativeBackend()) return false;

      const requestId = (Number(state.sampleDataRequestSeq) || 0) + 1;
      state.sampleDataRequestSeq = requestId;
      state.pendingSampleDataRequests.set(requestId, {
        entry,
        startedAt: performance.now()
      });

      const emitted = emitNativeEvent("sample_data_get", {
        requestId,
        order: entry.order,
        fileName: entry.fileName || "",
        rootMidi: Number.isFinite(entry.rootMidi) ? Math.round(entry.rootMidi) : -1,
        velocityLayer: Number.isFinite(entry.velocityLayer) ? Math.round(entry.velocityLayer) : 1,
        rrIndex: Number.isFinite(entry.rrIndex) ? Math.round(entry.rrIndex) : 1,
        manifestPath: getEntryManifestAbsolutePath(entry),
        manifestPathCandidates: getEntryManifestAbsolutePathCandidates(entry)
      });

      if (!emitted) {
        state.pendingSampleDataRequests.delete(requestId);
        return false;
      }

      window.setTimeout(() => {
        if (!state.pendingSampleDataRequests.has(requestId)) return;
        state.pendingSampleDataRequests.delete(requestId);
        requestFullSessionStateHydration("sample-editor-timeout");
        drawWaveformMessage("Sample data request timed out");
      }, 1500);

      return true;
    }

    function requestSampleDataForEntrySave(entry, timeoutMs = 3000) {
      if (!entry || !Number.isFinite(entry.order)) return Promise.resolve("");
      if (!getNativeBackend()) return Promise.resolve("");

      const requestId = (Number(state.sampleDataRequestSeq) || 0) + 1;
      state.sampleDataRequestSeq = requestId;

      return new Promise((resolve) => {
        const timeoutId = window.setTimeout(() => {
          const pending = state.pendingSampleDataRequests.get(requestId);
          if (!pending) return;
          state.pendingSampleDataRequests.delete(requestId);
          resolve("");
        }, Math.max(400, Math.round(Number(timeoutMs) || 3000)));

        state.pendingSampleDataRequests.set(requestId, {
          entry,
          startedAt: performance.now(),
          forSave: true,
          timeoutId,
          resolve
        });

        const emitted = emitNativeEvent("sample_data_get", {
          requestId,
          order: entry.order,
          fileName: entry.fileName || "",
          rootMidi: Number.isFinite(entry.rootMidi) ? Math.round(entry.rootMidi) : -1,
          velocityLayer: Number.isFinite(entry.velocityLayer) ? Math.round(entry.velocityLayer) : 1,
          rrIndex: Number.isFinite(entry.rrIndex) ? Math.round(entry.rrIndex) : 1,
          manifestPath: getEntryManifestAbsolutePath(entry),
          manifestPathCandidates: getEntryManifestAbsolutePathCandidates(entry)
        });

        if (!emitted) {
          const pending = state.pendingSampleDataRequests.get(requestId);
          if (pending) {
            window.clearTimeout(pending.timeoutId);
            state.pendingSampleDataRequests.delete(requestId);
          }
          resolve("");
        }
      });
    }

    function handleSampleDataPayload(payload) {
      const info = (payload && typeof payload === "object" && !Array.isArray(payload))
        ? payload
        : null;
      const requestId = Math.round(Number(info?.requestId));
      if (!Number.isFinite(requestId)) return;

      const pending = state.pendingSampleDataRequests.get(requestId);
      if (!pending) return;
      state.pendingSampleDataRequests.delete(requestId);
      if (pending.timeoutId) {
        window.clearTimeout(pending.timeoutId);
      }

      const entry = pending.entry;
      if (!entry) return;

      const dataUrl = String(info?.dataUrl || "").trim();
      if (!dataUrl) {
        if (typeof pending.resolve === "function") pending.resolve("");
        if (pending.forSave) return;
        requestFullSessionStateHydration("sample-editor-fallback");
        drawWaveformMessage("Sample data unavailable");
        return;
      }

      const previous = String(entry.sampleUrl || "").trim();
      if (previous && previous.startsWith("blob:")) {
        try { URL.revokeObjectURL(previous); } catch {}
      }
      entry.sampleUrl = dataUrl;
      state.waveformCache.delete(previous);
      state.waveformCache.delete(dataUrl);
      if (typeof pending.resolve === "function") pending.resolve(dataUrl);
      if (pending.forSave) return;

      if (state.selectedMapEntryOrder === entry.order) {
        void openSampleEditor(entry);
      }
    }

    function requestManifestPickFromNative(options = {}) {
      if (!getNativeBackend()) return Promise.resolve(null);
      const requestId = (Number(state.manifestPickRequestSeq) || 0) + 1;
      state.manifestPickRequestSeq = requestId;
      const timeoutMs = Math.max(1000, Math.round(Number(options?.timeoutMs) || 25000));
      const currentPath = String(options?.currentPath || getPackManifestFilePath() || getPackManifestBasePath()).trim();
      const mode = String(options?.mode || "open").trim().toLowerCase() === "save" ? "save" : "open";
      const defaultName = String(options?.defaultName || "").trim();
      return new Promise((resolve) => {
        const timeoutId = window.setTimeout(() => {
          const pending = state.pendingManifestPickRequests.get(requestId);
          if (!pending) return;
          state.pendingManifestPickRequests.delete(requestId);
          resolve(null);
        }, timeoutMs);

        state.pendingManifestPickRequests.set(requestId, { resolve, timeoutId });
        const emitted = emitNativeEvent("pick_instrument_manifest", {
          requestId,
          currentPath,
          mode,
          defaultName
        });
        if (!emitted) {
          const pending = state.pendingManifestPickRequests.get(requestId);
          if (pending) {
            window.clearTimeout(pending.timeoutId);
            state.pendingManifestPickRequests.delete(requestId);
          }
          resolve(null);
        }
      });
    }

    function requestDestinationFolderFromNative(options = {}) {
      if (!getNativeBackend()) return Promise.resolve("");
      const requestId = (Number(state.destinationFolderRequestSeq) || 0) + 1;
      state.destinationFolderRequestSeq = requestId;
      const timeoutMs = Math.max(1000, Math.round(Number(options?.timeoutMs) || 25000));
      const currentPath = normalizeManifestPathInput(options?.currentPath || el.autoDestination?.value || "");
      return new Promise((resolve) => {
        const timeoutId = window.setTimeout(() => {
          const pending = state.pendingDestinationFolderRequests.get(requestId);
          if (!pending) return;
          state.pendingDestinationFolderRequests.delete(requestId);
          resolve("");
        }, timeoutMs);

        state.pendingDestinationFolderRequests.set(requestId, { resolve, timeoutId });
        const emitted = emitNativeEvent("pick_destination_folder", {
          requestId,
          currentPath
        });
        if (!emitted) {
          const pending = state.pendingDestinationFolderRequests.get(requestId);
          if (pending) {
            window.clearTimeout(pending.timeoutId);
            state.pendingDestinationFolderRequests.delete(requestId);
          }
          resolve("");
        }
      });
    }

    function handleInstrumentManifestPickedPayload(payload) {
      const info = (payload && typeof payload === "object" && !Array.isArray(payload))
        ? payload
        : null;
      const requestId = Math.round(Number(info?.requestId));
      if (!Number.isFinite(requestId)) return;
      const pending = state.pendingManifestPickRequests.get(requestId);
      if (!pending) return;
      state.pendingManifestPickRequests.delete(requestId);
      window.clearTimeout(pending.timeoutId);
      pending.resolve({
        success: !!info?.success,
        path: String(info?.path || "").trim(),
        fileName: String(info?.fileName || "").trim(),
        text: String(info?.text || ""),
        message: String(info?.message || "").trim(),
        nativeLoaded: !!info?.nativeLoaded,
        format: String(info?.format || "").trim().toLowerCase()
      });
    }

    function requestGraphicPickFromNative(timeoutMs = 25000) {
      if (!getNativeBackend()) return Promise.resolve(null);
      const requestId = (Number(state.graphicPickRequestSeq) || 0) + 1;
      state.graphicPickRequestSeq = requestId;
      return new Promise((resolve) => {
        const timeoutId = window.setTimeout(() => {
          const pending = state.pendingGraphicPickRequests.get(requestId);
          if (!pending) return;
          state.pendingGraphicPickRequests.delete(requestId);
          resolve(null);
        }, Math.max(1000, Math.round(Number(timeoutMs) || 25000)));

        state.pendingGraphicPickRequests.set(requestId, { resolve, timeoutId });
        const emitted = emitNativeEvent("pick_graphic_file", {
          requestId,
          currentPath: state.wallpaperSourcePath || getWallpaperManifestAbsolutePath() || getPackManifestBasePath()
        });
        if (!emitted) {
          const pending = state.pendingGraphicPickRequests.get(requestId);
          if (pending) {
            window.clearTimeout(pending.timeoutId);
            state.pendingGraphicPickRequests.delete(requestId);
          }
          resolve(null);
        }
      });
    }

    function handleNativeGraphicFilePickedPayload(payload) {
      const info = (payload && typeof payload === "object" && !Array.isArray(payload))
        ? payload
        : null;
      const requestId = Math.round(Number(info?.requestId));
      if (!Number.isFinite(requestId)) return;
      const pending = state.pendingGraphicPickRequests.get(requestId);

      });
    }

    function requestGraphicDataFromNative(path, timeoutMs = 4000) {
      const normalizedPath = normalizeManifestPathInput(path);
      if (!normalizedPath || !getNativeBackend()) return Promise.resolve("");
      const requestId = (Number(state.graphicDataRequestSeq) || 0) + 1;
      state.graphicDataRequestSeq = requestId;
      return new Promise((resolve) => {
        const timeoutId = window.setTimeout(() => {
          const pending = state.pendingGraphicDataRequests.get(requestId);
          if (!pending) return;
          state.pendingGraphicDataRequests.delete(requestId);
          resolve("");
        }, Math.max(800, Math.round(Number(timeoutMs) || 4000)));

        state.pendingGraphicDataRequests.set(requestId, { resolve, timeoutId, path: normalizedPath });
        const emitted = emitNativeEvent("graphic_data_get", { requestId, path: normalizedPath });
        if (!emitted) {
          const pending = state.pendingGraphicDataRequests.get(requestId);
          if (pending) {
            window.clearTimeout(pending.timeoutId);
            state.pendingGraphicDataRequests.delete(requestId);
          }
          resolve("");
        }
      });

    function handleGraphicDataPayload(payload) {
      const info = (payload && typeof payload === "object" && !Array.isArray(payload))
        ? payload
        : null;
      const requestId = Math.round(Number(info?.requestId));
      if (!Number.isFinite(requestId)) return;
      const pending = state.pendingGraphicDataRequests.get(requestId);
      if (!pending) return;
      state.pendingGraphicDataRequests.delete(requestId);
      window.clearTimeout(pending.timeoutId);
      const dataUrl = info?.success ? String(info?.dataUrl || "").trim() : "";
      pending.resolve(dataUrl);
    }

    function applyPickedWallpaper({ sourcePath = "", fileName = "", dataUrl = "" } = {}) {
      const normalizedSourcePath = normalizeManifestPathInput(sourcePath);
      const normalizedFileName = String(fileName || "").trim() || normalizedSourcePath.split("/").pop() || "wallpaper";
      const normalizedDataUrl = String(dataUrl || "").trim();
      state.wallpaperSourcePath = normalizedSourcePath;
      state.wallpaperSourceFileName = normalizedFileName;
      state.wallpaperAssetPath = buildWallpaperAssetPath(normalizedFileName);
      state.wallpaperDataUrl = normalizedDataUrl;
      updateWallpaperField();
      logWallpaperDebug("picked", `inputSource=${JSON.stringify(normalizedSourcePath)}`);
      applyPlayerWallpaperVisual(normalizedDataUrl);
      ensureSessionStateWritable("wallpaper-update");
      scheduleSessionStateSave(250);
    }

    function getEntryManifestAbsolutePathCandidates(entry) {
      if (!entry) return [];
      const relativePath = String(entry.manifestPath || "").trim();
      if (!relativePath) return [];
      if (/^[A-Za-z]:\//.test(relativePath) || relativePath.startsWith("/")) {
        return [relativePath.replace(/\\/g, "/")];
      }

      const baseCandidates = [];
      const pushBase = (value) => {
        const candidate = String(value || "").trim().replace(/\\/g, "/").replace(/\/+$/, "");
        if (!candidate) return;
        if (!baseCandidates.includes(candidate)) baseCandidates.push(candidate);
      };

      pushBase(entry.manifestBasePath);
      if (Array.isArray(entry.manifestBasePaths)) {
        entry.manifestBasePaths.forEach((value) => pushBase(value));
      }

      const ownerSet = getKeyswitchSetById(entry.mapSetId);
      if (ownerSet) {
        pushBase(ownerSet.manifestBasePath);
        const ownerSourcePath = String(ownerSet.sourcePath || "").trim();
        if (ownerSourcePath) {
          getKeyswitchImportBasePathCandidates(ownerSourcePath).forEach((value) => pushBase(value));
        }
      }

      const manifestBasePath = getPackManifestBasePath();
      const destinationPath = String(el.autoDestination?.value || "").trim();
      if (manifestBasePath) {
        pushBase(`${manifestBasePath}/Keyswitches`);
        pushBase(manifestBasePath);
      }
      if (destinationPath) {
        pushBase(`${destinationPath}/Keyswitches`);
        pushBase(destinationPath);
      }

      const resolvedPaths = [];
      const pushResolved = (path) => {
        const normalized = normalizeManifestPathInput(path);
        if (!normalized) return;
        if (!resolvedPaths.includes(normalized)) resolvedPaths.push(normalized);
      };

      baseCandidates.forEach((base) => {
        pushResolved(resolveManifestAssetPath(base, relativePath));
      });

      const fileNameOnly = normalizeManifestPathInput(relativePath).split("/").pop() || "";
      if (fileNameOnly) {
        baseCandidates.forEach((base) => {
          pushResolved(resolveManifestAssetPath(base, fileNameOnly));
          pushResolved(resolveManifestAssetPath(base, `Audio/${fileNameOnly}`));
          pushResolved(resolveManifestAssetPath(base, `samples/${fileNameOnly}`));
          pushResolved(resolveManifestAssetPath(base, `Samples/${fileNameOnly}`));
        });
      }

      return resolvedPaths;
    }

    function getEntryManifestAbsolutePath(entry) {
      const candidates = getEntryManifestAbsolutePathCandidates(entry);
      return candidates[0] || "";
    }

    function getEntryHydrationKey(entry) {
      if (!entry) return "";
      if (Number.isFinite(entry.order)) return `order:${Math.round(entry.order)}`;
      const root = Number.isFinite(entry.rootMidi) ? Math.round(entry.rootMidi) : -1;
      const layer = Number.isFinite(entry.velocityLayer) ? Math.round(entry.velocityLayer) : -1;
      const rr = Number.isFinite(entry.rrIndex) ? Math.round(entry.rrIndex) : -1;
      const fileName = String(entry.fileName || "").trim();
      return `${root}:${layer}:${rr}:${fileName}`;
    }

    async function ensureEntrySampleUrl(entry, timeoutMs = 3500) {
      if (!entry || !entry.valid) return "";
      const existing = String(entry.sampleUrl || "").trim();
      if (existing) return existing;

      const hydrationKey = getEntryHydrationKey(entry);
      if (hydrationKey && state.entrySampleHydrationPromises.has(hydrationKey)) {
        return state.entrySampleHydrationPromises.get(hydrationKey);
      }

      const loadPromise = (async () => {
        const fromProcessor = String(await requestSampleDataForEntrySave(entry, Math.max(1000, Math.round(timeoutMs * 0.7))) || "").trim();
        if (fromProcessor) return fromProcessor;

        const absolutePaths = getEntryManifestAbsolutePathCandidates(entry);
        if (!absolutePaths.length) return "";

        for (const absolutePath of absolutePaths) {
          const payload = await requestGraphicDataFromNative(absolutePath, "sample");
          const dataUrl = String(payload?.dataUrl || "").trim();
          if (!dataUrl) continue;

          const previous = String(entry.sampleUrl || "").trim();
          if (previous && previous.startsWith("blob:") && previous !== dataUrl) {
            try { URL.revokeObjectURL(previous); } catch {}
          }
          entry.sampleUrl = dataUrl;
          state.waveformCache.delete(previous);
          state.waveformCache.delete(dataUrl);
          return dataUrl;
        }

        return "";
      })();

      if (hydrationKey) state.entrySampleHydrationPromises.set(hydrationKey, loadPromise);
      try {
        return await loadPromise;
      } finally {
        if (hydrationKey) state.entrySampleHydrationPromises.delete(hydrationKey);
      }
    }

    function getAllMapEntries() {
      const baseEntries = Array.isArray(state.entries) ? state.entries : [];
      const keyswitchEntries = Array.isArray(state.keyswitchSets)
        ? state.keyswitchSets.flatMap((set) => (Array.isArray(set?.entries) ? set.entries : []))
        : [];
      return [...baseEntries, ...keyswitchEntries];
    }

    async function hydrateMissingManifestSampleUrls(maxEntries = 96) {
      const candidates = getAllMapEntries()
        .filter((entry) => (
          entry?.valid
          && !String(entry.sampleUrl || "").trim()
          && !!String(entry.manifestPath || "").trim()
        ))
        .slice(0, Math.max(1, Math.round(Number(maxEntries) || 96)));

      if (!candidates.length) return;
      let cursor = 0;
      const workers = Math.min(4, candidates.length);
      const runWorker = async () => {
        while (cursor < candidates.length) {
          const entry = candidates[cursor];
          cursor += 1;
          if (!entry) continue;
          try {
            await ensureEntrySampleUrl(entry, 3600);
          } catch {
            // Continue hydrating others.
          }
        }
      };
      await Promise.all(Array.from({ length: workers }, () => runWorker()));
      updatePlayerEmptyState();
      renderKeyboardMap(getActiveMapEntries(), true);
    }

    function navigateSampleEditor(direction) {
      const entries = getActiveMapEntries().filter(e => e && e.valid);
      if (!entries.length) return;
      const currentOrder = state.selectedMapEntryOrder;
      const idx = entries.findIndex(e => e.order === currentOrder);
      if (idx < 0) return;
      const nextIdx = idx + direction;
      if (nextIdx < 0 || nextIdx >= entries.length) return;
      openSampleEditor(entries[nextIdx]);
    }

    async function openSampleEditor(entry) {
      if (!entry) return;
      ensureEntryEditorState(entry);
      stopWaveformPlayhead();
      clearLoopCandidates(false);
      state.loopNavVisible = false;
      state.selectedMapEntryOrder = entry.order;
      state.waveformZoom = 1;
      state.waveformRequestId += 1;
      const requestId = state.waveformRequestId;
      const entries = getActiveMapEntries().filter((item) => item && item.valid);
      const entryIndex = entries.findIndex((item) => item.order === entry.order);
      el.sampleNavPrev.disabled = entryIndex <= 0;
      el.sampleNavNext.disabled = entryIndex < 0 || entryIndex >= entries.length - 1;
      syncVelocityCrossfadeControl(entry);
      updateSampleGainLine(entry);
      el.sampleEditorTitle.textContent = entry.fileName;
      el.sampleEditorMeta.textContent = getSampleEditorMeta(entry, getCachedDurationForEntry(entry));
      el.sampleWaveformViewport.scrollLeft = 0;
      updateWaveformScrollControl();
      syncSelectedMapSampleBox();
      updateWaveformZoomButtons();
      updateFineTuneKnob(entry);
      updateLoopCrossfadeKnob();
      updateLoopHandles();
      updateLoopToolButtons();
      drawWaveformMessage("Loading sample data...");

      if (!entry.sampleUrl) {
        let resolved = "";
        try {
          resolved = await ensureEntrySampleUrl(entry, 5200);
        } catch {
          resolved = "";
        }
        if (!resolved) {
          try {
            resolved = String(await requestSampleDataForEntrySave(entry, 5200) || "").trim();
          } catch {
            resolved = "";
          }
        }
        if (!resolved) {
          const requested = requestSampleDataForEntry(entry);
          if (!requested) {
            requestFullSessionStateHydration("sample-editor");
            drawWaveformMessage("Sample data unavailable");
          } else {
            drawWaveformMessage("Waiting for sample data...");
          }
          return;
        }
      }
      drawWaveformMessage("Loading waveform...");

      try {
        const waveform = await getWaveformForEntry(entry);
        if (requestId !== state.waveformRequestId || state.selectedMapEntryOrder !== entry.order) return;
        const constrained = enforceLoopCrossfadeForEntry(entry, state.loopCrossfadeMs, waveform?.durationSec);
        if (constrained) {
          if (constrained.appliedMs !== state.loopCrossfadeMs) {
            state.loopCrossfadeMs = clampLoopCrossfadeMs(constrained.appliedMs);
            updateLoopCrossfadeKnob();
          }
          if (constrained.changed) {
            updateLoopHandles();
            scheduleSessionStateSave(700);
          }
        }
        refreshSelectedSampleMeta();
        drawWaveformPeaks(waveform.peaks, state.waveformZoom);
        updateSampleGainLine(entry);
      } catch {
        if (requestId !== state.waveformRequestId || state.selectedMapEntryOrder !== entry.order) return;
        drawWaveformMessage("Waveform unavailable");
        updateSampleGainLine(entry);
      }
    }

    function renderKeyboardMap(validEntries = getActiveMapEntries(), preserveView = false) {
      updateKeyswitchMapSelector();
      const {
        velocityLayers: matrixVelocityLayers,
