      setupStrumMenu([el.strumRateBtn, el.playerStrumRateBtn], el.strumRateMenu, ".strum-menu-item", (item) => {
        state.strumRateIndex = Math.max(0, Math.min(3, Number(item.dataset.rateIndex) || 0));
      }, "strum-rate");

      setupStrumMenu([el.strumSwingBtn, el.playerStrumSwingBtn], el.strumSwingMenu, ".strum-menu-item", (item) => {
        state.strumSwingPercent = Math.max(0, Math.min(20, Number(item.dataset.swingValue) || 0));
      }, "strum-swing");

      setupStrumMenu([el.strumVelHumanBtn, el.playerStrumVelHumanBtn], el.strumVelHumanMenu, ".strum-menu-item", (item) => {
        state.strumVelocityHumanizePercent = Math.max(0, Math.min(20, Number(item.dataset.velHumanValue) || 0));
      }, "strum-velocity-humanize");

      setupStrumMenu([el.strumTimeHumanBtn, el.playerStrumTimeHumanBtn], el.strumTimeHumanMenu, ".strum-menu-item", (item) => {
        state.strumTimingHumanizeMs = Math.max(0, Math.min(10, Number(item.dataset.timeHumanValue) || 0));
      }, "strum-timing-humanize");

      if (el.strumStepGrid || el.playerStrumStepGrid) {
        const applyVelocityFromPointer = (stepIndex, barIndex, clientY, capturedRect) => {
          const activeStepCount = getStrumVisibleStepCount();
          const index = Math.max(0, Math.min(7, Number(stepIndex) || 0));
          if (index >= activeStepCount) return -1;
          const normalized = 1 - ((clientY - capturedRect.top) / Math.max(1, capturedRect.height));
          const clamped = Math.max(0, Math.min(1, normalized));
          const velocity = Math.max(1, Math.min(127, Math.round(clamped * 127)));
          const subdivisionIndex = Math.max(0, Math.min(STRUM_STEP_MAX_SUBDIVISIONS - 1, Number(barIndex) || 0));
          ensureStrumStepPattern();
          const normalizedStep = normalizeStrumStep(state.strumStepPattern[index]);
          const nextSubVelocities = normalizedStep.subVelocities.slice();
          nextSubVelocities[subdivisionIndex] = velocity;
          state.strumStepPattern[index] = {
            ...normalizedStep,
            subVelocities: nextSubVelocities
          };
          return velocity;
        };

        const updateBarFillVisual = (stepIndex, barIndex, velocity) => {
          [el.strumStepGrid, el.playerStrumStepGrid].forEach((grid) => {
            if (!grid) return;
            const cards = grid.querySelectorAll(".strum-step-card");
            const card = cards[stepIndex];
            if (!card) return;
            const bars = card.querySelectorAll(".strum-step-velocity-bar");
            const bar = bars[barIndex];
            if (!bar) return;
            const fill = bar.querySelector(".strum-step-velocity-fill");
            if (fill instanceof HTMLElement) {
              fill.style.height = `${(velocity / 127) * 100}%`;
            }
          });
        };

        const attachStrumGridHandlers = (grid) => {
          if (!grid) return;

          grid.addEventListener("pointerdown", (ev) => {
            const target = ev.target;
            if (!(target instanceof Element)) return;
            const velocityBar = target.closest(".strum-step-velocity-bar");
            if (!(velocityBar instanceof HTMLElement)) return;
            const velocityBtn = target.closest(".strum-step-velocity-btn");
            if (!(velocityBtn instanceof HTMLButtonElement)) return;
            if (velocityBtn.disabled) return;
            const stepIndex = Number(velocityBtn.dataset.stepIndex);
            const barIndex = Number(velocityBar.dataset.barIndex);
            if (!Number.isFinite(stepIndex)) return;
            if (!Number.isFinite(barIndex)) return;
            ev.preventDefault();
            ensureSessionStateWritable("strum-step-velocity");
            const capturedRect = velocityBtn.getBoundingClientRect();
            const vel = applyVelocityFromPointer(stepIndex, barIndex, ev.clientY, capturedRect);
            if (vel >= 0) updateBarFillVisual(stepIndex, barIndex, vel);

            const onMove = (moveEv) => {
              const v = applyVelocityFromPointer(stepIndex, barIndex, moveEv.clientY, capturedRect);
              if (v >= 0) updateBarFillVisual(stepIndex, barIndex, v);
            };
            const onUp = () => {
              window.removeEventListener("pointermove", onMove);
              window.removeEventListener("pointerup", onUp);
              updateStrumUi();
              emitStrumSettings();
              scheduleSessionStateSave(280);
            };

            window.addEventListener("pointermove", onMove);
            window.addEventListener("pointerup", onUp);
          });

          grid.addEventListener("pointerdown", (ev) => {
            const target = ev.target;
            if (!(target instanceof Element)) return;

            const gapBtn = target.closest(".strum-step-gap");
            if (gapBtn instanceof HTMLButtonElement) {
              ev.preventDefault();
              ev.stopPropagation();
              const action = gapBtn.dataset.gapAction;
              const gapAfterStep = Number(gapBtn.dataset.gapAfterStep);
              if (!Number.isFinite(gapAfterStep)) return;
              ensureSessionStateWritable("strum-step-count");
              ensureStrumStepPattern();
              let newStepCount = getStrumVisibleStepCount();
              if (action === "remove") {
                newStepCount = gapAfterStep + 1;
              } else if (action === "add") {
                newStepCount = gapAfterStep + 2;
              }
              newStepCount = Math.max(1, Math.min(8, newStepCount));
              state.strumSequencerSteps = newStepCount;
              state.strumSequencerMode = newStepCount <= 0 ? 0 : (newStepCount <= 4 ? 1 : 2);
              state.strumEnabled = newStepCount > 0;
              updateStrumUi();
              emitStrumSettings();
              scheduleSessionStateSave(280);
              return;
            }

            const rateItem = target.closest(".strum-step-rate-item");
            if (rateItem instanceof HTMLButtonElement) {
              ev.preventDefault();
              ev.stopPropagation();
              const stepIndex = Math.max(0, Math.min(7, Number(rateItem.dataset.stepIndex) || 0));
              const activeStepCount = getStrumVisibleStepCount();
              if (stepIndex >= activeStepCount) return;
              const rateIndex = Math.max(0, Math.min(4, Number(rateItem.dataset.stepRateIndex) || 0));
              ensureSessionStateWritable("strum-step-rate");
              ensureStrumStepPattern();
              const normalizedStep = normalizeStrumStep(state.strumStepPattern[stepIndex]);
              state.strumStepPattern[stepIndex] = {
                ...normalizedStep,
                rateIndex
              };
              closeStrumMenus();
              updateStrumUi();
              emitStrumSettings();
              scheduleSessionStateSave(280);
              return;
            }

            const rateBtn = target.closest(".strum-step-rate-btn");
            if (rateBtn instanceof HTMLButtonElement) {
              if (rateBtn.disabled) return;
              ev.preventDefault();
              ev.stopPropagation();
              const stepIndex = Number(rateBtn.dataset.stepIndex);
              if (!Number.isFinite(stepIndex)) return;
              const wasOpen = strumRateOverlayStepIndex === stepIndex && !strumRateOverlay.classList.contains("hidden");
              closeStrumMenus();
              if (!wasOpen) {
                showStrumRateOverlay(rateBtn, stepIndex);
                rateBtn.setAttribute("aria-expanded", "true");
              }
              return;
            }

            const keyswitchItem = target.closest(".strum-step-keyswitch-item");
            if (keyswitchItem instanceof HTMLButtonElement) {
              ev.preventDefault();
              ev.stopPropagation();
              const stepIndex = Math.max(0, Math.min(7, Number(keyswitchItem.dataset.stepIndex) || 0));
              const activeStepCount = getStrumVisibleStepCount();
              if (stepIndex >= activeStepCount) return;
              const keyswitchSetId = String(keyswitchItem.dataset.stepKeyswitchId || "").trim();
              ensureSessionStateWritable("strum-step-keyswitch");
              ensureStrumStepPattern();
              const normalizedStep = normalizeStrumStep(state.strumStepPattern[stepIndex]);
              state.strumStepPattern[stepIndex] = {
                ...normalizedStep,
                keyswitchSetId: keyswitchSetId && getKeyswitchSetById(keyswitchSetId) ? keyswitchSetId : ""
              };
              closeStrumMenus();
              updateStrumUi();
              emitStrumSettings();
              scheduleSessionStateSave(280);
              return;
            }

            const keyswitchBtn = target.closest(".strum-step-keyswitch-btn");
            if (keyswitchBtn instanceof HTMLButtonElement) {
              if (keyswitchBtn.disabled) return;
              ev.preventDefault();
              ev.stopPropagation();
              const stepIndex = Number(keyswitchBtn.dataset.stepIndex);
              if (!Number.isFinite(stepIndex)) return;
              const wasOpen = strumKeyswitchOverlayStepIndex === stepIndex && !strumKeyswitchOverlay.classList.contains("hidden");
              closeStrumMenus();
              if (!wasOpen) {
                showStrumKeyswitchOverlay(keyswitchBtn, stepIndex);
                keyswitchBtn.setAttribute("aria-expanded", "true");
              }
            }
          });
        };

        attachStrumGridHandlers(el.strumStepGrid);
        attachStrumGridHandlers(el.playerStrumStepGrid);
      }

      document.addEventListener("click", (ev) => {
        const target = ev.target;
        if (!(target instanceof Element)) return;

        if (!clickedInsideMenu && !clickedMenuButton) closeStrumMenus();
      });
    }

    function syncKeyswitchGainKnob() {
      const knobNode = el.keyswitchGainKnob;
      const knob = state.knobs.keyswitchGain;

      const activeSet = getKeyswitchSetById(state.activeMapSetId);

    function buildKeyswitchEntriesFromManifest(data, options = null) {
      const useVirtualOrder = options?.useVirtualOrder !== false;
      let linearOrder = Math.max(0, Math.round(Number(options?.startOrder) || 0));
      const mapping = Array.isArray(data?.mapping) ? data.mapping : [];
      const entries = [];
      mapping.forEach((bucket, bucketIndex) => {
        const rootMidi = Math.max(0, Math.min(127, Math.round(Number(bucket?.rootMidiNote))));
        if (!Number.isFinite(rootMidi)) return;
        const velocityLayer = Math.max(1, Math.min(5, Math.round(Number(bucket?.velocityLayer) || 3)));
        const variants = Array.isArray(bucket?.rrVariants) && bucket.rrVariants.length
          ? bucket.rrVariants
          : [null];

        variants.forEach((variant, rrIndex) => {
          const variantObj = variant && typeof variant === "object" ? variant : {};
          const fallbackName = `${midiToNote(rootMidi)}_V${velocityLayer}_RR${rrIndex + 1}.wav`;
          const fileName = String(
            variantObj.originalFilename
            || variantObj.path
            || fallbackName
          );
          const manifestPath = normalizeManifestPathInput(variantObj.path || "");
          const sampleDataUrl = String(variantObj.sampleDataUrl || "").trim();
          const loopStartNorm = clamp01(variantObj.loopStartNorm ?? 0);
          const loopEndNorm = clamp01(variantObj.loopEndNorm ?? 1);
          const sampleStartNorm = clamp01(variantObj.sampleStartNorm ?? 0);
          const entry = {
            fileName,
            manifestPath,
            order: useVirtualOrder ? state.nextVirtualOrder : linearOrder,
            sampleUrl: sampleDataUrl,
            sampleDataUrl,
            valid: true,
            noteToken: midiToNote(rootMidi),
            rootMidi,
            velocityLayer,
            rrIndex: Number.isFinite(Number(variantObj.rrIndex))
              ? Math.max(1, Math.round(Number(variantObj.rrIndex)))
              : (variants.length > 1 ? rrIndex + 1 : null),
            loopEnabled: !!variantObj.loopEnabled,
            hasVelocityToken: true,
            hasRRToken: variants.length > 1,
            suffixSerial: bucketIndex + 1,
            reason: "",
            fineTuneCents: clampFineTune(variantObj.fineTuneCents ?? 0),
            sampleStartNorm,
            loopStartNorm,
            loopEndNorm,
            loopFadeInNorm: clamp01(variantObj.loopFadeInNorm ?? loopStartNorm)
          };
          if (useVirtualOrder) {
            state.nextVirtualOrder -= 1;
          } else {
            linearOrder += 1;
          }
          entries.push(entry);
        });
      });
      return entries;
    }

    function importKeyswitchPack(file) {
      const reader = new FileReader();
      reader.onload = () => {
        try {
          ensureSessionStateWritable("import-keyswitch");
          const data = JSON.parse(String(reader.result || "{}"));
          const entries = buildKeyswitchEntriesFromManifest(data);
          if (!entries.length) {
            setStatus(el.setupStatus, `No mapping data found in ${file.name}.`, "warn");
            return;
          }

          const sourceFilePath = (file && typeof file.path === "string") ? String(file.path).trim() : "";
          const baseCandidates = getKeyswitchImportBasePathCandidates(sourceFilePath);
          let importedManifestBasePath = "";
          entries.forEach((entry) => {
            if (!entry || typeof entry !== "object") return;
            const manifestPathRaw = normalizeManifestPathInput(entry.manifestPath || "");
            if (!manifestPathRaw) return;
            const manifestPathNormalized = manifestPathRaw;
            if (/^[A-Za-z]:\//.test(manifestPathNormalized) || manifestPathNormalized.startsWith("/")) {
              entry.manifestPath = manifestPathNormalized;
              return;
            }
            const basePath = selectKeyswitchImportBasePathForRelativePath(manifestPathNormalized, baseCandidates);
            const absolutePath = resolveManifestAssetPath(basePath, manifestPathNormalized);
            if (!absolutePath) return;
            entry.manifestPath = absolutePath;
            entry.manifestBasePath = basePath;
            entry.manifestBasePaths = [...baseCandidates];
            if (!importedManifestBasePath && basePath) importedManifestBasePath = basePath;
          });

          if (!importedManifestBasePath && baseCandidates.length) {
            importedManifestBasePath = baseCandidates[0];
          }
          if (importedManifestBasePath && !getPackManifestBasePath()) {
            state.packManifestBasePath = importedManifestBasePath;
          }

          const rawKey = String(
            data?.keyswitchKey
            || data?.key
            || ""
          ).trim();
          const normalizedKey = normalizeKeyswitchKey(rawKey, suggestUnusedKeyswitchMidi());
          const setName = String(data?.instrumentName || stripFileExtension(file.name) || "Keyswitch").trim();
          const set = {
            id: `ks_${Date.now()}_${Math.random().toString(36).slice(2, 7)}`,
            name: setName,
            key: normalizedKey.key,
            keyMidi: normalizedKey.keyMidi,
            loopPlaybackEnabled: data?.loopPlaybackEnabled !== false,
            gainDb: clampKeyswitchGainDb(data?.gainDb ?? 0),
            playbackMode: normalizeKeyswitchTriggerModeName(setName) !== "manual"
              ? "oneshot"
              : normalizeKeyswitchPlaybackMode(data?.playbackMode),
            openStringMidis: normalizeOpenStringMidiList(
              data?.openStringMidis
              ?? data?.settings?.openStringMidis
            ),
            openStringColorsByMidi: normalizeOpenStringColorMap(
              data?.openStringColorsByMidi
              ?? data?.settings?.openStringColorsByMidi,
              normalizeOpenStringMidiList(
                data?.openStringMidis
                ?? data?.settings?.openStringMidis
              )
            ),
            sourceFile: file.name,
            sourcePath: sourceFilePath,
            manifestBasePath: importedManifestBasePath,
            entries,
            manualRanges: extractManualRangesFromManifestMapping(data?.mapping)
          };
          set.entries.forEach((entry) => {
            entry.mapSetId = set.id;
          });

          state.keyswitchSets.push(set);
          state.activeMapSetId = set.id;
          updateKeyswitchMapSelector();
          renderKeyboardMap(undefined, true);
          const duplicates = collectDuplicateKeyswitchKeys();
          if (duplicates.has(set.keyMidi)) {
            setStatus(el.setupStatus, `Imported keyswitch "${set.name}" with duplicate key ${set.key}. Change it in Keyboard Map.`, "warn");
          } else {
            setStatus(el.setupStatus, `Imported keyswitch "${set.name}" (${set.key}) with ${entries.length} sample slot(s).`, "ok");
          }
          scheduleSessionStateSave(350);
          void flushSessionStateToNative(false);
        } catch {
          setStatus(el.setupStatus, `Could not parse keyswitch file ${file.name}.`, "bad");
        }
      };
      reader.readAsText(file);
    }

    function formatKnobValue(v, unit, decimals) {
      const n = Number(v);
      const fixed = decimals !== null ? n.toFixed(decimals) : (Number.isInteger(n) ? String(n) : n.toFixed(2));
      return unit ? `${fixed} ${unit}` : fixed;
    }

    function schedulePlayerControlsAutoHide(delayMs = 3000) {
      if (!el.playerControls) return;
      clearPlayerControlsHideTimer();
      playerControlsHideTimer = window.setTimeout(() => {
        playerControlsHideTimer = 0;
        if (playerControlsHovering) return;

        setPlayerControlsVisible(false);
      }, Math.max(0, Number(delayMs) || 0));
    }

    function pulsePlayerControlsVisibility() {
      if (!el.playerControls) return;
      setPlayerControlsVisible(true);
      clearPlayerControlsHideTimer();
      if (!playerControlsHovering && playerControlsDragging === 0) {
        schedulePlayerControlsAutoHide(3000);
      }

    function beginPlayerControlsDrag() {
      if (!el.playerControls) return;
      playerControlsDragging += 1;
      setPlayerControlsVisible(true);
      clearPlayerControlsHideTimer();
    }

    function endPlayerControlsDrag() {
      if (!el.playerControls) return;
      playerControlsDragging = Math.max(0, playerControlsDragging - 1);
      if (!playerControlsHovering && playerControlsDragging === 0) {
        schedulePlayerControlsAutoHide(3000);

    function setupPlayerControlsVisibility() {

    function updatePerformanceWheelVisuals() {
      const mod = Math.max(0, Math.min(1, Number(state.modWheelValue) || 0));
      const expression = Math.max(0, Math.min(1, Number(state.expressionValue) || 0));
      if (el.playerModWheelTape) {
        const y = (0.5 - mod) * 120;
        el.playerModWheelTape.style.transform = `translateY(${y}px)`;
      }
      if (el.playerPitchWheelTape) {
        const y = (0.5 - expression) * 120;
        el.playerPitchWheelTape.style.transform = `translateY(${y}px)`;
      }
      if (el.playerModWheelSlot) el.playerModWheelSlot.setAttribute("aria-valuenow", mod.toFixed(3));
      if (el.playerPitchWheelSlot) el.playerPitchWheelSlot.setAttribute("aria-valuenow", expression.toFixed(3));
    }

    function setupPerformanceWheels() {
      function bindWheel(slot, mode) {
        if (!slot) return;
        let dragging = false;
        let pointerId = null;
        let lastY = 0;
        let returnAnim = 0;
        const sensitivity = 0.008;

        function clampValue(v) {
          const n = Number(v) || 0;
          if (mode === "expression") return Math.max(0, Math.min(1, n));
          return Math.max(0, Math.min(1, n));
        }

        function getValue() {
          return mode === "expression" ? state.expressionValue : state.modWheelValue;
        }

        function setValue(next) {
          const value = clampValue(next);
          if (mode === "expression") {
            state.expressionValue = value;
            emitNativePreviewCc(11, Math.round(value * 127));
            emitNativePerformanceWheelSet("expression", value, "change");
          } else {
            state.modWheelValue = value;
            emitNativePreviewCc(1, Math.round(value * 127));
            emitNativePerformanceWheelSet("mod", value, "change");
          }
          updatePerformanceWheelVisuals();
        }

        function stopReturnAnim() {
          if (!returnAnim) return;
          window.cancelAnimationFrame(returnAnim);
          returnAnim = 0;
        }

        slot.addEventListener("pointerdown", (ev) => {
          if (typeof ev.button === "number" && ev.button > 0) return;
          ev.preventDefault();
          stopReturnAnim();
          dragging = true;
          pointerId = ev.pointerId;
          lastY = ev.clientY;
          slot.classList.add("dragging");
          emitNativePerformanceWheelSet(mode === "expression" ? "expression" : "mod", getValue(), "begin");
          if (slot.setPointerCapture) {
            try {
              slot.setPointerCapture(pointerId);
            } catch {}
          }
        });

        slot.addEventListener("pointermove", (ev) => {
          if (!dragging || ev.pointerId !== pointerId) return;
          const dy = lastY - ev.clientY;
          lastY = ev.clientY;
          setValue(getValue() + (dy * sensitivity));
        });

        function release(ev) {
          if (!dragging) return;
          if (ev && ev.pointerId !== pointerId) return;
          dragging = false;
          slot.classList.remove("dragging");
          if (slot.releasePointerCapture && pointerId !== null && slot.hasPointerCapture && slot.hasPointerCapture(pointerId)) {
            try {
              slot.releasePointerCapture(pointerId);
            } catch {}
          }
          pointerId = null;
          emitNativePerformanceWheelSet(mode === "expression" ? "expression" : "mod", getValue(), "end");
          scheduleSessionStateSave(700);
        }

        slot.addEventListener("pointerup", release);
        slot.addEventListener("pointercancel", release);
        slot.addEventListener("lostpointercapture", release);
      }

      bindWheel(el.playerModWheelSlot, "mod");
      bindWheel(el.playerPitchWheelSlot, "expression");
      updatePerformanceWheelVisuals();
    }

    function setupPlayerKeyboardSizing() {
      window.addEventListener("resize", () => {
        if (playerKeyboardResizeRaf) return;
        playerKeyboardResizeRaf = window.requestAnimationFrame(() => {
          playerKeyboardResizeRaf = 0;

        });
      });
    }

    function setupKnobs() {
      const nodes = Array.from(document.querySelectorAll(".knob"));
      nodes.forEach((node) => {
        const isPlayerControlKnob = !!node.closest(".player-controls");
        const parsedMin = Number(node.dataset.min);
        const parsedMax = Number(node.dataset.max);
        const min = Number.isFinite(parsedMin) ? parsedMin : 0;
        const max = Number.isFinite(parsedMax) ? parsedMax : 1;
        const maxValue = Math.max(min, max);
        const parsedStep = Number(node.dataset.step ?? 1);
        const step = Number.isFinite(parsedStep) && parsedStep > 0 ? parsedStep : 1;
        const unit = node.dataset.unit || "";
        const decimals = node.dataset.decimals ? Number(node.dataset.decimals) : null;
        const param = node.dataset.param || `knob_${Math.random().toString(16).slice(2)}`;
        const pointer = node.querySelector(".knob-pointer");
        const out = node.querySelector(".knob-value");
        const labelNode = node.querySelector(".knob-label");
        const showValueTooltip = param === "gain" || node.dataset.tooltipValue === "true";
        const tooltipLabel = param === "gain"
          ? "Output gain"
          : ((labelNode ? labelNode.textContent : "") || param).trim();
        const initialValue = Number(node.dataset.value);
        let value = Number.isFinite(initialValue) ? initialValue : min;

        function clamp(v) {
          const raw = Number(v);
          const safe = Number.isFinite(raw) ? raw : min;
          const snapped = min + (Math.round((safe - min) / step) * step);
          return Math.min(maxValue, Math.max(min, snapped));
        }

        function angle(v) {
          const t = (v - min) / (maxValue - min || 1);
          return -135 + t * 270;
        }

        function set(v, emit = true) {
          value = clamp(v);
          node.dataset.value = String(value);
          if (pointer) pointer.style.transform = `translate(-50%, -100%) rotate(${angle(value)}deg)`;
          const formatted = formatKnobValue(value, unit, decimals);
          if (out) out.textContent = formatted;
          if (showValueTooltip) {
            const tooltip = `${tooltipLabel}: ${formatted}`;
            node.dataset.tooltip = tooltip;
            node.setAttribute("aria-label", tooltip);
          }
          if (emit) {
            node.dispatchEvent(new CustomEvent("knobchange", { detail: { param, value } }));
          }
        }

        node.addEventListener("wheel", (ev) => {
          ev.preventDefault();
          const dir = ev.deltaY < 0 ? 1 : -1;
          set(value + dir * step);
          if (isPlayerControlKnob) pulsePlayerControlsVisibility();
        }, { passive: false });

        node.addEventListener("pointerdown", (ev) => {
          ev.preventDefault();
          if (isPlayerControlKnob) beginPlayerControlsDrag();
          const startY = ev.clientY;
          const startValue = value;
          const sensitivity = (maxValue - min) / 180;

          function move(moveEv) {
            const delta = startY - moveEv.clientY;
            set(startValue + delta * sensitivity);
          }

          function up() {
            window.removeEventListener("pointermove", move);
            window.removeEventListener("pointerup", up);
            window.removeEventListener("pointercancel", up);
            if (isPlayerControlKnob) endPlayerControlsDrag();
          }

          window.addEventListener("pointermove", move);
          window.addEventListener("pointerup", up);
          window.addEventListener("pointercancel", up);
        });

        node.addEventListener("dblclick", (ev) => {
          if (param !== "gain" && param !== "keyswitchGain") return;
          ev.preventDefault();
          set(0);
        });

        set(value, false);
        state.knobs[param] = {
          get: () => value,
          set,
          emit: () => set(value, true)
        };
      });
    }

    function getKnobNumericValue(param, fallback) {
      const knob = state.knobs[param];
      if (!knob || typeof knob.get !== "function") return fallback;
      const value = Number(knob.get());
      return Number.isFinite(value) ? value : fallback;
    }

    function syncAllKnobValues() {
      Object.values(state.knobs).forEach((knob) => {
        if (!knob || typeof knob.emit !== "function") return;
        knob.emit();
      });
    }

    function setupPlayerAdsrSliders() {
      const sliderNodes = Array.from(document.querySelectorAll(".player-adsr-slider[data-param]"));
      if (!sliderNodes.length) return;

      sliderNodes.forEach((node) => {
        const param = node.dataset.param || "";
        if (!param) return;

        const parsedMin = Number(node.min);
        const parsedMax = Number(node.max);
        const parsedStep = Number(node.step);
        const min = Number.isFinite(parsedMin) ? parsedMin : 0;
        const max = Number.isFinite(parsedMax) ? parsedMax : 1;
        const step = Number.isFinite(parsedStep) && parsedStep > 0 ? parsedStep : 1;

        const clampSliderValue = (value) => {
          const safe = Number.isFinite(value) ? value : min;
          const snapped = min + (Math.round((safe - min) / step) * step);
          return Math.min(max, Math.max(min, snapped));
        };

        const setSliderValue = (value, options = {}) => {
          const nextValue = clampSliderValue(value);
          node.value = String(nextValue);
          if (options.applyToKnob !== false) {
            const knob = state.knobs[param];
            if (knob && typeof knob.set === "function") knob.set(nextValue);
          }
          return nextValue;
        };

        const syncFromKnob = () => {
          const knob = state.knobs[param];
          if (!knob || typeof knob.get !== "function") return;
          const nextValue = Number(knob.get());
          if (!Number.isFinite(nextValue)) return;
          setSliderValue(nextValue, { applyToKnob: false });
        };

        node.addEventListener("input", () => {
          setSliderValue(Number(node.value));
          pulsePlayerControlsVisibility();
        });
        node.addEventListener("change", () => setSliderValue(Number(node.value)));
        node.addEventListener("pointerdown", (event) => {
          event.preventDefault();
          beginPlayerControlsDrag();
          pulsePlayerControlsVisibility();

          const range = Math.max(step, max - min);
          const precisionDivisor = event.shiftKey ? 560 : 320;
          const unitsPerPixel = Math.max(step, range / precisionDivisor);
          const startY = event.clientY;
          const startValue = Number(node.value);

          const move = (moveEvent) => {
            const delta = startY - moveEvent.clientY;
            setSliderValue(startValue + (delta * unitsPerPixel));
            pulsePlayerControlsVisibility();
          };

          const release = () => {
            window.removeEventListener("pointermove", move);
            window.removeEventListener("pointerup", release);
            window.removeEventListener("pointercancel", release);
            endPlayerControlsDrag();
          };

          window.addEventListener("pointermove", move);
          window.addEventListener("pointerup", release);
          window.addEventListener("pointercancel", release);
        });
        node.addEventListener("keydown", () => pulsePlayerControlsVisibility());

        const knobNode = document.querySelector(`.knob[data-param="${param}"]`);
        if (knobNode) knobNode.addEventListener("knobchange", syncFromKnob);
        syncFromKnob();
      });
    }

    function setupAmpEnvelopeBridge() {

    function readFileAsDataUrl(fileLike) {
      return new Promise((resolve, reject) => {
        if (!(fileLike instanceof Blob)) {
          reject(new Error("invalid-file"));
          return;
        }
        const reader = new FileReader();
        reader.onerror = () => reject(reader.error || new Error("read-failed"));
        reader.onload = () => resolve(String(reader.result || ""));
        reader.readAsDataURL(fileLike);
      });
    }

    function cacheEntrySampleDataUrlFromFile(entry, fileLike) {
      if (!entry || !entry.valid || !(fileLike instanceof Blob)) return;
      state.pendingCacheCount = (state.pendingCacheCount || 0) + 1;
      readFileAsDataUrl(fileLike)
        .then((dataUrl) => {
          if (!entry.valid) return;
          const normalized = String(dataUrl || "").trim();
          if (!normalized.startsWith("data:")) return;
          entry.sampleDataUrl = normalized;
        })
        .catch(() => {})
        .finally(() => {
          state.pendingCacheCount = Math.max(0, (state.pendingCacheCount || 0) - 1);
          if (state.pendingCacheCount <= 0) {
            scheduleSessionStateSave(200);
          }
        });
    }

    async function ensureEntryRuntimeSampleDataUrl(entry) {
      if (!entry || !entry.valid) return "";
      const cached = String(entry.sampleDataUrl || "").trim();
      if (cached.startsWith("data:")) return cached;

      let sourceUrl = String(entry.sampleUrl || "").trim();
      if (!sourceUrl) {
        sourceUrl = String(await requestSampleDataForEntrySave(entry, 2600) || "").trim();
        if (sourceUrl) entry.sampleUrl = sourceUrl;
      }
      if (!sourceUrl) return "";

      if (sourceUrl.startsWith("data:")) {
        entry.sampleDataUrl = sourceUrl;
        return sourceUrl;
      }

      const dataUrl = String(await dataUrlFromAnyUrl(sourceUrl) || "").trim();
      if (!dataUrl.startsWith("data:")) return "";
      entry.sampleDataUrl = dataUrl;
      return dataUrl;
    }

    async function ensureRuntimeSampleDataForSession(maxEntries = 192) {
      const limit = Math.max(1, Math.round(Number(maxEntries) || 192));
      const candidates = getAllMapEntries()
        .filter((entry) => {
          if (!entry || !entry.valid) return false;
          if (String(entry.sampleDataUrl || "").trim().startsWith("data:")) return false;
          const sourceUrl = String(entry.sampleUrl || "").trim();
          if (!sourceUrl) return false;
          const manifestPath = String(entry.manifestPath || "").trim();
          return !manifestPath;
        })
        .slice(0, limit);
      if (!candidates.length) return;
      let cursor = 0;
      const workers = Math.min(4, candidates.length);
      const runWorker = async () => {
        while (cursor < candidates.length) {
          const entry = candidates[cursor];
          cursor += 1;
          if (!entry) continue;
          try { await ensureEntryRuntimeSampleDataUrl(entry); } catch {}
        }
      };
      await Promise.all(Array.from({ length: workers }, () => runWorker()));
    }

      ));

      ));

    function assignImplicitVelocityLayers() {
      const groups = new Map();
      state.entries.forEach((entry) => {
        if (!entry.valid) return;
        if (entry.hasVelocityToken || entry.hasRRToken) return;
        const key = String(entry.rootMidi);
        if (!groups.has(key)) groups.set(key, []);
        groups.get(key).push(entry);
      });

      groups.forEach((group) => {
        if (group.length === 1) {
          group[0].velocityLayer = 3;
          group[0].rrIndex = null;
          return;
        }

        group.sort((a, b) => {
          const aSuffix = a.suffixSerial ?? -1;
          const bSuffix = b.suffixSerial ?? -1;
          if (aSuffix !== bSuffix) return aSuffix - bSuffix;
          return a.order - b.order;
        });

        const maxIndex = Math.max(1, group.length - 1);
        group.forEach((entry, index) => {
          entry.velocityLayer = 1 + Math.round((index * 4) / maxIndex);
          entry.rrIndex = null;
        });
      });
    }

    function getKeyboardMapBounds(validEntries) {
      if (!validEntries.length) {
        return { minStart: 0, maxStart: 120 };
      }
      const roots = validEntries.map((entry) => entry.rootMidi);
      const minRoot = Math.min(...roots);
      const maxRoot = Math.max(...roots);
      const minStart = Math.max(0, (Math.floor(minRoot / 12) * 12) - 12);
      const maxStart = Math.min(120, (Math.floor(maxRoot / 12) * 12) + 12);
      return {
        minStart,
        maxStart: Math.max(minStart, maxStart)
      };
    }

    function getMappedSampleRoots(validEntries = state.entries) {
      return Array.from(new Set(
        validEntries
          .filter((entry) => entryHasPlayableSource(entry))
          .map((entry) => entry.rootMidi)
      )).sort((a, b) => a - b);
    }

    function getRootRangeLimits(rootMidi, sortedRoots) {
      const idx = sortedRoots.indexOf(rootMidi);
      if (idx < 0) {
        return { minLow: Math.max(0, rootMidi), maxHigh: Math.min(127, rootMidi) };
      }
      const prevRoot = idx > 0 ? sortedRoots[idx - 1] : null;
      const nextRoot = idx < sortedRoots.length - 1 ? sortedRoots[idx + 1] : null;
      return {
        minLow: prevRoot === null ? 0 : prevRoot + 1,
        maxHigh: nextRoot === null ? 127 : nextRoot - 1
      };
    }

    function getResolvedRootRanges(validEntries = state.entries, manualRanges = state.manualRootRanges) {
      const roots = getMappedSampleRoots(validEntries);
      const rootSet = new Set(roots);
      const store = (manualRanges && typeof manualRanges === "object") ? manualRanges : state.manualRootRanges;
      Object.keys(store).forEach((key) => {
        const midi = Number(key);
        if (!rootSet.has(midi)) delete store[key];
      });

      const rangesByRoot = new Map();
      roots.forEach((rootMidi, idx) => {
        const { minLow, maxHigh } = getRootRangeLimits(rootMidi, roots);
        const defaultLow = idx === 0 ? rootMidi : roots[idx - 1] + 1;
        const defaultHigh = rootMidi;
        const saved = store[rootMidi] || {};
        const lowRaw = Number.isFinite(saved.low) ? Math.round(saved.low) : defaultLow;
        const highRaw = Number.isFinite(saved.high) ? Math.round(saved.high) : defaultHigh;
        const low = Math.max(minLow, Math.min(rootMidi, lowRaw));
        const high = Math.max(rootMidi, Math.min(maxHigh, highRaw));
        store[rootMidi] = { low, high };
        rangesByRoot.set(rootMidi, { low, high, minLow, maxHigh });
      });

      return { roots, rangesByRoot };
    }

    function setManualRangeForRoot(rootMidi, low, high, sortedRoots = null, manualRanges = state.manualRootRanges) {
      const roots = Array.isArray(sortedRoots) ? sortedRoots : getMappedSampleRoots();
      if (!roots.length || !roots.includes(rootMidi)) return null;
      const { minLow, maxHigh } = getRootRangeLimits(rootMidi, roots);
      const clampedLow = Math.max(minLow, Math.min(rootMidi, Math.round(Number(low) || rootMidi)));
      const clampedHigh = Math.max(rootMidi, Math.min(maxHigh, Math.round(Number(high) || rootMidi)));
      const range = { low: clampedLow, high: clampedHigh, minLow, maxHigh };
      const store = (manualRanges && typeof manualRanges === "object") ? manualRanges : state.manualRootRanges;
      store[rootMidi] = { low: range.low, high: range.high };
      scheduleSessionStateSave(700);
      return range;
    }

    function getMapEntryByOrder(order) {
      if (!Number.isFinite(order)) return null;
      const activeEntries = getActiveMapEntries();
      const source = activeEntries.length ? activeEntries : state.entries;
      return source.find((entry) => (
        entry.valid
        && entry.order === order
      )) || null;
    }

    function clampMapMatrixVelocityLayers(v) {
      return Math.max(1, Math.min(8, Math.round(Number(v) || 1)));
    }

    function clampMapMatrixRrColumns(v) {
      return Math.max(1, Math.min(8, Math.round(Number(v) || 1)));
    }

    function clampMapMatrixInterval(v) {
      return Math.max(1, Math.min(12, Math.round(Number(v) || 1)));
    }

    function normalizeMapMatrixState() {
      state.mapMatrixVelocityLayers = clampMapMatrixVelocityLayers(state.mapMatrixVelocityLayers);
      state.mapMatrixRrColumns = clampMapMatrixRrColumns(state.mapMatrixRrColumns);
      state.mapMatrixInterval = clampMapMatrixInterval(state.mapMatrixInterval);
      return {
        velocityLayers: state.mapMatrixVelocityLayers,
        rrColumns: state.mapMatrixRrColumns,
        interval: state.mapMatrixInterval
      };
    }

    function buildIntervalRootsFromRange(lowMidi, highMidi, interval) {
      const low = Math.max(0, Math.min(127, Math.round(Number(lowMidi) || 0)));
      const high = Math.max(low, Math.min(127, Math.round(Number(highMidi) || low)));
      const step = clampMapMatrixInterval(interval);
      const roots = [];
      const seen = new Set();

      for (let midi = low; midi <= high; midi += step) {
        if (seen.has(midi)) continue;
        seen.add(midi);
        roots.push(midi);
      }

      if (!seen.has(high)) roots.push(high);
      return roots;
    }

    function getManualRangeRoots(manualRanges) {
      const source = (manualRanges && typeof manualRanges === "object") ? manualRanges : null;
      if (!source) return [];

      return Object.keys(source)
        .map((key) => Math.round(Number(key)))
        .filter((rootMidi) => Number.isFinite(rootMidi) && rootMidi >= 0 && rootMidi <= 127)
        .sort((a, b) => a - b);
    }

    function getMapMatrixIntervalRoots(entries = getActiveMapEntries(), interval = state.mapMatrixInterval) {
      const step = clampMapMatrixInterval(interval);
      const roots = Array.from(new Set(
        [...(Array.isArray(entries) ? entries : [])]
          .filter((entry) => entry && entry.valid)
          .map((entry) => Math.max(0, Math.min(127, Math.round(Number(entry.rootMidi) || 0))))
      )).sort((a, b) => a - b);

      if (!state.mapMatrixSplitEnabled) {
        if (step <= 1 || !roots.length) return [];
        return buildIntervalRootsFromRange(roots[0], roots[roots.length - 1], step);
      }

      const manualRoots = getManualRangeRoots(getActiveMapManualRanges());
      if (manualRoots.length) return manualRoots;

      if (step <= 1) return buildIntervalRootsFromRange(0, 127, 1);
      if (!roots.length) return buildIntervalRootsFromRange(0, 127, step);

      const splitRoots = buildIntervalRootsFromRange(0, 127, step);
      roots.forEach((rootMidi) => {
        if (!splitRoots.includes(rootMidi)) splitRoots.push(rootMidi);
      });
      splitRoots.sort((a, b) => a - b);
      return splitRoots;
    }

    function isMapMatrixRootMidi(midi, interval = state.mapMatrixInterval, intervalRoots = null) {
      const step = clampMapMatrixInterval(interval);
      const note = Math.max(0, Math.min(127, Math.round(Number(midi) || 0)));
      if (Array.isArray(intervalRoots) && intervalRoots.length) {
        return intervalRoots.includes(note);
      }
      if (step <= 1) return true;
      return note % step === 0;
    }

    function quantizeMidiToMapMatrixRoot(midi, interval = state.mapMatrixInterval, intervalRoots = null) {
      const step = clampMapMatrixInterval(interval);
      const note = Math.max(0, Math.min(127, Math.round(Number(midi) || 0)));
      if (Array.isArray(intervalRoots) && intervalRoots.length) {
        for (let i = 0; i < intervalRoots.length; i += 1) {
          const candidate = Math.max(0, Math.min(127, Math.round(Number(intervalRoots[i]) || 0)));
          if (note <= candidate) return candidate;
        }
        const last = intervalRoots[intervalRoots.length - 1];
        return Math.max(0, Math.min(127, Math.round(Number(last) || 0)));
      }
      if (step <= 1) return note;
      const nextHigher = Math.ceil(note / step) * step;
      if (nextHigher <= 127) return nextHigher;
      return Math.max(0, Math.min(127, Math.floor(127 / step) * step));
    }

    function getMapMatrixStretchSourceRoot(midi, interval = state.mapMatrixInterval, intervalRoots = null) {
      return quantizeMidiToMapMatrixRoot(midi, interval, intervalRoots);
    }

    function getMapMatrixCellKey(rootMidi, velocityLayer, rrIndex) {
      const root = Math.max(0, Math.min(127, Math.round(Number(rootMidi) || 0)));
      const layer = clampMapMatrixVelocityLayers(velocityLayer);
      const rr = clampMapMatrixRrColumns(rrIndex);
      return `${root}:${layer}:${rr}`;
    }

    function getEntryMatrixRrIndex(entry, rrColumns = state.mapMatrixRrColumns) {
      const maxRr = clampMapMatrixRrColumns(rrColumns);
      const raw = Number.isFinite(entry?.rrIndex) ? Math.round(entry.rrIndex) : 1;
      return Math.max(1, Math.min(maxRr, raw || 1));
    }

    function getMapMatrixEntryLookup(entries = getActiveMapEntries(), rrColumns = state.mapMatrixRrColumns) {
      const maxRr = clampMapMatrixRrColumns(rrColumns);
      const lookup = new Map();
      [...(Array.isArray(entries) ? entries : [])]
        .filter((entry) => entry && entry.valid)
        .sort((a, b) => a.order - b.order)
        .forEach((entry) => {
          const rootMidi = Math.max(0, Math.min(127, Math.round(Number(entry.rootMidi) || 0)));
          const layer = clampMapMatrixVelocityLayers(entry.velocityLayer);
          const rr = getEntryMatrixRrIndex(entry, maxRr);
          const cellKey = getMapMatrixCellKey(rootMidi, layer, rr);
          if (!lookup.has(cellKey)) lookup.set(cellKey, entry);
        });
      return lookup;
    }

    function findNextMapMatrixRrSlot(rootMidi, velocityLayer, rrColumns, lookup, startAt = 1) {
      const maxRr = clampMapMatrixRrColumns(rrColumns);
      const start = Math.max(1, Math.min(maxRr, Math.round(Number(startAt) || 1)));
      for (let step = 0; step < maxRr; step += 1) {
        const rr = ((start - 1 + step) % maxRr) + 1;
        const key = getMapMatrixCellKey(rootMidi, velocityLayer, rr);
        if (!lookup.has(key)) return rr;
      }
      return null;
    }

    function getMapMatrixCursorKey(rootMidi, velocityLayer) {
      const activeSetId = String(state.activeMapSetId || "base");
      const root = Math.max(0, Math.min(127, Math.round(Number(rootMidi) || 0)));
      const layer = clampMapMatrixVelocityLayers(velocityLayer);
      return `${activeSetId}:${root}:${layer}`;
    }

    function applyMapMatrixIntervalRanges(entries = getActiveMapEntries()) {
      if (!state.mapMatrixSplitEnabled) return;
      const validEntries = [...(Array.isArray(entries) ? entries : [])]
        .filter((entry) => entry && entry.valid);
      const roots = getMapMatrixIntervalRoots(validEntries, state.mapMatrixInterval);
      const manualRanges = getActiveMapManualRanges();
      if (!manualRanges || typeof manualRanges !== "object") return;

      Object.keys(manualRanges).forEach((key) => {
        delete manualRanges[key];
      });

      if (!roots.length) return;

      roots.forEach((root, idx) => {
        const low = idx === 0 ? root : Math.max(0, Math.min(root, roots[idx - 1] + 1));
        let high = root;
        if (idx === roots.length - 1 && state.allowPitchUpAboveHighest) {
          high = 127;
        }
        manualRanges[root] = { low, high };
      });
    }

    function syncMapMatrixControls() {
      const { velocityLayers, rrColumns, interval } = normalizeMapMatrixState();
      if (el.mapMatrixIntervalInput) el.mapMatrixIntervalInput.value = String(interval);
      if (el.mapMatrixVelInput) el.mapMatrixVelInput.value = String(velocityLayers);
      if (el.mapMatrixRrInput) el.mapMatrixRrInput.value = String(rrColumns);

      if (el.mapMatrixSplitBtn) {
        const splitEnabled = !!state.mapMatrixSplitEnabled;
        el.mapMatrixSplitBtn.classList.toggle("active", splitEnabled);
        el.mapMatrixSplitBtn.textContent = splitEnabled ? "Clear Splits" : "Split";
      }
    }

    function syncMapMatrixStateFromInputs() {
      if (el.mapMatrixIntervalInput) {
        state.mapMatrixInterval = clampMapMatrixInterval(el.mapMatrixIntervalInput.value);
      }
      if (el.mapMatrixVelInput) {
        state.mapMatrixVelocityLayers = clampMapMatrixVelocityLayers(el.mapMatrixVelInput.value);
      }
      if (el.mapMatrixRrInput) {
        state.mapMatrixRrColumns = clampMapMatrixRrColumns(el.mapMatrixRrInput.value);
      }
      normalizeMapMatrixState();
    }

    function applyMapMatrixSplitAll() {
      syncMapMatrixStateFromInputs();
      const { velocityLayers, rrColumns, interval } = normalizeMapMatrixState();
      const activeEntries = getActiveMapEntries().filter((entry) => entry && entry.valid);
      const intervalRoots = getMapMatrixIntervalRoots(activeEntries, interval);
      const occupancy = new Map();

      [...activeEntries]
        .sort((a, b) => (
          a.rootMidi - b.rootMidi
          || a.velocityLayer - b.velocityLayer
          || (getEntryMatrixRrIndex(a, rrColumns) - getEntryMatrixRrIndex(b, rrColumns))
          || a.order - b.order
        ))
        .forEach((entry) => {
          const rawRootMidi = Math.max(0, Math.min(127, Math.round(Number(entry.rootMidi) || 0)));
          const rootMidi = quantizeMidiToMapMatrixRoot(rawRootMidi, interval, intervalRoots);
          const layer = Math.max(1, Math.min(velocityLayers, Math.round(Number(entry.velocityLayer) || 1)));
          let rr = getEntryMatrixRrIndex(entry, rrColumns);
          const preferredKey = getMapMatrixCellKey(rootMidi, layer, rr);
          if (occupancy.has(preferredKey)) {
            const fallback = findNextMapMatrixRrSlot(rootMidi, layer, rrColumns, occupancy, rr + 1);
            if (fallback !== null) rr = fallback;
          }

          entry.rootMidi = rootMidi;
          entry.velocityLayer = layer;
          entry.rrIndex = rrColumns > 1 ? rr : null;
          ensureEntryEditorState(entry);
          occupancy.set(getMapMatrixCellKey(rootMidi, layer, rr), entry);
        });

      state.mapMatrixSplitEnabled = true;
      state.mapMatrixAssignMode = false;
      state.mapMatrixRrCursor = {};
      state.mapMatrixPaintActive = false;
      state.mapMatrixLastPaintCellKey = "";
      applyMapMatrixIntervalRanges(activeEntries);
      syncMapMatrixControls();
      renderKeyboardMap(getActiveMapEntries(), true);
      renderPlayerKeyboard();
      scheduleSessionStateSave(320);
    }

    function tryAssignSelectedEntryToMatrixCell(rootMidi, velocityLayer, rrIndex = 1) {
      if (!state.mapMatrixSplitEnabled) return false;
      const selected = getMapEntryByOrder(state.selectedMapEntryOrder);
      if (!selected) {
        setStatus(el.setupStatus, "Select a sample cell first, then hover to assign.", "warn");
        return false;
      }

      const activeEntries = getActiveMapEntries().filter((entry) => entry && entry.valid);
      if (!activeEntries.includes(selected)) return false;

      const { velocityLayers, rrColumns, interval } = normalizeMapMatrixState();
      const intervalRoots = getMapMatrixIntervalRoots(activeEntries, interval);
      const targetRoot = quantizeMidiToMapMatrixRoot(
        Math.max(0, Math.min(127, Math.round(Number(rootMidi) || selected.rootMidi || 0))),
        interval,
        intervalRoots
      );
      const targetLayer = Math.max(1, Math.min(velocityLayers, Math.round(Number(velocityLayer) || selected.velocityLayer || 1)));
      let targetRr = Math.max(1, Math.min(rrColumns, Math.round(Number(rrIndex) || 1)));
      const sourceRoot = quantizeMidiToMapMatrixRoot(
        Math.max(0, Math.min(127, Math.round(Number(selected.rootMidi) || 0))),
        interval,
        intervalRoots
      );
      const sourceLayer = Math.max(1, Math.min(velocityLayers, Math.round(Number(selected.velocityLayer) || 1)));
      const sourceRr = getEntryMatrixRrIndex(selected, rrColumns);

      const mapLookup = getMapMatrixEntryLookup(activeEntries, rrColumns);
      const sourceKey = getMapMatrixCellKey(sourceRoot, sourceLayer, sourceRr);
      mapLookup.delete(sourceKey);

      const useAutoFillRr = true;
      if (useAutoFillRr && rrColumns > 1) {
        const cursorKey = getMapMatrixCursorKey(targetRoot, targetLayer);
        const cursorStart = Math.max(1, Math.min(rrColumns, Math.round(Number(state.mapMatrixRrCursor[cursorKey]) || 1)));
        const nextSlot = findNextMapMatrixRrSlot(targetRoot, targetLayer, rrColumns, mapLookup, cursorStart);
        if (nextSlot !== null) targetRr = nextSlot;
        state.mapMatrixRrCursor[cursorKey] = (targetRr % rrColumns) + 1;
      }

      const targetKey = getMapMatrixCellKey(targetRoot, targetLayer, targetRr);
      const occupant = mapLookup.get(targetKey) || null;
      const selectedRrBefore = getEntryMatrixRrIndex(selected, rrColumns);
      const selectedAlreadyThere = (
        selected.rootMidi === targetRoot
        && selected.velocityLayer === targetLayer
        && selectedRrBefore === targetRr
      );
      if (selectedAlreadyThere && (!occupant || occupant === selected)) return false;

      if (occupant && occupant !== selected) {
        occupant.rootMidi = sourceRoot;
        occupant.velocityLayer = sourceLayer;
        occupant.rrIndex = rrColumns > 1 ? sourceRr : null;
        ensureEntryEditorState(occupant);
      }

      selected.rootMidi = targetRoot;
      selected.velocityLayer = targetLayer;
      selected.rrIndex = rrColumns > 1 ? targetRr : null;
      ensureEntryEditorState(selected);
      applyMapMatrixIntervalRanges(activeEntries);
      syncVelocityCrossfadeControl(selected);
      renderKeyboardMap(getActiveMapEntries(), true);
      renderPlayerKeyboard();
      scheduleSessionStateSave(280);
      return true;
    }

    function tryAssignFromMapMatrixCell(cell) {
      if (!cell || !state.mapMatrixSplitEnabled || !state.mapMatrixAssignMode) return false;
      const rootMidi = Number(cell.dataset.rootMidi);
      const velocityLayer = Number(cell.dataset.velocityLayer);
      const rrIndex = Number(cell.dataset.rrIndex);
      if (!Number.isFinite(rootMidi) || !Number.isFinite(velocityLayer) || !Number.isFinite(rrIndex)) return false;
      return tryAssignSelectedEntryToMatrixCell(rootMidi, velocityLayer, rrIndex);
    }

    function getNextMapEntryOrder() {
      return getAllMapEntries().reduce((max, entry) => (
        Number.isFinite(entry?.order) ? Math.max(max, Math.round(entry.order)) : max
      ), -1) + 1;
    }

    function hasLoopTokenInFileName(fileName) {
      const stem = String(fileName || "").replace(/\.[^/.]+$/, "");
      if (!stem) return false;
      const parts = stem.split(/[^A-Za-z0-9#]+/).filter(Boolean);
      return parts.some((token) => String(token).toUpperCase() === "L");
    }

    function getImportedSampleFileExtension(fileName, fallback = ".wav") {
      const match = String(fileName || "").trim().match(/\.([^.\\/]+)$/);
      if (!match) return fallback;
      const cleaned = String(match[1] || "").replace(/[^a-z0-9]+/gi, "").toLowerCase();
      return cleaned ? `.${cleaned}` : fallback;
    }

    function sanitizeImportedSampleFileStem(raw, fallback = "sample") {
      const cleaned = String(raw || "")
        .trim()
        .replace(/[<>:"/\\|?*\u0000-\u001f]+/g, " ")
        .replace(/\s+/g, "_")
        .replace(/_+/g, "_")
        .replace(/[. ]+$/g, "")
        .replace(/^_+|_+$/g, "");
      return cleaned || String(fallback || "sample");
    }

    function getMappedImportFileNamePrefixes() {
      const prefixes = [];
      const instrumentName = String(el.autoInstrument?.value || "").trim() || "Instrument";
      prefixes.push(instrumentName);

      const activeMapSet = getActiveMapSet();
      if (activeMapSet && activeMapSet.id !== "base") {
        const activeKeyswitchSet = getKeyswitchSetById(activeMapSet.id);
        const keyswitchName = String(activeKeyswitchSet?.name || "").trim() || "Keyswitch";
        prefixes.push(keyswitchName);
      }

      return prefixes;
    }

    function buildMappedImportFileName(options, existingFileNames = null) {
      const source = (options && typeof options === "object") ? options : {};
      const root = Math.max(0, Math.min(127, Math.round(Number(source.rootMidi) || 0)));
      const velocityLayer = Math.max(1, Math.min(5, Math.round(Number(source.velocityLayer) || 1)));
      const rrIndexValue = Math.round(Number(source.rrIndex));
      const rrIndex = Number.isFinite(rrIndexValue) && rrIndexValue > 0 ? rrIndexValue : null;
      const extension = getImportedSampleFileExtension(source.originalName, ".wav");
      const stemParts = [
        ...getMappedImportFileNamePrefixes(),
        `${midiToNote(root)}_V${velocityLayer}`
      ];
      if (rrIndex !== null) stemParts.push(`RR${rrIndex}`);
      if (source.loopEnabled) stemParts.push("L");
      const stem = sanitizeImportedSampleFileStem(stemParts.join("_"), "sample");
      let candidate = `${stem}${extension}`;

      if (!(existingFileNames instanceof Set)) return candidate;

      const baseKey = candidate.toLowerCase();
      if (!existingFileNames.has(baseKey)) {
        existingFileNames.add(baseKey);
        return candidate;
      }

      let suffix = 2;
      do {
        candidate = `${stem}_${suffix}${extension}`;
        suffix += 1;
      } while (existingFileNames.has(candidate.toLowerCase()));

      existingFileNames.add(candidate.toLowerCase());
      return candidate;
    }

    function createMatrixMappedEntryFromFile(file, rootMidi, velocityLayer, rrIndex = 1, existingFileNames = null) {
      const parsed = parseFilename(String(file?.name || ""));
      const loopEnabled = parsed.valid ? !!parsed.loopEnabled : hasLoopTokenInFileName(file?.name);
      const suffixSerial = parsed.valid && Number.isFinite(parsed.suffixSerial) ? parsed.suffixSerial : null;
      const root = Math.max(0, Math.min(127, Math.round(Number(rootMidi) || 0)));
      const layer = clampMapMatrixVelocityLayers(velocityLayer);
      const sourcePath = (file && typeof file.path === "string") ? String(file.path).trim() : "";
      const fileName = buildMappedImportFileName({
        originalName: String(file?.name || "sample.wav"),
        rootMidi: root,
        velocityLayer: layer,
        rrIndex,
        loopEnabled
      }, existingFileNames);

      return {
        fileName,
        manifestPath: sourcePath,
        order: getNextMapEntryOrder(),
        sampleUrl: sourcePath ? "" : URL.createObjectURL(file),
        sampleDataUrl: "",
        fineTuneCents: 0,
        sampleStartNorm: 0,
        loopStartNorm: 0,
        loopEndNorm: 1,
        loopFadeInNorm: 0,
        valid: true,
        reason: "",
        noteToken: midiToNote(root),
        rootMidi: root,
        velocityLayer: layer,
        rrIndex,
        loopEnabled,
        hasVelocityToken: true,
        hasRRToken: rrIndex !== null,
        suffixSerial
      };
    }

    function getDroppedAudioFiles(filesLike) {
      return Array.from(filesLike || []).filter((file) => {
        if (!file || typeof file.name !== "string") return false;
        if (file.type && file.type.startsWith("audio/")) return true;
        return AUDIO_REGEX.test(file.name);
      });
    }

    function droppedFilesHaveMapTokens(filesLike) {
      const files = getDroppedAudioFiles(filesLike);
      return files.some((file) => {
        const parsed = parseFilename(String(file?.name || ""));
        return !!parsed?.valid;
      });
    }

    function dataTransferHasFilePayload(dataTransfer) {
      if (!dataTransfer) return false;

      if (dataTransfer.files && dataTransfer.files.length > 0) return true;

      if (dataTransfer.items && dataTransfer.items.length > 0) {
        for (const item of Array.from(dataTransfer.items)) {
          if (String(item?.kind || "").toLowerCase() === "file") return true;
        }
      }

      if (dataTransfer.types && dataTransfer.types.length > 0) {
        for (const type of Array.from(dataTransfer.types)) {
          const normalized = String(type || "").toLowerCase();
          if (normalized.includes("file")) return true;
        }
      }

      return false;
    }

    function moveMapEntryToMatrixLayer(entry, rootMidi, velocityLayer) {
      if (!state.mapMatrixSplitEnabled || !entry || !entry.valid) return { moved: false, reason: "invalid-entry" };

      const { rrColumns, interval } = normalizeMapMatrixState();
      const activeEntries = getActiveMapEntries().filter((item) => item && item.valid);
      if (!activeEntries.includes(entry)) return { moved: false, reason: "not-in-active-set" };

      const intervalRoots = getMapMatrixIntervalRoots(activeEntries, interval);
      const sourceRoot = quantizeMidiToMapMatrixRoot(entry.rootMidi, interval, intervalRoots);
      const sourceLayer = clampMapMatrixVelocityLayers(entry.velocityLayer);
      const sourceRr = getEntryMatrixRrIndex(entry, rrColumns);
      const targetRoot = quantizeMidiToMapMatrixRoot(rootMidi, interval, intervalRoots);
      const targetLayer = clampMapMatrixVelocityLayers(velocityLayer);
      const mapLookup = getMapMatrixEntryLookup(activeEntries, rrColumns);
      const sourceKey = getMapMatrixCellKey(sourceRoot, sourceLayer, sourceRr);
      mapLookup.delete(sourceKey);

      const cursorKey = getMapMatrixCursorKey(targetRoot, targetLayer);
      const cursorStart = Math.max(1, Math.min(rrColumns, Math.round(Number(state.mapMatrixRrCursor[cursorKey]) || 1)));
      const targetRr = findNextMapMatrixRrSlot(targetRoot, targetLayer, rrColumns, mapLookup, cursorStart);
      if (targetRr === null) {
        return {
          moved: false,
          reason: "layer-full",
          rootMidi: targetRoot,
          velocityLayer: targetLayer
        };
      }

      entry.rootMidi = targetRoot;
      entry.velocityLayer = targetLayer;
      entry.rrIndex = rrColumns > 1 ? targetRr : null;
      ensureEntryEditorState(entry);
      state.mapMatrixRrCursor[cursorKey] = (targetRr % rrColumns) + 1;

      return {
        moved: true,
        entry,
        rootMidi: targetRoot,
        velocityLayer: targetLayer,
        rrIndex: targetRr
      };
    }

    function addDroppedFilesToMatrixLayer(filesLike, rootMidi, velocityLayer) {
      if (!state.mapMatrixSplitEnabled) {
        return {
          added: 0,
          skipped: 0,
          rootMidi: null,
          velocityLayer: null
        };
      }

      const files = getDroppedAudioFiles(filesLike);
      if (!files.length) {
        return {
          added: 0,
          skipped: 0,
          rootMidi: null,
          velocityLayer: null
        };
      }

      const owner = getMutableActiveMapEntriesStore();
      if (!Array.isArray(owner)) {
        return {
          added: 0,
          skipped: files.length,
          rootMidi: null,
          velocityLayer: null
        };
      }

      const { rrColumns, interval } = normalizeMapMatrixState();
      const activeEntries = getActiveMapEntries().filter((entry) => entry && entry.valid);
      const intervalRoots = getMapMatrixIntervalRoots(activeEntries, interval);
      const targetRoot = quantizeMidiToMapMatrixRoot(rootMidi, interval, intervalRoots);
      const targetLayer = clampMapMatrixVelocityLayers(velocityLayer);
      const mapLookup = getMapMatrixEntryLookup(activeEntries, rrColumns);
      const cursorKey = getMapMatrixCursorKey(targetRoot, targetLayer);
      let cursorStart = Math.max(1, Math.min(rrColumns, Math.round(Number(state.mapMatrixRrCursor[cursorKey]) || 1)));
      const existingFileNames = new Set(owner.map((entry) => String(entry?.fileName || "").trim().toLowerCase()).filter(Boolean));
      let added = 0;
      let skipped = 0;

      files.forEach((file) => {
        const targetRr = findNextMapMatrixRrSlot(targetRoot, targetLayer, rrColumns, mapLookup, cursorStart);
        if (targetRr === null) {
          skipped += 1;
          return;
        }

        const entry = createMatrixMappedEntryFromFile(
          file,
          targetRoot,
          targetLayer,
          rrColumns > 1 ? targetRr : null,
          existingFileNames
        );
        owner.push(entry);
        if (!entry.manifestPath) {
          cacheEntrySampleDataUrlFromFile(entry, file);
        }
        ensureEntryEditorState(entry);
        mapLookup.set(getMapMatrixCellKey(targetRoot, targetLayer, targetRr), entry);
        cursorStart = (targetRr % rrColumns) + 1;
        added += 1;
      });

      if (added > 0) {
        state.mapMatrixRrCursor[cursorKey] = cursorStart;
      }

      return {
        added,
        skipped,
        rootMidi: targetRoot,
        velocityLayer: targetLayer
      };
    }

    function getMutableActiveMapEntriesStore() {
      const active = getActiveMapSet();
      if (!active || active.id === "base") return state.entries;
      const set = getKeyswitchSetById(active.id);
      if (set && Array.isArray(set.entries)) return set.entries;
      return state.entries;
    }

    function removeActiveMapEntriesByPredicate(predicate) {
      if (typeof predicate !== "function") return [];
      const owner = getMutableActiveMapEntriesStore();
      if (!Array.isArray(owner) || !owner.length) return [];
      const removed = [];

      for (let i = owner.length - 1; i >= 0; i -= 1) {
        const entry = owner[i];
        if (!entry || !entry.valid) continue;
        if (!predicate(entry)) continue;

        const sampleUrl = String(entry.sampleUrl || "");
        if (sampleUrl && sampleUrl.startsWith("blob:")) {
          try { URL.revokeObjectURL(sampleUrl); } catch {}
        }
        if (sampleUrl) state.waveformCache.delete(sampleUrl);

        owner.splice(i, 1);
        removed.push(entry);
      }

      return removed;
    }

    function deleteSelectedMapMatrixAssignment(options = null) {
      if (!state.mapMatrixSplitEnabled) return false;
      const opts = (options && typeof options === "object") ? options : {};
      const { rrColumns, interval } = normalizeMapMatrixState();
      const activeEntries = getActiveMapEntries().filter((entry) => entry && entry.valid);
      const intervalRoots = getMapMatrixIntervalRoots(activeEntries, interval);

      const selected = getMapEntryByOrder(state.selectedMapEntryOrder);
      const selection = (opts.target && typeof opts.target === "object") ? opts.target : null;

      let rootMidi = Number.NaN;
      let velocityLayer = Number.NaN;
      let rrIndex = 1;
      let deleteVelocityLayer = false;

      if (selection) {
        rootMidi = quantizeMidiToMapMatrixRoot(selection.rootMidi, interval, intervalRoots);
        velocityLayer = clampMapMatrixVelocityLayers(selection.velocityLayer);
        rrIndex = Math.max(1, Math.min(rrColumns, Math.round(Number(selection.rrIndex) || 1)));
        deleteVelocityLayer = String(selection.scope || "").toLowerCase() === "layer";
      } else if (selected && selected.valid) {
        rootMidi = quantizeMidiToMapMatrixRoot(selected.rootMidi, interval, intervalRoots);
        velocityLayer = clampMapMatrixVelocityLayers(selected.velocityLayer);
        rrIndex = getEntryMatrixRrIndex(selected, rrColumns);
      } else {
        setStatus(el.setupStatus, "Select a velocity layer or RR cell, then press Delete or Backspace.", "warn");
        return false;
      }

      if (!Number.isFinite(rootMidi) || !Number.isFinite(velocityLayer)) return false;
      if (opts.deleteVelocityLayer) deleteVelocityLayer = true;
      if (rrColumns <= 1) deleteVelocityLayer = true;

      const removed = removeActiveMapEntriesByPredicate((entry) => {
        const entryRoot = quantizeMidiToMapMatrixRoot(entry.rootMidi, interval, intervalRoots);
        if (entryRoot !== rootMidi) return false;
        const entryLayer = clampMapMatrixVelocityLayers(entry.velocityLayer);
        if (entryLayer !== velocityLayer) return false;
        if (deleteVelocityLayer) return true;
        return getEntryMatrixRrIndex(entry, rrColumns) === rrIndex;
      });

      if (!removed.length) {
        setStatus(el.setupStatus, "Nothing to delete in the selected cell.", "warn");
        return false;
      }

      stopAllPreviewVoices();
      state.mapMatrixRrCursor = {};
      state.mapMatrixPaintActive = false;
      state.mapMatrixLastPaintCellKey = "";
      closeSampleEditor();
      applyMapMatrixIntervalRanges(getActiveMapEntries());
      renderSetup();
      renderPlayerKeyboard();
      updatePlayerEmptyState();

      const removedCount = removed.length;
      const removedLabel = removedCount === 1 ? "sample" : "samples";
      const scopeLabel = deleteVelocityLayer ? "velocity layer" : "round robin";
      const targetLabel = deleteVelocityLayer
        ? `${midiToNote(rootMidi)} V${velocityLayer}`
        : `${midiToNote(rootMidi)} V${velocityLayer} RR${rrIndex}`;
      setStatus(el.setupStatus, `Deleted ${removedCount} ${removedLabel} from ${scopeLabel} ${targetLabel}.`, "ok");
      scheduleSessionStateSave(260);
      return true;
    }

    function isTextInputLikeTarget(target) {
      if (!(target instanceof Element)) return false;
      if (target.closest("[contenteditable]")) return true;
      const tag = String(target.tagName || "").toUpperCase();
      return tag === "INPUT" || tag === "TEXTAREA" || tag === "SELECT";
    }

    function clamp01(v) {
      return Math.max(0, Math.min(1, Number(v) || 0));
    }

    function clampFineTune(v) {
      return Math.max(-100, Math.min(100, Math.round(Number(v) || 0)));
    }

    function clampLoopCrossfadeMs(v) {
      return Math.max(0, Math.min(500, Math.round(Number(v) || 0)));
    }

    function clampVelocityCrossfadePercent(v) {
      return Number(v) > 0 ? 70 : 0;
    }

    function clampSampleGainDb(v) {
      return Math.max(-24, Math.min(24, Number(v) || 0));
    }

    function clampKeyswitchGainDb(v) {
      return clampSampleGainDb(v);
    }

    function clampAutoInterval(v) {
      return Math.max(1, Math.min(12, Math.round(Number(v) || 1)));
    }

    function getAutoInterval() {
      return clampAutoInterval(el.autoIntervalValue?.value ?? 1);
    }

    function setAutoIntervalValue(next, shouldRender = true) {
      const value = clampAutoInterval(next);
      if (el.autoIntervalValue) el.autoIntervalValue.value = String(value);
      if (shouldRender) renderAuto();
      return value;
    }

    function clampAutoVelocityLayers(v) {
      return Math.max(1, Math.min(5, Math.round(Number(v) || 1)));
    }

    function getAutoVelocityLayers() {
      return clampAutoVelocityLayers(el.autoVelValue?.value ?? 1);
    }

    function setAutoVelocityLayers(next, shouldRender = true) {
      const value = clampAutoVelocityLayers(next);
      if (el.autoVelValue) el.autoVelValue.value = String(value);
      updateAutoModwheelVelocityAvailability();
      if (shouldRender) renderAuto();
      return value;
    }

    function clampAutoRRPerNote(v) {
      return Math.max(1, Math.min(8, Math.round(Number(v) || 1)));
    }

    function getAutoRRPerNote() {
      return clampAutoRRPerNote(el.autoRRValue?.value ?? 1);
    }

    function setAutoRRPerNote(next, shouldRender = true) {
      const value = clampAutoRRPerNote(next);
      if (el.autoRRValue) el.autoRRValue.value = String(value);
      if (shouldRender) renderAuto();
      return value;
    }

    function clampAutoMs(v, min = 0, max = 60000) {
      return Math.max(min, Math.min(max, Math.round(Number(v) || 0)));
    }

    function parseAutoNumberOrFallback(raw, fallback) {
      const value = Number(raw);
      return Number.isFinite(value) ? value : fallback;
    }

    function isAutoLoopEnabled() {
      return !!el.autoLoop?.checked;
    }

    function getAutoHoldMs() {
      const minHoldMs = isAutoLoopEnabled() ? 3000 : 1;
      return clampAutoMs(el.autoHoldMs?.value ?? minHoldMs, minHoldMs, 60000);
    }

    function setAutoHoldMs(next, shouldRender = true) {
      const minHoldMs = isAutoLoopEnabled() ? 3000 : 1;
      const value = clampAutoMs(next, minHoldMs, 60000);
      if (el.autoHoldMs) el.autoHoldMs.value = String(value);
      if (shouldRender) renderAuto();
      return value;
    }

    function getAutoTailMs() {
      if (isAutoLoopEnabled()) return 0;
      return clampAutoMs(el.autoTailMs?.value ?? 0, 0, 60000);
    }

    function setAutoTailMs(next, shouldRender = true) {
      const value = clampAutoMs(next, 0, 60000);
      if (el.autoTailMs) el.autoTailMs.value = String(value);
      if (shouldRender) renderAuto();
      return value;
    }

    function getAutoPrerollMs() {
      return clampAutoMs(el.autoPrerollMs?.value ?? 0, 0, 60000);
    }

    function setAutoPrerollMs(next, shouldRender = true) {
      const value = clampAutoMs(next, 0, 60000);
      if (el.autoPrerollMs) el.autoPrerollMs.value = String(value);
      if (shouldRender) renderAuto();
      return value;
    }

    function clampAutoPercent(v) {
      return Math.max(0, Math.min(100, Math.round(Number(v) || 0)));
    }

    function getAutoLoopStartPercent() {
      return clampAutoPercent(parseAutoNumberOrFallback(el.autoLoopStartPct?.value, 10));
    }

    function setAutoLoopStartPercent(next, shouldRender = true) {
      const value = clampAutoPercent(next);
      if (el.autoLoopStartPct) el.autoLoopStartPct.value = String(value);
      if (shouldRender) renderAuto();
      return value;
    }

    function getAutoLoopEndPercent() {
      return clampAutoPercent(parseAutoNumberOrFallback(el.autoLoopEndPct?.value, 90));
    }

    function setAutoLoopEndPercent(next, shouldRender = true) {
      const value = clampAutoPercent(next);
      if (el.autoLoopEndPct) el.autoLoopEndPct.value = String(value);
      if (shouldRender) renderAuto();
      return value;
    }

    function getAutoLoopCrossfadeMs() {
      const minCrossfadeMs = isAutoLoopEnabled() ? 200 : 0;
      return clampAutoMs(parseAutoNumberOrFallback(el.autoLoopCrossfadeMs?.value, minCrossfadeMs), minCrossfadeMs, 60000);
    }

    function setAutoLoopCrossfadeMs(next, shouldRender = true) {
      const minCrossfadeMs = isAutoLoopEnabled() ? 200 : 0;
      const value = clampAutoMs(next, minCrossfadeMs, 60000);
      if (el.autoLoopCrossfadeMs) el.autoLoopCrossfadeMs.value = String(value);
      if (shouldRender) renderAuto();
      return value;
    }

    function applyAutoLoopDependentConstraints(shouldRender = false) {
      const loopEnabled = isAutoLoopEnabled();
      let changed = false;

      if (el.autoTailMs) {
        el.autoTailMs.disabled = loopEnabled;
        const tailField = el.autoTailMs.closest(".field");
        if (tailField) tailField.classList.toggle("is-disabled", loopEnabled);
      }

      const holdMin = loopEnabled ? 3000 : 1;
      const holdValue = clampAutoMs(parseAutoNumberOrFallback(el.autoHoldMs?.value, holdMin), holdMin, 60000);
      if (el.autoHoldMs && String(holdValue) !== String(el.autoHoldMs.value)) {
        el.autoHoldMs.value = String(holdValue);
        changed = true;
      }

      const crossfadeMin = loopEnabled ? 200 : 0;
      const crossfadeValue = clampAutoMs(parseAutoNumberOrFallback(el.autoLoopCrossfadeMs?.value, crossfadeMin), crossfadeMin, 60000);
      if (el.autoLoopCrossfadeMs && String(crossfadeValue) !== String(el.autoLoopCrossfadeMs.value)) {
        el.autoLoopCrossfadeMs.value = String(crossfadeValue);
        changed = true;
      }

      if (shouldRender && changed) renderAuto();
      return changed;
    }

    function updateAutoLoopDetailsVisibility(shouldRender = false) {
      if (!el.autoLoopDetails) return;
      const enabled = !!el.autoLoop?.checked;
      el.autoLoopDetails.classList.toggle("is-disabled", !enabled);
      if (el.autoLoopMode) el.autoLoopMode.disabled = !enabled;
      if (el.autoLoopStartPct) el.autoLoopStartPct.disabled = !enabled;
      if (el.autoLoopEndPct) el.autoLoopEndPct.disabled = !enabled;
      if (el.autoLoopCutAtEnd) el.autoLoopCutAtEnd.disabled = !enabled;
      if (el.autoLoopCrossfadeMs) el.autoLoopCrossfadeMs.disabled = !enabled;
      updateAutoModwheelVelocityAvailability();
      applyAutoLoopDependentConstraints(shouldRender);
      scheduleHostResizeForActiveTab();
    }

    function updateAutoModwheelVelocityAvailability() {
      if (!el.autoModwheelVelocityRow || !el.autoModwheelVelocity) return;
      const loopEnabled = !!el.autoLoop?.checked;
      const enabled = loopEnabled && getAutoVelocityLayers() >= 2;
      el.autoModwheelVelocityRow.classList.remove("hidden");
      el.autoModwheelVelocityRow.classList.toggle("is-disabled", !enabled);
      el.autoModwheelVelocity.disabled = !enabled;
      if (!enabled && el.autoModwheelVelocity.checked) {
        el.autoModwheelVelocity.checked = false;
      }
    }

    function getPackCheckByExt(ext) {
      const token = String(ext || "").trim().toLowerCase();
      return (el.autoPackChecks || []).find((node) => (
        String(node.dataset.packExt || "").trim().toLowerCase() === token
      )) || null;
    }

    function isKeyswitchPackEnabled() {
      return false;
    }

    function updateKeyswitchMetaLabels() {
      const keyswitchEnabled = isKeyswitchPackEnabled();
      const instrumentLabel = keyswitchEnabled ? "Keyswitch Name" : "Instrument Name";
      const authorLabel = keyswitchEnabled ? "Keyswitch Key" : "Author";
      if (el.autoInstrumentLabel) {
        el.autoInstrumentLabel.textContent = instrumentLabel;
      }
      if (el.autoAuthorLabel) {
        el.autoAuthorLabel.textContent = authorLabel;
      }
      if (el.autoInstrument) {
        el.autoInstrument.placeholder = instrumentLabel;
        el.autoInstrument.setAttribute("aria-label", instrumentLabel);
      }
      if (el.autoAuthor) {
        el.autoAuthor.placeholder = keyswitchEnabled ? "C0" : authorLabel;
        el.autoAuthor.setAttribute("aria-label", authorLabel);
        if (keyswitchEnabled) {
          el.autoAuthor.setAttribute("maxlength", "3");
        } else {
          el.autoAuthor.removeAttribute("maxlength");
        }
      }
    }

    function normalizeKeyswitchKeyInput(shouldRender = true) {
      if (!el.autoAuthor || !isKeyswitchPackEnabled()) return "";
      const raw = String(el.autoAuthor.value || "").trim().toUpperCase();
      if (!raw) {
        if (shouldRender) renderAuto();
        return "";
      }
      const midi = noteToMidi(raw);
      const normalized = midi === null ? "C0" : midiToNote(midi);
      if (el.autoAuthor.value !== normalized) el.autoAuthor.value = normalized;
      if (shouldRender) renderAuto();
      return normalized;
    }

    function applyPackFormatRules(shouldRender = true) {
      const checks = el.autoPackChecks || [];
      checks.forEach((node) => {
        node.checked = String(node.dataset.packExt || "").trim().toLowerCase() === "smpinst";
        node.disabled = true;
        const row = node.closest(".auto-pack-check");
        if (row) row.classList.toggle("disabled", node.disabled);
      });

      updateKeyswitchMetaLabels();
      if (shouldRender) renderAuto();
    }

    function getAutoPresetSettingsSnapshot() {
      const startMidi = normalizeAutoNoteInput(el.autoStart, 36, false);
      const endMidi = normalizeAutoNoteInput(el.autoEnd, 72, false);
      return {
        startNote: midiToNote(startMidi ?? 36),
        endNote: midiToNote(endMidi ?? 72),
        sampleInterval: getAutoInterval(),
        velocityLayers: getAutoVelocityLayers(),
        roundRobin: getAutoRRPerNote(),
        sustainMs: getAutoHoldMs(),
        releaseTailMs: getAutoTailMs(),
        prerollMs: getAutoPrerollMs(),
        loopSamples: !!el.autoLoop?.checked,
        autoLoop: !!el.autoLoopMode?.checked,
        loopStartPercent: getAutoLoopStartPercent(),
        loopEndPercent: getAutoLoopEndPercent(),
        cutLoopAtEnd: !!el.autoLoopCutAtEnd?.checked,
        loopCrossfadeMs: getAutoLoopCrossfadeMs(),
        modwheelVelocityControl: !!el.autoModwheelVelocity?.checked,
        normalizeRecorded: !!el.autoNormalizeRecorded?.checked
      };
    }

    function normalizeAutoPresetRecord(rawPreset, fallbackIndex = 0) {
      if (!rawPreset || typeof rawPreset !== "object") return null;
      const sourceSettings = (rawPreset.settings && typeof rawPreset.settings === "object")
        ? rawPreset.settings
        : rawPreset;
      const fallbackName = `Preset ${fallbackIndex + 1}`;
      const name = String(rawPreset.name || fallbackName).trim() || fallbackName;
      const startMidi = noteToMidi(sourceSettings.startNote);
      const endMidi = noteToMidi(sourceSettings.endNote);
      return {
        id: String(rawPreset.id || `preset_${Date.now()}_${fallbackIndex}`),
        name,
        settings: {
          startNote: midiToNote(startMidi === null ? 36 : startMidi),
          endNote: midiToNote(endMidi === null ? 72 : endMidi),
          sampleInterval: clampAutoInterval(sourceSettings.sampleInterval),
          velocityLayers: clampAutoVelocityLayers(sourceSettings.velocityLayers),
          roundRobin: clampAutoRRPerNote(sourceSettings.roundRobin),
          sustainMs: clampAutoMs(sourceSettings.sustainMs, 1, 60000),
          releaseTailMs: clampAutoMs(sourceSettings.releaseTailMs, 0, 60000),
          prerollMs: clampAutoMs(sourceSettings.prerollMs, 0, 60000),
          loopSamples: !!sourceSettings.loopSamples,
          autoLoop: !!sourceSettings.autoLoop,
          loopStartPercent: clampAutoPercent(sourceSettings.loopStartPercent),
