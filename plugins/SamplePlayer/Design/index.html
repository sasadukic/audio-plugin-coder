        rrColumns: matrixRrColumns,
        interval: matrixInterval
      } = normalizeMapMatrixState();
      const matrixMode = !!state.mapMatrixSplitEnabled;
      const valid = [...validEntries]
        .filter((entry) => entry && entry.valid)
        .sort((a, b) => (
          a.rootMidi - b.rootMidi
          || a.velocityLayer - b.velocityLayer
          || ((a.rrIndex ?? 999) - (b.rrIndex ?? 999))
          || a.order - b.order
        ));
      const bounds = getKeyboardMapBounds(valid);

      state.setupOctaveStart = Math.round(Number(state.setupOctaveStart) || 48);

      if (!preserveView && valid.length) {
        const hasVisible = valid.some((entry) => (
          entry.rootMidi >= state.setupOctaveStart && entry.rootMidi <= state.setupOctaveStart + 11
        ));
        if (!hasVisible) {
          state.setupOctaveStart = Math.floor(valid[0].rootMidi / 12) * 12;
        }
      }

      state.setupOctaveStart = Math.max(bounds.minStart, Math.min(bounds.maxStart, state.setupOctaveStart));

      const start = state.setupOctaveStart;
      el.octaveDownBtn.disabled = start <= bounds.minStart;
      el.octaveUpBtn.disabled = start >= bounds.maxStart;

      const windowStart = start;
      const windowEnd = start + 11;

      el.mapSamples.textContent = "";
      el.mapSamples.classList.toggle("matrix-mode", matrixMode);

      let visibleCount = 0;
      if (matrixMode) {
        el.mapSamples.style.setProperty("--matrix-velocity-layers", String(matrixVelocityLayers));
        const matrixLookup = getMapMatrixEntryLookup(valid, matrixRrColumns);
        const matrixIntervalRoots = getMapMatrixIntervalRoots(valid, matrixInterval);
        const roots = matrixIntervalRoots.length
          ? matrixIntervalRoots
          : buildIntervalRootsFromRange(windowStart, windowEnd, matrixInterval);
        const rangesByRoot = new Map();
        roots.forEach((root, idx) => {
          const prev = idx > 0 ? roots[idx - 1] : null;
          const low = prev === null ? root : Math.max(0, Math.min(root, prev + 1));
          let high = root;
          if (matrixInterval > 1 && idx === roots.length - 1 && state.allowPitchUpAboveHighest) {
            high = 127;
          }
          rangesByRoot.set(root, { low, high });
        });

        const buckets = Array.from({ length: 12 }, () => []);
        roots.forEach((rootMidi) => {
          const range = rangesByRoot.get(rootMidi);
          if (!range) return;
          const coverageStart = Math.max(windowStart, range.low);
          const coverageEnd = Math.min(windowEnd, range.high);
          if (coverageStart > coverageEnd) return;

          const rootInView = rootMidi >= windowStart && rootMidi <= windowEnd;
          const anchorMidi = rootInView
            ? rootMidi
            : (rootMidi < windowStart ? coverageStart : coverageEnd);
          const keyIndex = anchorMidi - windowStart;
          if (keyIndex < 0 || keyIndex >= 12) return;

          for (let layer = matrixVelocityLayers; layer >= 1; layer -= 1) {
            const rrEntries = [];
            for (let rr = 1; rr <= matrixRrColumns; rr += 1) {
              const cellKey = getMapMatrixCellKey(rootMidi, layer, rr);
              rrEntries.push(matrixLookup.get(cellKey) || null);
            }
            buckets[keyIndex].push({
              rootMidi,
              velocityLayer: layer,
              coverageStart,
              coverageEnd,
              rootInView,
              rrEntries
            });
          }
        });

        buckets.forEach((items, keyIndex) => {
          const col = document.createElement("div");
          col.className = "map-col";
          const orderedItems = [...items].sort((a, b) => (
            b.velocityLayer - a.velocityLayer
            || a.rootMidi - b.rootMidi
          ));

          orderedItems.forEach((item) => {
            const row = document.createElement("div");
            row.className = "map-velocity-row";

            const anchorMidi = windowStart + keyIndex;
            const leftSpan = Math.max(0, anchorMidi - item.coverageStart);
            const spanTotal = Math.max(1, item.coverageEnd - item.coverageStart + 1);
            const rootSlot = item.rootInView ? leftSpan : 0;

            const box = document.createElement("div");
            box.className = "map-sample-box map-matrix-box";
            box.dataset.rootMidi = String(item.rootMidi);
            box.dataset.velocityLayer = String(item.velocityLayer);
            box.style.setProperty("--span-total", String(spanTotal));
            box.style.setProperty("--span-left", String(leftSpan));
            box.style.setProperty("--root-slot", String(rootSlot));
            if (!item.rootInView) box.classList.add("offscreen-root");
            if (keyIndex <= 1) box.classList.add("tooltip-left");
            if (keyIndex >= 10) box.classList.add("tooltip-right");
            box.dataset.tooltip = `root:${midiToNote(item.rootMidi)} | covers:${midiToNote(item.coverageStart)}-${midiToNote(item.coverageEnd)} | V${item.velocityLayer}`;
            box.setAttribute("aria-label", box.dataset.tooltip);

            const rrGrid = document.createElement("div");
            rrGrid.className = "map-rr-grid";
            rrGrid.style.setProperty("--rr-count", String(matrixRrColumns));

            for (let rr = 1; rr <= matrixRrColumns; rr += 1) {
              const entry = item.rrEntries[rr - 1] || null;
              const rrCell = document.createElement("button");
              rrCell.type = "button";
              rrCell.className = "map-rr-cell map-matrix-cell";
              rrCell.dataset.matrixCell = "1";
              rrCell.dataset.rootMidi = String(item.rootMidi);
              rrCell.dataset.velocityLayer = String(item.velocityLayer);
              rrCell.dataset.rrIndex = String(rr);
              if (keyIndex <= 1) rrCell.classList.add("tooltip-left");
              if (keyIndex >= 10) rrCell.classList.add("tooltip-right");

              if (entry) {
                ensureEntryEditorState(entry);
                const rrLabel = entry.rrIndex === null ? "auto" : String(entry.rrIndex);
                const loopOn = isEntryLoopRegionActive(entry);
                const fineTune = clampFineTune(entry.fineTuneCents ?? 0);
                const xfadePct = Math.max(0, ((entry.loopStartNorm ?? 0) - (entry.loopFadeInNorm ?? entry.loopStartNorm ?? 0)) * 100);
                rrCell.dataset.entryOrder = String(entry.order);
                rrCell.draggable = true;
                rrCell.dataset.tooltip = `${entry.fileName} | root:${midiToNote(entry.rootMidi)} | V${entry.velocityLayer} | RR:${rrLabel} | tune:${fineTune >= 0 ? "+" : ""}${fineTune}c${loopOn ? ` | L:on${xfadePct > 0.05 ? ` | XF:${xfadePct.toFixed(1)}%` : ""}` : ""}`;
                rrCell.setAttribute("aria-label", rrCell.dataset.tooltip);
                visibleCount += 1;
              } else {
                rrCell.classList.add("empty");
                rrCell.draggable = false;
                rrCell.dataset.tooltip = `${midiToNote(item.rootMidi)} | V${item.velocityLayer} | RR:${rr} | Empty`;
                rrCell.setAttribute("aria-label", rrCell.dataset.tooltip);
              }

              if (matrixRrColumns > 1) rrCell.textContent = String(rr);
              rrGrid.appendChild(rrCell);
            }

            box.appendChild(rrGrid);
            row.appendChild(box);
            col.appendChild(row);
          });

          el.mapSamples.appendChild(col);
        });
      } else {
        el.mapSamples.style.removeProperty("--matrix-velocity-layers");
        const { rangesByRoot } = getResolvedRootRanges(valid, getActiveMapManualRanges());
        const buckets = Array.from({ length: 12 }, () => []);
        valid.forEach((entry) => {
          const rootRange = rangesByRoot.get(entry.rootMidi) || {
            low: entry.rootMidi,
            high: entry.rootMidi
          };
          const coverageStart = Math.max(windowStart, rootRange.low);
          const coverageEnd = Math.min(windowEnd, rootRange.high);
          if (coverageStart > coverageEnd) return;

          const rootInView = entry.rootMidi >= windowStart && entry.rootMidi <= windowEnd;
          const anchorMidi = rootInView
            ? entry.rootMidi
            : (entry.rootMidi < windowStart ? coverageStart : coverageEnd);
          const keyIndex = anchorMidi - windowStart;
          if (keyIndex < 0 || keyIndex >= 12) return;

          buckets[keyIndex].push({
            entry,
            coverageStart,
            coverageEnd,
            rootInView
          });
        });

        buckets.forEach((entries, keyIndex) => {
          const col = document.createElement("div");
          col.className = "map-col";
          const layers = new Map();
          entries.forEach((item) => {
            const entry = item.entry;
            const layer = clampMapMatrixVelocityLayers(entry.velocityLayer);
            if (!layers.has(layer)) layers.set(layer, []);
            layers.get(layer).push(item);
          });

          const orderedLayers = Array.from(layers.keys()).sort((a, b) => b - a);
          orderedLayers.forEach((layer) => {
            const layerEntries = [...(layers.get(layer) || [])].sort((a, b) => (
              ((a.entry.rrIndex ?? 999) - (b.entry.rrIndex ?? 999)) || (a.entry.order - b.entry.order)
            ));
            if (!layerEntries.length) return;

            const primaryItem = layerEntries[0];
            const primary = primaryItem.entry;
            ensureEntryEditorState(primary);

            const coverageStart = primaryItem.coverageStart;
            const coverageEnd = primaryItem.coverageEnd;
            const rootInView = !!primaryItem.rootInView;
            const anchorMidi = start + keyIndex;
            const leftSpan = Math.max(0, anchorMidi - coverageStart);
            const rightSpan = Math.max(0, coverageEnd - anchorMidi);
            const spanTotal = Math.max(1, leftSpan + rightSpan + 1);

            const row = document.createElement("div");
            row.className = "map-velocity-row";

            const box = document.createElement("div");
            box.className = "map-sample-box";
            box.dataset.entryOrder = String(primary.order);
            box.dataset.rootMidi = String(primary.rootMidi);
            box.style.setProperty("--span-total", String(spanTotal));
            box.style.setProperty("--span-left", String(leftSpan));
            box.style.setProperty("--root-slot", String(rootInView ? leftSpan : 0));
            if (!rootInView) box.classList.add("offscreen-root");
            if (keyIndex <= 1) box.classList.add("tooltip-left");
            if (keyIndex >= 10) box.classList.add("tooltip-right");
            box.dataset.tooltip = `root:${midiToNote(primary.rootMidi)} | covers:${midiToNote(coverageStart)}-${midiToNote(coverageEnd)} | V${layer} | RR:${layerEntries.length}`;
            box.setAttribute("aria-label", box.dataset.tooltip);

            if (rootInView) {
              const rrGrid = document.createElement("div");
              rrGrid.className = "map-rr-grid";
              rrGrid.style.setProperty("--rr-count", String(layerEntries.length));

              layerEntries.forEach((item) => {
                const entry = item.entry;
                ensureEntryEditorState(entry);
                const rr = entry.rrIndex === null ? "auto" : String(entry.rrIndex);
                const loopOn = isEntryLoopRegionActive(entry);
                const fineTune = clampFineTune(entry.fineTuneCents ?? 0);
                const xfadePct = Math.max(0, ((entry.loopStartNorm ?? 0) - (entry.loopFadeInNorm ?? entry.loopStartNorm ?? 0)) * 100);

                const rrCell = document.createElement("button");
                rrCell.type = "button";
                rrCell.className = "map-rr-cell";
                rrCell.dataset.entryOrder = String(entry.order);
                rrCell.dataset.rootMidi = String(entry.rootMidi);
                if (keyIndex <= 1) rrCell.classList.add("tooltip-left");
                if (keyIndex >= 10) rrCell.classList.add("tooltip-right");
                rrCell.dataset.tooltip = `${entry.fileName} | root:${midiToNote(entry.rootMidi)} | covers:${midiToNote(coverageStart)}-${midiToNote(coverageEnd)} | V${entry.velocityLayer} | RR:${rr} | tune:${fineTune >= 0 ? "+" : ""}${fineTune}c${loopOn ? ` | L:on${xfadePct > 0.05 ? ` | XF:${xfadePct.toFixed(1)}%` : ""}` : ""}`;
                rrCell.setAttribute("aria-label", rrCell.dataset.tooltip);
                rrGrid.appendChild(rrCell);
              });

              box.appendChild(rrGrid);
            }

            const leftHandle = document.createElement("div");
            leftHandle.className = "map-range-handle left";
            leftHandle.dataset.side = "left";
            leftHandle.title = "Stretch down";
            const rightHandle = document.createElement("div");
            rightHandle.className = "map-range-handle right";
            rightHandle.dataset.side = "right";
            rightHandle.title = "Stretch up";

            box.appendChild(leftHandle);
            box.appendChild(rightHandle);
            row.appendChild(box);
            col.appendChild(row);
            visibleCount += 1;
          });
          el.mapSamples.appendChild(col);
        });
      }
      syncSelectedMapSampleBox();

      el.mapKeys.textContent = "";
      for (let i = 0; i < 12; i += 1) {
        const midi = start + i;
        const semitone = ((midi % 12) + 12) % 12;
        const key = document.createElement("div");
        key.className = `map-key ${BLACK_SEMITONES.has(semitone) ? "black" : "white"}`;
        if (midi > 127) {
          key.classList.add("disabled");
        } else {
          key.dataset.midi = String(midi);
          key.textContent = midiToNote(midi);
        }
        el.mapKeys.appendChild(key);
      }

      if (el.mapEmpty) {
        if (visibleCount > 0 || valid.length > 0) {
          el.mapEmpty.classList.add("hidden");
        } else {
          el.mapEmpty.textContent = "Filename format: NOTE(required), V1..V5, RRn, L";
          el.mapEmpty.classList.remove("hidden");
        }
      }
    }

    function getPlayerKeyboardWhiteCount() {
      let count = 0;
      for (let midi = PLAYER_KB_START_MIDI; midi <= PLAYER_KB_END_MIDI; midi += 1) {
        const semitone = ((midi % 12) + 12) % 12;
        if (!BLACK_SEMITONES.has(semitone)) count += 1;
      }
      return count;
    }

    function getPlayerWhiteKeyWidthPx() {
      const whiteCount = getPlayerKeyboardWhiteCount();
      const viewportWidth = el.playerKeyboardViewport?.clientWidth ?? 0;
      if (whiteCount > 0 && Number.isFinite(viewportWidth) && viewportWidth > 0) {
        return Math.max(8, viewportWidth / whiteCount);
      }
      const raw = Number.parseFloat(getComputedStyle(el.playerStage).getPropertyValue("--player-white-key-width"));
      if (Number.isFinite(raw) && raw > 0) return raw;
      return 22;
    }

    function scrollPlayerKeyboardToMidi(midi = 60) {
      if (!el.playerKeyboardViewport) return;
      if ((el.playerKeyboardViewport.scrollWidth - el.playerKeyboardViewport.clientWidth) <= 1) {
        el.playerKeyboardViewport.scrollLeft = 0;
        return;
      }
      const clampedMidi = Math.max(PLAYER_KB_START_MIDI, Math.min(PLAYER_KB_END_MIDI, Math.round(Number(midi) || PLAYER_KB_START_MIDI)));
      const keyWidth = getPlayerWhiteKeyWidthPx();
      let whitesBefore = 0;
      for (let m = PLAYER_KB_START_MIDI; m < clampedMidi; m += 1) {
        const semitone = ((m % 12) + 12) % 12;
        if (!BLACK_SEMITONES.has(semitone)) whitesBefore += 1;
      }
      const target = Math.max(0, (whitesBefore * keyWidth) - (el.playerKeyboardViewport.clientWidth * 0.45));
      el.playerKeyboardViewport.scrollLeft = target;
    }

    function getPlayerKeyswitchDisplaySets() {
      const sets = Array.isArray(state.keyswitchSets) ? state.keyswitchSets : [];
      return sets
        .map((set, index) => {
          const explicitMidi = Number.isFinite(set?.keyMidi) ? Math.round(Number(set.keyMidi)) : null;
          const parsedMidi = explicitMidi === null
            ? noteToMidi(String(set?.key || "").trim().toUpperCase())
            : explicitMidi;
          if (!Number.isFinite(parsedMidi)) return null;
          const keyMidi = Math.max(0, Math.min(127, Math.round(parsedMidi)));
          return {
            id: String(set?.id || `set_${index + 1}`),
            name: String(set?.name || `Set ${index + 1}`),
            keyMidi,
            key: midiToNote(keyMidi)
          };
        })
        .filter(Boolean)
        .sort((a, b) => (a.keyMidi - b.keyMidi) || a.name.localeCompare(b.name));
    }

    function getKeyswitchSetForMidi(midi) {
      const targetMidi = Math.round(Number(midi));
      if (!Number.isFinite(targetMidi)) return null;
      const sets = Array.isArray(state.keyswitchSets) ? state.keyswitchSets : [];
      for (const set of sets) {
        if (!set || typeof set !== "object") continue;
        const explicitMidi = Number(set.keyMidi);
        if (Number.isFinite(explicitMidi) && Math.round(explicitMidi) === targetMidi) return set;
        const parsedMidi = noteToMidi(String(set.key || "").trim().toUpperCase());
        if (Number.isFinite(parsedMidi) && Math.round(parsedMidi) === targetMidi) return set;
      }
      return null;
    }

    function renderPlayerKeyboard() {
      if (!el.playerKeyboard || !el.playerKeyboardWhites || !el.playerKeyboardBlacks) return;

      el.playerKeyboardWhites.textContent = "";
      el.playerKeyboardBlacks.textContent = "";

      const whiteCount = getPlayerKeyboardWhiteCount();
      const whiteKeyWidth = getPlayerWhiteKeyWidthPx();
      if (el.playerStage) {
        el.playerStage.style.setProperty("--player-white-key-width", `${whiteKeyWidth}px`);
      }
      el.playerKeyboard.style.width = `${Math.max(1, whiteCount * whiteKeyWidth)}px`;

      const blackOffsets = { 1: 0.72, 3: 0.86, 6: 0.72, 8: 0.86, 10: 0.98 };

      const playbackSource = getPlayerPlaybackSource();
      const { roots, rangesByRoot } = getResolvedRootRanges(playbackSource.entries, playbackSource.manualRanges);
      const keyswitchSets = getPlayerKeyswitchDisplaySets();
      const keyswitchSetsByMidi = new Map();
      keyswitchSets.forEach((set) => {
        if (!keyswitchSetsByMidi.has(set.keyMidi)) keyswitchSetsByMidi.set(set.keyMidi, []);
        keyswitchSetsByMidi.get(set.keyMidi).push(set);
      });
      const playableMidis = new Set();
      const hasPlayableEntries = Array.isArray(playbackSource.entries)
        && playbackSource.entries.some((entry) => entryHasPlayableSource(entry));
      if (playbackSource.oneShotPlayback && hasPlayableEntries) {
        for (let midi = PLAYER_KB_START_MIDI; midi <= PLAYER_KB_END_MIDI; midi += 1) {
          playableMidis.add(midi);
        }
      } else {
        roots.forEach((rootMidi) => {
          const range = rangesByRoot.get(rootMidi);
          if (!range) return;
          for (let midi = range.low; midi <= range.high; midi += 1) {
            playableMidis.add(midi);
          }
        });
      }
      const openStringMidis = new Set(
        getOpenStringMidisForSet()
          .map((midi) => Math.round(Number(midi)))
          .filter((midi) => Number.isFinite(midi))
          .map((midi) => Math.max(PLAYER_KB_START_MIDI, Math.min(PLAYER_KB_END_MIDI, midi)))
      );
      const openStringColorsByMidi = getOpenStringColorsByMidiForSet();
      const openStringScrollMidi = openStringMidis.size
        ? Array.from(openStringMidis).at(-1)
        : null;

      function decorateOpenStringPlayerKey(keyNode, midi) {
        if (!openStringMidis.has(midi)) return;
        keyNode.classList.add("is-open-string");
        const openStringColor = normalizeRgbText(openStringColorsByMidi[String(midi)]);
        if (openStringColor) {
          keyNode.style.setProperty("--player-open-string-rgb", openStringColor);
        }
        const overlay = document.createElement("span");
        overlay.className = "player-key-open-string-overlay";
        overlay.setAttribute("aria-hidden", "true");
        keyNode.appendChild(overlay);
        const aria = keyNode.getAttribute("aria-label") || `${midiToNote(midi)} (${midi})`;
        keyNode.setAttribute("aria-label", `${aria}, open string`);
        keyNode.title = `Open string: ${midiToNote(midi)}`;
      }

      function decorateKeyswitchPlayerKey(keyNode, midi) {
        const sets = keyswitchSetsByMidi.get(midi);
        if (!sets || !sets.length) return;
        keyNode.classList.add("is-keyswitch");
        const isActiveKeyswitch = sets.some((set) => String(set.id || "") === String(state.activeMapSetId || ""));
        if (isActiveKeyswitch) {
          keyNode.classList.add("keyswitch-latched");
          keyNode.classList.add("is-down");
        }

        const setNames = sets.map((set) => set.name).join(", ");
        const aria = keyNode.getAttribute("aria-label") || `${midiToNote(midi)} (${midi})`;
        keyNode.setAttribute("aria-label", `${aria}, keyswitch: ${setNames}`);
        keyNode.title = `Keyswitch ${sets[0].key}: ${setNames}`;
      }

      function bindPlayerKeyEvents(keyNode, midi) {
        let releaseTimer = 0;
        let lastPressTs = -1;
        let keyHeld = false;
        let keyHeldVelocity = 100;
        keyNode.dataset.midi = String(midi);
        keyNode.setAttribute("aria-label", `${midiToNote(midi)} (${midi})`);
        if (keyNode.disabled) return;

        function triggerPressFromClientY(clientY, eventTimeStamp = null) {
          const stamp = Number.isFinite(eventTimeStamp) ? Number(eventTimeStamp) : performance.now();
          if (Number.isFinite(stamp) && lastPressTs >= 0 && Math.abs(stamp - lastPressTs) < 24) return;
          lastPressTs = stamp;
          if (releaseTimer) {
            window.clearTimeout(releaseTimer);
            releaseTimer = 0;
          }
          const rect = keyNode.getBoundingClientRect();
          const ratioY = clamp01((clientY - rect.top) / Math.max(1, rect.height));
          keyHeldVelocity = Math.max(1, Math.min(127, Math.round((ratioY * 126) + 1)));
          let triggered = false;
          try {
            triggered = !!triggerKeyboardMapKey(midi, ratioY);
          } catch {
            triggered = false;
          }
          if (!triggered) return;
          keyHeld = true;
          // Force animation retrigger on rapid repeated presses.
          keyNode.classList.remove("is-down");
          void keyNode.offsetWidth;
          keyNode.classList.add("is-down");
        }

        keyNode.addEventListener("pointerdown", (ev) => {
          if (typeof ev.button === "number" && ev.button > 0) return;
          ev.preventDefault();
          triggerPressFromClientY(ev.clientY, ev.timeStamp);
          if (keyNode.setPointerCapture) {
            try {
              keyNode.setPointerCapture(ev.pointerId);
            } catch {}
          }
        });

        const release = (ev) => {
          if (keyHeld) {
            const sentNativeNoteOff = emitNativePreviewMidi(false, midi, keyHeldVelocity, 1);
            if (!sentNativeNoteOff) {
              stopPreviewVoiceForKey(midi, getPlayerVoiceSettings().releaseSec, null, false);
            }
          }
          keyHeld = false;
          if (releaseTimer) window.clearTimeout(releaseTimer);
          releaseTimer = window.setTimeout(() => {
            if (!keyNode.classList.contains("keyswitch-latched")) {
              keyNode.classList.remove("is-down");
            }
            releaseTimer = 0;
          }, 240);
          if (ev && keyNode.releasePointerCapture && keyNode.hasPointerCapture && keyNode.hasPointerCapture(ev.pointerId)) {
            try {
              keyNode.releasePointerCapture(ev.pointerId);
            } catch {}
          }
        };

        keyNode.addEventListener("pointerup", release);
        keyNode.addEventListener("pointercancel", release);
        keyNode.addEventListener("lostpointercapture", release);
        keyNode.addEventListener("pointerleave", (ev) => {
          if ((ev.buttons & 1) !== 1) release();
        });

        keyNode.addEventListener("mousedown", (ev) => {
          if (typeof ev.button === "number" && ev.button > 0) return;
          ev.preventDefault();
          triggerPressFromClientY(ev.clientY, ev.timeStamp);
        });
        keyNode.addEventListener("mouseup", release);
        keyNode.addEventListener("mouseleave", release);
        keyNode.addEventListener("touchstart", (ev) => {
          const touch = ev.changedTouches && ev.changedTouches[0];
          if (!touch) return;
          ev.preventDefault();
          triggerPressFromClientY(touch.clientY, ev.timeStamp);
        }, { passive: false });
        keyNode.addEventListener("touchend", release);
        keyNode.addEventListener("touchcancel", release);
      }

      let whiteIndex = -1;
      for (let midi = PLAYER_KB_START_MIDI; midi <= PLAYER_KB_END_MIDI; midi += 1) {
        const semitone = ((midi % 12) + 12) % 12;
        if (BLACK_SEMITONES.has(semitone)) continue;

        const key = document.createElement("button");
        key.type = "button";
        key.className = "player-key player-key-white";

        if (semitone === 0) {
          key.classList.add("c-note");
          const label = document.createElement("span");
          label.className = "player-key-label";
          label.textContent = midiToNote(midi);
          key.appendChild(label);
        }

        const hasMappedSample = playableMidis.has(midi);
        const isKeyswitch = keyswitchSetsByMidi.has(midi);
        const isInteractive = hasMappedSample || isKeyswitch;
        if (isInteractive) {
          key.classList.add("has-sample");
          key.disabled = false;
          key.removeAttribute("aria-disabled");
        } else {
          key.classList.add("no-sample");
          key.disabled = true;
          key.setAttribute("aria-disabled", "true");
        }
        bindPlayerKeyEvents(key, midi);
        decorateOpenStringPlayerKey(key, midi);
        decorateKeyswitchPlayerKey(key, midi);
        el.playerKeyboardWhites.appendChild(key);
        whiteIndex += 1;
      }

      whiteIndex = -1;
      for (let midi = PLAYER_KB_START_MIDI; midi <= PLAYER_KB_END_MIDI; midi += 1) {
        const semitone = ((midi % 12) + 12) % 12;
        if (!BLACK_SEMITONES.has(semitone)) {
          whiteIndex += 1;
          continue;
        }

        const key = document.createElement("button");
        key.type = "button";
        key.className = "player-key player-key-black";
        const offset = blackOffsets[semitone] ?? 0.8;
        key.style.left = `${(whiteIndex + offset) * whiteKeyWidth}px`;
        key.style.width = `${whiteKeyWidth * 0.68}px`;
        const hasMappedSample = playableMidis.has(midi);
        const isKeyswitch = keyswitchSetsByMidi.has(midi);
        const isInteractive = hasMappedSample || isKeyswitch;
        if (isInteractive) {
          key.classList.add("has-sample");
          key.disabled = false;
          key.removeAttribute("aria-disabled");
        } else {
          key.classList.add("no-sample");
          key.disabled = true;
          key.setAttribute("aria-disabled", "true");
        }
        bindPlayerKeyEvents(key, midi);
        decorateOpenStringPlayerKey(key, midi);
        decorateKeyswitchPlayerKey(key, midi);
        el.playerKeyboardBlacks.appendChild(key);
      }

      applyHostHeldMidiNotesToPlayerKeys();
      window.requestAnimationFrame(() => scrollPlayerKeyboardToMidi(openStringScrollMidi ?? PLAYER_KB_START_MIDI));
    }

    function shiftKeyboardMapRange(direction, semitoneStep = 1) {
      const step = Math.max(1, Math.round(Number(semitoneStep) || 1));
      state.setupOctaveStart += direction * step;
      renderKeyboardMap(undefined, true);
    }

    function selectDonorRootForPlayedNote(playedMidi, entries = state.entries, manualRanges = state.manualRootRanges, options = {}) {
      const { roots, rangesByRoot } = getResolvedRootRanges(entries, manualRanges);
      if (!roots.length) return null;
      const normalizedPlayedMidi = Math.round(Number(playedMidi));
      if (!Number.isFinite(normalizedPlayedMidi)) return roots[0];
      for (let i = 0; i < roots.length; i += 1) {
        const root = roots[i];
        const range = rangesByRoot.get(root);
        if (!range) continue;
        if (normalizedPlayedMidi >= range.low && normalizedPlayedMidi <= range.high) return root;
      }
      if (options?.oneShotPlayback) {
        let nearestRoot = roots[0];
        let nearestDistance = Math.abs(nearestRoot - normalizedPlayedMidi);
        for (let i = 1; i < roots.length; i += 1) {
          const root = roots[i];
          const distance = Math.abs(root - normalizedPlayedMidi);
          if (distance < nearestDistance) {
            nearestRoot = root;
            nearestDistance = distance;
          }
        }
        return nearestRoot;
      }
      return null;
    }

    function getVelocityLayersForRoot(donorRoot, entries = state.entries) {
      const layers = Array.from(new Set(
        entries
          .filter((entry) => entryHasPlayableSource(entry) && entry.rootMidi === donorRoot)
          .map((entry) => entry.velocityLayer)
      )).sort((a, b) => a - b);
      return layers;
    }

    function hasLoopedEntriesForRoot(donorRoot, entries = state.entries) {
      if (!Number.isFinite(donorRoot)) return false;
      return entries.some((entry) => (
        entryHasPlayableSource(entry)
        && entry.rootMidi === donorRoot
        && isEntryLoopRegionActive(entry)
      ));
    }

    function getVelocityCrossfadePlan(donorRoot, midiVelocity, entries = state.entries) {
      const layers = getVelocityLayersForRoot(donorRoot, entries);
      if (!layers.length) return [];
      const v = Math.max(1, Math.min(127, Math.round(midiVelocity)));
      if (layers.length === 1) return [{ velocityLayer: layers[0], gain: 1, startDelaySec: 0 }];

      const layerCount = layers.length;
      const baseIdx = Math.min(layerCount - 1, Math.floor(((v - 1) * layerCount) / 127));
      const perRootPercent = getVelocityCrossfadePercentForRoot(donorRoot);
      const xfadePct = Math.max(0, Math.min(1, perRootPercent / 100));
      if (xfadePct <= 0.0001) return [{ velocityLayer: layers[baseIdx], gain: 1, startDelaySec: 0 }];

      const layerRange = 127 / layerCount;
      const halfWidth = Math.max(0.5, (layerRange * xfadePct * 0.5));
      for (let split = 1; split < layerCount; split += 1) {
        const splitVelocity = Math.ceil((split * 127) / layerCount) + 1;
        const center = splitVelocity - 0.5;
        const zoneStart = center - halfWidth;
        const zoneEnd = center + halfWidth;
        if (v < zoneStart || v > zoneEnd) continue;
        const t = clamp01((v - zoneStart) / Math.max(0.0001, zoneEnd - zoneStart));
        const lowerGain = Math.max(0, 1 - t);
        const upperGain = Math.max(0, t);

        // Mitigate comb-filter phasing when two layers overlap: delay the weaker layer slightly.
        const blendCenterWeight = 1 - Math.abs((t * 2) - 1);
        const baseDelaySec = 0.00045 + (blendCenterWeight * 0.00035);
        const jitterSec = ((Math.random() * 2) - 1) * 0.00006;
        const delaySec = Math.max(0.0002, Math.min(0.0012, baseDelaySec + jitterSec));
        const lowerDelaySec = lowerGain <= upperGain ? delaySec : 0;
        const upperDelaySec = upperGain < lowerGain ? delaySec : 0;

        return [
          { velocityLayer: layers[split - 1], gain: lowerGain, startDelaySec: lowerDelaySec },
          { velocityLayer: layers[split], gain: upperGain, startDelaySec: upperDelaySec }
        ].filter((item) => item.gain > 0.0001);
      }

      return [{ velocityLayer: layers[baseIdx], gain: 1, startDelaySec: 0 }];
    }

    function pickSampleEntryForPlayback(playedMidi, donorRoot, velocityLayer, entries = state.entries) {
      const variants = entries
        .filter((entry) => (
          entryHasPlayableSource(entry)
          && entry.rootMidi === donorRoot
          && entry.velocityLayer === velocityLayer
        ))
        .sort((a, b) => ((a.rrIndex ?? 999) - (b.rrIndex ?? 999)) || (a.order - b.order));
      if (!variants.length) return null;

      const cursorKey = `${playedMidi}:${velocityLayer}`;
      const cursor = state.rrCursor[cursorKey] ?? 0;
      const pick = variants[cursor % variants.length];
      state.rrCursor[cursorKey] = (cursor + 1) % variants.length;
      return pick;
    }

    function computeAudioRms(audioBuffer, fromSec, toSec) {
      if (!audioBuffer || !audioBuffer.length) return 0;
      const sampleRate = audioBuffer.sampleRate || 44100;
      const start = Math.max(0, Math.min(audioBuffer.length - 1, Math.floor((Number(fromSec) || 0) * sampleRate)));
      const end = Math.max(start + 1, Math.min(audioBuffer.length, Math.ceil((Number(toSec) || 0) * sampleRate)));
      if (end <= start) return 0;

      const channels = Math.max(1, audioBuffer.numberOfChannels || 1);
      let sumSquares = 0;
      let count = 0;

      for (let ch = 0; ch < channels; ch += 1) {
        const data = audioBuffer.getChannelData(ch);
        for (let i = start; i < end; i += 1) {
          const sample = data[i] || 0;
          sumSquares += sample * sample;
          count += 1;
        }
      }

      if (!count) return 0;
      return Math.sqrt(sumSquares / count);
    }

    function computeLoopIncomingGainScale(audioBuffer, loop, options = null) {
      if (!state.autoGainCrossfade) return 1;
      if (!loop || !Number.isFinite(loop.crossfadeSec) || loop.crossfadeSec <= 0.0005) return 1;
      const mixGain = Math.max(0, Math.min(1, Number(options?.mixGain) || 1));
      const velocityLayerCount = Math.max(1, Math.round(Number(options?.velocityLayerCount) || 1));

      const outFrom = Math.max(0, loop.endSec - loop.crossfadeSec);
      const outTo = loop.endSec;
      const inFrom = loop.fadeStartSec;
      const inTo = loop.startSec;
      const outgoingRms = computeAudioRms(audioBuffer, outFrom, outTo);
      const incomingRms = computeAudioRms(audioBuffer, inFrom, inTo);
      if (outgoingRms < 0.00001 || incomingRms < 0.00001) return 1;

      const gainScale = outgoingRms / incomingRms;
      if (!Number.isFinite(gainScale) || gainScale <= 0) return 1;

      // Multi-velocity playback can stack loop compensation and make pass 2 louder.
      // Keep loop incoming gain neutral whenever layers are blended or multiple
      // velocity layers exist for the donor root.
      if (velocityLayerCount > 1 || mixGain < 0.999) {
        return Math.max(0.85, Math.min(1, Math.sqrt(gainScale)));
      }

      // Single-layer playback can use mild AGC to reduce pass-2 dips without
      // creating aggressive level jumps.
      return Math.max(0.85, Math.min(1.25, Math.sqrt(gainScale)));
    }

    function dbToGain(db) {
      return Math.pow(10, (Number(db) || 0) / 20);
    }

    function getPlayerVoiceSettings() {
      const attackSec = Math.max(0, getKnobNumericValue("ampAttack", 10) / 1000);
      const decaySec = Math.max(0, getKnobNumericValue("ampDecay", 120) / 1000);
      const sustainLevel = clamp01(getKnobNumericValue("ampSustain", 100) / 100);
      const releaseSec = Math.max(0.005, getKnobNumericValue("ampRelease", 2000) / 1000);
      const outputGain = Math.max(0, dbToGain(getKnobNumericValue("gain", 0)));
      return {
        attackSec,
        decaySec,
        sustainLevel,
        releaseSec,
        outputGain
      };
    }

    function scheduleAmpEnvelope(param, now, releaseAnchor, settings, peakGain) {
      const attackSec = Math.max(0.001, Number(settings.attackSec) || 0);
      const decaySec = Math.max(0, Number(settings.decaySec) || 0);
      const sustainLevel = clamp01(Number(settings.sustainLevel));
      const releaseSec = Math.max(0.005, Number(settings.releaseSec) || 0.005);
      const peak = Math.max(0.0001, Number(peakGain) || 0.0001);
      const sustain = Math.max(0.0001, peak * sustainLevel);

      param.cancelScheduledValues(now);
      param.setValueAtTime(0.0001, now);
      const attackEnd = now + attackSec;
      param.linearRampToValueAtTime(peak, attackEnd);
      const decayEnd = attackEnd + decaySec;
      param.linearRampToValueAtTime(sustain, decayEnd);

      const releaseStart = Math.max(decayEnd, Number(releaseAnchor) || decayEnd);
      param.setValueAtTime(sustain, releaseStart);
      const releaseEnd = releaseStart + releaseSec;
      param.linearRampToValueAtTime(0.0001, releaseEnd);
      return releaseEnd;
    }

    function scheduleHeldAmpEnvelope(param, now, settings, peakGain) {
      const attackSec = Math.max(0.001, Number(settings.attackSec) || 0);
      const decaySec = Math.max(0, Number(settings.decaySec) || 0);
      const sustainLevel = clamp01(Number(settings.sustainLevel));
      const peak = Math.max(0.0001, Number(peakGain) || 0.0001);
      const sustain = Math.max(0.0001, peak * sustainLevel);

      param.cancelScheduledValues(now);
      param.setValueAtTime(0.0001, now);
      const attackEnd = now + attackSec;
      param.linearRampToValueAtTime(peak, attackEnd);
      const decayEnd = attackEnd + decaySec;
      param.linearRampToValueAtTime(sustain, decayEnd);
      param.setValueAtTime(sustain, decayEnd + 0.0005);
    }

    function schedulePlaybackSegment(
      ctx,
      destinationNode,
      audioBuffer,
      playbackRate,
      whenSec,
      sourceStartSec,
      sourceEndSec,
      fadeInSec,
      fadeOutSec,
      gainScale = 1,
      hardStopSec = Number.POSITIVE_INFINITY
    ) {
      const srcStart = Math.max(0, Math.min(audioBuffer.duration, Number(sourceStartSec) || 0));
      const srcEndRaw = Math.max(srcStart + 0.002, Math.min(audioBuffer.duration, Number(sourceEndSec) || audioBuffer.duration));
      const srcDuration = srcEndRaw - srcStart;
      const naturalEndSec = whenSec + (srcDuration / playbackRate);
      const cappedEndSec = Number.isFinite(hardStopSec) ? Math.min(naturalEndSec, hardStopSec) : naturalEndSec;
      if (!Number.isFinite(cappedEndSec) || cappedEndSec <= whenSec + 0.0002) return null;

      const playOutSec = cappedEndSec - whenSec;
      const safeFadeIn = Math.max(0, Math.min(Number(fadeInSec) || 0, playOutSec * 0.5));
      const safeFadeOut = Math.max(0, Math.min(Number(fadeOutSec) || 0, playOutSec * 0.5));
      const scale = Math.max(0.05, Math.min(4, Number(gainScale) || 1));

      const source = ctx.createBufferSource();
      source.buffer = audioBuffer;
      source.playbackRate.value = playbackRate;

      const gain = ctx.createGain();
      source.connect(gain);
      gain.connect(destinationNode);

      const forcedCap = cappedEndSec < naturalEndSec - 0.0005;
      const fadeOutDuration = safeFadeOut > 0.0005
        ? safeFadeOut
        : (forcedCap ? Math.min(0.012, Math.max(0.002, playOutSec * 0.35)) : 0);

      gain.gain.setValueAtTime(0.0001, whenSec);
      if (safeFadeIn > 0.0005) {
        const points = 48;
        const fadeInCurve = new Float32Array(points);
        for (let i = 0; i < points; i += 1) {
          const t = i / (points - 1);
          fadeInCurve[i] = Math.max(0.0001, scale * Math.sin(t * Math.PI * 0.5));
        }
        gain.gain.setValueCurveAtTime(fadeInCurve, whenSec, safeFadeIn);
      } else {
        gain.gain.setValueAtTime(scale, whenSec + 0.0005);
      }

      const fadeOutStartSec = Math.max(whenSec, cappedEndSec - fadeOutDuration);
      gain.gain.setValueAtTime(scale, fadeOutStartSec);
      if (fadeOutDuration > 0.0005) {
        const points = 48;
        const fadeOutCurve = new Float32Array(points);
        for (let i = 0; i < points; i += 1) {
          const t = i / (points - 1);
          fadeOutCurve[i] = Math.max(0.0001, scale * Math.cos(t * Math.PI * 0.5));
        }
        gain.gain.setValueCurveAtTime(fadeOutCurve, fadeOutStartSec, fadeOutDuration);
      } else if (forcedCap) {
        gain.gain.linearRampToValueAtTime(0.0001, cappedEndSec);
      }

      source.start(whenSec, srcStart, srcDuration);
      source.stop(cappedEndSec + 0.02);

      const playedSourceDuration = Math.max(0, (cappedEndSec - whenSec) * playbackRate);
      const srcEnd = Math.min(srcEndRaw, srcStart + playedSourceDuration);
      return {
        t0: whenSec,
        t1: cappedEndSec,
        src0: srcStart,
        src1: srcEnd,
        source
      };
    }

    function stopPreviewHtmlAudioForKey(keyMidi, fadeOutSec = 0, clearGroup = true) {
      if (!Number.isFinite(keyMidi)) return;
      const activeGroup = state.previewHtmlAudioByKey.get(keyMidi);
      if (!activeGroup) return;
      const audios = Array.isArray(activeGroup.audios) ? activeGroup.audios.slice() : [activeGroup];
      if (clearGroup) {
        state.previewHtmlAudioByKey.delete(keyMidi);
      }
      const fadeMs = Math.max(0, Math.round((Number(fadeOutSec) || 0) * 1000));
      audios.forEach((audio) => {
        try {
          if (audio && Number.isFinite(audio.__spFadeTimer) && audio.__spFadeTimer > 0) {
            window.clearInterval(audio.__spFadeTimer);
            audio.__spFadeTimer = 0;
          }
          const startVolume = Number.isFinite(audio.volume) ? audio.volume : 1;
          if (fadeMs <= 4 || startVolume <= 0.0001) {
            audio.pause();
            audio.currentTime = 0;
            audio.volume = startVolume;
            return;
          }

          const steps = Math.max(2, Math.round(fadeMs / 16));
          const stepMs = Math.max(8, Math.round(fadeMs / steps));
          let step = 0;
          const timerId = window.setInterval(() => {
            step += 1;
            const t = Math.min(1, step / steps);
            audio.volume = Math.max(0, startVolume * (1 - t));
            if (t >= 1) {
              window.clearInterval(timerId);
              audio.__spFadeTimer = 0;
              try {
                audio.pause();
                audio.currentTime = 0;
              } catch {
                // best effort
              }
              audio.volume = startVolume;
            }
          }, stepMs);
          audio.__spFadeTimer = timerId;
        } catch {
          // best effort
        }
      });
    }

    function disconnectPreviewVoiceNodes(voice) {
      if (!voice) return;
      if (voice.loopScheduleTimer) {
        window.clearInterval(voice.loopScheduleTimer);
        voice.loopScheduleTimer = 0;
      }
      if (Array.isArray(voice.sources)) {
        voice.sources.forEach((src) => {
          try { src.disconnect(); } catch {}
        });
      }
      try { voice.voiceInput.disconnect(); } catch {}
      try { voice.ampEnvelope.disconnect(); } catch {}
    }

    function stopPreviewVoice(voice, fadeOutSec = 0.007, atTime = null) {
      if (!voice) return;

      const ctx = voice.ctx;
      const now = Number.isFinite(atTime) ? atTime : (ctx?.currentTime ?? 0);
      const requestedFade = Number(fadeOutSec);
      const hardCut = !(requestedFade > 0.000001);
      if (voice.stopping && !hardCut) return;
      voice.stopping = true;
      const stopAt = hardCut ? now : (now + Math.max(0.001, requestedFade || 0.007));

      const gainParam = voice.ampEnvelope?.gain;
      if (gainParam) {
        try {
          gainParam.cancelScheduledValues(now);
          if (hardCut) {
            gainParam.setValueAtTime(0, now);
          } else {
            const currentGain = Math.max(0.0001, Number(gainParam.value) || 0.0001);
            gainParam.setValueAtTime(currentGain, now);
            gainParam.linearRampToValueAtTime(0.0001, stopAt);
          }
        } catch {
          // gain schedule may be stale
        }
      }

      if (Array.isArray(voice.sources)) {
        voice.sources.forEach((src) => {
          try { src.stop(hardCut ? now : (stopAt + 0.02)); } catch {}
        });
      }

      const cleanupMs = hardCut ? 0 : Math.max(40, Math.round(((stopAt - now) + 0.08) * 1000));
      window.setTimeout(() => {
        disconnectPreviewVoiceNodes(voice);
      }, cleanupMs);
    }

    function stopPreviewVoiceForKey(keyMidi, fadeOutSec = 0.007, atTime = null, clearGroup = true) {
      if (!Number.isFinite(keyMidi)) return;
      const existingGroup = state.previewVoicesByKey.get(keyMidi);
      if (existingGroup) {
        if (clearGroup) {
          state.previewVoicesByKey.delete(keyMidi);
        }
        const voices = Array.isArray(existingGroup.voices) ? existingGroup.voices : [existingGroup];
        voices.forEach((voice) => stopPreviewVoice(voice, fadeOutSec, atTime));
      }
      stopPreviewHtmlAudioForKey(keyMidi, fadeOutSec, clearGroup);
    }

    function stopAllPreviewVoices(fadeOutSec = 0.007) {
      const now = state.audioContext ? state.audioContext.currentTime : null;
      state.previewVoicesByKey.forEach((group) => {
        const voices = Array.isArray(group.voices) ? group.voices : [group];
        voices.forEach((voice) => stopPreviewVoice(voice, fadeOutSec, now));
      });
      state.previewVoicesByKey.clear();
      state.previewHtmlAudioByKey.forEach((group) => {
        const audios = Array.isArray(group.audios) ? group.audios : [group];
        audios.forEach((audio) => {
          try {
            audio.pause();
            audio.currentTime = 0;
          } catch {
            // best effort
          }
        });
      });
      state.previewHtmlAudioByKey.clear();
      state.previewTriggerSerialByKey.clear();
    }

    function playMappedSampleEntry(
      entry,
      velocityNorm,
      playedMidi,
      donorRoot,
      layerMixGain = 1,
      externalKeySerial = null,
      layerStartDelaySec = 0,
      holdLoopUntilRelease = true,
      playAsOneShot = false
    ) {
      const keyMidi = Number.isFinite(playedMidi) ? Math.round(playedMidi) : null;
      if (keyMidi === null) return;
      if (!entry) return;

      if (!entry.sampleUrl) {
        const retrySerial = Number.isFinite(externalKeySerial)
          ? Number(externalKeySerial)
          : (state.previewTriggerSerialByKey.get(keyMidi) ?? 0);
        void ensureEntrySampleUrl(entry, 3200).then((url) => {
          if (!url) return;
          if ((state.previewTriggerSerialByKey.get(keyMidi) ?? 0) !== retrySerial) return;
          playMappedSampleEntry(
            entry,
            velocityNorm,
            playedMidi,
            donorRoot,
            layerMixGain,
            retrySerial,
            layerStartDelaySec,
            holdLoopUntilRelease,
            playAsOneShot
          );
        });
        return;
      }

      ensureEntryEditorState(entry);
      if (state.selectedMapEntryOrder !== entry.order) stopWaveformPlayhead();
      const mixGain = Math.max(0, Math.min(1, Number(layerMixGain) || 0));
      if (mixGain <= 0.0001) return;

      let keySerial = Number.isFinite(externalKeySerial) ? Number(externalKeySerial) : null;
      if (keySerial === null) {
        keySerial = (state.previewTriggerSerialByKey.get(keyMidi) ?? 0) + 1;
        state.previewTriggerSerialByKey.set(keyMidi, keySerial);
        stopPreviewVoiceForKey(keyMidi, SAME_KEY_RETRIGGER_FADE_SEC);
      }

      if ((state.previewTriggerSerialByKey.get(keyMidi) ?? 0) !== keySerial) return;
      const activeVoiceGroup = state.previewVoicesByKey.get(keyMidi);
      if (!activeVoiceGroup || activeVoiceGroup.serial !== keySerial || !Array.isArray(activeVoiceGroup.voices)) {
        state.previewVoicesByKey.set(keyMidi, { serial: keySerial, voices: [] });
      }
      const activeHtmlGroup = state.previewHtmlAudioByKey.get(keyMidi);
      if (!activeHtmlGroup || activeHtmlGroup.serial !== keySerial || !Array.isArray(activeHtmlGroup.audios)) {
        state.previewHtmlAudioByKey.set(keyMidi, { serial: keySerial, audios: [] });
      }

      const velocityGain = Math.max(0.05, Math.min(1, 0.2 + (velocityNorm * 0.8)));
      const semitoneRatio = playAsOneShot ? 1 : Math.pow(2, (playedMidi - donorRoot) / 12);
      const fineTuneRatio = Math.pow(2, clampFineTune(entry.fineTuneCents ?? 0) / 1200);
      const pitchDownRatio = getPlayerPitchDownRateRatio();
      const sampleGainScale = dbToGain(entry.editorGainDb ?? 0);
      const mapSetGainScale = dbToGain(getKeyswitchSetGainDb(entry?.mapSetId || state.activeMapSetId));
      const playbackRate = Math.max(0.125, Math.min(8, semitoneRatio * fineTuneRatio * pitchDownRatio));
      const voiceSettings = getPlayerVoiceSettings();
      const peakGain = Math.max(0.0001, velocityGain * voiceSettings.outputGain * mixGain * sampleGainScale * mapSetGainScale);
      const startDelaySec = Math.max(0, Math.min(0.003, Number(layerStartDelaySec) || 0));

      getWaveformForEntry(entry).then((waveform) => {
        if ((state.previewTriggerSerialByKey.get(keyMidi) ?? 0) !== keySerial) return;
        const audioBuffer = waveform?.audioBuffer;
        if (!audioBuffer) throw new Error("missing buffer");
        const ctx = ensureAudioContext();
        if (ctx.state === "suspended") ctx.resume().catch(() => {});

        const now = ctx.currentTime + startDelaySec;

        const voiceInput = ctx.createGain();
        const ampEnvelope = ctx.createGain();
        voiceInput.connect(ampEnvelope);
        ampEnvelope.connect(ctx.destination);

        const voiceId = (state.previewVoiceId += 1);
        const voiceRef = {
          id: voiceId,
          keyMidi: playedMidi,
          ctx,
          voiceInput,
          ampEnvelope,
          voiceSettings,
          sources: [],
          loopScheduleTimer: 0,
          stopping: false
        };
        const voiceGroup = state.previewVoicesByKey.get(keyMidi);
        if (!voiceGroup || voiceGroup.serial !== keySerial || !Array.isArray(voiceGroup.voices)) {
          disconnectPreviewVoiceNodes(voiceRef);
          return;
        }
        voiceGroup.voices.push(voiceRef);

        const segments = [];
        let stopAt = now;
        const trackSegmentsForPlayhead = state.selectedMapEntryOrder === entry.order;
        const sampleStartSec = Math.max(0, Math.min(
          Math.max(0, audioBuffer.duration - 0.002),
          clamp01(entry.sampleStartNorm ?? 0) * audioBuffer.duration
        ));

        const loop = getEntryLoopTimes(entry, audioBuffer.duration);
        if (loop.active && holdLoopUntilRelease) {
          const crossfadeOutSec = Math.max(0, loop.crossfadeSec / playbackRate);
          const loopPeriodSec = Math.max(0.0001, (loop.endSec - loop.startSec) / playbackRate);
          stopAt = Number.POSITIVE_INFINITY;
          const loopSegmentStartSec = Math.min(loop.startSec, loop.fadeStartSec);
          const velocityLayerCount = getVelocityLayersForRoot(donorRoot).length;
          const loopIncomingGain = computeLoopIncomingGainScale(audioBuffer, loop, {
            mixGain,
            velocityLayerCount
          });

          const firstSegment = schedulePlaybackSegment(
            ctx,
            voiceInput,
            audioBuffer,
            playbackRate,
            now,
            sampleStartSec,
            loop.endSec,
            Math.max(0.002, voiceSettings.attackSec),
            crossfadeOutSec,
            1
          );
          if (firstSegment) {
            if (trackSegmentsForPlayhead) segments.push(firstSegment);
            if (firstSegment.source) voiceRef.sources.push(firstSegment.source);
          }

          if (loopPeriodSec > 0.004) {
            let segmentStartSec = now + ((loop.endSec - sampleStartSec) / playbackRate) - crossfadeOutSec;
            const scheduleAheadSec = Math.max(0.35, (loopPeriodSec * 2.25) + 0.08);
            const maxSegmentsPerPass = 256;
            const scheduleLoopSegments = () => {
              if (voiceRef.stopping) return;
              if ((state.previewTriggerSerialByKey.get(keyMidi) ?? 0) !== keySerial) return;
              const horizon = ctx.currentTime + scheduleAheadSec;
              let count = 0;
              while (segmentStartSec < horizon && count < maxSegmentsPerPass) {
                const nextSegment = schedulePlaybackSegment(
                  ctx,
                  voiceInput,
                  audioBuffer,
                  playbackRate,
                  segmentStartSec,
                  loopSegmentStartSec,
                  loop.endSec,
                  crossfadeOutSec,
                  crossfadeOutSec,
                  loopIncomingGain
                );
                if (nextSegment) {
                  if (trackSegmentsForPlayhead && segments.length < 512) segments.push(nextSegment);
                  if (nextSegment.source) voiceRef.sources.push(nextSegment.source);
                }
                segmentStartSec += loopPeriodSec;
                count += 1;
              }
            };
            scheduleLoopSegments();
            voiceRef.loopScheduleTimer = window.setInterval(scheduleLoopSegments, 120);
          }

          scheduleHeldAmpEnvelope(
            ampEnvelope.gain,
            now,
            voiceSettings,
            peakGain
          );

          if (trackSegmentsForPlayhead && segments.length) {
            const previewStopForPlayhead = now + 12;
            startWaveformPlayhead(entry, ctx, audioBuffer.duration, segments, previewStopForPlayhead);
          }
          return;
        } else {
          const playSec = Math.max(0.01, (audioBuffer.duration - sampleStartSec) / playbackRate);
          stopAt = now + playSec;
          const oneShot = schedulePlaybackSegment(
            ctx,
            voiceInput,
            audioBuffer,
            playbackRate,
            now,
            sampleStartSec,
            audioBuffer.duration,
            Math.max(0.002, voiceSettings.attackSec),
            0.01,
            1,
            stopAt + 0.03
          );
          if (oneShot) {
            if (trackSegmentsForPlayhead) segments.push(oneShot);
            if (oneShot.source) voiceRef.sources.push(oneShot.source);
          }
        }

        const ampReleaseEnd = scheduleAmpEnvelope(
          ampEnvelope.gain,
          now,
          stopAt,
          voiceSettings,
          peakGain
        );
        const releaseEnd = ampReleaseEnd;

        if (trackSegmentsForPlayhead && segments.length) {
          startWaveformPlayhead(entry, ctx, audioBuffer.duration, segments, stopAt);
        }

        const cleanupMs = Math.max(160, Math.round(((releaseEnd - now) + 0.12) * 1000));
        window.setTimeout(() => {
          const currentVoiceGroup = state.previewVoicesByKey.get(keyMidi);
          if (currentVoiceGroup && currentVoiceGroup.serial === keySerial && Array.isArray(currentVoiceGroup.voices)) {
            currentVoiceGroup.voices = currentVoiceGroup.voices.filter((voice) => voice.id !== voiceId);
            if (!currentVoiceGroup.voices.length) {
              const currentHtmlGroup = state.previewHtmlAudioByKey.get(keyMidi);
              if (!currentHtmlGroup || currentHtmlGroup.serial !== keySerial || !Array.isArray(currentHtmlGroup.audios) || !currentHtmlGroup.audios.length) {
                state.previewVoicesByKey.delete(keyMidi);
              }
            }
          }
          disconnectPreviewVoiceNodes(voiceRef);
        }, cleanupMs);
      }).catch(() => {
        if ((state.previewTriggerSerialByKey.get(keyMidi) ?? 0) !== keySerial) return;
        if (state.selectedMapEntryOrder === entry.order) stopWaveformPlayhead();
        const audio = new Audio(entry.sampleUrl);
        audio.volume = Math.max(0, Math.min(1, velocityGain * mixGain * sampleGainScale * mapSetGainScale * Math.min(1, voiceSettings.outputGain)));
        audio.playbackRate = playbackRate;
        if ("preservesPitch" in audio) audio.preservesPitch = false;
        if ("mozPreservesPitch" in audio) audio.mozPreservesPitch = false;
        if ("webkitPreservesPitch" in audio) audio.webkitPreservesPitch = false;
        const htmlGroup = state.previewHtmlAudioByKey.get(keyMidi);
        if (htmlGroup && htmlGroup.serial === keySerial && Array.isArray(htmlGroup.audios)) {
          htmlGroup.audios.push(audio);
        } else {
          state.previewHtmlAudioByKey.set(keyMidi, { serial: keySerial, audios: [audio] });
        }
        audio.addEventListener("ended", () => {
          const currentHtmlGroup = state.previewHtmlAudioByKey.get(keyMidi);
          if (currentHtmlGroup && currentHtmlGroup.serial === keySerial && Array.isArray(currentHtmlGroup.audios)) {
            currentHtmlGroup.audios = currentHtmlGroup.audios.filter((item) => item !== audio);
            if (!currentHtmlGroup.audios.length) {
              const currentVoiceGroup = state.previewVoicesByKey.get(keyMidi);
              if (!currentVoiceGroup || currentVoiceGroup.serial !== keySerial || !Array.isArray(currentVoiceGroup.voices) || !currentVoiceGroup.voices.length) {
                state.previewHtmlAudioByKey.delete(keyMidi);
              }
            }
          }
        }, { once: true });
        const playAudio = () => audio.play().catch(() => {});
        const htmlSampleStartSec = clamp01(entry.sampleStartNorm ?? 0) * Math.max(0, audio.duration || 0);
        if (htmlSampleStartSec > 0.0005) {
          try { audio.currentTime = htmlSampleStartSec; } catch {}
        }
        if (startDelaySec > 0.0001) window.setTimeout(playAudio, Math.round(startDelaySec * 1000));
        else playAudio();
      });
    }

    function triggerKeyboardMapKey(midi, pointerRatioY, options = null) {
      if (!Number.isFinite(midi)) return false;
      const hasExplicitSource = options && Array.isArray(options.entries);
      const playedMidi = Math.max(0, Math.min(127, Math.round(Number(midi) || 0)));
      let sourceEntries = hasExplicitSource ? options.entries : null;
      let playbackSource = hasExplicitSource
        ? {
            entries: sourceEntries,
            manualRanges: (options && typeof options.manualRanges === "object" && options.manualRanges !== null)
              ? options.manualRanges
              : state.manualRootRanges,
            oneShotPlayback: !!options?.oneShotPlayback
          }
        : null;
      let manualRanges = (options && typeof options.manualRanges === "object" && options.manualRanges !== null)
        ? options.manualRanges
        : null;
      let switchedByKeyswitch = false;

      if (!hasExplicitSource) {
        const keyswitchSet = getKeyswitchSetForMidi(midi);
        if (keyswitchSet) {
          const activeTab = getActiveTab();
          const isPlayerTab = activeTab === "player";
          setActiveMapSet(keyswitchSet.id, !isPlayerTab);
          if (getNativeBackend()) {
            // Send a real keyswitch note-on through the DSP path so articulation
            // switching is sample-accurate and does not depend on UI event timing.
            emitNativePreviewMidi(true, midi, 100, 1);
          }
          if (isPlayerTab) {
            renderPlayerKeyboard();
          }
          switchedByKeyswitch = true;
          // Avoid synchronous native session flush here; it causes noticeable stalls
          // when rapidly switching articulations from the player keyboard.
          return true;
        }

        // In the native plugin, route preview keys through the DSP engine so
        // audio goes through the plugin output bus (host metering works).
        if (getNativeBackend()) {
          playbackSource = getPlayerPlaybackSource();
          if (!playbackSource.oneShotPlayback) {
            const donorRoot = selectDonorRootForPlayedNote(playedMidi, playbackSource.entries, playbackSource.manualRanges);
            if (donorRoot === null) return switchedByKeyswitch;
          }
          const ratio = Math.max(0, Math.min(1, pointerRatioY));
          const midiVelocity = Math.max(1, Math.min(127, Math.round((ratio * 126) + 1)));
          return emitNativePreviewMidi(true, playedMidi, midiVelocity, 1);
        }

        playbackSource = getPlayerPlaybackSource();
        sourceEntries = playbackSource.entries;
        manualRanges = playbackSource.manualRanges;
      }

      if (!Array.isArray(sourceEntries) || !sourceEntries.length) return switchedByKeyswitch;
      if (!manualRanges || typeof manualRanges !== "object") manualRanges = state.manualRootRanges;
      const ratio = Math.max(0, Math.min(1, pointerRatioY));
      const velocityNorm = ratio;
      const donorRoot = selectDonorRootForPlayedNote(playedMidi, sourceEntries, manualRanges, {
        oneShotPlayback: !!playbackSource?.oneShotPlayback
      });
      if (donorRoot === null) return switchedByKeyswitch;
      const useModwheelVelocity = isAutoModwheelVelocityControlActiveForRoot(donorRoot, sourceEntries);
      const loopedVelocityRoot = hasLoopedEntriesForRoot(donorRoot, sourceEntries);
      const lockVelocityToModwheelMode = useModwheelVelocity && loopedVelocityRoot;
      const velocitySelectorNorm = useModwheelVelocity
        ? Math.max(0, Math.min(1, Number(state.modWheelValue) || 0))
        : velocityNorm;
      const midiVelocity = Math.round((velocitySelectorNorm * 126) + 1);
      const playbackPlan = getVelocityCrossfadePlan(donorRoot, midiVelocity, sourceEntries);
      if (!playbackPlan.length) return switchedByKeyswitch;

      const keyMidi = Math.round(playedMidi);
      const keySerial = (state.previewTriggerSerialByKey.get(keyMidi) ?? 0) + 1;
      state.previewTriggerSerialByKey.set(keyMidi, keySerial);
      stopPreviewVoiceForKey(keyMidi, SAME_KEY_RETRIGGER_FADE_SEC);
      state.previewVoicesByKey.set(keyMidi, { serial: keySerial, voices: [] });
      state.previewHtmlAudioByKey.set(keyMidi, { serial: keySerial, audios: [] });
      const holdLoopUntilRelease = options && Object.prototype.hasOwnProperty.call(options, "holdLoopUntilRelease")
        ? !!options.holdLoopUntilRelease
        : !hasExplicitSource;

      let startedCount = 0;
      playbackPlan.forEach((item) => {
        const gain = Math.max(0, Math.min(1, Number(item.gain) || 0));
        if (gain <= 0.0001) return;
        const entry = pickSampleEntryForPlayback(playedMidi, donorRoot, item.velocityLayer, sourceEntries);
        if (!entry) return;
        flashPlayedMapEntry(entry);
        const delaySec = Math.max(0, Math.min(0.003, Number(item.startDelaySec) || 0));
        const playbackVelocityNorm = lockVelocityToModwheelMode ? 1 : velocityNorm;
        if (!entry.sampleUrl && entry.manifestPath) {
          void ensureEntrySampleUrl(entry, 3200).then((url) => {
            if (!url) return;
            if ((state.previewTriggerSerialByKey.get(keyMidi) ?? 0) !== keySerial) return;
            playMappedSampleEntry(entry, playbackVelocityNorm, playedMidi, donorRoot, gain, keySerial, delaySec, holdLoopUntilRelease, !!playbackSource?.oneShotPlayback);
          });
          startedCount += 1;
          return;
        }
        playMappedSampleEntry(entry, playbackVelocityNorm, playedMidi, donorRoot, gain, keySerial, delaySec, holdLoopUntilRelease, !!playbackSource?.oneShotPlayback);
        startedCount += 1;
      });

      if (!startedCount) {
        state.previewVoicesByKey.delete(keyMidi);
        state.previewHtmlAudioByKey.delete(keyMidi);
        return switchedByKeyswitch;
      }

      return true;
    }

    function setupKeyboardMap() {
      let mapMatrixDeleteSelection = null;
      const armMatrixNumericInputForQuickReplace = (inputEl) => {
        if (!inputEl) return;

        inputEl.addEventListener("pointerdown", (ev) => {
          if (document.activeElement === inputEl) return;
          ev.preventDefault();
          inputEl.focus({ preventScroll: true });
        });

        const selectAll = () => {
          window.requestAnimationFrame(() => {
            try {
              inputEl.select();
            } catch {}
          });
        };

        inputEl.addEventListener("focus", selectAll);
        inputEl.addEventListener("click", selectAll);
      };

      if (el.keyswitchMapSelect) {
        el.keyswitchMapSelect.addEventListener("change", () => {
          mapMatrixDeleteSelection = null;
          setActiveMapSet(el.keyswitchMapSelect.value, true);
        });
      }

      if (el.keyswitchGainKnob) {
        el.keyswitchGainKnob.addEventListener("knobchange", (ev) => {
          const activeSet = getKeyswitchSetById(state.activeMapSetId);
          if (!activeSet) {
            syncKeyswitchGainKnob();
            return;
          }

          const nextDb = clampKeyswitchGainDb(ev?.detail?.value ?? 0);
          if (Math.abs(getKeyswitchSetGainDb(activeSet) - nextDb) < 0.049) return;

          ensureSessionStateWritable("keyswitch-gain");
          activeSet.gainDb = nextDb;
          emitNativeEvent("keyswitch_gain_set", {
            setId: activeSet.id,
            gainDb: nextDb
          });
          scheduleSessionStateSave(220);
        });
      }

      if (el.keyswitchMapNormalizeBtn) {
        el.keyswitchMapNormalizeBtn.addEventListener("click", () => {
          void normalizeAllSamples();
        });
      }

      /* ---- New Keyswitch popover ---- */
      if (el.newKeyswitchBtn && el.newKeyswitchPopover) {
        const showNewKsPopover = () => {
          const suggested = midiToNote(suggestUnusedKeyswitchMidi());
          el.newKsNameInput.value = "";
          el.newKsNoteInput.value = suggested;
          const btnRect = el.newKeyswitchBtn.getBoundingClientRect();
          el.newKeyswitchPopover.style.left = btnRect.left + "px";
          el.newKeyswitchPopover.style.top = (btnRect.bottom + 4) + "px";
          el.newKeyswitchPopover.classList.add("visible");
          requestAnimationFrame(() => el.newKsNameInput.focus());
        };

        const hideNewKsPopover = () => {
          el.newKeyswitchPopover.classList.remove("visible");
        };

        const createNewKeyswitchSet = () => {
          const name = el.newKsNameInput.value.trim() || "Keyswitch";
          const noteRaw = el.newKsNoteInput.value.trim();
          const normalized = normalizeKeyswitchKey(noteRaw, suggestUnusedKeyswitchMidi());
          hideNewKsPopover();

          ensureSessionStateWritable("new-keyswitch");
          if (!Array.isArray(state.keyswitchSets)) state.keyswitchSets = [];

          const set = {
            id: `ks_${Date.now()}_${Math.random().toString(36).slice(2, 7)}`,
            name,
            key: normalized.key,
            keyMidi: normalized.keyMidi,
            loopPlaybackEnabled: true,
            gainDb: 0,
            playbackMode: normalizeKeyswitchTriggerModeName(name) !== "manual" ? "oneshot" : "spread",
            openStringMidis: [],
            openStringColorsByMidi: {},
            sourceFile: "",
            sourcePath: "",
            manifestBasePath: "",
            entries: [],
            manualRanges: {}
          };

          state.keyswitchSets.push(set);
          state.activeMapSetId = set.id;
          updateKeyswitchMapSelector();
          renderKeyboardMap(undefined, true);

          const duplicates = collectDuplicateKeyswitchKeys();
          if (duplicates.has(set.keyMidi)) {
            setStatus(el.setupStatus, `Created keyswitch "${name}" with duplicate key ${set.key}. Change it in Keyboard Map.`, "warn");
          } else {
            setStatus(el.setupStatus, `Created keyswitch "${name}" (${set.key}).`, "ok");
          }
          scheduleSessionStateSave(350);
          void flushSessionStateToNative(false);
        };

        el.newKeyswitchBtn.addEventListener("click", () => {
          if (el.newKeyswitchPopover.classList.contains("visible")) {
            hideNewKsPopover();
          } else {
            showNewKsPopover();
          }
        });

        el.newKsCreateBtn.addEventListener("click", createNewKeyswitchSet);

        el.newKsNameInput.addEventListener("keydown", (ev) => {
          if (ev.key === "Enter") { ev.preventDefault(); el.newKsNoteInput.focus(); }
          if (ev.key === "Escape") hideNewKsPopover();
        });
        el.newKsNoteInput.addEventListener("keydown", (ev) => {
          if (ev.key === "Enter") { ev.preventDefault(); createNewKeyswitchSet(); }
          if (ev.key === "Escape") hideNewKsPopover();
        });

        document.addEventListener("pointerdown", (ev) => {
          if (!el.newKeyswitchPopover.contains(ev.target) && ev.target !== el.newKeyswitchBtn) {
            hideNewKsPopover();
          }
        });
      }
      if (el.keyswitchMapLoopModeBtn) {
        el.keyswitchMapLoopModeBtn.addEventListener("click", () => {
          cycleActiveKeyswitchToolbarMode(true);
        });
      }
      if (el.mapMatrixIntervalInput) {
        armMatrixNumericInputForQuickReplace(el.mapMatrixIntervalInput);
        const applyInterval = () => {
          state.mapMatrixInterval = clampMapMatrixInterval(el.mapMatrixIntervalInput.value);
          if (state.mapMatrixSplitEnabled) {
            applyMapMatrixSplitAll();
            return;
          }
          syncMapMatrixControls();
          scheduleSessionStateSave(450);
        };
        el.mapMatrixIntervalInput.addEventListener("input", applyInterval);
        el.mapMatrixIntervalInput.addEventListener("change", applyInterval);
        el.mapMatrixIntervalInput.addEventListener("blur", applyInterval);
      }
      if (el.mapMatrixVelInput) {
        armMatrixNumericInputForQuickReplace(el.mapMatrixVelInput);
        const applyVelocityLayers = () => {
          state.mapMatrixVelocityLayers = clampMapMatrixVelocityLayers(el.mapMatrixVelInput.value);
          if (state.mapMatrixSplitEnabled) {
            applyMapMatrixSplitAll();
            return;
          }
          syncMapMatrixControls();
          scheduleSessionStateSave(450);
        };
        el.mapMatrixVelInput.addEventListener("input", applyVelocityLayers);
        el.mapMatrixVelInput.addEventListener("change", applyVelocityLayers);
        el.mapMatrixVelInput.addEventListener("blur", applyVelocityLayers);
      }
      if (el.mapMatrixRrInput) {
        armMatrixNumericInputForQuickReplace(el.mapMatrixRrInput);
        const applyRrColumns = () => {
          state.mapMatrixRrColumns = clampMapMatrixRrColumns(el.mapMatrixRrInput.value);
          if (state.mapMatrixSplitEnabled) {
            applyMapMatrixSplitAll();
            return;
          }
          syncMapMatrixControls();
          scheduleSessionStateSave(450);
        };
        el.mapMatrixRrInput.addEventListener("input", applyRrColumns);
        el.mapMatrixRrInput.addEventListener("change", applyRrColumns);
        el.mapMatrixRrInput.addEventListener("blur", applyRrColumns);
      }
      if (el.mapMatrixSplitBtn) {
        el.mapMatrixSplitBtn.addEventListener("click", () => {
          if (state.mapMatrixSplitEnabled) {
            state.mapMatrixSplitEnabled = false;
            state.mapMatrixAssignMode = false;
            state.mapMatrixPaintActive = false;
            state.mapMatrixLastPaintCellKey = "";
            mapMatrixDeleteSelection = null;
            syncMapMatrixControls();
            renderKeyboardMap(getActiveMapEntries(), true);
            renderPlayerKeyboard();
            scheduleSessionStateSave(320);
            return;
          }
          applyMapMatrixSplitAll();
        });
      }
      syncMapMatrixControls();

      el.octaveDownBtn.addEventListener("click", (ev) => {
        shiftKeyboardMapRange(-1, ev.shiftKey ? 12 : 1);
      });
      el.octaveUpBtn.addEventListener("click", (ev) => {
        shiftKeyboardMapRange(1, ev.shiftKey ? 12 : 1);
      });
      el.sampleEditorClose?.addEventListener("click", closeSampleEditor);
      el.sampleNavPrev.addEventListener("click", () => navigateSampleEditor(-1));
      el.sampleNavNext.addEventListener("click", () => navigateSampleEditor(1));
      setupWaveformPan();
      el.sampleWaveformViewport.addEventListener("scroll", updateWaveformScrollControl);
      el.sampleFindLoopBtn.addEventListener("click", () => findLoopCandidatesForSelectedEntry());
      el.sampleLoopPrevBtn.addEventListener("click", () => stepSelectedLoopCandidate(-1));
      el.sampleLoopNextBtn.addEventListener("click", () => stepSelectedLoopCandidate(1));
      el.sampleLoopApplyAllBtn.addEventListener("click", () => applyCurrentLoopStrategyToAll());
      el.sampleStartMarker.addEventListener("pointerdown", (ev) => startLoopHandleDrag("sampleStart", ev));
      el.sampleLoopFade.addEventListener("pointerdown", (ev) => startLoopHandleDrag("fade", ev));
      el.sampleLoopStart.addEventListener("pointerdown", (ev) => startLoopHandleDrag("start", ev));
      el.sampleLoopEnd.addEventListener("pointerdown", (ev) => startLoopHandleDrag("end", ev));

      const fineTuneKnob = el.sampleFineTuneKnob.querySelector(".sample-finetune-knob");
      const crossfadeKnob = el.sampleLoopXfadeKnob.querySelector(".sample-finetune-knob");

      crossfadeKnob.addEventListener("wheel", (ev) => {
        ev.preventDefault();
        const step = ev.shiftKey ? 10 : 1;
        const dir = ev.deltaY < 0 ? 1 : -1;
        setLoopCrossfadeMs(state.loopCrossfadeMs + (dir * step));
      }, { passive: false });

      crossfadeKnob.addEventListener("pointerdown", (ev) => {
        ev.preventDefault();
        const startY = ev.clientY;
        const startValue = state.loopCrossfadeMs;

        function move(moveEv) {
          const delta = (startY - moveEv.clientY) * 2;
          setLoopCrossfadeMs(startValue + delta);
        }

        function up() {
          window.removeEventListener("pointermove", move);
          window.removeEventListener("pointerup", up);
        }

        window.addEventListener("pointermove", move);
        window.addEventListener("pointerup", up);
      });

      crossfadeKnob.addEventListener("keydown", (ev) => {
        if (ev.key !== "ArrowUp" && ev.key !== "ArrowDown" && ev.key !== "Home" && ev.key !== "End") return;
        ev.preventDefault();
        if (ev.key === "Home") {
          setLoopCrossfadeMs(0);
          return;
        }
        if (ev.key === "End") {
          setLoopCrossfadeMs(500);
          return;
        }
        const step = ev.shiftKey ? 10 : 1;
        const dir = ev.key === "ArrowUp" ? 1 : -1;
        setLoopCrossfadeMs(state.loopCrossfadeMs + (dir * step));
      });

      crossfadeKnob.addEventListener("dblclick", () => setLoopCrossfadeMs(30));

      function stepFineTune(delta, fallback = null) {
        const entry = getMapEntryByOrder(state.selectedMapEntryOrder);
        if (!entry) {
          updateFineTuneKnob(null);
          return;
        }
        const base = fallback === null ? (entry.fineTuneCents ?? 0) : fallback;
        setSelectedFineTune(base + delta);
      }

      fineTuneKnob.addEventListener("wheel", (ev) => {
        ev.preventDefault();
        const step = ev.shiftKey ? 10 : 1;
        const dir = ev.deltaY < 0 ? 1 : -1;
        stepFineTune(dir * step);
      }, { passive: false });

      fineTuneKnob.addEventListener("pointerdown", (ev) => {
        ev.preventDefault();
        const entry = getMapEntryByOrder(state.selectedMapEntryOrder);
        if (!entry) {
          updateFineTuneKnob(null);
          return;
        }
        const startY = ev.clientY;
        const startValue = clampFineTune(entry.fineTuneCents ?? 0);

        function move(moveEv) {
          const delta = Math.round(startY - moveEv.clientY);
          const next = clampFineTune(startValue + delta);
          setSelectedFineTune(next);
        }

        function up() {
          window.removeEventListener("pointermove", move);
          window.removeEventListener("pointerup", up);
        }

        window.addEventListener("pointermove", move);
        window.addEventListener("pointerup", up);
      });

      fineTuneKnob.addEventListener("keydown", (ev) => {
        const entry = getMapEntryByOrder(state.selectedMapEntryOrder);
        if (!entry) return;
        if (ev.key === "ArrowUp" || ev.key === "ArrowDown") {
          ev.preventDefault();
          const step = ev.shiftKey ? 10 : 1;
          const dir = ev.key === "ArrowUp" ? 1 : -1;
          stepFineTune(dir * step);
          return;
        }
        if (ev.key === "Home") {
          ev.preventDefault();
          setSelectedFineTune(-100);
          return;
        }
        if (ev.key === "End") {
          ev.preventDefault();
          setSelectedFineTune(100);
        }
      });

      fineTuneKnob.addEventListener("dblclick", () => setSelectedFineTune(0));

      function pointerEventToSampleGainDb(clientY) {
        const rect = el.sampleWaveformViewport.getBoundingClientRect();
        const t = clamp01((clientY - rect.top) / Math.max(1, rect.height));
        const minDb = -24;
        const maxDb = 24;
        return maxDb - (t * (maxDb - minDb));
      }

      el.sampleGainLine?.addEventListener("pointerdown", (ev) => {
        ev.preventDefault();
        const entry = getMapEntryByOrder(state.selectedMapEntryOrder);
        if (!entry) return;
        el.sampleGainLine.classList.add("dragging");
        setSelectedSampleGainDb(pointerEventToSampleGainDb(ev.clientY));

        function move(moveEv) {
          setSelectedSampleGainDb(pointerEventToSampleGainDb(moveEv.clientY));
        }

        function up() {
          window.removeEventListener("pointermove", move);
          window.removeEventListener("pointerup", up);
          window.removeEventListener("pointercancel", up);
          el.sampleGainLine.classList.remove("dragging");
        }

        window.addEventListener("pointermove", move);
        window.addEventListener("pointerup", up);
        window.addEventListener("pointercancel", up);
      });

      el.sampleGainLine?.addEventListener("dblclick", (ev) => {
        ev.preventDefault();
        setSelectedSampleGainDb(0);
      });

      window.addEventListener("resize", () => {
        if (getMapEntryByOrder(state.selectedMapEntryOrder)) redrawSelectedWaveform();
      });

      updateWaveformZoomButtons();
      updateWaveformScrollControl();
      updateFineTuneKnob(null);
      updateLoopCrossfadeKnob();
      updateLoopHandles();
      updateLoopToolButtons();
      updateSampleGainLine(null);

      el.mapKeys.addEventListener("pointerdown", (ev) => {
        const keyNode = ev.target.closest(".map-key");
        if (!keyNode || keyNode.classList.contains("disabled")) return;
        const midi = Number(keyNode.dataset.midi);
        if (!Number.isFinite(midi)) return;
        const rect = keyNode.getBoundingClientRect();
        const ratioY = (ev.clientY - rect.top) / Math.max(1, rect.height);
        triggerKeyboardMapKey(midi, ratioY);
        keyNode.classList.add("pressed");
        window.setTimeout(() => keyNode.classList.remove("pressed"), 120);
      });

      /* ---- right-click context menu on keyboard map keys ---- */
      const hideKeyContextMenu = () => {
        el.mapKeyContextMenu.classList.remove("visible");
      };

      const buildKeyContextMenuItems = () => {
        const menu = el.mapKeyContextMenu;
        const targetMidi = Math.max(
          PLAYER_KB_START_MIDI,
          Math.min(PLAYER_KB_END_MIDI, Math.round(Number(state.keyContextMenuTargetMidi) || 0))
        );
        const selectedMidis = getOpenStringMidisForSet();
        const isOpenString = selectedMidis.includes(targetMidi);
        const selectedColor = normalizeRgbText(getOpenStringColorForMidi(targetMidi));
        const availablePalette = (state.wallpaperOpenStringPalette.length
          ? state.wallpaperOpenStringPalette
          : [normalizeRgbText(getComputedStyle(document.documentElement).getPropertyValue("--player-wallpaper-open-string-rgb"), "224, 224, 224")]
        ).filter(Boolean).slice(0, 3);
        menu.textContent = "";
