    function getDefaultWallpaperOpenStringPalette() {
      return [
        "224, 224, 224",
        "255, 126, 88",
        "88, 196, 255"
      ];
    }

    function setWallpaperOpenStringPalette(values = []) {
      const unique = [];
      const pushUnique = (rgbText) => {
        const normalized = normalizeRgbText(rgbText);
        if (!normalized || unique.includes(normalized)) return;
        unique.push(normalized);
      };
      (Array.isArray(values) ? values : []).forEach(pushUnique);
      getDefaultWallpaperOpenStringPalette().forEach(pushUnique);
      state.wallpaperOpenStringPalette = unique.slice(0, 3);
      return state.wallpaperOpenStringPalette;
    }

    function rgbToHsl(red, green, blue) {
      const r = Math.max(0, Math.min(255, Number(red) || 0)) / 255;
      const g = Math.max(0, Math.min(255, Number(green) || 0)) / 255;
      const b = Math.max(0, Math.min(255, Number(blue) || 0)) / 255;
      const max = Math.max(r, g, b);
      const min = Math.min(r, g, b);
      let hue = 0;
      let saturation = 0;
      const lightness = (max + min) / 2;

      if (max !== min) {
        const delta = max - min;
        saturation = lightness > 0.5
          ? delta / (2 - max - min)
          : delta / (max + min);
        switch (max) {
          case r:
            hue = ((g - b) / delta) + (g < b ? 6 : 0);
            break;
          case g:
            hue = ((b - r) / delta) + 2;
            break;
          default:
            hue = ((r - g) / delta) + 4;
            break;
        }
        hue /= 6;
      }

      return { hue, saturation, lightness };
    }

    function hslToRgb(hue, saturation, lightness) {
      const clampUnit = (value) => Math.max(0, Math.min(1, Number(value) || 0));
      const h = clampUnit(hue);
      const s = clampUnit(saturation);
      const l = clampUnit(lightness);
      if (s <= 0) {
        const gray = Math.round(l * 255);
        return { red: gray, green: gray, blue: gray };
      }

      const hueToRgb = (p, q, t) => {
        let value = t;
        if (value < 0) value += 1;
        if (value > 1) value -= 1;
        if (value < (1 / 6)) return p + ((q - p) * 6 * value);
        if (value < 0.5) return q;
        if (value < (2 / 3)) return p + ((q - p) * ((2 / 3) - value) * 6);
        return p;
      };

      const q = l < 0.5 ? l * (1 + s) : l + s - (l * s);
      const p = (2 * l) - q;
      return {
        red: Math.round(hueToRgb(p, q, h + (1 / 3)) * 255),
        green: Math.round(hueToRgb(p, q, h) * 255),
        blue: Math.round(hueToRgb(p, q, h - (1 / 3)) * 255)
      };
    }

    function normalizeOpenStringPaletteRgb(red, green, blue) {
      const { hue, saturation, lightness } = rgbToHsl(red, green, blue);
      const tuned = hslToRgb(
        hue,
        Math.max(0.58, Math.min(0.94, saturation)),
        Math.max(0.42, Math.min(0.6, lightness))
      );
      return normalizeRgbText(`${tuned.red}, ${tuned.green}, ${tuned.blue}`);
    }

    function sampleWallpaperOpenStringPalette(dataUrl, count = 3) {
      return new Promise((resolve) => {
        const normalized = String(dataUrl || "").trim();
        if (!normalized) {
          resolve(setWallpaperOpenStringPalette([]).slice(0, count));
          return;
        }

        const image = new Image();
        image.decoding = "async";
        image.onload = () => {
          try {
            const canvas = document.createElement("canvas");
            const width = Math.max(16, Math.min(48, image.naturalWidth || image.width || 1));
            const height = Math.max(16, Math.min(48, image.naturalHeight || image.height || 1));
            canvas.width = width;
            canvas.height = height;
            const ctx = canvas.getContext("2d", { willReadFrequently: true });
            if (!ctx) {
              resolve(setWallpaperOpenStringPalette([]).slice(0, count));
              return;
            }

            ctx.drawImage(image, 0, 0, width, height);
            const imageData = ctx.getImageData(0, 0, width, height);
            const buckets = new Map();

            for (let index = 0; index < imageData.data.length; index += 4) {
              const alpha = Number(imageData.data[index + 3] || 0) / 255;
              if (alpha < 0.42) continue;
              const red = Number(imageData.data[index] || 0);
              const green = Number(imageData.data[index + 1] || 0);
              const blue = Number(imageData.data[index + 2] || 0);
              const hsl = rgbToHsl(red, green, blue);
              if (hsl.saturation < 0.18) continue;
              const bucketRed = Math.round(red / 24) * 24;
              const bucketGreen = Math.round(green / 24) * 24;
              const bucketBlue = Math.round(blue / 24) * 24;
              const key = `${bucketRed},${bucketGreen},${bucketBlue}`;
              const current = buckets.get(key) || {
                red: 0,
                green: 0,
                blue: 0,
                hueTotal: 0,
                saturationTotal: 0,
                lightnessTotal: 0,
                count: 0
              };
              current.red += red;
              current.green += green;
              current.blue += blue;
              current.hueTotal += hsl.hue;
              current.saturationTotal += hsl.saturation;
              current.lightnessTotal += hsl.lightness;
              current.count += 1;
              buckets.set(key, current);
            }

            const candidates = Array.from(buckets.values())
              .filter((bucket) => bucket.count > 0)
              .map((bucket) => {
                const avgRed = bucket.red / bucket.count;
                const avgGreen = bucket.green / bucket.count;
                const avgBlue = bucket.blue / bucket.count;
                const avgHue = bucket.hueTotal / bucket.count;
                const avgSaturation = bucket.saturationTotal / bucket.count;
                const avgLightness = bucket.lightnessTotal / bucket.count;
                const visibility = 1 - Math.min(1, Math.abs(avgLightness - 0.52) * 1.9);
                return {
                  hue: avgHue,
                  saturation: avgSaturation,
                  lightness: avgLightness,
                  rgb: normalizeOpenStringPaletteRgb(avgRed, avgGreen, avgBlue),
                  score: (avgSaturation * 8) + (visibility * 2.2) + Math.min(1.4, bucket.count / 6)
                };
              })
              .filter((candidate) => !!candidate.rgb)
              .sort((left, right) => right.score - left.score);

            const palette = [];
            candidates.forEach((candidate) => {
              if (palette.length >= count) return;
              const isDistinct = palette.every((selected) => {
                const hueDistance = Math.min(
                  Math.abs(candidate.hue - selected.hue),
                  1 - Math.abs(candidate.hue - selected.hue)
                );
                const rgbA = candidate.rgb.split(",").map((part) => Number(part.trim()) || 0);
                const rgbB = selected.rgb.split(",").map((part) => Number(part.trim()) || 0);
                const rgbDistance = Math.abs(rgbA[0] - rgbB[0]) + Math.abs(rgbA[1] - rgbB[1]) + Math.abs(rgbA[2] - rgbB[2]);
                return hueDistance > 0.06 || rgbDistance > 84;
              });
              if (isDistinct) palette.push(candidate);
            });

            resolve(setWallpaperOpenStringPalette(palette.map((candidate) => candidate.rgb)).slice(0, count));
          } catch {
            resolve(setWallpaperOpenStringPalette([]).slice(0, count));
          }
        };
        image.onerror = () => resolve(setWallpaperOpenStringPalette([]).slice(0, count));
        image.src = normalized;
      });
    }

    function sampleDarkestWallpaperRgb(dataUrl) {
      return new Promise((resolve) => {
        const normalized = String(dataUrl || "").trim();
        if (!normalized) {
          resolve("");
          return;
        }

        const image = new Image();
        image.decoding = "async";
        image.onload = () => {
          try {
            const canvas = document.createElement("canvas");
            const width = Math.max(8, Math.min(32, image.naturalWidth || image.width || 1));
            const height = Math.max(8, Math.min(32, image.naturalHeight || image.height || 1));
            canvas.width = width;
            canvas.height = height;
            const ctx = canvas.getContext("2d", { willReadFrequently: true });
            if (!ctx) {
              resolve("");
              return;
            }

            ctx.drawImage(image, 0, 0, width, height);
            const imageData = ctx.getImageData(0, 0, width, height);
            const pixels = [];
            for (let index = 0; index < imageData.data.length; index += 4) {
              const alpha = Number(imageData.data[index + 3] || 0) / 255;
              if (alpha < 0.35) continue;
              const red = Number(imageData.data[index] || 0);
              const green = Number(imageData.data[index + 1] || 0);
              const blue = Number(imageData.data[index + 2] || 0);
              const luminance = (0.2126 * red) + (0.7152 * green) + (0.0722 * blue);
              pixels.push({ red, green, blue, luminance });
            }

            if (!pixels.length) {
              resolve("");
              return;
            }

            pixels.sort((left, right) => left.luminance - right.luminance);
            const darkestCount = Math.max(12, Math.min(pixels.length, Math.round(pixels.length * 0.1)));
            const darkestPixels = pixels.slice(0, darkestCount);
            const totals = darkestPixels.reduce((acc, pixel) => {
              acc.red += pixel.red;
              acc.green += pixel.green;
              acc.blue += pixel.blue;
              return acc;
            }, { red: 0, green: 0, blue: 0 });

            const clampChannel = (value) => Math.max(0, Math.min(255, Math.round(value)));
            resolve([
              clampChannel(totals.red / darkestPixels.length),
              clampChannel(totals.green / darkestPixels.length),
              clampChannel(totals.blue / darkestPixels.length)
            ].join(", "));
          } catch {
            resolve("");
          }
        };
        image.onerror = () => resolve("");
        image.src = normalized;
      });
    }

    function sampleDominantWallpaperRgb(dataUrl) {
      return new Promise((resolve) => {
        const normalized = String(dataUrl || "").trim();
        if (!normalized) {
          resolve("");
          return;
        }

        const rgbToHsl = (red, green, blue) => {
          const r = Math.max(0, Math.min(255, Number(red) || 0)) / 255;
          const g = Math.max(0, Math.min(255, Number(green) || 0)) / 255;
          const b = Math.max(0, Math.min(255, Number(blue) || 0)) / 255;
          const max = Math.max(r, g, b);
          const min = Math.min(r, g, b);
          let hue = 0;
          let saturation = 0;
          const lightness = (max + min) / 2;

          if (max !== min) {
            const delta = max - min;
            saturation = lightness > 0.5
              ? delta / (2 - max - min)
              : delta / (max + min);
            switch (max) {
              case r:
                hue = ((g - b) / delta) + (g < b ? 6 : 0);
                break;
              case g:
                hue = ((b - r) / delta) + 2;
                break;
              default:
                hue = ((r - g) / delta) + 4;
                break;
            }
            hue /= 6;
          }

          return { hue, saturation, lightness };
        };

        const hslToRgb = (hue, saturation, lightness) => {
          const clampUnit = (value) => Math.max(0, Math.min(1, Number(value) || 0));
          const h = clampUnit(hue);
          const s = clampUnit(saturation);
          const l = clampUnit(lightness);
          if (s <= 0) {
            const gray = Math.round(l * 255);
            return { red: gray, green: gray, blue: gray };
          }

          const hueToRgb = (p, q, t) => {
            let value = t;
            if (value < 0) value += 1;
            if (value > 1) value -= 1;
            if (value < (1 / 6)) return p + ((q - p) * 6 * value);
            if (value < 0.5) return q;
            if (value < (2 / 3)) return p + ((q - p) * ((2 / 3) - value) * 6);
            return p;
          };

          const q = l < 0.5 ? l * (1 + s) : l + s - (l * s);
          const p = (2 * l) - q;
          return {
            red: Math.round(hueToRgb(p, q, h + (1 / 3)) * 255),
            green: Math.round(hueToRgb(p, q, h) * 255),
            blue: Math.round(hueToRgb(p, q, h - (1 / 3)) * 255)
          };
        };

        const normalizeHighlightRgb = (red, green, blue) => {
          const { hue, saturation, lightness } = rgbToHsl(red, green, blue);
          const tunedSaturation = Math.max(0.24, Math.min(0.72, saturation));
          const tunedLightness = Math.max(0.44, Math.min(0.62, lightness));
          return hslToRgb(hue, tunedSaturation, tunedLightness);
        };

        const image = new Image();
        image.decoding = "async";
        image.onload = () => {
          try {
            const canvas = document.createElement("canvas");
            const width = Math.max(12, Math.min(40, image.naturalWidth || image.width || 1));
            const height = Math.max(12, Math.min(40, image.naturalHeight || image.height || 1));
            canvas.width = width;
            canvas.height = height;
            const ctx = canvas.getContext("2d", { willReadFrequently: true });
            if (!ctx) {
              resolve("");
              return;
            }

            ctx.drawImage(image, 0, 0, width, height);
            const imageData = ctx.getImageData(0, 0, width, height);
            const buckets = new Map();

            for (let index = 0; index < imageData.data.length; index += 4) {
              const alpha = Number(imageData.data[index + 3] || 0) / 255;
              if (alpha < 0.4) continue;
              const red = Number(imageData.data[index] || 0);
              const green = Number(imageData.data[index + 1] || 0);
              const blue = Number(imageData.data[index + 2] || 0);
              const max = Math.max(red, green, blue);
              const min = Math.min(red, green, blue);
              const saturation = max === 0 ? 0 : (max - min) / max;
              const bucketRed = Math.round(red / 32) * 32;
              const bucketGreen = Math.round(green / 32) * 32;
              const bucketBlue = Math.round(blue / 32) * 32;
              const key = `${bucketRed},${bucketGreen},${bucketBlue}`;
              const weight = 1 + (saturation * 1.5) + (alpha * 0.5);
              const current = buckets.get(key) || { weight: 0, red: 0, green: 0, blue: 0, count: 0 };
              current.weight += weight;
              current.red += red;
              current.green += green;
              current.blue += blue;
              current.count += 1;
              buckets.set(key, current);
            }

            if (!buckets.size) {
              resolve("");
              return;
            }

            let dominant = null;
            buckets.forEach((bucket) => {
              if (!dominant || bucket.weight > dominant.weight) dominant = bucket;
            });
            if (!dominant || !dominant.count) {
              resolve("");
              return;
            }

            const clampChannel = (value) => Math.max(0, Math.min(255, Math.round(value)));
            const normalizedDominant = normalizeHighlightRgb(
              dominant.red / dominant.count,
              dominant.green / dominant.count,
              dominant.blue / dominant.count
            );
            resolve([
              clampChannel(normalizedDominant.red),
              clampChannel(normalizedDominant.green),
              clampChannel(normalizedDominant.blue)
            ].join(", "));
          } catch {
            resolve("");
          }
        };
        image.onerror = () => resolve("");
        image.src = normalized;
      });
    }

    function sampleMostSaturatedWallpaperRgb(dataUrl) {
      return sampleWallpaperOpenStringPalette(dataUrl, 3)
        .then((palette) => normalizeRgbText(Array.isArray(palette) ? palette[0] : ""));
    }

    async function applyWallpaperBackdropTheme(dataUrl = "") {
      const normalized = String(dataUrl || "").trim();
      const requestId = (state.wallpaperThemeRequestId || 0) + 1;
      state.wallpaperThemeRequestId = requestId;

      if (!normalized) {
        setWallpaperOpenStringPalette([]);
        applyPlayerWallpaperBackdropRgb("");
        applyPlayerWallpaperDominantRgb("");
        applyPlayerWallpaperOpenStringRgb("");
        return;
      }

      const [darkestRgb, dominantRgb, saturatedPalette] = await Promise.all([
        sampleDarkestWallpaperRgb(normalized),
        sampleDominantWallpaperRgb(normalized),
        sampleWallpaperOpenStringPalette(normalized, 3)
      ]);
      if (state.wallpaperThemeRequestId !== requestId) return;
      const palette = setWallpaperOpenStringPalette(saturatedPalette);
      applyPlayerWallpaperBackdropRgb(darkestRgb || "40, 40, 40");
      applyPlayerWallpaperDominantRgb(dominantRgb || darkestRgb || "224, 224, 224");
      applyPlayerWallpaperOpenStringRgb(palette[0] || dominantRgb || darkestRgb || "224, 224, 224");
    }

      const normalized = String(dataUrl || "").trim();
      if (el.playerStage) {

        el.playerStage.style.backgroundPosition = normalized ? "center, center calc(50% - 30px)" : "center";
        el.playerStage.style.backgroundSize = normalized ? "cover, cover" : "cover";

    function scheduleWallpaperHydration(delayMs = 60) {
      if (state.wallpaperHydrationTimer) {
        window.clearTimeout(state.wallpaperHydrationTimer);
      }
      const wallpaperAbsolutePath = getWallpaperManifestAbsolutePath();

      const absolutePath = getWallpaperManifestAbsolutePath();
      if (!absolutePath) {
        logWallpaperDebug("hydrate-no-source");
        applyPlayerWallpaperVisual(state.wallpaperDataUrl);
        return "";
      }
      logWallpaperDebug("hydrate-request", `requestPath=${JSON.stringify(absolutePath)}`);

        allowPitchUpAboveHighest: !!state.allowPitchUpAboveHighest,
        autoRR: !!state.autoRR,
        autoGainCrossfade: !!state.autoGainCrossfade,
        modWheelValue: 0,
        expressionValue: Math.max(0, Math.min(1, Number(state.expressionValue) || 0)),
        pitchBendValue: Math.max(-1, Math.min(1, Number(state.pitchBendValue) || 0)),
        playerPitchDownOctaves: Math.max(0, Math.min(2, Math.round(Number(state.playerPitchDownOctaves) || 0))),
        playerOpenStringMidis: normalizeOpenStringMidiList(state.playerOpenStringMidis),
        playerOpenStringColorsByMidi: normalizeOpenStringColorMap(
          state.playerOpenStringColorsByMidi,
          state.playerOpenStringMidis
        ),
        ampEnvelope: buildAmpEnvelopeSnapshot(),
        auto: buildAutoControlsSnapshot(),
        sequencer: buildSequencerSnapshot(),
        strum: buildStrumSnapshot(),
        wallpaperAssetPath: getWallpaperAssetPath(),
        wallpaperSourcePath: normalizeManifestPathInput(state.wallpaperSourcePath),
        wallpaperSourceFileName: String(state.wallpaperSourceFileName || "").trim()
      };
    }

    async function buildSessionStateSnapshot(options = {}) {
      ensurePackManifestBasePathHint();
      if (options.force) {
        if ((state.pendingCacheCount || 0) <= 0) {
          await ensureRuntimeSampleDataForSession();
        }
      }
      const manifest = buildManifestSkeleton("smpinst", {
        preserveRuntimePaths: true,
        includeEmbeddedSampleData: !!options.includeEmbeddedSampleData
      });
      return {
        version: 1,
        manifest,
        ui: buildUiSessionStateSnapshot({ includeKeyswitchSets: true })
      };
    }

    function buildQuickSessionSnapshotFromManifest(manifest) {
      const safeManifest = (manifest && typeof manifest === "object")
        ? manifest
        : { formatVersion: 1, instrumentName: "Instrument", mapping: [] };
      return {
        version: 1,
        manifest: safeManifest,
        ui: buildUiSessionStateSnapshot({ includeKeyswitchSets: false })
      };
    }

    async function flushSessionStateToNative(force = false, flushOptions = {}) {
      clearSessionStateSaveTimer();
      if (state.sessionStateRestoreInProgress) return;
      if (!getNativeBackend()) return;
      if (state.sessionStateLightweight) {
        debugLoadLog("flush skipped | lightweight session active");
        return;
      }
      if (state.sessionStateSaveInFlight) {
        state.sessionStateSaveQueued = true;
        return;
      }

      state.sessionStateSaveInFlight = true;
      try {
        const flushStart = performance.now();

        // Build a lightweight signature directly from state fields BEFORE
        // building the full snapshot.  This avoids the expensive
        // buildManifestSkeleton + buildManifestMapping + JSON.stringify
        // on large payloads
        // when nothing actually changed.
        const baseEntries = Array.isArray(state.entries) ? state.entries : [];
        const ksSets = Array.isArray(state.keyswitchSets) ? state.keyswitchSets : [];
        let entrySigParts = "";
        for (let i = 0; i < baseEntries.length; i++) {
          const e = baseEntries[i];
          if (!e || !e.valid) continue;
          entrySigParts += `${e.order}:${e.rootMidi}:${e.velocityLayer}:${(e.loopStartNorm||0).toFixed(4)}:${(e.loopEndNorm||1).toFixed(4)}:${(e.sampleStartNorm||0).toFixed(4)}:${e.loopEnabled?1:0}:${e.fineTuneCents||0}:${(e.editorGainDb||0).toFixed(1)},`;
        }
        for (let si = 0; si < ksSets.length; si++) {
          const set = ksSets[si];
          const setEntries = Array.isArray(set?.entries) ? set.entries : [];
          for (let i = 0; i < setEntries.length; i++) {
            const e = setEntries[i];
            if (!e || !e.valid) continue;
            entrySigParts += `${e.order}:${e.rootMidi}:${e.velocityLayer}:${(e.loopStartNorm||0).toFixed(4)}:${(e.loopEndNorm||1).toFixed(4)}:${(e.sampleStartNorm||0).toFixed(4)}:${e.loopEnabled?1:0}:${e.fineTuneCents||0}:${(e.editorGainDb||0).toFixed(1)},`;
          }
        }

        const ampEnvelopeSnapshot = buildAmpEnvelopeSnapshot();

        const hashSig = [
          state.setupOctaveStart,
          state.activeMapSetId,
          state.mapMatrixInterval,
          state.mapMatrixVelocityLayers,
          state.mapMatrixRrColumns,
          state.mapMatrixSplitEnabled,
          state.baseLoopPlaybackEnabled,
          normalizeKeyswitchPlaybackMode(state.basePlaybackMode),
          getPackManifestFilePath(),
          getPackManifestBasePath(),
          state.loopCrossfadeMs,
          state.allowPitchUpAboveHighest,
          state.autoRR,
          state.autoGainCrossfade,
          0,
          state.expressionValue,
          state.pitchBendValue,
          ampEnvelopeSnapshot.attackMs,
          ampEnvelopeSnapshot.decayMs,
          ampEnvelopeSnapshot.sustainPercent,
          ampEnvelopeSnapshot.releaseMs,
          state.playerPitchDownOctaves,
          normalizeOpenStringMidiList(state.playerOpenStringMidis).join(","),
          serializeOpenStringColorMap(state.playerOpenStringColorsByMidi, state.playerOpenStringMidis),
          ksSets.map((set) => getNormalizedKeyswitchSetOpenStringMidis(set).join(",")).join("|"),
          ksSets.map((set) => serializeOpenStringColorMap(set?.openStringColorsByMidi, getNormalizedKeyswitchSetOpenStringMidis(set))).join("|"),
          baseEntries.length,
          ksSets.length,
          state.strumEnabled,
          state.strumSequencerSteps,
          state.strumSequencerMode,
          state.strumDoubling,
          state.strumShowOnMain,
          state.strumRateIndex,
          state.strumSwingPercent,
          state.strumVelocityHumanizePercent,
          state.strumTimingHumanizeMs,
          state.sequencerHostTriggerEnabled,
          state.sequencerDoubling,
          getWallpaperAssetPath(),
          normalizeManifestPathInput(state.wallpaperSourcePath),
          JSON.stringify(state.manualRootRanges || {}),
          JSON.stringify(state.velocityCrossfadeByRoot || {}),
          JSON.stringify(state.sequencerSteps),
          JSON.stringify(state.strumStepPattern),
          ksSets.map(s => `${s?.id}:${s?.key}:${s?.keyMidi}:${clampKeyswitchGainDb(s?.gainDb ?? 0).toFixed(1)}:${JSON.stringify(s?.manualRanges||{})}`).join(";"),
          entrySigParts
        ].join("|");

        if (hashSig === state.lastFlushedJsonHash && !force) {
          debugLoadLog(`flush skipped | identical sig | ${(performance.now() - flushStart).toFixed(1)}ms`);
        } else {
          state.lastFlushedJsonHash = hashSig;
          const snapshot = await buildSessionStateSnapshot({
            force,
            includeEmbeddedSampleData: !!flushOptions.includeEmbeddedSampleData
          });
          const jsonPayload = JSON.stringify(snapshot);
          emitNativeEvent("session_state_set", { json: jsonPayload });
          const totalMs = performance.now() - flushStart;
          const debugCount = Number(state.sessionStateFlushDebugCount) || 0;
          if (debugCount < 5 || totalMs > 500) {
            state.sessionStateFlushDebugCount = debugCount + 1;
            debugLoadLog(`flush session state | totalMs=${totalMs.toFixed(1)} | jsonBytes=${jsonPayload.length}`);
          }
        }
      } catch {
        if (force) {
          // Ignore failures during teardown.
        }
      } finally {
        state.sessionStateSaveInFlight = false;
        if (state.sessionStateSaveQueued) {
          state.sessionStateSaveQueued = false;
          scheduleSessionStateSave(400);
        }
      }
    }

    function scheduleSessionStateSave(delayMs = 900) {
      if (state.sessionStateRestoreInProgress) return;
      if (!getNativeBackend()) return;
      if (!state.sessionStateRestoreAttempted) return;
      if (state.sessionStateLightweight) return;
      clearSessionStateSaveTimer();
      const waitMs = Math.max(600, Math.round(Number(delayMs) || 900));
      state.sessionStateSaveTimer = window.setTimeout(() => {
        state.sessionStateSaveTimer = 0;
        void flushSessionStateToNative(false);
      }, waitMs);
    }

    function getBackendResourceUrl(resourcePath) {
      const relativePath = String(resourcePath || "").trim().replace(/^\/+/, "");
      if (!relativePath) return window.location.href;
      try {
        return new URL(relativePath, window.location.href).toString();
      } catch {
        return `/${relativePath}`;
      }
    }

    function requestSessionStateViaBridge(options = {}) {
      if (!getNativeBackend()) return false;
      const requestFull = options?.full === true;
      const reason = String(options?.reason || "manual").trim() || "manual";
      const emitted = emitNativeEvent("session_state_get", {
        full: requestFull,
        mode: requestFull ? "full" : "light",
        reason
      });
      if (emitted) {
        debugLoadLog(`restore fallback | bridge request emitted | mode=${requestFull ? "full" : "light"} | reason=${reason}`);
      }
      return emitted;
    }

    async function fetchNativeSessionStateSnapshot(options = {}) {
      const requestFull = options?.full === true;
      const reason = String(options?.reason || "manual").trim() || "manual";
      const mode = requestFull ? "full" : "light";
      const allowBridgeFallback = options?.allowBridgeFallback !== false;

      if (state.sessionStateFetchInFlight) {
        const queued = state.pendingSessionStateFetch;
        state.pendingSessionStateFetch = {
          full: requestFull || !!queued?.full,
          reason,
          allowBridgeFallback: allowBridgeFallback || !!queued?.allowBridgeFallback
        };
        return false;
      }

      state.sessionStateFetchInFlight = true;
      try {
        const fetchStart = performance.now();
        const resourceUrl = getBackendResourceUrl(`session-state-${mode}.json?ts=${Date.now()}&reason=${encodeURIComponent(reason)}`);
        const response = await fetch(resourceUrl, { cache: "no-store" });
        if (!response.ok) {
          throw new Error(`http-${response.status}`);
        }
        const rawJson = await response.text();
        const trimmedJson = rawJson.trim();
        if (!trimmedJson.startsWith("{")) {
          const preview = trimmedJson.slice(0, 64).replace(/\s+/g, " ");
          throw new Error(`non-json-response:${preview || "empty"}`);
        }
        debugLoadLog(`restore fetched | mode=${mode} | reason=${reason} | bytes=${rawJson.length} | fetchMs=${(performance.now() - fetchStart).toFixed(1)}`);
        await applySessionStateFromPayload({
          json: rawJson,
          lightweight: !requestFull,
          full: requestFull
        });
        return true;
      } catch (error) {
        const errorMessage = error && typeof error === "object" && "message" in error
          ? String(error.message || "").trim()
          : String(error || "").trim();
        debugLoadLog(`restore fetch failed | mode=${mode} | reason=${reason} | error=${errorMessage || "unknown"}`);
        if (allowBridgeFallback && requestSessionStateViaBridge({
          full: requestFull,
          reason: `fallback-${reason}`
        })) {
          return false;
        }
        if (requestFull) {
          state.sessionStateHydrationRequested = false;
          completeLoadingOverlay("Ready");
        }
        return false;
      } finally {
        state.sessionStateFetchInFlight = false;
        if (state.pendingSessionStateFetch) {
          const pendingFetch = state.pendingSessionStateFetch;
          state.pendingSessionStateFetch = null;
          window.setTimeout(() => {
            void fetchNativeSessionStateSnapshot(pendingFetch);
          }, 0);
        }
      }
    }

    function requestFullSessionStateHydration(reason = "manual") {
      if (!state.sessionStateLightweight) return;
      if (state.sessionStateHydrationRequested) return;
      state.sessionStateHydrationRequested = true;
      if (reason !== "pending-save") {
        setLoadingOverlay(14, "Loading full instrument data...");
      }
      debugLoadLog(`full session requested | reason=${reason}`);
      void fetchNativeSessionStateSnapshot({ full: true, reason });
    }

    function matchRestoredKeyswitchSet(snapshotSet) {
      if (!snapshotSet || typeof snapshotSet !== "object") return null;
      const id = String(snapshotSet.id || "");
      const name = String(snapshotSet.name || "");
      const key = String(snapshotSet.key || "");
      const midi = Number.isFinite(snapshotSet.keyMidi) ? Math.round(snapshotSet.keyMidi) : null;
      return (state.keyswitchSets || []).find((set) => (
        (id && String(set?.id || "") === id)
        || (
        (name && String(set?.name || "") === name && key && String(set?.key || "") === key)
        || (midi !== null && Number.isFinite(set?.keyMidi) && Math.round(set.keyMidi) === midi)
        )
      )) || null;
    }

    async function applySessionStateFromPayload(payload) {
      if (state.sessionPayloadLock) {
        debugLoadLog("restore skipped | session payload locked");
        state.sessionStateRestoreAttempted = true;
        return;
      }

      const nowMs = Date.now();
      if (state.manualPackLoadInProgress || nowMs < Number(state.ignoreSessionPayloadUntil || 0)) {
        debugLoadLog("restore skipped | suppressed during manual pack load");
        state.sessionStateRestoreAttempted = true;
        return;
      }

      const payloadObject = (payload && typeof payload === "object" && !Array.isArray(payload))
        ? payload
        : null;
      const isLightweightPayload = !!payloadObject?.lightweight;

      if (state.sessionStateRestored) {
        if (!(state.sessionStateLightweight && !isLightweightPayload)) return;
        debugLoadLog("restore upgrade | lightweight -> full");
      }
      const restoreStart = performance.now();
      const rawJson = typeof payload === "string"
        ? payload
        : String(payload?.json || "");
      if (!rawJson.trim()) {
        state.sessionStateRestoreAttempted = true;
        completeLoadingOverlay("Ready");
        return;
      }
      const payloadSig = `${rawJson.length}:${rawJson.slice(0, 64)}:${rawJson.slice(-64)}`;
      if (payloadSig === state.lastSessionPayloadSig) {
        debugLoadLog("restore skipped | duplicate payload");
        state.sessionStateRestoreAttempted = true;
        completeLoadingOverlay("Ready");
        return;
      }
      debugLoadLog(`restore start | payloadBytes=${rawJson.length}`);

      state.sessionStateRestoreAttempted = true;
      if (state.sessionStateRestoreTimeout) {
        window.clearTimeout(state.sessionStateRestoreTimeout);
        state.sessionStateRestoreTimeout = 0;
      }

      let snapshot = null;
      try {
        snapshot = JSON.parse(rawJson);
      } catch {
        debugLoadLog("restore failed | invalid json");
        completeLoadingOverlay("Ready");
        return;
      }
      if (!snapshot || typeof snapshot !== "object") {
        completeLoadingOverlay("Ready");
        return;
      }
      debugLoadLog(`restore json parsed | elapsedMs=${(performance.now() - restoreStart).toFixed(1)}`);
      const manifest = (snapshot.manifest && typeof snapshot.manifest === "object")
        ? snapshot.manifest
        : null;
      if (!manifest) {
        completeLoadingOverlay("Ready");
        return;
      }

      state.sessionStateRestoreInProgress = true;
      try {
        const applyStart = performance.now();
        const ui = (snapshot.ui && typeof snapshot.ui === "object") ? snapshot.ui : {};
        await applyLoadedPackData(manifest, {
          sourceLabel: "session",
          manifestFilePath: String(ui.manifestFilePath || "").trim(),
          manifestBasePath: String(ui.manifestBasePath || "").trim(),
          silentStatus: true,
          hydrateManifestSamples: false,
          sessionUiState: ui,
          skipRender: true
        });
        debugLoadLog(`restore manifest applied | elapsedMs=${(performance.now() - applyStart).toFixed(1)} | entries=${state.entries.length} | keyswitchSets=${state.keyswitchSets.length}`);
        state.setupOctaveStart = Math.max(0, Math.min(120, Math.round(Number(ui.setupOctaveStart) || state.setupOctaveStart || 48)));
        const matrixUi = (ui.mapMatrix && typeof ui.mapMatrix === "object") ? ui.mapMatrix : {};
        state.mapMatrixInterval = clampMapMatrixInterval(matrixUi.interval ?? state.mapMatrixInterval);
        state.mapMatrixVelocityLayers = clampMapMatrixVelocityLayers(matrixUi.velocityLayers ?? state.mapMatrixVelocityLayers);
        state.mapMatrixRrColumns = clampMapMatrixRrColumns(matrixUi.rrColumns ?? state.mapMatrixRrColumns);
        state.mapMatrixSplitEnabled = !!matrixUi.splitEnabled;
        state.mapMatrixAutoFillRr = true;
        state.mapMatrixAssignMode = false;
        state.mapMatrixRrCursor = {};
        state.mapMatrixPaintActive = false;
        state.mapMatrixLastPaintCellKey = "";
        state.manualRootRanges = resolveLoadedManualRanges(
          ui.manualRootRanges,
          state.manualRootRanges
        );
        state.velocityCrossfadeByRoot = (ui.velocityCrossfadeByRoot && typeof ui.velocityCrossfadeByRoot === "object")
          ? { ...ui.velocityCrossfadeByRoot }
          : {};
        state.loopCrossfadeMs = clampLoopCrossfadeMs(ui.loopCrossfadeMs ?? state.loopCrossfadeMs);
        state.allowPitchUpAboveHighest = ui.allowPitchUpAboveHighest !== undefined ? !!ui.allowPitchUpAboveHighest : state.allowPitchUpAboveHighest;
        state.autoRR = ui.autoRR !== undefined ? !!ui.autoRR : state.autoRR;
        state.autoGainCrossfade = ui.autoGainCrossfade !== undefined ? !!ui.autoGainCrossfade : state.autoGainCrossfade;
        state.modWheelValue = 0;
        state.expressionValue = Math.max(0, Math.min(1, Number(ui.expressionValue) || 0));
        state.pitchBendValue = Math.max(-1, Math.min(1, Number(ui.pitchBendValue) || 0));
        state.playerPitchDownOctaves = Math.max(0, Math.min(2, Math.round(Number(ui.playerPitchDownOctaves) || 0)));
        state.playerOpenStringMidis = Object.prototype.hasOwnProperty.call(ui, "playerOpenStringMidis")
          ? normalizeOpenStringMidiList(ui.playerOpenStringMidis)
          : normalizeOpenStringMidiList(state.playerOpenStringMidis);
        state.playerOpenStringColorsByMidi = Object.prototype.hasOwnProperty.call(ui, "playerOpenStringColorsByMidi")
          ? normalizeOpenStringColorMap(ui.playerOpenStringColorsByMidi, state.playerOpenStringMidis)
          : normalizeOpenStringColorMap(state.playerOpenStringColorsByMidi, state.playerOpenStringMidis);
        state.baseLoopPlaybackEnabled = ui.baseLoopPlaybackEnabled !== false;
        state.basePlaybackMode = Object.prototype.hasOwnProperty.call(ui, "basePlaybackMode")
          ? normalizeKeyswitchPlaybackMode(ui.basePlaybackMode)
          : "spread";
        state.packManifestFilePath = String(
          ui.manifestFilePath
          || state.packManifestFilePath
          || ""
        ).trim();
        state.packManifestBasePath = normalizeDestinationFolderPath(
          ui.manifestBasePath
          || state.packManifestBasePath
          || computeManifestBasePathFromFilePath(state.packManifestFilePath)
        );
        state.wallpaperAssetPath = normalizeManifestPathInput(ui.wallpaperAssetPath || state.wallpaperAssetPath);
        state.wallpaperSourcePath = normalizeManifestPathInput(ui.wallpaperSourcePath || state.wallpaperSourcePath);
        state.wallpaperSourceFileName = String(ui.wallpaperSourceFileName || state.wallpaperSourceFileName || "").trim();
        updateWallpaperField();
        scheduleWallpaperHydration(80);
        updatePerformanceWheelVisuals();
        applyAmpEnvelopeSnapshot(ui.ampEnvelope || {});

        const restoredSetStates = Array.isArray(ui.keyswitchSets) ? ui.keyswitchSets : [];
        restoredSetStates.forEach((snapshotSet) => {
          const matched = matchRestoredKeyswitchSet(snapshotSet);
          if (!matched) return;
          const restoredName = String(snapshotSet?.name || matched?.name || "");
          matched.manualRanges = resolveLoadedManualRanges(
            snapshotSet?.manualRanges,
            matched.manualRanges
          );
          matched.loopPlaybackEnabled = snapshotSet?.loopPlaybackEnabled !== false;
          matched.gainDb = clampKeyswitchGainDb(snapshotSet?.gainDb ?? matched?.gainDb ?? 0);
          matched.openStringMidis = normalizeOpenStringMidiList(
            snapshotSet?.openStringMidis
            ?? matched?.openStringMidis
          );
          matched.openStringColorsByMidi = normalizeOpenStringColorMap(
            snapshotSet?.openStringColorsByMidi
            ?? matched?.openStringColorsByMidi,
            matched.openStringMidis
          );
          matched.playbackMode = normalizeKeyswitchTriggerModeName(restoredName) !== "manual"
            ? "oneshot"
            : normalizeKeyswitchPlaybackMode(snapshotSet?.playbackMode || matched.playbackMode);
        });

        const activeSetSnapshot = restoredSetStates.find((item) => !!item?.active);
        const activeSet = matchRestoredKeyswitchSet(activeSetSnapshot)
          || matchRestoredKeyswitchSet({
            id: ui.activeMapSetId,
            name: "",
            key: "",
            keyMidi: null
          });
        state.activeMapSetId = activeSet ? activeSet.id : (state.keyswitchSets[0]?.id || "base");
        applyAutoControlsSnapshot(ui.auto || {});
        applySequencerSnapshot(ui.sequencer || {}, false);
        applyStrumSnapshot(ui.strum || {});
      } finally {
        state.sessionStateRestoreInProgress = false;
      }

      renderSetup();
      renderAuto();
      resetSetupSaveButtonState();
      applyModwheelVelocityCrossfadeLink();
      updatePlayerEmptyState();
      syncAllKnobValues();
      updateStrumUi();
      emitStrumSettings();
      scheduleHostResizeForActiveTab();
      state.sessionStateRestored = true;
      state.sessionStateRestoreCompletedAt = Date.now();
      state.lastSessionPayloadSig = payloadSig;
      state.sessionStateLightweight = isLightweightPayload;
      if (!isLightweightPayload) {
        state.sessionStateHydrationRequested = false;
        if (state.sessionStateSaveQueued) {
          state.sessionStateSaveQueued = false;
          scheduleSessionStateSave(240);
        }
      }
      debugLoadLog(`restore mode | lightweight=${isLightweightPayload ? "yes" : "no"}`);
      debugLoadLog(`restore done | totalMs=${(performance.now() - restoreStart).toFixed(1)}`);
      completeLoadingOverlay("Ready");
    }

    function clampHostSize(value, min, max, fallback) {
      const num = Number(value);
      if (!Number.isFinite(num)) return fallback;
      return Math.max(min, Math.min(max, Math.round(num)));
    }

    function emitHostResize(width, height) {
      const nextWidth = clampHostSize(width, HOST_EDITOR_WIDTH, HOST_EDITOR_WIDTH, HOST_EDITOR_WIDTH);
      const nextHeight = clampHostSize(height, HOST_SETUP_MIN_HEIGHT, HOST_SETUP_MAX_HEIGHT, HOST_PLAYER_FIXED_HEIGHT);

      if (nextWidth === state.lastHostResizeWidth && nextHeight === state.lastHostResizeHeight) return;
      if (!emitNativeEvent("ui_resize", { width: nextWidth, height: nextHeight })) return;

      state.lastHostResizeWidth = nextWidth;
      state.lastHostResizeHeight = nextHeight;
    }

    function computeSetupHostHeight() {
      const tabsHeight = Math.ceil(el.tabsBar?.getBoundingClientRect?.().height || 0);
      const setupPanel = el.panels.setup;
      const setupContent = setupPanel?.querySelector?.(".setup-layout") || setupPanel?.firstElementChild || null;
      const setupStyles = setupPanel ? window.getComputedStyle(setupPanel) : null;
      const setupPaddingTop = setupStyles ? Math.ceil(Number.parseFloat(setupStyles.paddingTop) || 0) : 0;
      const setupPaddingBottom = setupStyles ? Math.ceil(Number.parseFloat(setupStyles.paddingBottom) || 0) : 0;
      const setupContentHeight = Math.ceil(setupContent?.scrollHeight || 0);
      const setupHeight = setupPaddingTop + setupPaddingBottom + setupContentHeight;
      const shellBorder = 2;
      const target = tabsHeight + setupHeight + shellBorder;
      return clampHostSize(target, HOST_PLAYER_FIXED_HEIGHT, HOST_SETUP_MAX_HEIGHT, HOST_PLAYER_FIXED_HEIGHT);
    }

    function requestHostResizeForActiveTab() {
      emitHostResize(HOST_EDITOR_WIDTH, HOST_PLAYER_FIXED_HEIGHT);
    }

    function scheduleHostResizeForActiveTab() {
      if (state.hostResizeRaf) return;
      state.hostResizeRaf = window.requestAnimationFrame(() => {
        state.hostResizeRaf = 0;
        requestHostResizeForActiveTab();
      });
    }

    function buildAutoLoopPostConfigSnapshot() {
      const loopStartPercent = getAutoLoopStartPercent();
      const loopEndPercent = Math.max(loopStartPercent, getAutoLoopEndPercent());
      return {
        loopSamples: !!el.autoLoop?.checked,
        autoLoopMode: !!el.autoLoopMode?.checked,
        loopStartPercent,
        loopEndPercent,
        cutLoopAtEnd: !!el.autoLoopCutAtEnd?.checked,
        loopCrossfadeMs: getAutoLoopCrossfadeMs()
      };
    }

    function buildDisabledAutoLoopConfigSnapshot() {
      return {
        loopSamples: false,
        autoLoopMode: false,
        loopStartPercent: 0,
        loopEndPercent: 100,
        cutLoopAtEnd: false,
        loopCrossfadeMs: 0
      };
    }

    function buildNativeAutoSamplerSettings(options = {}) {
      const forceLoopCaptureOff = !!options.forceLoopCaptureOff;
      const startMidi = noteToMidi(el.autoStart?.value) ?? 36;
      const endMidi = noteToMidi(el.autoEnd?.value) ?? 72;
      const keyswitchMode = isKeyswitchPackEnabled();
      const keyswitchInfo = keyswitchMode
        ? normalizeKeyswitchKey(el.autoAuthor?.value || "", 12)
        : { key: "", keyMidi: null, valid: true };
      const loopConfig = buildAutoLoopPostConfigSnapshot();
      return {
        startMidi,
        endMidi,
        intervalSemitones: getAutoInterval(),
        velocityLayers: getAutoVelocityLayers(),
        roundRobinsPerNote: getAutoRRPerNote(),
        sustainMs: getAutoHoldMs(),
        releaseTailMs: getAutoTailMs(),
        prerollMs: getAutoPrerollMs(),
        destinationFolder: String(el.autoDestination?.value || "").trim(),
        instrumentName: String(el.autoInstrument?.value || (keyswitchMode ? "Keyswitch" : "Instrument")).trim(),
        keyswitchMode,
        keyswitchKey: keyswitchMode ? String(keyswitchInfo.key || "C0").trim() : "",
        loopSamples: forceLoopCaptureOff ? false : loopConfig.loopSamples,
        autoLoopMode: forceLoopCaptureOff ? false : loopConfig.autoLoopMode,
        loopStartPercent: loopConfig.loopStartPercent,
        loopEndPercent: loopConfig.loopEndPercent,
        cutLoopAtEnd: forceLoopCaptureOff ? false : loopConfig.cutLoopAtEnd,
        loopCrossfadeMs: loopConfig.loopCrossfadeMs,
        modwheelVelocityControl: !!el.autoModwheelVelocity?.checked,
        normalizeRecorded: !!el.autoNormalizeRecorded?.checked
      };
    }

    function getAutoLoopConfigFromPayload(payload) {
      const info = (payload && typeof payload === "object") ? payload : {};
      const loopStartPercent = clampAutoPercent(info.loopStartPercent ?? getAutoLoopStartPercent());
      const loopEndPercent = Math.max(loopStartPercent, clampAutoPercent(info.loopEndPercent ?? getAutoLoopEndPercent()));
      return {
        loopSamples: !!(info.loopSamples ?? el.autoLoop?.checked),
        autoLoopMode: !!(info.autoLoopMode ?? el.autoLoopMode?.checked),
        cutLoopAtEnd: !!(info.cutLoopAtEnd ?? el.autoLoopCutAtEnd?.checked),
        loopStartPercent,
        loopEndPercent,
        loopCrossfadeMs: clampAutoMs(info.loopCrossfadeMs ?? getAutoLoopCrossfadeMs(), 0, 60000)
      };
    }

    function resolveAutoLoopConfigForCapturedTake(payload) {
      const hasOwn = (obj, key) => !!obj && typeof obj === "object" && Object.prototype.hasOwnProperty.call(obj, key);
      const snapshot = state.nativeAutoSamplerLoopPostConfig;
      if (snapshot && typeof snapshot === "object" && hasOwn(snapshot, "loopSamples")) {
        return getAutoLoopConfigFromPayload(snapshot);
      }
      if (hasOwn(payload, "loopSamples")) {
        return getAutoLoopConfigFromPayload(payload);
      }
      return getAutoLoopConfigFromPayload(buildDisabledAutoLoopConfigSnapshot());
    }

    function applyManualLoopConfigToEntry(entry, loopConfig, durationSec = null) {
      ensureEntryEditorState(entry);
      if (!loopConfig.loopSamples) {
        entry.loopStartNorm = 0;
        entry.loopEndNorm = 1;
        entry.loopFadeInNorm = 0;
        entry.loopEnabled = false;
        return;
      }

      const minGap = 0.002;
      const startNorm = clamp01(loopConfig.loopStartPercent / 100);
      const endNormRaw = clamp01(loopConfig.loopEndPercent / 100);
      const endNorm = Math.max(Math.min(1, startNorm + minGap), endNormRaw);
      entry.loopStartNorm = startNorm;
      entry.loopEndNorm = endNorm;
      entry.loopEnabled = true;

      if (Number.isFinite(durationSec) && durationSec > 0.0001) {
        const fadeNorm = clamp01((loopConfig.loopCrossfadeMs / 1000) / durationSec);
        entry.loopFadeInNorm = Math.max(0, startNorm - Math.min(startNorm, fadeNorm));
      } else {
        entry.loopFadeInNorm = startNorm;
      }
      ensureEntryEditorState(entry);
    }

    function encodeAudioBufferToWavBlob(audioBuffer) {
      const channels = Math.max(1, Math.min(2, Number(audioBuffer?.numberOfChannels) || 1));
      const sampleRate = Math.max(8000, Math.round(Number(audioBuffer?.sampleRate) || 44100));
      const length = Math.max(0, Number(audioBuffer?.length) || 0);
      const bytesPerSample = 4;
      const blockAlign = channels * bytesPerSample;
      const byteRate = sampleRate * blockAlign;
      const dataSize = length * blockAlign;
      const buffer = new ArrayBuffer(44 + dataSize);
      const view = new DataView(buffer);

      const writeAscii = (offset, text) => {
        for (let i = 0; i < text.length; i += 1) view.setUint8(offset + i, text.charCodeAt(i));
      };

      writeAscii(0, "RIFF");
      view.setUint32(4, 36 + dataSize, true);
      writeAscii(8, "WAVE");
      writeAscii(12, "fmt ");
      view.setUint32(16, 16, true);
      view.setUint16(20, 3, true);
      view.setUint16(22, channels, true);
      view.setUint32(24, sampleRate, true);
      view.setUint32(28, byteRate, true);
      view.setUint16(32, blockAlign, true);
      view.setUint16(34, 32, true);
      writeAscii(36, "data");
      view.setUint32(40, dataSize, true);

      let offset = 44;
      const channelData = [];
      for (let ch = 0; ch < channels; ch += 1) {
        channelData.push(audioBuffer.getChannelData(ch));
      }
      for (let i = 0; i < length; i += 1) {
        for (let ch = 0; ch < channels; ch += 1) {
          const sample = Math.max(-1, Math.min(1, Number(channelData[ch][i]) || 0));
          view.setFloat32(offset, sample, true);
          offset += 4;
        }
      }

      return new Blob([buffer], { type: "audio/wav" });
    }

    async function normalizeEntryAudioPeak(entry, sourceAudioBuffer = null, targetPeak = 0.999) {
      if (!entry || !entry.sampleUrl) return false;
      ensureEntryEditorState(entry);

      let audioBuffer = sourceAudioBuffer;
      if (!audioBuffer) {
        try {
          const waveform = await getWaveformForEntry(entry);
          audioBuffer = waveform?.audioBuffer || null;
        } catch {
          audioBuffer = null;
        }
      }
      if (!audioBuffer) return false;

      const channels = Math.max(1, Number(audioBuffer.numberOfChannels) || 1);
      const totalSamples = Math.max(0, Number(audioBuffer.length) || 0);
      if (totalSamples <= 0) return false;

      let peak = 0;
      for (let ch = 0; ch < channels; ch += 1) {
        const data = audioBuffer.getChannelData(ch);
        for (let i = 0; i < totalSamples; i += 1) {
          const value = Math.abs(data[i] || 0);
          if (value > peak) peak = value;
        }
      }

      if (peak <= 0.000001) return false;

      const safeTarget = Math.max(0.01, Math.min(0.999, Number(targetPeak) || 0.999));
      const gain = safeTarget / peak;
      if (!Number.isFinite(gain) || gain <= 0) return false;
      if (Math.abs(gain - 1) < 0.0001) return false;

      const sampleRate = Math.max(8000, Number(audioBuffer.sampleRate) || 44100);
      const context = ensureAudioContext();
      const normalized = context.createBuffer(channels, totalSamples, sampleRate);

      for (let ch = 0; ch < channels; ch += 1) {
        const src = audioBuffer.getChannelData(ch);
        const out = normalized.getChannelData(ch);
        for (let i = 0; i < totalSamples; i += 1) {
          out[i] = Math.max(-1, Math.min(1, (src[i] || 0) * gain));
        }
      }

      const prevUrl = entry.sampleUrl;
      const wavBlob = encodeAudioBufferToWavBlob(normalized);
      const nextUrl = URL.createObjectURL(wavBlob);
      entry.sampleUrl = nextUrl;
      entry.sampleDataUrl = "";
      entry.autoCapturePending = false;
      if (!String(entry.manifestPath || "").trim()) {
        try { await ensureEntryRuntimeSampleDataUrl(entry); } catch {}
      }

      if (prevUrl) {
        state.waveformCache.delete(prevUrl);
        if (prevUrl.startsWith("blob:")) URL.revokeObjectURL(prevUrl);
      }
      state.waveformCache.set(nextUrl, {
        peaks: buildWaveformPeaks(normalized),
        durationSec: Number(normalized.duration) || 0,
        audioBuffer: normalized
      });

      return true;
    }

    async function normalizeAllSamples() {
      if (el.keyswitchMapNormalizeBtn) el.keyswitchMapNormalizeBtn.disabled = true;

      try {
        const allEntries = [];
        const baseEntries = (Array.isArray(state.entries) ? state.entries : []).filter((e) => e && e.valid);
        allEntries.push(...baseEntries);
        (Array.isArray(state.keyswitchSets) ? state.keyswitchSets : []).forEach((set) => {
          if (set && Array.isArray(set.entries)) {
            allEntries.push(...set.entries.filter((e) => e && e.valid));
          }
        });

        if (!allEntries.length) {
          setStatus(el.setupStatus, "No samples to normalize.", "warn");
          return;
        }

        const isNative = !!getNativeBackend();
        let normalizedCount = 0;

        for (const entry of allEntries) {
          if (!entry.sampleUrl && isNative) {
            const dataUrl = await requestSampleDataForEntrySave(entry, 4000).catch(() => "");
            if (dataUrl) entry.sampleUrl = dataUrl;
          }
          if (!entry.sampleUrl) continue;
          const ok = await normalizeEntryAudioPeak(entry).catch(() => false);
          if (ok) normalizedCount += 1;
        }

        if (normalizedCount > 0) {
          renderSetup();
          renderPlayerKeyboard();
          flushSessionStateToNative(true, { includeEmbeddedSampleData: true });
        }

        setStatus(el.setupStatus, `Normalized ${normalizedCount} of ${allEntries.length} samples.`, normalizedCount > 0 ? "ok" : "warn");
      } finally {
        if (el.keyswitchMapNormalizeBtn) el.keyswitchMapNormalizeBtn.disabled = false;
      }
    }

    async function trimEntryAudioAtLoopEnd(entry, sourceAudioBuffer = null) {
      if (!entry || !entry.sampleUrl) return false;
      ensureEntryEditorState(entry);

      let audioBuffer = sourceAudioBuffer;
      if (!audioBuffer) {
        try {
          const waveform = await getWaveformForEntry(entry);
          audioBuffer = waveform?.audioBuffer || null;
        } catch {
          audioBuffer = null;
        }
      }
      if (!audioBuffer) return false;

      const totalSamples = Math.max(0, Number(audioBuffer.length) || 0);
      if (totalSamples <= 4) return false;

      const endNorm = clamp01(entry.loopEndNorm ?? 1);
      const cutSample = Math.max(4, Math.min(totalSamples, Math.round(endNorm * totalSamples)));
      if (cutSample >= totalSamples) return false;

      const channels = Math.max(1, Number(audioBuffer.numberOfChannels) || 1);
      const sampleRate = Math.max(8000, Number(audioBuffer.sampleRate) || 44100);
      const context = ensureAudioContext();
      const trimmed = context.createBuffer(channels, cutSample, sampleRate);
      for (let ch = 0; ch < channels; ch += 1) {
        const source = audioBuffer.getChannelData(ch);
        trimmed.copyToChannel(source.subarray(0, cutSample), ch, 0);
      }

      const prevUrl = entry.sampleUrl;
      const wavBlob = encodeAudioBufferToWavBlob(trimmed);
      const nextUrl = URL.createObjectURL(wavBlob);
      entry.sampleUrl = nextUrl;
      entry.sampleDataUrl = "";
      entry.autoCapturePending = false;
      if (!String(entry.manifestPath || "").trim()) {
        try { await ensureEntryRuntimeSampleDataUrl(entry); } catch {}
      }

      const safeCutNorm = cutSample / totalSamples;
      const startNorm = clamp01(entry.loopStartNorm ?? 0);
      const fadeNorm = clamp01(entry.loopFadeInNorm ?? startNorm);
      entry.loopStartNorm = safeCutNorm > 0 ? clamp01(startNorm / safeCutNorm) : 0;
      entry.loopFadeInNorm = safeCutNorm > 0 ? clamp01(fadeNorm / safeCutNorm) : 0;
      entry.loopEndNorm = 1;
      entry.loopEnabled = true;
      ensureEntryEditorState(entry);

      if (prevUrl) {
        state.waveformCache.delete(prevUrl);
        if (prevUrl.startsWith("blob:")) URL.revokeObjectURL(prevUrl);
      }
      state.waveformCache.set(nextUrl, {
        peaks: buildWaveformPeaks(trimmed),
        durationSec: Number(trimmed.duration) || 0,
        audioBuffer: trimmed
      });

      scheduleSessionStateSave(600);
      return true;
    }

    async function applyAutoLoopConfigToEntry(entry, payload) {
      if (!entry || !entry.sampleUrl) return;
      const loopConfig = getAutoLoopConfigFromPayload(payload);
      if (!loopConfig.loopSamples) {
        applyManualLoopConfigToEntry(entry, loopConfig, null);
        return;
      }

      let waveform = null;
      try {
        waveform = await getWaveformForEntry(entry);
      } catch {
        waveform = null;
      }

      const durationSec = Number.isFinite(waveform?.durationSec) ? waveform.durationSec : null;
      applyManualLoopConfigToEntry(entry, loopConfig, durationSec);

      if (loopConfig.autoLoopMode && waveform?.audioBuffer) {
        const candidates = buildLoopCandidatesFromBuffer(entry, waveform.audioBuffer, 7, loopConfig.loopCrossfadeMs);
        const best = pickBestAutoLoopCandidate(waveform.audioBuffer, candidates);
        if (best) {
          applyLoopCandidateToEntry(entry, best);
        }
      }

      if (loopConfig.cutLoopAtEnd) {
        await trimEntryAudioAtLoopEnd(entry, waveform?.audioBuffer || null);
      }
    }

    function runDeferredAutoLoopPass(loopPayloadOverride = null) {
      if (state.nativeAutoSamplerActive) return;
      const uniqueOrders = Array.from(new Set(
        (state.deferredAutoLoopOrders || [])
          .map((value) => Math.round(Number(value)))
          .filter((value) => Number.isFinite(value))
      ));
      state.deferredAutoLoopOrders = [];
      if (!uniqueOrders.length) return;

      const payload = (loopPayloadOverride && typeof loopPayloadOverride === "object")
        ? loopPayloadOverride
        : (state.nativeAutoSamplerLoopPostConfig || buildDisabledAutoLoopConfigSnapshot());
      const tasks = uniqueOrders.map((order) => {
        const entry = getMapEntryByOrder(order);
        if (!entry) return Promise.resolve();
        return applyAutoLoopConfigToEntry(entry, payload).catch(() => {});
      });

      Promise.all(tasks).then(() => {
        renderSetup();
        syncAllKnobValues();
        scheduleSessionStateSave(320);
      });
    }

    function handleNativeAutoSamplerStatus(payload) {
      const info = (payload && typeof payload === "object") ? payload : {};
      const wasActive = !!state.nativeAutoSamplerActive;
      state.nativeAutoSamplerAvailable = true;
      state.nativeAutoSamplerActive = !!info.active;
      state.nativeAutoSamplerExpected = Math.max(0, Math.round(Number(info.expected) || 0));
      const capturedFromStatus = Math.max(0, Math.round(Number(info.captured) || 0));
      state.nativeAutoSamplerCaptured = Math.max(capturedFromStatus, state.nativeAutoSamplerTakeCount);
      state.nativeAutoSamplerInputDetected = !!info.inputDetected;
      state.nativeAutoSamplerMessage = String(info.message || "").trim();
      if (!state.nativeAutoSamplerActive && state.nativeAutoSamplerCaptured <= 0) {
        state.nativeAutoSamplerTakeCount = 0;
      }

      if (state.nativeAutoSamplerMessage) {
        let type = "ok";
        if (!state.nativeAutoSamplerInputDetected && state.nativeAutoSamplerMessage.toLowerCase().includes("no input")) {
          type = "warn";
        }
        setStatus(el.setupStatus, state.nativeAutoSamplerMessage, type);
      }

      if (wasActive && !state.nativeAutoSamplerActive) {
        const finishedLoopPayload = state.nativeAutoSamplerLoopPostConfig;
        runDeferredAutoLoopPass(finishedLoopPayload);
        state.nativeAutoSamplerLoopPostConfig = null;
      }

      if (!state.nativeAutoSamplerActive) {
        state.nativeAutoSamplerNormalizeRequested = false;
      }

      updateStartSamplingButtonLabel();
    }

    function handleNativeDestinationFolderSelected(payload) {
      const info = (payload && typeof payload === "object") ? payload : {};
      const path = applyAutoDestinationPath(info.path || "");
      if (!path) return;

      const requestId = Math.round(Number(info.requestId));
      if (Number.isFinite(requestId) && state.pendingDestinationFolderRequests.has(requestId)) {
        const pending = state.pendingDestinationFolderRequests.get(requestId);
        state.pendingDestinationFolderRequests.delete(requestId);
        window.clearTimeout(pending.timeoutId);
        pending.resolve(path);
        return;
      }

      const firstPending = state.pendingDestinationFolderRequests.entries().next();
      if (!firstPending.done) {
        const [pendingId, pending] = firstPending.value;
        state.pendingDestinationFolderRequests.delete(pendingId);
        window.clearTimeout(pending.timeoutId);
        pending.resolve(path);
      }
    }

    function appendNativeAutoSamplerTake(payload) {
      const info = (payload && typeof payload === "object") ? payload : {};
      const fileNameRaw = String(info.fileName || "").trim();
      const fileName = fileNameRaw || `AUTO_${Date.now()}.wav`;
      const dataUrl = String(info.dataUrl || "").trim();
      const hasAudioPayload = !!dataUrl;

      const rootMidi = Math.max(0, Math.min(127, Math.round(Number(info.rootMidi) || 60)));
      const velocityLayer = Math.max(1, Math.min(5, Math.round(Number(info.velocityLayer) || 1)));
      const rrIndexRaw = Math.round(Number(info.rrIndex));
      const rrIndex = Number.isFinite(rrIndexRaw) && rrIndexRaw > 0 ? rrIndexRaw : null;
      const velocityLow = Math.max(1, Math.min(127, Math.round(Number(info.velocityLow) || 1)));
      const velocityHigh = Math.max(velocityLow, Math.min(127, Math.round(Number(info.velocityHigh) || 127)));
      const velocity127 = Math.max(1, Math.min(127, Math.round(Number(info.velocity) || velocityHigh)));
      const hadValidEntries = state.entries.some((entry) => entry.valid);
      const normalizedRr = rrIndex === null ? null : Math.round(rrIndex);
      const pendingEntry = state.entries.find((entry) => (
        entry.valid
        && entry.autoCapturePending
        && entry.rootMidi === rootMidi
        && entry.velocityLayer === velocityLayer
        && ((Number.isFinite(entry.rrIndex) ? Math.round(entry.rrIndex) : null) === normalizedRr)
      )) || null;

      let entry = pendingEntry;
      if (!entry) {
        const nextOrder = state.entries.reduce((max, item) => (
          Number.isFinite(item?.order) ? Math.max(max, Math.round(item.order)) : max
        ), -1) + 1;

        entry = {
          fileName,
          order: nextOrder,
          sampleUrl: "",
          fineTuneCents: 0,
          sampleStartNorm: 0,
          loopStartNorm: 0,
          loopEndNorm: 1,
          loopFadeInNorm: 0,
          valid: true,
          reason: "",
          noteToken: midiToNote(rootMidi),
          rootMidi,
          velocityLayer,
          rrIndex,
          loopEnabled: false,
          hasVelocityToken: true,
          hasRRToken: rrIndex !== null,
          suffixSerial: null,
          velocityLow,
          velocityHigh,
          velocity127,
          autoCapturePending: !hasAudioPayload
        };
        state.entries.push(entry);
        if (!hadValidEntries) {
          state.setupOctaveStart = Math.floor(rootMidi / 12) * 12;
        }
        state.nativeAutoSamplerTakeCount = Math.max(0, state.nativeAutoSamplerTakeCount) + 1;
        state.nativeAutoSamplerCaptured = Math.max(state.nativeAutoSamplerCaptured, state.nativeAutoSamplerTakeCount);
      } else {
        entry.fileName = fileName;
        entry.noteToken = midiToNote(rootMidi);
        entry.rootMidi = rootMidi;
        entry.velocityLayer = velocityLayer;
        entry.rrIndex = rrIndex;
        entry.velocityLow = velocityLow;
        entry.velocityHigh = velocityHigh;
        entry.velocity127 = velocity127;
      }

      if (hasAudioPayload) {
        const sampleUrl = dataUrl;
        if (!sampleUrl) return;
        if (entry.sampleUrl && entry.sampleUrl.startsWith("blob:") && entry.sampleUrl !== sampleUrl) {
          URL.revokeObjectURL(entry.sampleUrl);
        }
        entry.sampleUrl = sampleUrl;
        entry.sampleDataUrl = sampleUrl.startsWith("data:") ? sampleUrl : "";
        entry.autoCapturePending = false;
      }

      state.activeMapSetId = "base";
      state.rrCursor = {};
      state.mapMatrixRrCursor = {};
      state.mapMatrixPaintActive = false;
      state.mapMatrixLastPaintCellKey = "";
      assignImplicitVelocityLayers();
      renderSetup();
      updatePlayerEmptyState();
      syncAllKnobValues();
      updateStartSamplingButtonLabel();
      scheduleSessionStateSave(hasAudioPayload ? 250 : 500);

      if (!hasAudioPayload) return;

      void (async () => {
        const normalizeRequested = !!(info.normalized
          || state.nativeAutoSamplerNormalizeRequested
          || el.autoNormalizeRecorded?.checked);
        if (normalizeRequested) {
          const normalized = await normalizeEntryAudioPeak(entry).catch(() => false);
          if (normalized && state.selectedMapEntryOrder === entry.order) {
            await openSampleEditor(entry).catch(() => {});
          }
        }

        if (!state.entries.includes(entry)) return;

        const loopPayload = state.nativeAutoSamplerLoopPostConfig || info || buildDisabledAutoLoopConfigSnapshot();
        const loopConfig = resolveAutoLoopConfigForCapturedTake(loopPayload);
        applyManualLoopConfigToEntry(entry, loopConfig, null);

        if (loopConfig.loopSamples && loopConfig.autoLoopMode) {
          if (state.nativeAutoSamplerActive) {
            state.deferredAutoLoopOrders.push(entry.order);
          } else {
            await applyAutoLoopConfigToEntry(entry, loopPayload).catch(() => {});
          }
        } else if (loopConfig.loopSamples && loopConfig.cutLoopAtEnd) {
          const trimmed = await trimEntryAudioAtLoopEnd(entry).catch(() => false);
          if (trimmed && state.selectedMapEntryOrder === entry.order) {
            await openSampleEditor(entry).catch(() => {});
          }
        }

        if (!state.entries.includes(entry)) return;
        renderSetup();
        syncAllKnobValues();
        scheduleSessionStateSave(320);
      })();
    }

    function setupNativeAutoSamplerBridge() {
      const backend = getNativeBackend();
      if (!backend || typeof backend.addEventListener !== "function") return;
      if (state.nativeAutoSamplerListeners.length) return;
      state.nativeAutoSamplerAvailable = true;

      try {
        const statusToken = backend.addEventListener("autosampler_status", (payload) => {
          handleNativeAutoSamplerStatus(payload);
        });
        const takeToken = backend.addEventListener("autosampler_take", (payload) => {
          appendNativeAutoSamplerTake(payload);
        });
        const destinationToken = backend.addEventListener("destination_folder_selected", (payload) => {
          handleNativeDestinationFolderSelected(payload);
        });
        state.nativeAutoSamplerListeners = [statusToken, takeToken, destinationToken];
      } catch {
        state.nativeAutoSamplerAvailable = false;
      }
    }

    function getMapSetIdForSlot(slot) {
      const safeSlot = Math.max(0, Math.round(Number(slot) || 0));
      if (safeSlot <= 0) return "base";
      const sets = Array.isArray(state.keyswitchSets) ? state.keyswitchSets : [];
      return String(sets[safeSlot - 1]?.id || "");
    }

    function applyHostHeldMidiNotesToPlayerKeys() {
      if (!el.playerKeyboard) return;
      const heldNotes = state.hostHeldMidiNotes instanceof Set ? state.hostHeldMidiNotes : new Set();
      const keyNodes = el.playerKeyboard.querySelectorAll(".player-key[data-midi]");
      keyNodes.forEach((keyNode) => {
        const midi = Number(keyNode.dataset.midi);
        if (!Number.isFinite(midi)) return;
        if (heldNotes.has(midi) && !keyNode.disabled) {
          keyNode.classList.add("is-down");
          return;
        }
        if (!keyNode.classList.contains("keyswitch-latched")) {
          keyNode.classList.remove("is-down");
        }
      });
    }

    function handleNativeMidiActivity(payload) {
      const rawNotes = Array.isArray(payload?.notes) ? payload.notes : [];
      const heldNotes = [];
      rawNotes.forEach((value) => {
        const midi = Math.round(Number(value));
        if (!Number.isFinite(midi)) return;
        if (midi < 0 || midi > 127) return;
        heldNotes.push(midi);
      });
      heldNotes.sort((a, b) => a - b);
      const uniqueHeldNotes = [];
      for (let i = 0; i < heldNotes.length; i += 1) {
        if (i === 0 || heldNotes[i] !== heldNotes[i - 1]) uniqueHeldNotes.push(heldNotes[i]);
      }

      const nextKey = uniqueHeldNotes.join(",");
      const notesChanged = nextKey !== state.hostHeldMidiNotesKey;
      if (notesChanged) {
        state.hostHeldMidiNotes = new Set(uniqueHeldNotes);
        state.hostHeldMidiNotesKey = nextKey;
      }

      const rawSequencerStep = payload?.sequencerStep;
      const sequencerStep = Number.isFinite(Number(rawSequencerStep))
        ? Math.max(-1, Math.min(SEQUENCER_STEP_COUNT - 1, Math.round(Number(rawSequencerStep))))
        : -1;
      const sequencerStepChanged = sequencerStep !== state.sequencerCurrentStep;
      if (sequencerStepChanged) {
        state.sequencerCurrentStep = sequencerStep;
      }

      const rawActiveSlot = payload?.activeSlot;
      const hasActiveSlot = Number.isFinite(Number(rawActiveSlot));
      const activeSlot = hasActiveSlot ? Math.max(0, Math.round(Number(rawActiveSlot))) : null;
      const incomingMod = Number(payload?.modWheelValue);
      const incomingExpression = Number(payload?.expressionValue);
      let wheelsChanged = false;
      if (Number.isFinite(incomingMod)) {
        const mod = Math.max(0, Math.min(1, incomingMod));
        if (Math.abs(mod - state.modWheelValue) > 0.0005) {
          state.modWheelValue = mod;
          wheelsChanged = true;
        }
      }
      if (Number.isFinite(incomingExpression)) {
        const expression = Math.max(0, Math.min(1, incomingExpression));
        if (Math.abs(expression - state.expressionValue) > 0.0005) {
          state.expressionValue = expression;
          wheelsChanged = true;
        }
      }
      let shouldRenderKeyboard = false;
      if (activeSlot !== null && activeSlot !== state.hostMidiActiveSlot) {
        state.hostMidiActiveSlot = activeSlot;
        const slotSetId = getMapSetIdForSlot(activeSlot);
        if (slotSetId && slotSetId !== state.activeMapSetId) {
          state.activeMapSetId = slotSetId;
          updateKeyswitchMapSelector();
          shouldRenderKeyboard = true;
        }
      }

      if (shouldRenderKeyboard) {
        renderPlayerKeyboard();
        if (sequencerStepChanged) updateSequencerStepHighlight();
        return;
      }

      if (notesChanged) {
        applyHostHeldMidiNotesToPlayerKeys();
      }

      if (wheelsChanged) {
        updatePerformanceWheelVisuals();
      }

      if (sequencerStepChanged) {
        updateSequencerStepHighlight();
      }
    }

    // -----------------------------------------------------------------------
    //  Native file picker / drag-drop handlers
    // -----------------------------------------------------------------------

    function handleNativePickedAudioFiles(payload) {
      const files = Array.isArray(payload?.files) ? payload.files : [];
      if (!files.length) return;
      const audioFiles = files.filter((f) => f && typeof f.name === "string" && AUDIO_REGEX.test(f.name));
      if (!audioFiles.length) return;

      const targetMidi = state.keyContextMenuTargetMidi;
      const targetLayer = state.keyContextMenuTargetLayer;
      state.keyContextMenuTargetMidi = null;
      state.keyContextMenuTargetLayer = null;

      if (Number.isFinite(targetMidi)) {
        handleNativePickedAudioFilesForKey(audioFiles, targetMidi, targetLayer);
        return;
      }

      ensureSessionStateWritable("native-audio-pick");
      state.packLoaded = false;
      const owner = getMutableActiveMapEntriesStore();
      const start = owner.length;
      audioFiles.forEach((file, idx) => {
        const parsed = parseFilename(String(file.name || ""));
        const entry = {
          fileName: String(file.name || "sample.wav"),
          manifestPath: String(file.path || ""),
          order: start + idx,
          sampleUrl: "",
          sampleDataUrl: "",
          fineTuneCents: 0,
          sampleStartNorm: 0,
          loopStartNorm: 0,
          loopEndNorm: 1,
          loopFadeInNorm: 0,
          ...parsed
        };
        owner.push(entry);
      });
      state.rrCursor = {};
      state.mapMatrixRrCursor = {};
      state.mapMatrixPaintActive = false;
      state.mapMatrixLastPaintCellKey = "";
      assignImplicitVelocityLayers();
      renderSetup();
      updatePlayerEmptyState();
      setKeyboardMapCollapsed(false);
      syncAllKnobValues();
      scheduleSessionStateSave(350);
    }

    function handleNativePickedAudioFilesForKey(audioFiles, rootMidi, chosenLayer) {
      ensureSessionStateWritable("native-audio-pick-key");
      state.packLoaded = false;
      const root = Math.max(0, Math.min(127, Math.round(rootMidi)));
      const noteToken = midiToNote(root);
      const owner = getMutableActiveMapEntriesStore();
      if (!Array.isArray(owner)) return;
      const existingFileNames = new Set(owner.map((entry) => String(entry?.fileName || "").trim().toLowerCase()).filter(Boolean));

      if (state.mapMatrixSplitEnabled) {
        const { rrColumns, interval } = normalizeMapMatrixState();
        const activeEntries = getActiveMapEntries().filter((e) => e && e.valid);
        const intervalRoots = getMapMatrixIntervalRoots(activeEntries, interval);
        const targetRoot = quantizeMidiToMapMatrixRoot(root, interval, intervalRoots);
        const targetLayer = Number.isFinite(chosenLayer) ? clampMapMatrixVelocityLayers(chosenLayer) : 1;
        const mapLookup = getMapMatrixEntryLookup(activeEntries, rrColumns);
        const cursorKey = getMapMatrixCursorKey(targetRoot, targetLayer);
        let cursorStart = Math.max(1, Math.min(rrColumns, Math.round(Number(state.mapMatrixRrCursor[cursorKey]) || 1)));

        audioFiles.forEach((file) => {
          const targetRr = findNextMapMatrixRrSlot(targetRoot, targetLayer, rrColumns, mapLookup, cursorStart);
          if (targetRr === null) return;
          const entry = createMatrixMappedEntryFromFile(
            { name: file.name, path: file.path || "" },
            targetRoot,
            targetLayer,
            rrColumns > 1 ? targetRr : null,
            existingFileNames
          );
          owner.push(entry);
          ensureEntryEditorState(entry);
          mapLookup.set(getMapMatrixCellKey(targetRoot, targetLayer, targetRr), entry);
          cursorStart = (targetRr % rrColumns) + 1;
        });
        state.mapMatrixRrCursor[cursorKey] = cursorStart;
      } else {
        audioFiles.forEach((file) => {
          const parsed = parseFilename(String(file.name || ""));
          const loopEnabled = parsed.valid ? !!parsed.loopEnabled : hasLoopTokenInFileName(file.name);
          const velocityLayer = parsed.valid && Number.isFinite(parsed.velocityLayer) ? parsed.velocityLayer : 1;
          const rrIndex = parsed.valid && Number.isFinite(parsed.rrIndex) ? parsed.rrIndex : null;
          const fileName = buildMappedImportFileName({
            originalName: String(file.name || "sample.wav"),
            rootMidi: root,
            velocityLayer,
            rrIndex,
            loopEnabled
          }, existingFileNames);
          const entry = {
            fileName,
            manifestPath: String(file.path || ""),
            order: getNextMapEntryOrder(),
            sampleUrl: "",
            sampleDataUrl: "",
            fineTuneCents: 0,
            sampleStartNorm: 0,
            loopStartNorm: 0,
            loopEndNorm: 1,
            loopFadeInNorm: 0,
            valid: true,
            reason: "",
            noteToken,
            rootMidi: root,
            velocityLayer,
            rrIndex,
            loopEnabled,
            hasVelocityToken: parsed.valid && !!parsed.hasVelocityToken,
            hasRRToken: parsed.valid && !!parsed.hasRRToken,
            suffixSerial: parsed.valid && Number.isFinite(parsed.suffixSerial) ? parsed.suffixSerial : null
          };
          owner.push(entry);
          ensureEntryEditorState(entry);
        });
      }

      state.mapMatrixPaintActive = false;
      state.mapMatrixLastPaintCellKey = "";
      applyMapMatrixIntervalRanges(getActiveMapEntries());
      renderSetup();
      renderPlayerKeyboard();
      updatePlayerEmptyState();
      setKeyboardMapCollapsed(false);
      syncAllKnobValues();
      scheduleSessionStateSave(350);
    }
